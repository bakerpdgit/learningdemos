<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQA A Level CS: Compression Interactive</title>

    <!-- React & ReactDOM -->
    <script
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      crossorigin
    ></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .gap-input {
        width: auto;
        min-width: 60px;
        display: inline-block;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef } = React;

      // --- Icons (Inline SVGs to keep it standalone) ---
      const ChevronDown = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <path d="m6 9 6 6 6-6" />
        </svg>
      );
      const CheckIcon = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#16a34a"
          strokeWidth="3"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      );
      const XIcon = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#dc2626"
          strokeWidth="3"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      );
      const InfoIcon = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <path d="M12 16v-4" />
          <path d="M12 8h.01" />
        </svg>
      );

      // --- Question Data Bank (AQA Aligned) ---
      // Format for Gap Fill: {{hint:rest_of_word}}
      const QUESTIONS = [
        // Subtopic: Theory
        {
          id: 1,
          topic: "theory",
          type: "gap_fill",
          text: "Compression reduces the amount of {{s:torage}} required to save files and reduces the data {{t:ransmission}} time across networks.",
        },
        {
          id: 2,
          topic: "theory",
          type: "gap_fill",
          text: "{{L:ossless}} compression ensures the original data can be recreated exactly without losing any information, whereas {{l:ossy}} compression permanently removes unnoticeable data.",
        },
        {
          id: 3,
          topic: "theory",
          type: "gap_fill",
          text: "Run Length Encoding (RLE) replaces {{c:onsecutive}} instances of a binary pattern with one instance and a {{f:requency}} count.",
        },
        {
          id: 4,
          topic: "theory",
          type: "gap_fill",
          text: "In dictionary compression, repeated patterns are assigned a token. A dictionary is created where the token is the {{k:ey}} and the original pattern is the {{v:alue}}.",
        },

        // Subtopic: RLE
        {
          id: 5,
          topic: "rle",
          type: "rle_encode",
          rleFormat: "freq_first",
          data: "AAAAAABBBCCCCDD",
          desc: "Compress the string using Run Length Encoding. Format: Frequency * Character",
        },
        {
          id: 6,
          topic: "rle",
          type: "rle_encode",
          rleFormat: "char_first",
          data: "000000011000",
          desc: "Compress this binary sequence using RLE. Format: Character * Frequency",
        },
        {
          id: 7,
          topic: "rle",
          type: "rle_decode",
          rleFormat: "freq_first",
          data: [
            { count: 4, char: "X" },
            { count: 2, char: "Y" },
            { count: 3, char: "X" },
          ],
          desc: "Decompress the following RLE runs back to the original string. Format: Frequency * Character",
        },
        {
          id: 8,
          topic: "rle",
          type: "rle_decode",
          rleFormat: "char_first",
          data: [
            { count: 5, char: "1" },
            { count: 1, char: "0" },
            { count: 4, char: "1" },
          ],
          desc: "Decompress this binary RLE sequence. Format: Character * Frequency",
        },
        {
          id: 13,
          topic: "rle",
          type: "rle_bit_dynamic",
          mode: "encode",
          desc: "Compress this binary sequence using the dynamically generated format rules.",
        },
        {
          id: 14,
          topic: "rle",
          type: "rle_bit_dynamic",
          mode: "decode",
          desc: "Decompress this binary stream using the dynamically generated format rules.",
        },

        // Subtopic: Dictionary
        {
          id: 9,
          topic: "dict",
          type: "dict_encode",
          data: "the red car and the blue car raced past the other red car",
          desc: "Use dictionary indexing to compress this sentence. Create at least one key/value pair. Separate tokens/words with spaces in output.",
        },
        {
          id: 10,
          topic: "dict",
          type: "dict_encode",
          data: "ding dong ding ding dong bell ding dong bell",
          desc: "Compress this sequence using a dictionary. Create keys for repeated patterns.",
        },
        {
          id: 11,
          topic: "dict",
          type: "dict_decode",
          dict: { 1: "hello", 2: "world" },
          output: "1 2 1",
          desc: "Use the dictionary provided to decompress the output sequence.",
        },
        {
          id: 12,
          topic: "dict",
          type: "dict_decode",
          dict: { A: "1010", B: "1100" },
          output: "A B A A",
          desc: "Decompress this sequence. Note: the original sequence did not have spaces.",
        },
      ];

      // --- Helper Components ---

      // 1. Gap Fill Component
      const GapFillTask = ({
        question,
        onCheck,
        checkStatus,
        showSolution,
      }) => {
        const parts = useMemo(() => {
          const regex = /(\{\{[^}]+\}\})/g;
          const splitText = question.text.split(regex);
          return splitText.map((part) => {
            if (part.startsWith("{{") && part.endsWith("}}")) {
              const content = part.slice(2, -2);
              const [hint, rest] = content.split(":");
              return { type: "gap", hint, full: hint + rest };
            }
            return { type: "text", content: part };
          });
        }, [question.text]);

        const [userInputs, setUserInputs] = useState({});

        // Reset inputs when question changes
        useEffect(() => {
          setUserInputs({});
        }, [question.id]);

        const handleInputChange = (index, value) => {
          setUserInputs((prev) => ({ ...prev, [index]: value }));
        };

        const validate = () => {
          let isAllCorrect = true;
          let userAnswers = {};

          parts.forEach((part, index) => {
            if (part.type === "gap") {
              const input = (userInputs[index] || "").trim().toLowerCase();
              const expectedFull = part.full.toLowerCase();
              const expectedRest = part.full
                .substring(part.hint.length)
                .toLowerCase();

              // Accept if they typed the full word (e.g. "storage") OR just the missing part (e.g. "torage" after 's')
              if (input !== expectedFull && input !== expectedRest) {
                isAllCorrect = false;
              }
              userAnswers[index] = { input, expected: part.full };
            }
          });
          onCheck(isAllCorrect, userAnswers);
        };

        return (
          <div className="text-lg leading-loose">
            {parts.map((part, index) => {
              if (part.type === "text")
                return <span key={index}>{part.content}</span>;

              const isCorrectInput =
                checkStatus === "checked" &&
                (userInputs[index]?.trim().toLowerCase() ===
                  part.full.toLowerCase() ||
                  userInputs[index]?.trim().toLowerCase() ===
                    part.full.substring(part.hint.length).toLowerCase());

              const isWrongInput = checkStatus === "checked" && !isCorrectInput;

              return (
                <span key={index} className="inline-flex items-center mx-1">
                  {showSolution ? (
                    <span className="font-bold text-green-700 bg-green-100 px-2 py-1 rounded border border-green-300">
                      {part.full}
                    </span>
                  ) : (
                    <span className="relative flex items-center">
                      <span className="bg-slate-200 border border-slate-400 border-r-0 rounded-l px-2 py-1 font-mono text-slate-600 font-bold select-none">
                        {part.hint}
                      </span>
                      <input
                        type="text"
                        value={userInputs[index] || ""}
                        onChange={(e) =>
                          handleInputChange(index, e.target.value)
                        }
                        className={`border rounded-r px-2 py-1 outline-none focus:ring-2 focus:ring-blue-400 gap-input 
                                                ${isWrongInput ? "bg-red-50 border-red-500" : "border-slate-400"}
                                                ${isCorrectInput ? "bg-green-50 border-green-500" : ""}
                                            `}
                        placeholder="..."
                        disabled={
                          checkStatus === "checked" &&
                          isAllCorrectInput(parts, userInputs)
                        }
                      />
                    </span>
                  )}
                </span>
              );
            })}

            <div className="mt-6 flex gap-4 items-center">
              <button
                onClick={validate}
                className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition-colors"
              >
                Check Answers
              </button>
            </div>
          </div>
        );
      };

      // Helper to check if gapfill is totally correct for disabling inputs
      const isAllCorrectInput = (parts, inputs) => {
        for (let i = 0; i < parts.length; i++) {
          if (parts[i].type === "gap") {
            const inp = (inputs[i] || "").trim().toLowerCase();
            const full = parts[i].full.toLowerCase();
            const rest = full.substring(parts[i].hint.length);
            if (inp !== full && inp !== rest) return false;
          }
        }
        return true;
      };

      // 2. RLE Encode Component
      const RLEEncodeTask = ({
        question,
        onCheck,
        checkStatus,
        showSolution,
      }) => {
        const [runs, setRuns] = useState([{ count: "", char: "" }]);

        const isFreqFirst = question.rleFormat !== "char_first";

        useEffect(() => {
          setRuns([{ count: "", char: "" }]);
        }, [question.id]);

        const addRun = () => setRuns([...runs, { count: "", char: "" }]);

        const updateRun = (index, field, value) => {
          const newRuns = [...runs];
          newRuns[index][field] = value;
          setRuns(newRuns);
        };

        const removeRun = (index) => {
          setRuns(runs.filter((_, i) => i !== index));
        };

        const getOptimalRLE = (str) => {
          let optimal = [];
          let count = 1;
          for (let i = 1; i <= str.length; i++) {
            if (str[i] === str[i - 1]) {
              count++;
            } else {
              optimal.push({ count: count.toString(), char: str[i - 1] });
              count = 1;
            }
          }
          return optimal;
        };

        const validate = () => {
          const optimal = getOptimalRLE(question.data);
          // Check if user runs match optimal exactly (AQA requires grouping consecutive)
          const isCorrect =
            runs.length === optimal.length &&
            runs.every(
              (run, i) =>
                run.count == optimal[i].count && run.char === optimal[i].char,
            );
          onCheck(isCorrect, { userRuns: runs, optimalRuns: optimal });
        };

        const optimalSolution = getOptimalRLE(question.data);

        return (
          <div className="space-y-4">
            <div className="bg-blue-50 p-4 rounded border border-blue-200">
              <p className="font-semibold text-blue-800 mb-2">Original Data:</p>
              <p className="font-mono text-xl tracking-[0.2em] break-all">
                {question.data}
              </p>
            </div>

            {showSolution ? (
              <div className="bg-green-50 border border-green-200 p-4 rounded mt-4">
                <p className="font-bold text-green-800 mb-2">
                  Optimal RLE Solution:
                </p>
                <div className="flex flex-wrap gap-2">
                  {optimalSolution.map((r, i) => (
                    <span
                      key={i}
                      className="bg-white border border-green-400 px-3 py-1 rounded font-mono shadow-sm flex items-center gap-1"
                    >
                      <span className="text-blue-600 font-bold">
                        {isFreqFirst ? r.count : r.char}
                      </span>
                      <span className="text-slate-500 font-bold text-lg">
                        *
                      </span>
                      <span className="text-slate-800 font-bold">
                        {isFreqFirst ? r.char : r.count}
                      </span>
                    </span>
                  ))}
                </div>
              </div>
            ) : (
              <div className="mt-4">
                <p className="font-semibold mb-2">
                  Build your runs (follow requested format):
                </p>
                <div className="flex flex-wrap gap-3 items-center">
                  {runs.map((run, i) => {
                    const CountInput = (
                      <input
                        type="number"
                        min="1"
                        value={run.count}
                        onChange={(e) => updateRun(i, "count", e.target.value)}
                        className="w-16 p-1 text-center outline-none border-b border-dashed border-slate-300 focus:border-blue-500 font-mono text-blue-700 font-bold"
                        placeholder="Freq"
                      />
                    );
                    const CharInput = (
                      <input
                        type="text"
                        maxLength="1"
                        value={run.char}
                        onChange={(e) => updateRun(i, "char", e.target.value)}
                        className="w-12 p-1 text-center outline-none font-mono focus:bg-slate-100 border-b border-dashed border-slate-300"
                        placeholder="Char"
                      />
                    );

                    return (
                      <div
                        key={i}
                        className="flex items-center bg-white border border-slate-300 rounded p-1 shadow-sm gap-1"
                      >
                        {isFreqFirst ? (
                          <>
                            {CountInput}{" "}
                            <span className="font-bold text-slate-400">*</span>{" "}
                            {CharInput}
                          </>
                        ) : (
                          <>
                            {CharInput}{" "}
                            <span className="font-bold text-slate-400">*</span>{" "}
                            {CountInput}
                          </>
                        )}
                        {runs.length > 1 && (
                          <button
                            onClick={() => removeRun(i)}
                            className="text-red-400 hover:text-red-600 px-1 ml-1"
                            title="Remove run"
                          >
                            ×
                          </button>
                        )}
                      </div>
                    );
                  })}
                  <button
                    onClick={addRun}
                    className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-2 rounded text-sm font-semibold transition-colors"
                  >
                    + Add Run
                  </button>
                </div>

                <div className="mt-6 flex gap-4 items-center">
                  <button
                    onClick={validate}
                    className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition-colors"
                  >
                    Check Runs
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      };

      // 3. RLE Decode Component
      const RLEDecodeTask = ({
        question,
        onCheck,
        checkStatus,
        showSolution,
      }) => {
        const [input, setInput] = useState("");
        useEffect(() => {
          setInput("");
        }, [question.id]);

        const isFreqFirst = question.rleFormat !== "char_first";

        const expected = useMemo(() => {
          return question.data
            .map((run) => run.char.repeat(run.count))
            .join("");
        }, [question.data]);

        const validate = () => {
          onCheck(input.trim() === expected, { input, expected });
        };

        return (
          <div className="space-y-4">
            <div className="bg-slate-100 p-4 rounded border border-slate-300">
              <p className="font-semibold text-slate-700 mb-2">
                Compressed RLE Sequence:
              </p>
              <div className="flex flex-wrap gap-2">
                {question.data.map((r, i) => (
                  <span
                    key={i}
                    className="bg-white border border-slate-300 px-3 py-1 rounded font-mono shadow-sm flex items-center gap-1"
                  >
                    <span className="text-blue-600 font-bold">
                      {isFreqFirst ? r.count : r.char}
                    </span>
                    <span className="text-slate-500 font-bold text-lg">*</span>
                    <span className="text-slate-800 font-bold">
                      {isFreqFirst ? r.char : r.count}
                    </span>
                  </span>
                ))}
              </div>
            </div>

            {showSolution ? (
              <div className="bg-green-50 border border-green-200 p-4 rounded mt-4">
                <p className="font-bold text-green-800 mb-2">
                  Expanded Solution:
                </p>
                <p className="font-mono text-lg break-all tracking-widest">
                  {expected}
                </p>
              </div>
            ) : (
              <div>
                <p className="font-semibold mb-2">
                  Type the decompressed string:
                </p>
                <textarea
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  className="w-full border border-slate-300 rounded p-3 font-mono outline-none focus:ring-2 focus:ring-blue-400"
                  rows="3"
                  placeholder="e.g. XXXXYYXXX..."
                ></textarea>

                <div className="mt-4 flex gap-4 items-center">
                  <button
                    onClick={validate}
                    className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition-colors"
                  >
                    Check Decompression
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      };

      // 3a/b. RLE Bit Dynamic Component (Randomized Format & Data)
      const RLEBitDynamicTask = ({
        question,
        onCheck,
        checkStatus,
        showSolution,
      }) => {
        const [params, setParams] = useState(null);
        const [input, setInput] = useState("");

        useEffect(() => {
          // Randomize data bits (2 to 6) and freq bits (8 - dataBits)
          const dBits = Math.floor(Math.random() * 5) + 2;
          const fBits = 8 - dBits;
          const dataFirst = Math.random() > 0.5;

          const numRuns = Math.floor(Math.random() * 3) + 2; // 2 to 4 runs
          let rawData = "";
          let compData = "";
          let prevPattern = "";

          for (let i = 0; i < numRuns; i++) {
            let dPattern;
            // Ensure consecutive runs don't have the same pattern
            do {
              dPattern = Array.from({ length: dBits }, () =>
                Math.random() > 0.5 ? "1" : "0",
              ).join("");
            } while (dPattern === prevPattern);
            prevPattern = dPattern;

            const maxFreq = Math.pow(2, fBits) - 1;
            // Generate a reasonable frequency based on available bits
            const freq =
              Math.floor(Math.random() * Math.min(maxFreq - 1, 8)) + 2;
            const fPattern = freq.toString(2).padStart(fBits, "0");

            rawData += dPattern.repeat(freq);
            compData += dataFirst ? dPattern + fPattern : fPattern + dPattern;
          }

          setParams({
            dBits,
            fBits,
            dataFirst,
            rawData,
            compData,
            mode: question.mode,
          });
          setInput("");
        }, [question.id]);

        if (!params) return null;

        const isEncode = params.mode === "encode";
        const expected = isEncode ? params.compData : params.rawData;

        const validate = () => {
          const cleanInput = input.replace(/\s/g, ""); // Allow spaces for readability
          onCheck(cleanInput === expected, { input: cleanInput, expected });
        };

        const formatDesc = `${params.dBits}-bit Data and ${params.fBits}-bit Frequency`;
        const orderDesc = params.dataFirst
          ? "Data followed by Frequency"
          : "Frequency followed by Data";

        return (
          <div className="space-y-4">
            <div className="bg-slate-100 border-l-4 border-blue-500 p-3 rounded text-slate-700 mb-4 shadow-sm">
              <p>
                <strong>Bits Split:</strong> {formatDesc} (Total 8 bits per
                block)
              </p>
              <p>
                <strong>Order:</strong> {orderDesc}
              </p>
            </div>

            <div className="bg-blue-50 p-4 rounded border border-blue-200">
              <p className="font-semibold text-blue-800 mb-2">
                {isEncode ? "Original Data:" : "Compressed Binary Stream:"}
              </p>
              <p className="font-mono text-xl tracking-[0.2em] break-all">
                {isEncode ? params.rawData : params.compData}
              </p>
            </div>

            {showSolution ? (
              <div className="bg-green-50 border border-green-200 p-4 rounded mt-4">
                <p className="font-bold text-green-800 mb-2">
                  {isEncode ? "Encoded Binary Stream:" : "Decoded Solution:"}
                </p>
                <p className="font-mono text-lg break-all tracking-widest">
                  {expected}
                </p>
                <p className="text-sm mt-2 text-green-700">
                  Broken down:{" "}
                  {expected
                    .match(
                      new RegExp(`.{1,${isEncode ? 8 : params.dBits}}`, "g"),
                    )
                    ?.join(" ")}
                </p>
              </div>
            ) : (
              <div>
                <p className="font-semibold mb-2">
                  Type the {isEncode ? "encoded" : "decompressed"} binary
                  sequence (spaces ignored):
                </p>
                <textarea
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  className="w-full border border-slate-300 rounded p-3 font-mono outline-none focus:ring-2 focus:ring-blue-400"
                  rows="3"
                  placeholder={
                    isEncode ? "e.g. 10101100..." : "e.g. 00110011..."
                  }
                ></textarea>

                <div className="mt-4 flex gap-4 items-center">
                  <button
                    onClick={validate}
                    className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition-colors"
                  >
                    Check {isEncode ? "Encoding" : "Decompression"}
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      };

      // 4. Dictionary Encode Component
      const DictEncodeTask = ({
        question,
        onCheck,
        checkStatus,
        showSolution,
      }) => {
        const [dict, setDict] = useState([{ key: "", value: "" }]);
        const [output, setOutput] = useState("");

        useEffect(() => {
          setDict([{ key: "", value: "" }]);
          setOutput("");
        }, [question.id]);

        const addDictRow = () => setDict([...dict, { key: "", value: "" }]);
        const updateDict = (i, field, val) => {
          const newD = [...dict];
          newD[i][field] = val;
          setDict(newD);
        };
        const removeDictRow = (i) =>
          setDict(dict.filter((_, idx) => idx !== i));

        const validate = () => {
          // Ensure dict has values
          const validDict = dict.filter(
            (d) => d.key.trim() !== "" && d.value.trim() !== "",
          );
          if (validDict.length === 0) {
            onCheck(false, {
              error: "Dictionary must have at least one valid Key/Value pair.",
            });
            return;
          }

          // Reconstruct string
          const tokens = output.trim().split(/\s+/);
          const reconstructedArr = tokens.map((token) => {
            const dictEntry = validDict.find((d) => d.key === token);
            return dictEntry ? dictEntry.value : token;
          });

          // For words, we assume space separation.
          const reconstructed = reconstructedArr.join(" ");

          const isCorrect = reconstructed === question.data;
          onCheck(isCorrect, {
            reconstructed,
            original: question.data,
            dictUsed: validDict.length > 0,
          });
        };

        // Generate a sample solution for display
        const sampleSolution = useMemo(() => {
          return {
            d: [
              { key: "T1", value: "quick" },
              { key: "T2", value: "fox" },
            ],
            o: "the T1 brown T2 jumped over the lazy T2",
          };
        }, []);

        return (
          <div className="space-y-4">
            <div className="bg-blue-50 p-4 rounded border border-blue-200">
              <p className="font-semibold text-blue-800 mb-2">Original Data:</p>
              <p className="font-mono text-lg">{question.data}</p>
            </div>

            {showSolution ? (
              <div className="bg-green-50 border border-green-200 p-4 rounded mt-4 space-y-4">
                <p className="font-bold text-green-800">
                  Sample Solution Concept:
                </p>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <p className="font-semibold text-sm mb-1">Dictionary:</p>
                    <table className="w-full bg-white border text-sm">
                      <thead className="bg-slate-100">
                        <tr>
                          <th className="border p-1">Key (Token)</th>
                          <th className="border p-1">Value (Pattern)</th>
                        </tr>
                      </thead>
                      <tbody>
                        {sampleSolution.d.map((r, i) => (
                          <tr key={i}>
                            <td className="border p-1 text-center font-mono font-bold text-blue-600">
                              {r.key}
                            </td>
                            <td className="border p-1 text-center">
                              {r.value}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div>
                    <p className="font-semibold text-sm mb-1">
                      Compressed Output:
                    </p>
                    <p className="bg-white p-2 border rounded font-mono">
                      {sampleSolution.o}
                    </p>
                  </div>
                </div>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                {/* Dictionary Builder */}
                <div className="border border-slate-300 rounded p-4 bg-white shadow-sm">
                  <h3 className="font-bold text-slate-700 mb-2 flex items-center gap-2">
                    <InfoIcon /> 1. Build Dictionary
                  </h3>
                  <table className="w-full mb-3 text-sm">
                    <thead>
                      <tr className="bg-slate-100">
                        <th className="p-2 border-b text-left w-1/3">
                          Key (Token)
                        </th>
                        <th className="p-2 border-b text-left">
                          Value (Pattern)
                        </th>
                        <th className="p-2 border-b w-8"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {dict.map((row, i) => (
                        <tr key={i}>
                          <td className="p-1 border-b">
                            <input
                              type="text"
                              value={row.key}
                              onChange={(e) =>
                                updateDict(i, "key", e.target.value)
                              }
                              className="w-full border p-1 rounded font-mono font-bold text-blue-600 outline-none focus:border-blue-500"
                              placeholder="e.g. T1"
                            />
                          </td>
                          <td className="p-1 border-b">
                            <input
                              type="text"
                              value={row.value}
                              onChange={(e) =>
                                updateDict(i, "value", e.target.value)
                              }
                              className="w-full border p-1 rounded outline-none focus:border-blue-500"
                              placeholder="e.g. apple"
                            />
                          </td>
                          <td className="p-1 border-b text-center">
                            {dict.length > 1 && (
                              <button
                                onClick={() => removeDictRow(i)}
                                className="text-red-500 hover:text-red-700 font-bold"
                              >
                                ×
                              </button>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <button
                    onClick={addDictRow}
                    className="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1 rounded transition-colors"
                  >
                    + Add Pair
                  </button>
                </div>

                {/* Output Builder */}
                <div className="border border-slate-300 rounded p-4 bg-white shadow-sm">
                  <h3 className="font-bold text-slate-700 mb-2 flex items-center gap-2">
                    <InfoIcon /> 2. Compressed Output
                  </h3>
                  <p className="text-xs text-slate-500 mb-2">
                    Replace patterns with your keys. Separate ALL words/tokens
                    with spaces.
                  </p>
                  <textarea
                    value={output}
                    onChange={(e) => setOutput(e.target.value)}
                    className="w-full border border-slate-300 rounded p-2 font-mono outline-none focus:ring-2 focus:ring-blue-400"
                    rows="4"
                    placeholder="e.g. the T1 pie is a good pie"
                  ></textarea>
                </div>
              </div>
            )}

            {!showSolution && (
              <div className="mt-4 flex gap-4 items-center">
                <button
                  onClick={validate}
                  className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition-colors"
                >
                  Check Compression
                </button>
                {checkStatus === "checked" && (
                  <span className="text-sm text-slate-600 italic">
                    Hint: Output must recreate exact original string
                    (case/spaces matter).
                  </span>
                )}
              </div>
            )}
          </div>
        );
      };

      // 5. Dict Decode Component
      const DictDecodeTask = ({
        question,
        onCheck,
        checkStatus,
        showSolution,
      }) => {
        const [input, setInput] = useState("");
        useEffect(() => {
          setInput("");
        }, [question.id]);

        const expected = useMemo(() => {
          const tokens = question.output.split(/\s+/);
          const joinChar = question.output.includes("A") ? "" : " "; // Simple heuristic for spaces vs no spaces based on our data
          return tokens.map((t) => question.dict[t] || t).join(joinChar);
        }, [question]);

        const validate = () => {
          onCheck(input.trim() === expected, { input, expected });
        };

        return (
          <div className="space-y-4">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-slate-100 p-4 rounded border border-slate-300">
                <p className="font-semibold text-slate-700 mb-2">
                  Dictionary Given:
                </p>
                <table className="bg-white border text-sm w-full">
                  <thead className="bg-slate-50">
                    <tr>
                      <th className="border p-1 text-left">Key</th>
                      <th className="border p-1 text-left">Value</th>
                    </tr>
                  </thead>
                  <tbody>
                    {Object.entries(question.dict).map(([k, v]) => (
                      <tr key={k}>
                        <td className="border p-1 font-mono font-bold text-blue-600">
                          {k}
                        </td>
                        <td className="border p-1 font-mono">{v}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="bg-blue-50 p-4 rounded border border-blue-200 flex flex-col justify-center">
                <p className="font-semibold text-blue-800 mb-2">
                  Compressed Sequence:
                </p>
                <p className="font-mono text-lg bg-white p-2 border rounded border-blue-200">
                  {question.output}
                </p>
              </div>
            </div>

            {showSolution ? (
              <div className="bg-green-50 border border-green-200 p-4 rounded mt-4">
                <p className="font-bold text-green-800 mb-2">
                  Decompressed Solution:
                </p>
                <p className="font-mono text-lg break-all">{expected}</p>
              </div>
            ) : (
              <div className="mt-4">
                <p className="font-semibold mb-2">
                  Type the decompressed original data:
                </p>
                <textarea
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  className="w-full border border-slate-300 rounded p-3 font-mono outline-none focus:ring-2 focus:ring-blue-400"
                  rows="2"
                ></textarea>

                <div className="mt-4 flex gap-4 items-center">
                  <button
                    onClick={validate}
                    className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition-colors"
                  >
                    Check Decompression
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      };

      // --- Main Application Component ---
      const App = () => {
        // State
        const [selectedTopics, setSelectedTopics] = useState({
          theory: true,
          rle: true,
          dict: true,
        });
        const [dropdownOpen, setDropdownOpen] = useState(false);

        const [availableIds, setAvailableIds] = useState([]);
        const [currentQ, setCurrentQ] = useState(null);

        const [checkStatus, setCheckStatus] = useState("idle"); // 'idle', 'checked'
        const [isCorrect, setIsCorrect] = useState(null);
        const [showSolution, setShowSolution] = useState(false);
        const [errorMsg, setErrorMsg] = useState(""); // For custom validation errors

        const dropdownRef = useRef(null);

        // Close dropdown on outside click
        useEffect(() => {
          const handleClickOutside = (event) => {
            if (
              dropdownRef.current &&
              !dropdownRef.current.contains(event.target)
            )
              setDropdownOpen(false);
          };
          document.addEventListener("mousedown", handleClickOutside);
          return () =>
            document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        // Initialise questions based on filters
        const initQuestions = (filters) => {
          const activeTopics = Object.keys(filters).filter((k) => filters[k]);
          const filtered = QUESTIONS.filter((q) =>
            activeTopics.includes(q.topic),
          );

          if (filtered.length === 0) {
            setCurrentQ(null);
            return;
          }

          // Get ids of filtered questions
          const filteredIds = filtered.map((q) => q.id);

          // Find intersection with currently available ids to avoid immediate repeats if applying same filter
          let nextAvailable = availableIds.filter((id) =>
            filteredIds.includes(id),
          );

          // If pool empty, replenish
          if (nextAvailable.length === 0) {
            nextAvailable = [...filteredIds];
          }

          // Pick random
          const randomIndex = Math.floor(Math.random() * nextAvailable.length);
          const chosenId = nextAvailable[randomIndex];

          setCurrentQ(QUESTIONS.find((q) => q.id === chosenId));
          setAvailableIds(nextAvailable.filter((id) => id !== chosenId));

          // Reset interaction state
          setCheckStatus("idle");
          setIsCorrect(null);
          setShowSolution(false);
          setErrorMsg("");
        };

        // Run on initial mount
        useEffect(() => {
          initQuestions(selectedTopics);
        }, []);

        const handleApplyFilters = () => {
          setDropdownOpen(false);
          initQuestions(selectedTopics);
        };

        const toggleTopic = (topic) => {
          setSelectedTopics((prev) => ({ ...prev, [topic]: !prev[topic] }));
        };

        const handleCheck = (correct, details) => {
          setCheckStatus("checked");
          setIsCorrect(correct);
          if (details && details.error) setErrorMsg(details.error);
          else setErrorMsg("");
        };

        const handleNext = () => {
          initQuestions(selectedTopics);
        };

        // Dynamic Component Renderer
        const renderTask = () => {
          if (!currentQ)
            return (
              <div className="p-8 text-center text-slate-500">
                No topics selected. Please enable topics in the filter.
              </div>
            );

          const props = {
            question: currentQ,
            onCheck: handleCheck,
            checkStatus,
            showSolution,
          };

          switch (currentQ.type) {
            case "gap_fill":
              return <GapFillTask {...props} />;
            case "rle_encode":
              return <RLEEncodeTask {...props} />;
            case "rle_decode":
              return <RLEDecodeTask {...props} />;
            case "rle_bit_dynamic":
              return <RLEBitDynamicTask {...props} />;
            case "dict_encode":
              return <DictEncodeTask {...props} />;
            case "dict_decode":
              return <DictDecodeTask {...props} />;
            default:
              return <div>Unknown task type</div>;
          }
        };

        const getTopicColor = (topic) => {
          switch (topic) {
            case "theory":
              return "bg-purple-100 text-purple-800 border-purple-200";
            case "rle":
              return "bg-blue-100 text-blue-800 border-blue-200";
            case "dict":
              return "bg-emerald-100 text-emerald-800 border-emerald-200";
            default:
              return "bg-gray-100 text-gray-800";
          }
        };

        return (
          <div className="max-w-4xl mx-auto pt-8 pb-16 px-4">
            {/* Header & Controls */}
            <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-200">
              <div>
                <h1 className="text-3xl font-bold text-slate-800">
                  Compression
                </h1>
                <p className="text-slate-500 mt-1">
                  AQA A Level Computer Science Interactive
                </p>
              </div>

              {/* Filter Dropdown */}
              <div className="relative" ref={dropdownRef}>
                <button
                  onClick={() => setDropdownOpen(!dropdownOpen)}
                  className="flex items-center gap-2 bg-white border border-slate-300 shadow-sm px-4 py-2 rounded-md hover:bg-slate-50 font-medium text-slate-700 transition-colors"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                  >
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                  </svg>
                  Filter Topics
                  <ChevronDown />
                </button>

                {dropdownOpen && (
                  <div className="absolute right-0 mt-2 w-64 bg-white border border-slate-200 rounded-md shadow-xl z-10 p-4">
                    <h3 className="font-semibold text-slate-800 mb-3 text-sm uppercase tracking-wider">
                      Select Subtopics
                    </h3>
                    <div className="space-y-3 mb-4">
                      <label className="flex items-center gap-3 cursor-pointer">
                        <input
                          type="checkbox"
                          checked={selectedTopics.theory}
                          onChange={() => toggleTopic("theory")}
                          className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                        />
                        <span className="text-slate-700 text-sm">
                          Definitions & Benefits
                        </span>
                      </label>
                      <label className="flex items-center gap-3 cursor-pointer">
                        <input
                          type="checkbox"
                          checked={selectedTopics.rle}
                          onChange={() => toggleTopic("rle")}
                          className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                        />
                        <span className="text-slate-700 text-sm">
                          Run Length Encoding
                        </span>
                      </label>
                      <label className="flex items-center gap-3 cursor-pointer">
                        <input
                          type="checkbox"
                          checked={selectedTopics.dict}
                          onChange={() => toggleTopic("dict")}
                          className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                        />
                        <span className="text-slate-700 text-sm">
                          Dictionary Indexing
                        </span>
                      </label>
                    </div>
                    <button
                      onClick={handleApplyFilters}
                      className="w-full bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-md font-medium text-sm transition-colors"
                    >
                      Apply & New Question
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* Main Interaction Area */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              {/* Question Header */}
              {currentQ && (
                <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-start">
                  <div>
                    <span
                      className={`inline-block px-2 py-1 rounded text-xs font-bold uppercase tracking-wider border mb-2 ${getTopicColor(currentQ.topic)}`}
                    >
                      {currentQ.topic === "dict"
                        ? "Dictionary"
                        : currentQ.topic}
                    </span>
                    <h2 className="text-lg font-semibold text-slate-800">
                      {currentQ.desc ||
                        "Complete the definition based on AQA terminology:"}
                    </h2>
                  </div>
                  <span className="text-slate-400 text-sm font-mono bg-white px-2 py-1 rounded border">
                    Q-ID: {currentQ.id}
                  </span>
                </div>
              )}

              {/* Task Body */}
              <div className="p-6 md:p-8 min-h-[250px]">{renderTask()}</div>

              {/* Feedback & Action Footer */}
              {checkStatus === "checked" && currentQ && (
                <div
                  className={`p-4 border-t flex flex-col md:flex-row md:items-center justify-between gap-4 ${isCorrect ? "bg-green-50 border-green-200" : "bg-red-50 border-red-200"}`}
                >
                  <div className="flex items-center gap-3">
                    {isCorrect ? <CheckIcon /> : <XIcon />}
                    <div>
                      <p
                        className={`font-bold ${isCorrect ? "text-green-800" : "text-red-800"}`}
                      >
                        {isCorrect ? "Correct!" : "Not quite right."}
                      </p>
                      {errorMsg && (
                        <p className="text-red-600 text-sm">{errorMsg}</p>
                      )}
                      {!isCorrect && !showSolution && (
                        <p
                          className={`text-sm ${isCorrect ? "text-green-700" : "text-red-700"}`}
                        >
                          Review your answer and try again, or view the
                          solution.
                        </p>
                      )}
                    </div>
                  </div>

                  <div className="flex gap-3">
                    {!isCorrect && !showSolution && (
                      <button
                        onClick={() => setShowSolution(true)}
                        className="bg-white border border-red-300 text-red-700 hover:bg-red-100 py-2 px-4 rounded font-medium shadow-sm transition-colors text-sm"
                      >
                        Show Solution
                      </button>
                    )}
                    <button
                      onClick={handleNext}
                      className="bg-slate-800 hover:bg-slate-900 text-white py-2 px-6 rounded font-semibold shadow-sm transition-colors"
                    >
                      Next Question
                    </button>
                  </div>
                </div>
              )}

              {/* Fallback Next button if showing solution without checking */}
              {showSolution && checkStatus !== "checked" && (
                <div className="p-4 border-t bg-slate-50 flex justify-end">
                  <button
                    onClick={handleNext}
                    className="bg-slate-800 hover:bg-slate-900 text-white py-2 px-6 rounded font-semibold shadow-sm transition-colors"
                  >
                    Next Question
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
