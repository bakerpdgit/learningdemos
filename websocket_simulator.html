<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQA A Level CS: WebSocket Simulator</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-DYQESQXT38"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-DYQESQXT38");

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              headerBg: "#0f172a",
              headerAccent: "#38bdf8",
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          sans-serif;
      }
      .code-pane {
        font-family: "Consolas", "Courier New", monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .browser-chrome {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 12px 26px rgba(15, 23, 42, 0.08);
      }
      @keyframes frame-pop {
        0% {
          transform: translateY(8px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .frame-pop {
        animation: frame-pop 0.2s ease-out;
      }
      @keyframes socket-pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.55);
        }
        100% {
          box-shadow: 0 0 0 16px rgba(14, 165, 233, 0);
        }
      }
      .socket-live {
        animation: socket-pulse 1.8s infinite;
      }
    </style>

    <script>
      (function () {
        try {
          var mode = localStorage.getItem("uimode");
          if (
            mode === "dark" ||
            (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
      const { useMemo, useState } = React;

      const HANDSHAKE_REQUEST =
        "GET /chat HTTP/1.1\n" +
        "Host: contactsapp.local\n" +
        "Upgrade: websocket\n" +
        "Connection: Upgrade\n" +
        "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==\n" +
        "Sec-WebSocket-Version: 13";

      const HANDSHAKE_RESPONSE =
        "HTTP/1.1 101 Switching Protocols\n" +
        "Upgrade: websocket\n" +
        "Connection: Upgrade\n" +
        "Sec-WebSocket-Accept: s3pPLMBiTxaQ9kYGzzhZRbK+xOo=";

      function byteLength(text) {
        if (window.TextEncoder) return new TextEncoder().encode(text).length;
        return unescape(encodeURIComponent(text)).length;
      }

      function Header({ darkMode, setDarkMode }) {
        const toggleMode = () => {
          const next = !darkMode;
          setDarkMode(next);
          localStorage.setItem("uimode", next ? "dark" : "light");
          document.documentElement.classList.toggle("dark", next);
        };

        const SunIcon = () => (
          <svg
            className="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
        );

        const MoonIcon = () => (
          <svg
            className="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        );

        return (
          <header className="sticky top-0 z-40 flex h-[58px] items-center justify-between bg-headerBg px-4 shadow-lg md:px-8">
            <a
              href="index.html"
              className="font-mono text-[1.1rem] font-bold tracking-widest text-headerAccent no-underline md:text-[1.2rem]"
            >
              <span className="text-slate-500">&lt;</span>CS
              <span className="text-slate-500">&gt;</span>&nbsp;Learning
            </a>
            <nav className="flex items-center gap-4">
              <a
                href="index.html"
                className="text-sm font-medium tracking-wide text-slate-400 transition-colors hover:text-headerAccent"
              >
                Home
              </a>
              <button
                onClick={toggleMode}
                className="p-1 text-slate-400 transition-colors hover:text-headerAccent"
                aria-label="Toggle dark mode"
              >
                {darkMode ? <SunIcon /> : <MoonIcon />}
              </button>
            </nav>
          </header>
        );
      }

      function Button({ children, onClick, disabled, tone = "slate", title }) {
        const tones = {
          slate:
            "border-slate-300 bg-white text-slate-700 hover:bg-slate-100 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700",
          blue: "border-blue-600 bg-blue-600 text-white hover:bg-blue-700",
          green: "border-emerald-600 bg-emerald-600 text-white hover:bg-emerald-700",
          red: "border-red-600 bg-red-600 text-white hover:bg-red-700",
          amber:
            "border-amber-300 bg-amber-50 text-amber-900 hover:bg-amber-100 dark:border-amber-700 dark:bg-amber-950 dark:text-amber-100",
        };
        return (
          <button
            type="button"
            onClick={onClick}
            disabled={disabled}
            title={title}
            className={`inline-flex min-h-9 items-center justify-center rounded-md border px-3 py-1.5 text-sm font-semibold transition disabled:cursor-not-allowed disabled:opacity-50 ${tones[tone]}`}
          >
            {children}
          </button>
        );
      }

      function StatusBadge({ state }) {
        const styles = {
          disconnected:
            "border-slate-200 bg-slate-100 text-slate-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200",
          handshaking:
            "border-amber-200 bg-amber-50 text-amber-800 dark:border-amber-800 dark:bg-amber-950 dark:text-amber-100",
          connected:
            "border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-800 dark:bg-emerald-950 dark:text-emerald-100",
          closed:
            "border-red-200 bg-red-50 text-red-700 dark:border-red-800 dark:bg-red-950 dark:text-red-100",
        };
        const labels = {
          disconnected: "DISCONNECTED",
          handshaking: "HTTP UPGRADE IN PROGRESS",
          connected: "STATEFUL SOCKET OPEN",
          closed: "SOCKET CLOSED",
        };
        return (
          <span className={`rounded-full border px-3 py-1 text-xs font-black ${styles[state]}`}>
            {labels[state]}
          </span>
        );
      }

      function DisconnectedView({ onConnect }) {
        return (
          <section className="browser-chrome overflow-hidden rounded-xl border border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900">
            <div className="flex items-center gap-3 border-b border-slate-200 bg-slate-100 p-3 dark:border-slate-700 dark:bg-slate-800">
              <div className="flex items-center gap-1.5">
                <span className="h-3 w-3 rounded-full bg-red-400"></span>
                <span className="h-3 w-3 rounded-full bg-amber-400"></span>
                <span className="h-3 w-3 rounded-full bg-emerald-400"></span>
              </div>
              <div className="min-w-0 flex-1 rounded-md border border-slate-300 bg-white px-3 py-2 font-mono text-sm dark:border-slate-600 dark:bg-slate-950">
                http://contactsapp.local/chat
              </div>
            </div>
            <div className="grid gap-6 p-5 lg:grid-cols-[1fr_360px]">
              <div className="rounded-xl border border-slate-200 bg-slate-50 p-5 dark:border-slate-700 dark:bg-slate-950">
                <h2 className="text-xl font-black">Live Chat Window</h2>
                <p className="mt-2 max-w-2xl text-sm leading-6 text-slate-600 dark:text-slate-300">
                  A WebSocket starts with an HTTP request, then upgrades the protocol. After that upgrade, the TCP socket stays open for lightweight two-way frames.
                </p>
                <div className="mt-6 flex flex-wrap gap-3">
                  <Button tone="blue" onClick={onConnect}>
                    Connect to Chat Server
                  </Button>
                </div>
              </div>
              <div className="rounded-xl border border-slate-200 bg-white p-5 dark:border-slate-700 dark:bg-slate-900">
                <h3 className="font-bold">Why not REST here?</h3>
                <p className="mt-2 text-sm leading-6 text-slate-600 dark:text-slate-300">
                  REST is well suited to independent CRUD operations. A live chat benefits from a persistent connection because either side can send data immediately without creating a new HTTP request every time.
                </p>
              </div>
            </div>
          </section>
        );
      }

      function HandshakeView({ sceneIndex, setSceneIndex, onComplete, onCancel }) {
        const scenes = [
          {
            label: "Upgrade request",
            title: "Scene 2 - Client asks to upgrade HTTP to WebSocket",
            body: (
              <div className="grid gap-4 lg:grid-cols-[1fr_340px]">
                <pre className="code-pane rounded-lg border border-slate-200 bg-slate-950 p-4 text-sm text-slate-100">
                  {HANDSHAKE_REQUEST}
                </pre>
                <div className="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
                  <h3 className="font-bold">Important headers</h3>
                  <p className="mt-2 text-sm leading-6 text-slate-600 dark:text-slate-300">
                    The browser sends a normal GET request, but the Upgrade and Connection headers ask the server to switch protocols on the same TCP connection.
                  </p>
                </div>
              </div>
            ),
          },
          {
            label: "101 response",
            title: "Scene 3 - Server accepts the protocol switch",
            body: (
              <div className="grid gap-4 lg:grid-cols-[1fr_340px]">
                <pre className="code-pane rounded-lg border border-slate-200 bg-slate-950 p-4 text-sm text-emerald-100">
                  {HANDSHAKE_RESPONSE}
                </pre>
                <div className="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
                  <h3 className="font-bold">Status code 101</h3>
                  <p className="mt-2 text-sm leading-6 text-slate-600 dark:text-slate-300">
                    101 Switching Protocols confirms that the HTTP phase has ended and the WebSocket protocol now owns the open connection.
                  </p>
                </div>
              </div>
            ),
          },
          {
            label: "Stateful socket",
            title: "Scene 4 - TCP socket remains open",
            body: (
              <div className="grid gap-4 lg:grid-cols-[1fr_340px]">
                <pre className="code-pane rounded-lg border border-slate-800 bg-slate-950 p-4 text-sm text-sky-100">
                  {"[Server] Connection upgraded to WebSockets.\n" +
                    "[Server] TCP socket opened for Client #1.\n" +
                    "[Server] TCP socket opened for Client #2.\n" +
                    "[Server] Connection is now STATEFUL."}
                </pre>
                <div className="rounded-lg border border-sky-200 bg-sky-50 p-4 text-sky-900 dark:border-sky-800 dark:bg-sky-950 dark:text-sky-100">
                  <h3 className="font-bold">After the handshake</h3>
                  <p className="mt-2 text-sm leading-6">
                    Messages are sent as frames. They do not include a complete HTTP method, path, host, and header block each time.
                  </p>
                </div>
              </div>
            ),
          },
        ];
        const scene = scenes[sceneIndex];

        return (
          <main className="mx-auto max-w-7xl px-4 py-6">
            <div className="mb-4 flex flex-col gap-3 rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900 md:flex-row md:items-center md:justify-between">
              <div>
                <div className="flex flex-wrap items-center gap-2">
                  <h1 className="text-xl font-bold">WebSocket Connection Handshake</h1>
                  <StatusBadge state="handshaking" />
                </div>
                <p className="mt-1 text-sm text-slate-500 dark:text-slate-400">
                  Step through the HTTP upgrade before using the persistent chat socket.
                </p>
              </div>
              <Button onClick={onCancel}>Cancel</Button>
            </div>

            <div className="mb-4 grid gap-2 md:grid-cols-3">
              {scenes.map((item, index) => (
                <button
                  key={item.label}
                  type="button"
                  onClick={() => setSceneIndex(index)}
                  className={`rounded-lg border px-3 py-2 text-left text-sm font-semibold transition ${
                    index === sceneIndex
                      ? "border-blue-500 bg-blue-50 text-blue-700 dark:bg-blue-950 dark:text-blue-200"
                      : "border-slate-200 bg-white text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800"
                  }`}
                >
                  <span className="block text-xs text-slate-400">Scene {index + 2}</span>
                  {item.label}
                </button>
              ))}
            </div>

            <section className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-900 md:p-6">
              <div className="mb-4 flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                <h2 className="text-lg font-bold">{scene.title}</h2>
                <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-600 dark:bg-slate-800 dark:text-slate-300">
                  Step {sceneIndex + 1} / {scenes.length}
                </span>
              </div>
              {scene.body}
            </section>

            <div className="mt-4 flex flex-wrap justify-between gap-3">
              <Button disabled={sceneIndex === 0} onClick={() => setSceneIndex(sceneIndex - 1)}>
                Previous Scene
              </Button>
              {sceneIndex === scenes.length - 1 ? (
                <Button tone="green" onClick={onComplete}>
                  Open Stateful Chat
                </Button>
              ) : (
                <Button tone="blue" onClick={() => setSceneIndex(sceneIndex + 1)}>
                  Next Scene
                </Button>
              )}
            </div>
          </main>
        );
      }

      function MessageBubble({ message }) {
        const isClientOne = message.client === 1;
        return (
          <div className={`flex ${isClientOne ? "justify-end" : "justify-start"}`}>
            <div
              className={`frame-pop max-w-[82%] rounded-lg px-3 py-2 text-sm shadow-sm ${
                isClientOne
                  ? "bg-blue-600 text-white"
                  : "bg-slate-200 text-slate-900 dark:bg-slate-700 dark:text-slate-100"
              }`}
            >
              <div className="text-xs font-bold opacity-80">
                Client #{message.client}
              </div>
              <div>{message.text}</div>
            </div>
          </div>
        );
      }

      function ChatClient({ title, messages, draft, setDraft, onSend, disabled, placeholder }) {
        return (
          <div className="flex min-h-[420px] flex-col overflow-hidden rounded-xl border border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-900">
            <div className="flex items-center justify-between border-b border-slate-200 bg-slate-100 px-4 py-3 dark:border-slate-700 dark:bg-slate-800">
              <h2 className="font-bold">{title}</h2>
              <span className={`h-3 w-3 rounded-full ${disabled ? "bg-red-500" : "socket-live bg-emerald-500"}`}></span>
            </div>
            <div className="flex-1 space-y-3 overflow-y-auto bg-slate-50 p-4 dark:bg-slate-950">
              {messages.length === 0 ? (
                <div className="flex h-full items-center justify-center rounded-lg border border-dashed border-slate-300 text-center text-sm text-slate-500 dark:border-slate-700 dark:text-slate-400">
                  No frames received yet.
                </div>
              ) : (
                messages.map((message) => (
                  <MessageBubble key={message.id} message={message} />
                ))
              )}
            </div>
            <div className="border-t border-slate-200 p-3 dark:border-slate-700">
              <div className="flex gap-2">
                <input
                  className="min-w-0 flex-1 rounded-md border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-950"
                  value={draft}
                  disabled={disabled}
                  onChange={(e) => setDraft(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") onSend();
                  }}
                  placeholder={placeholder}
                />
                <Button tone="blue" disabled={disabled || !draft.trim()} onClick={onSend}>
                  Send
                </Button>
              </div>
            </div>
          </div>
        );
      }

      function FrameLog({ frames }) {
        return (
          <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
            <div className="mb-3 flex items-center justify-between">
              <h2 className="font-bold">Network Frame Stream</h2>
              <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-600 dark:bg-slate-800 dark:text-slate-300">
                {frames.length} frame(s)
              </span>
            </div>
            <div className="max-h-[300px] space-y-2 overflow-y-auto">
              {frames.length === 0 ? (
                <div className="rounded-lg border border-dashed border-slate-300 p-4 text-center text-sm text-slate-500 dark:border-slate-700 dark:text-slate-400">
                  Frame log is empty until a client sends data.
                </div>
              ) : (
                frames.map((frame) => (
                  <pre
                    key={frame.id}
                    className="frame-pop code-pane rounded-lg border border-slate-200 bg-slate-950 p-3 text-xs text-sky-100"
                  >
                    {frame.text}
                  </pre>
                ))
              )}
            </div>
          </section>
        );
      }

      function ServerLog({ logs }) {
        return (
          <section className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900">
            <h2 className="mb-3 font-bold">Server Socket Log</h2>
            <pre className="code-pane max-h-[300px] overflow-y-auto rounded-lg border border-slate-800 bg-slate-950 p-4 text-xs text-emerald-100">
              {logs.join("\n")}
            </pre>
          </section>
        );
      }

      function ConnectedView({
        connectionState,
        messages,
        frames,
        logs,
        clientOneDraft,
        setClientOneDraft,
        clientTwoDraft,
        setClientTwoDraft,
        onSendClientOne,
        onSendClientTwo,
        onAutoReply,
        onClose,
        onReset,
      }) {
        const disabled = connectionState !== "connected";
        return (
          <main className="mx-auto max-w-7xl px-4 py-6">
            <div className="mb-5 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
              <div>
                <p className="text-sm font-bold uppercase tracking-wider text-sky-600 dark:text-sky-300">
                  AQA A Level Computer Science - Paper 2
                </p>
                <div className="mt-1 flex flex-wrap items-center gap-3">
                  <h1 className="text-2xl font-black tracking-tight md:text-3xl">
                    WebSocket Live Chat Simulator
                  </h1>
                  <StatusBadge state={connectionState} />
                </div>
                <p className="mt-2 max-w-3xl text-sm leading-6 text-slate-600 dark:text-slate-300">
                  After one HTTP upgrade, both clients use the same open socket connection to exchange lightweight frames.
                </p>
              </div>
              <div className="flex flex-wrap gap-2">
                <Button tone="amber" disabled={disabled} onClick={onAutoReply}>
                  Auto Reply from Client #2
                </Button>
                <Button tone="red" disabled={disabled} onClick={onClose}>
                  Close Socket
                </Button>
                <Button onClick={onReset}>Reset</Button>
              </div>
            </div>

            <div className="mb-4 grid gap-3 md:grid-cols-3">
              <div className="rounded-lg border border-slate-200 bg-white p-3 dark:border-slate-700 dark:bg-slate-900">
                <div className="text-xs font-bold uppercase text-slate-500">Transport</div>
                <div className="mt-1 text-sm">TCP socket stays open after the 101 response.</div>
              </div>
              <div className="rounded-lg border border-slate-200 bg-white p-3 dark:border-slate-700 dark:bg-slate-900">
                <div className="text-xs font-bold uppercase text-slate-500">Data unit</div>
                <div className="mt-1 text-sm">Short WebSocket frames, not full HTTP requests.</div>
              </div>
              <div className="rounded-lg border border-slate-200 bg-white p-3 dark:border-slate-700 dark:bg-slate-900">
                <div className="text-xs font-bold uppercase text-slate-500">State</div>
                <div className="mt-1 text-sm">The server tracks active client sockets.</div>
              </div>
            </div>

            <div className="grid gap-4 xl:grid-cols-[1fr_1fr_420px]">
              <ChatClient
                title="Browser Client #1"
                messages={messages}
                draft={clientOneDraft}
                setDraft={setClientOneDraft}
                onSend={onSendClientOne}
                disabled={disabled}
                placeholder="Type Hello!"
              />
              <ChatClient
                title="Browser Client #2"
                messages={messages}
                draft={clientTwoDraft}
                setDraft={setClientTwoDraft}
                onSend={onSendClientTwo}
                disabled={disabled}
                placeholder="Reply from Client #2"
              />
              <div className="grid gap-4">
                <FrameLog frames={frames} />
                <ServerLog logs={logs} />
              </div>
            </div>
          </main>
        );
      }

      function App() {
        const [darkMode, setDarkMode] = useState(
          document.documentElement.classList.contains("dark"),
        );
        const [connectionState, setConnectionState] = useState("disconnected");
        const [handshakeScene, setHandshakeScene] = useState(0);
        const [messages, setMessages] = useState([]);
        const [frames, setFrames] = useState([]);
        const [logs, setLogs] = useState([
          "[Server] Chat service ready on /chat.",
          "[Server] Waiting for WebSocket upgrade requests.",
        ]);
        const [clientOneDraft, setClientOneDraft] = useState("Hello!");
        const [clientTwoDraft, setClientTwoDraft] = useState("Message received.");

        const nextNumber = useMemo(
          () => messages.length + frames.length + logs.length + 1,
          [messages, frames, logs],
        );

        const beginHandshake = () => {
          setConnectionState("handshaking");
          setHandshakeScene(0);
          setLogs((oldLogs) => [
            ...oldLogs,
            "[Server] Incoming GET /chat with Upgrade: websocket.",
          ]);
        };

        const completeHandshake = () => {
          setConnectionState("connected");
          setLogs((oldLogs) => [
            ...oldLogs,
            "[Server] HTTP/1.1 101 Switching Protocols sent.",
            "[Server] TCP Socket connection opened for Client #1.",
            "[Server] TCP Socket connection opened for Client #2.",
            "[Server] Connection is now STATEFUL.",
          ]);
        };

        const appendFrame = (direction, fromClient, toClient, text, opcode = "text") => {
          const length = byteLength(text);
          const frameText =
            `[${direction} Frame] [Opcode: ${opcode}] [Length: ${length} bytes]\n` +
            `Client #${fromClient} -> Client #${toClient}: "${text}"`;
          setFrames((oldFrames) => [
            ...oldFrames,
            { id: `frame-${Date.now()}-${oldFrames.length}`, text: frameText },
          ]);
          setLogs((oldLogs) => [
            ...oldLogs,
            `[Server] Received ${opcode} frame from Client #${fromClient}.`,
            `[Server] Routing payload directly to Client #${toClient} socket... Broadcast complete.`,
          ]);
        };

        const sendMessage = (client, text, clearDraft) => {
          const trimmed = text.trim();
          if (!trimmed || connectionState !== "connected") return;
          const target = client === 1 ? 2 : 1;
          const idBase = `${Date.now()}-${nextNumber}`;
          setMessages((oldMessages) => [
            ...oldMessages,
            { id: `msg-${idBase}`, client, text: trimmed },
          ]);
          appendFrame("Outbound", client, target, trimmed);
          clearDraft();
        };

        const closeSocket = () => {
          if (connectionState !== "connected") return;
          const closeText = "[Close Frame] [Opcode: close] [Length: 0 bytes]\nClient #1 -> Server: close connection";
          setFrames((oldFrames) => [
            ...oldFrames,
            { id: `close-${Date.now()}`, text: closeText },
          ]);
          setLogs((oldLogs) => [
            ...oldLogs,
            "[Server] Close frame received from Client #1.",
            "[Server] Closing Client #1 and Client #2 sockets.",
            "[Server] No more data frames will be accepted on this connection.",
          ]);
          setConnectionState("closed");
        };

        const reset = () => {
          setConnectionState("disconnected");
          setHandshakeScene(0);
          setMessages([]);
          setFrames([]);
          setLogs([
            "[Server] Chat service ready on /chat.",
            "[Server] Waiting for WebSocket upgrade requests.",
          ]);
          setClientOneDraft("Hello!");
          setClientTwoDraft("Message received.");
        };

        if (connectionState === "handshaking") {
          return (
            <>
              <Header darkMode={darkMode} setDarkMode={setDarkMode} />
              <HandshakeView
                sceneIndex={handshakeScene}
                setSceneIndex={setHandshakeScene}
                onComplete={completeHandshake}
                onCancel={reset}
              />
            </>
          );
        }

        if (connectionState === "disconnected") {
          return (
            <>
              <Header darkMode={darkMode} setDarkMode={setDarkMode} />
              <main className="mx-auto max-w-7xl px-4 py-6">
                <div className="mb-5 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                  <div>
                    <p className="text-sm font-bold uppercase tracking-wider text-sky-600 dark:text-sky-300">
                      AQA A Level Computer Science - Paper 2
                    </p>
                    <div className="mt-1 flex flex-wrap items-center gap-3">
                      <h1 className="text-2xl font-black tracking-tight md:text-3xl">
                        WebSocket Simulator
                      </h1>
                      <StatusBadge state="disconnected" />
                    </div>
                    <p className="mt-2 max-w-3xl text-sm leading-6 text-slate-600 dark:text-slate-300">
                      Connect a simulated chat browser and compare WebSockets with stateless REST request-response cycles.
                    </p>
                  </div>
                </div>
                <DisconnectedView onConnect={beginHandshake} />
              </main>
            </>
          );
        }

        return (
          <>
            <Header darkMode={darkMode} setDarkMode={setDarkMode} />
            <ConnectedView
              connectionState={connectionState}
              messages={messages}
              frames={frames}
              logs={logs}
              clientOneDraft={clientOneDraft}
              setClientOneDraft={setClientOneDraft}
              clientTwoDraft={clientTwoDraft}
              setClientTwoDraft={setClientTwoDraft}
              onSendClientOne={() =>
                sendMessage(1, clientOneDraft, () => setClientOneDraft(""))
              }
              onSendClientTwo={() =>
                sendMessage(2, clientTwoDraft, () => setClientTwoDraft(""))
              }
              onAutoReply={() =>
                sendMessage(2, "Received instantly over the same socket.", () =>
                  setClientTwoDraft(""),
                )
              }
              onClose={closeSocket}
              onReset={reset}
            />
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
