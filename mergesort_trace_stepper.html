            </div>
            <div className="overflow-x-auto p-3">
              <div className="min-w-[420px] font-mono text-sm">
                {lines.map((line, index) => {
                  const lineNumber = index + 1;
                  const isActive = activeCode === blockKey && activeLine === lineNumber;
                  return (
                    <div
                      key={lineNumber}
                      className={`grid grid-cols-[40px_1fr] items-start gap-3 rounded-lg px-2 py-1.5 transition ${isActive ? "bg-amber-100 ring-1 ring-amber-300" : "hover:bg-slate-50"}`}
                    >
                      <div className="text-right text-slate-400">{lineNumber}</div>
                      <div className="whitespace-pre text-slate-800">{line}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      function TraceTable({ rows, activeRow, activeUpdates }) {

          <div className="rounded-2xl border border-slate-200 bg-white shadow-sm">
            <div className="border-b border-slate-200 px-4 py-3">
              <div className="text-sm font-semibold text-slate-800">Trace table</div>
            </div>
            <div className="overflow-auto">
              <table className="min-w-full border-collapse text-sm">
                <thead className="bg-slate-50">
                  <tr>
                    <th className="sticky left-0 z-10 border-b border-r border-slate-200 bg-slate-50 px-2 py-2 text-center text-xs font-medium text-slate-500">Row</th>
                    {headings.map((heading) => (
                      <th key={heading.key} className="border-b border-r border-slate-200 px-3 py-2 text-left text-xs font-medium text-slate-500">
                        {heading.label}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((row, rowIndex) => {
                    const displayRow = rowIndex + 1;
                    const isActiveRow = activeRow === displayRow;
                    return (
                      <tr key={displayRow} className={isActiveRow ? "bg-blue-50/70" : displayRow % 2 === 0 ? "bg-white" : "bg-slate-50/40"}>
                        <td className="sticky left-0 z-10 border-b border-r border-slate-200 bg-inherit px-2 py-2 text-center text-xs font-semibold text-slate-500">
                          {displayRow}
                        </td>
                        {headings.map((heading) => {
                          const changed = changedCells.has(`${displayRow}-${heading.key}`);
                          return (
                            <td
                              key={heading.key}
                              className={`border-b border-r border-slate-200 px-3 py-2 font-mono text-slate-800 transition ${heading.key === "list" ? "min-w-[220px]" : "min-w-[54px]"} ${changed ? "bg-emerald-100 font-semibold ring-1 ring-inset ring-emerald-300" : ""}`}
                            >
                              {row[heading.key] || " "}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      function SmallCard({ title, children }) {
        return (
          <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <div className="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">{title}</div>
            <div className="text-sm text-slate-800">{children}</div>
          </div>
        );
      }

      function MergeSortTraceStepper() {
        const [stepIndex, setStepIndex] = useState(-1);
        const activeStep = stepIndex >= 0 ? steps[stepIndex] : null;

        const rows = useMemo(() => {
          const nextRows = initialRows.map((row) => ({ ...row }));
          for (let i = 0; i <= stepIndex; i += 1) {
            const updates = steps[i]?.updates || [];
            updates.forEach((update) => {
              const target = nextRows[update.row - 1];
              if (!target) return;
              Object.entries(update.values).forEach(([key, value]) => {
                target[key] = value;
              });
            });
          }
          return nextRows;
        }, [stepIndex]);

        const activeUpdates = activeStep?.updates || [];
        const revealedRows = rows.filter((row) => row.list || (row.S && row.E && row.M)).length;
        const vars = activeStep?.vars ? Object.entries(activeStep.vars) : [];

        return (
          <div className="min-h-screen bg-slate-100 p-4 text-slate-900 md:p-6">
            <div className="mx-auto max-w-7xl space-y-4">
              <div className="rounded-3xl bg-slate-900 p-5 text-white shadow-lg">
                <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                  <div>
                    <div className="text-2xl font-semibold">Recursive MergeSort trace table stepper</div>
                    <div className="mt-2 max-w-3xl text-sm text-slate-300">
                      This starts from the exam&apos;s given state: the first six rows are already provided. Use <span className="font-semibold text-white">Step</span> to follow the remaining execution one line at a time and watch the missing rows fill in at the correct moments.
                    </div>
                  </div>

                  <div className="flex flex-wrap gap-2">
                    <button onClick={() => setStepIndex((current) => Math.max(-1, current - 1))} className="rounded-xl border border-white/20 px-4 py-2 text-sm font-medium text-white transition hover:bg-white/10">Previous</button>
                    <button onClick={() => setStepIndex(-1)} className="rounded-xl border border-white/20 px-4 py-2 text-sm font-medium text-white transition hover:bg-white/10">Reset</button>
                    <button onClick={() => setStepIndex((current) => Math.min(steps.length - 1, current + 1))} className="rounded-xl bg-amber-300 px-5 py-2 text-sm font-semibold text-slate-900 transition hover:bg-amber-200">Step</button>
                  </div>
                </div>

                <div className="mt-4 grid gap-3 md:grid-cols-3">
                  <div className="rounded-2xl bg-white/10 px-4 py-3">
                    <div className="text-xs uppercase tracking-wide text-slate-300">Progress</div>
                    <div className="mt-1 text-lg font-semibold">{stepIndex < 0 ? 0 : stepIndex + 1} / {steps.length} steps</div>
                  </div>
                  <div className="rounded-2xl bg-white/10 px-4 py-3">
                    <div className="text-xs uppercase tracking-wide text-slate-300">Rows revealed</div>
                    <div className="mt-1 text-lg font-semibold">{revealedRows} / 17 rows with values</div>
                  </div>
                  <div className="rounded-2xl bg-white/10 px-4 py-3">
                    <div className="text-xs uppercase tracking-wide text-slate-300">Current line</div>
                    <div className="mt-1 text-lg font-semibold">
                      {activeStep ? `${activeStep.code === "ms" ? "MergeSort" : "Merge"} line ${activeStep.line}` : "Ready to begin"}
                    </div>
                  </div>
                </div>
              </div>

              <div className="grid gap-4 xl:grid-cols-[1.1fr_1fr]">
                <div className="space-y-4">
                  <CodeBlock title="Figure 1 — MergeSort" lines={mergeSortLines} activeCode={activeStep?.code} blockKey="ms" activeLine={activeStep?.line} />
                  <CodeBlock title="Figure 2 — Merge" lines={mergeLines} activeCode={activeStep?.code} blockKey="m" activeLine={activeStep?.line} />
                </div>

                <div className="space-y-4">
                  <div className="grid gap-4 md:grid-cols-2">
                    <SmallCard title="Current context">
                      {activeStep ? activeStep.context : "Press Step to continue from the point where the first six rows have already been completed."}
                    </SmallCard>
                    <SmallCard title="What this line is doing">
                      {activeStep ? activeStep.note : "The next highlighted line will show the remaining recursive calls and merges needed to finish the trace table."}
                    </SmallCard>
                  </div>

                  <SmallCard title="Current values">
                    {vars.length ? (
                      <div className="flex flex-wrap gap-2">
                        {vars.map(([key, value]) => (
                          <div key={key} className="rounded-xl bg-slate-100 px-3 py-2 font-mono text-sm text-slate-800">
                            <span className="font-semibold">{key}</span>: {value}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-slate-500">No local values are being shown yet.</div>
                    )}
                  </SmallCard>

                  <TraceTable rows={rows} activeRow={activeStep?.rowFocus || null} activeUpdates={activeUpdates} />
                </div>
              </div>

              <div className="rounded-2xl border border-slate-200 bg-white p-4 text-sm text-slate-600 shadow-sm">
                The highlighted row shows the call currently being resumed or completed. Green cells are new values added on the current step.
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<MergeSortTraceStepper />);
    </script>
  </body>
</html>
