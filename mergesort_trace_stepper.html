              <div className="min-w-[420px] font-mono text-sm">
                {lines.map((line, index) => {
                  const lineNumber = index + 1;
                  const isActive = activeCode === blockKey && activeLine === lineNumber;
                  return (
                    <div key={lineNumber}
                      className={`grid grid-cols-[40px_1fr] items-start gap-3 rounded-lg px-2 py-1.5 transition ${isActive ? "bg-amber-100 dark:bg-amber-900/40 ring-1 ring-amber-300 dark:ring-amber-600" : "hover:bg-slate-50 dark:hover:bg-slate-700/50"}`}>
                      <div className="text-right text-slate-400 dark:text-slate-500">{lineNumber}</div>
                      <div className="whitespace-pre text-slate-800 dark:text-slate-100">{line}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      function TraceTable({ rows, activeRow, activeUpdates }) {
        const changedCells = new Set();
        activeUpdates.forEach((update) => {
          Object.keys(update.values).forEach((key) => changedCells.add(`${update.row}-${key}`));
        });
        const headings = [
          { key: "call", label: "Call number" },
          { key: "S", label: "S" },
          { key: "E", label: "E" },
          { key: "M", label: "M" },
          { key: "list", label: "List returned" },
        ];
        return (
          <div className="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm">
            <div className="border-b border-slate-200 dark:border-slate-700 px-4 py-3">
              <div className="text-sm font-semibold text-slate-800 dark:text-slate-100">Trace table</div>
            </div>
            <div className="overflow-auto">
              <table className="min-w-full border-collapse text-sm">
                <thead className="bg-slate-50 dark:bg-slate-900/50">
                  <tr>
                    <th className="sticky left-0 z-10 border-b border-r border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-2 py-2 text-center text-xs font-medium text-slate-500 dark:text-slate-400">Row</th>
                    {headings.map((h) => (
                      <th key={h.key} className="border-b border-r border-slate-200 dark:border-slate-700 px-3 py-2 text-left text-xs font-medium text-slate-500 dark:text-slate-400">{h.label}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((row, rowIndex) => {
                    const displayRow = rowIndex + 1;
                    const isActiveRow = activeRow === displayRow;
                    return (
                      <tr key={displayRow} className={isActiveRow ? "bg-blue-50/70 dark:bg-blue-900/20" : displayRow % 2 === 0 ? "bg-white dark:bg-slate-800" : "bg-slate-50/40 dark:bg-slate-800/50"}>
                        <td className="sticky left-0 z-10 border-b border-r border-slate-200 dark:border-slate-700 bg-inherit px-2 py-2 text-center text-xs font-semibold text-slate-500 dark:text-slate-400">{displayRow}</td>
                        {headings.map((h) => {
                          const changed = changedCells.has(`${displayRow}-${h.key}`);
                          return (
                            <td key={h.key}
                              className={`border-b border-r border-slate-200 dark:border-slate-700 px-3 py-2 font-mono text-slate-800 dark:text-slate-100 transition ${h.key === "list" ? "min-w-[220px]" : "min-w-[54px]"} ${changed ? "bg-emerald-100 dark:bg-emerald-900/40 font-semibold ring-1 ring-inset ring-emerald-300 dark:ring-emerald-600" : ""}`}>
                              {row[h.key] || " "}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      function SmallCard({ title, children }) {
        return (
          <div className="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 shadow-sm">
            <div className="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">{title}</div>
            <div className="text-sm text-slate-800 dark:text-slate-200">{children}</div>
          </div>
        );
      }

      function App() {
        const [theme, setTheme] = useState(() => {
          const saved = localStorage.getItem("uimode");
          if (saved) return saved;
          return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        });
        useEffect(() => {
          if (theme === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
          localStorage.setItem("uimode", theme);
        }, [theme]);
        const toggleTheme = () => setTheme(prev => prev === "dark" ? "light" : "dark");

        const [stepIndex, setStepIndex] = useState(-1);
        const activeStep = stepIndex >= 0 ? steps[stepIndex] : null;

        const rows = useMemo(() => {
          const nextRows = initialRows.map((row) => ({ ...row }));
          for (let i = 0; i <= stepIndex; i++) {
            const updates = steps[i]?.updates || [];
            updates.forEach((update) => {
              const target = nextRows[update.row - 1];
              if (!target) return;
              Object.entries(update.values).forEach(([key, value]) => { target[key] = value; });
            });
          }
          return nextRows;
        }, [stepIndex]);

        const activeUpdates = activeStep?.updates || [];
        const revealedRows = rows.filter((row) => row.list || (row.S && row.E && row.M)).length;
        const vars = activeStep?.vars ? Object.entries(activeStep.vars) : [];

        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-900 transition-colors">
            {/* CS Learning Header */}
            <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
              <a href="index.html" className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline">
                <span className="text-slate-500">&lt;</span>CS<span className="text-slate-500">&gt;</span>&nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a href="index.html" className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors">Home</a>
                <button onClick={toggleTheme} className="text-slate-400 hover:text-headerAccent transition-colors p-1" aria-label="Toggle Dark Mode">
                  {theme === "dark" ? (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                  )}
                </button>
              </nav>
            </header>

            <div className="p-4 md:p-6">
              <div className="mx-auto max-w-7xl space-y-4">
                {/* App header bar */}
                <div className="rounded-2xl bg-slate-800 dark:bg-slate-950 p-5 text-white shadow-lg">
                  <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                    <div>
                      <div className="text-2xl font-semibold">Recursive MergeSort trace table stepper</div>
                      <div className="mt-2 max-w-3xl text-sm text-slate-300">
                        This starts from the exam&apos;s given state when tracing an initial call to MergeSort(L,1,5) where the array L = [6,3,4,8,5] uses 1-based indexing. The first six rows are already provided. Use <span className="font-semibold text-white">Step</span> to follow the remaining execution and trace one line at a time.
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      <button onClick={() => setStepIndex(cur => Math.max(-1, cur - 1))}
                        className="rounded-xl border border-white/20 px-4 py-2 text-sm font-medium text-white transition hover:bg-white/10">Previous</button>
                      <button onClick={() => setStepIndex(-1)}
                        className="rounded-xl border border-white/20 px-4 py-2 text-sm font-medium text-white transition hover:bg-white/10">Reset</button>
                      <button onClick={() => setStepIndex(cur => Math.min(steps.length - 1, cur + 1))}
                        className="rounded-xl bg-amber-400 dark:bg-amber-500 px-5 py-2 text-sm font-semibold text-slate-900 transition hover:bg-amber-300 dark:hover:bg-amber-400">Step</button>
                    </div>
                  </div>
                  <div className="mt-4 grid gap-3 md:grid-cols-3">
                    <div className="rounded-xl bg-white/10 px-4 py-3">
                      <div className="text-xs uppercase tracking-wide text-slate-300">Progress</div>
                      <div className="mt-1 text-lg font-semibold">{stepIndex < 0 ? 0 : stepIndex + 1} / {steps.length} steps</div>
                    </div>
                    <div className="rounded-xl bg-white/10 px-4 py-3">
                      <div className="text-xs uppercase tracking-wide text-slate-300">Rows revealed</div>
                      <div className="mt-1 text-lg font-semibold">{revealedRows} / 17 rows with values</div>
                    </div>
                    <div className="rounded-xl bg-white/10 px-4 py-3">
                      <div className="text-xs uppercase tracking-wide text-slate-300">Current line</div>
                      <div className="mt-1 text-lg font-semibold">
                        {activeStep ? `${activeStep.code === "ms" ? "MergeSort" : "Merge"} line ${activeStep.line}` : "Ready to begin"}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="grid gap-4 xl:grid-cols-[1.1fr_1fr]">
                  <div className="space-y-4">
                    <CodeBlock title="Figure 1 — MergeSort" lines={mergeSortLines} activeCode={activeStep?.code} blockKey="ms" activeLine={activeStep?.line} />
                    <CodeBlock title="Figure 2 — Merge" lines={mergeLines} activeCode={activeStep?.code} blockKey="m" activeLine={activeStep?.line} />
                  </div>
                  <div className="space-y-4">
                    <div className="grid gap-4 md:grid-cols-2">
                      <SmallCard title="Current context">
                        {activeStep ? activeStep.context : "Press Step to continue from the point where the first six rows have already been completed."}
                      </SmallCard>
                      <SmallCard title="What this line is doing">
                        {activeStep ? activeStep.note : "The next highlighted line will show the remaining recursive calls and merges needed to finish the trace table."}
                      </SmallCard>
                    </div>
                    <SmallCard title="Current values">
                      {vars.length ? (
                        <div className="flex flex-wrap gap-2">
                          {vars.map(([key, value]) => (
                            <div key={key} className="rounded-lg bg-slate-100 dark:bg-slate-700 px-3 py-2 font-mono text-sm text-slate-800 dark:text-slate-100">
                              <span className="font-semibold">{key}</span>: {value}
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="text-slate-500 dark:text-slate-400">No local values are being shown yet.</div>
                      )}
                    </SmallCard>
                    <TraceTable rows={rows} activeRow={activeStep?.rowFocus || null} activeUpdates={activeUpdates} />
                  </div>
                </div>

                <div className="rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 text-sm text-slate-600 dark:text-slate-300 shadow-sm">
                  The highlighted row shows the call currently being resumed or completed. Green cells are new values added on the current step.
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
