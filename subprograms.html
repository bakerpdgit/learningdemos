<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQA A Level CS: Subprograms</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-DYQESQXT38"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-DYQESQXT38");
    </script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              headerBg: "#0f172a",
              headerAccent: "#38bdf8",
            },
          },
        },
      };
    </script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .drop-zone { min-width: 120px; display: inline-block; text-align: center; }
        .code-font { font-family: 'Courier New', Courier, monospace; }
        
        /* Custom scrollbar for dropdowns */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    <!-- Prevent FOUC: apply dark class before render -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("uimode");
          if (
            mode === "dark" ||
            (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- SVGs ---
        const ChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
        const Check = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const X = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Lightbulb = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
        const SunIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const MoonIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;

        // --- Data Bank ---
        const SUBTOPICS = [
            "Definition and advantages",
            "Parameters and interfaces",
            "Procedure vs Functions",
            "Local vs Global variables and scope"
        ];

        const ALL_QUESTIONS = [
            {
                id: 1,
                subtopic: "Definition and advantages",
                type: "multi-select",
                text: "Select all the advantages of using subroutines in a large software project:",
                options: [
                    "Allows multiple programmers to work on different modules simultaneously.",
                    "Makes code reusable and prevents writing the same logic multiple times.",
                    "Makes the code easier to test and debug independently.",
                    "Automatically prevents logical errors from occurring.",
                    "Makes the compiled program run significantly faster.",
                    "Converts all global variables into local variables to save memory."
                ],
                answers: [
                    "Allows multiple programmers to work on different modules simultaneously.",
                    "Makes code reusable and prevents writing the same logic multiple times.",
                    "Makes the code easier to test and debug independently."
                ],
                explanation: "Subroutines support modular programming, code reuse, and independent testing/debugging. They do NOT necessarily improve execution speed, auto-fix logic errors, or convert global variables."
            },
            {
                id: 2,
                subtopic: "Definition and advantages",
                type: "fib",
                text: "A subroutine is a named '",
                firstLetter: "o",
                answer: "out of line",
                textAfter: "' block of code that may be executed by simply writing its name in a program statement.",
                explanation: "The AQA specification defines a subroutine as a named 'out of line' block of code. This means it is written once outside the main flow and called when needed."
            },
            {
                id: 3,
                subtopic: "Parameters and interfaces",
                type: "mcq",
                text: "When a parameter is passed by reference, what is actually passed to the subroutine?",
                options: [
                    "The memory address of the original variable.",
                    "A copy of the value from the original variable.",
                    "A local duplicate of the data structure.",
                    "The data type of the variable."
                ],
                answer: "The memory address of the original variable.",
                explanation: "Passing by reference passes the memory address (pointer) of the variable. This means any modifications made to the parameter inside the subroutine will affect the original variable in the calling routine."
            },
            {
                id: 4,
                subtopic: "Procedure vs Functions",
                type: "fib",
                text: "Unlike a procedure, a ",
                firstLetter: "f",
                answer: "function",
                textAfter: " will always return a value/values to the calling routine.",
                explanation: "Functions return values, whereas procedures execute a set of instructions without returning a value back to the code that called them."
            },
            {
                id: 5,
                subtopic: "Local vs Global variables and scope",
                type: "code-mcq",
                text: "Consider the pseudocode below. What will be output when Main() is called?",
                code: `INT x = 5\n\nSUBROUTINE modify()\n    x = 10\n    print(x)\nENDSUBROUTINE\n\nSUBROUTINE Main()\n    modify()\n    print(x)\nENDSUBROUTINE`,
                options: ["10 then 10", "10 then 5", "5 then 10", "Error"],
                answer: "10 then 10",
                explanation: "Since x is declared outside all subroutines, it acts as a global variable. Modifying it inside the subroutine 'modify' changes it for the entire program. Therefore, both print statements output 10."
            },
            {
                id: 6,
                subtopic: "Local vs Global variables and scope",
                type: "code-mcq",
                text: "Consider the pseudocode below. What happens when Main() is called?",
                code: `SUBROUTINE calculate()\n    INT y = 20\n    print(y)\nENDSUBROUTINE\n\nSUBROUTINE Main()\n    calculate()\n    print(y)\nENDSUBROUTINE`,
                options: ["An error occurs on the second print statement", "20 then 20", "20 then 0", "An error occurs on the first print statement"],
                answer: "An error occurs on the second print statement",
                explanation: "The variable 'y' is declared inside 'calculate()', making it a local variable. It is out of scope in 'Main()', causing an error when trying to print it there."
            },
            {
                id: 7,
                subtopic: "Local vs Global variables and scope",
                type: "fib",
                text: "When variables are declared inside a subroutine, it is good practice because it prevents unintended ",
                firstLetter: "s",
                answer: "side effects",
                textAfter: " where variables in other parts of the program are accidentally modified.",
                explanation: "Using local variables encapsulates data, preventing unintended side effects and naming conflicts (shadowing) with global variables."
            },
            {
                id: 8,
                subtopic: "Definition and advantages",
                type: "drag-drop",
                text: "Drag and drop (or click to select) a label to identify the components in the pseudocode.",
                labels: ["End of Function", "End of Procedure", "Parameter", "Local Variable", "Global Variable"],
                codeLines: [
                    { code: "INT score = 0", zoneId: "DROP_1" },
                    { code: "" },
                    { code: "SUBROUTINE display_score(player_name)", zoneId: "DROP_2" },
                    { code: "    print(player_name + score)" },
                    { code: "ENDSUBROUTINE", zoneId: "DROP_3" },
                    { code: "" },
                    { code: "SUBROUTINE get_bonus()" },
                    { code: "    INT bonus_multiplier = 1.5", zoneId: "DROP_4" },
                    { code: "    return bonus_multiplier * 10" },
                    { code: "ENDSUBROUTINE", zoneId: "DROP_5" }
                ],
                answers: {
                    "DROP_1": "Global Variable",
                    "DROP_2": "Parameter",
                    "DROP_3": "End of Procedure",
                    "DROP_4": "Local Variable",
                    "DROP_5": "End of Function"
                },
                explanation: "'score' is defined outside subroutines (Global). 'player_name' is passed in the interface (Parameter). 'display_score' doesn't return anything (Procedure). 'bonus_multiplier' is declared inside (Local). 'get_bonus' returns a value (Function)."
            },
            {
                id: 9,
                subtopic: "Parameters and interfaces",
                type: "mcq",
                text: "When passing data to a subroutine by value, what happens if the subroutine changes the parameter's value?",
                options: [
                    "The original variable remains unchanged.",
                    "The original variable is updated immediately.",
                    "The program crashes due to a memory error.",
                    "The subroutine returns an error."
                ],
                answer: "The original variable remains unchanged.",
                explanation: "Passing by value creates a local copy of the data. Modifying this copy inside the subroutine has no effect on the original variable in the calling routine."
            },
            {
                id: 10,
                subtopic: "Local vs Global variables and scope",
                type: "fib",
                text: "Local variables only exist while the subroutine is ",
                firstLetter: "e",
                answer: "executing",
                textAfter: " and their memory is freed when the subroutine completes.",
                explanation: "Local variables are created on the call stack when the subroutine is called and are destroyed (memory freed) when the subroutine finishes executing."
            },
            {
                id: 11,
                subtopic: "Parameters and interfaces",
                type: "mcq",
                text: "Which of the following best describes a subroutine's interface and its primary advantage in collaborative development?",
                options: [
                    "It specifies the subroutine's name, expected parameters, and return type, allowing programmers to use it without needing to understand its internal code.",
                    "It defines the graphical user interface components of the subroutine, ensuring consistent styling across the application.",
                    "It lists all the local and global variables used by the subroutine to prevent memory leaks during execution.",
                    "It provides a network endpoint for the subroutine to communicate with other subroutines securely."
                ],
                answer: "It specifies the subroutine's name, expected parameters, and return type, allowing programmers to use it without needing to understand its internal code.",
                explanation: "An interface abstracts away the internal workings (implementation) of a subroutine. Programmers or external libraries only need to know the interface (name, parameters, return type) to interact with it seamlessly."
            },
            {
                id: 12,
                subtopic: "Parameters and interfaces",
                type: "fib",
                text: "A subroutine's ",
                firstLetter: "i",
                answer: "interface",
                textAfter: " hides the internal implementation details and simply specifies its name, expected parameters, and return type.",
                explanation: "The interface defines how a subroutine is called and what it returns, establishing a clear contract for other parts of the program or external libraries to use without needing to know how it works inside."
            }
        ];

        // --- Helper: Shuffle Array ---
        const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        // --- Main Component ---
        const App = () => {
            const [theme, setTheme] = useState(() => {
                const saved = localStorage.getItem("uimode");
                if (saved) return saved;
                return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            });
            useEffect(() => {
                document.documentElement.classList.toggle("dark", theme === "dark");
                localStorage.setItem("uimode", theme);
            }, [theme]);
            const toggleTheme = () => setTheme(prev => prev === "dark" ? "light" : "dark");

            const [selectedTopics, setSelectedTopics] = useState([...SUBTOPICS]);
            const [tempSelectedTopics, setTempSelectedTopics] = useState([...SUBTOPICS]);
            const [isFilterOpen, setIsFilterOpen] = useState(false);
            
            // Loop State
            const [questionLoop, setQuestionLoop] = useState([]);
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [totalInLoop, setTotalInLoop] = useState(0);
            const [currentIndex, setCurrentIndex] = useState(0);

            // Interaction State
            const [userAnswer, setUserAnswer] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [showSolution, setShowSolution] = useState(false);
            const [shuffledOptions, setShuffledOptions] = useState([]); // For MCQs

            // Drag/Drop Specific State
            const [activeDropLabel, setActiveDropLabel] = useState(null);
            const [dropZones, setDropZones] = useState({});

            // Initialize Loop
            const generateLoop = useCallback((topics) => {
                const filtered = ALL_QUESTIONS.filter(q => topics.includes(q.subtopic));
                const shuffled = shuffle(filtered);
                setQuestionLoop(shuffled);
                setTotalInLoop(shuffled.length);
                setCurrentIndex(1);
                
                if (shuffled.length > 0) {
                    setupQuestion(shuffled[0]);
                } else {
                    setCurrentQuestion(null);
                }
            }, []);

            // Initial load
            useEffect(() => {
                generateLoop(selectedTopics);
            }, []);

            const setupQuestion = (q) => {
                setCurrentQuestion(q);
                setUserAnswer(q.type === 'multi-select' ? [] : null);
                setIsCorrect(null);
                setShowSolution(false);
                setDropZones({});
                setActiveDropLabel(null);

                if (q.type === 'mcq' || q.type === 'code-mcq' || q.type === 'multi-select') {
                    setShuffledOptions(shuffle(q.options));
                }
            };

            const handleApplyFilters = () => {
                if (tempSelectedTopics.length === 0) {
                    alert("Please select at least one subtopic.");
                    return;
                }
                setSelectedTopics([...tempSelectedTopics]);
                generateLoop(tempSelectedTopics);
                setIsFilterOpen(false);
            };

            const handleNextQuestion = () => {
                const remaining = questionLoop.slice(1);
                if (remaining.length > 0) {
                    setQuestionLoop(remaining);
                    setCurrentIndex(currentIndex + 1);
                    setupQuestion(remaining[0]);
                } else {
                    // Loop finished, regenerate
                    generateLoop(selectedTopics);
                }
            };

            const toggleTopic = (topic) => {
                if (tempSelectedTopics.includes(topic)) {
                    setTempSelectedTopics(tempSelectedTopics.filter(t => t !== topic));
                } else {
                    setTempSelectedTopics([...tempSelectedTopics, topic]);
                }
            };

            // Checking Answers
            const checkAnswer = () => {
                if (!currentQuestion) return;

                let correct = false;

                if (currentQuestion.type === 'mcq' || currentQuestion.type === 'code-mcq') {
                    correct = (userAnswer === currentQuestion.answer);
                }
                else if (currentQuestion.type === 'multi-select') {
                    const userArr = Array.isArray(userAnswer) ? userAnswer : [];
                    const requiredAnswers = currentQuestion.answers;
                    correct = userArr.length === requiredAnswers.length && 
                              userArr.every(val => requiredAnswers.includes(val));
                }
                else if (currentQuestion.type === 'fib') {
                    const ans = currentQuestion.answer.toLowerCase();
                    const input = (userAnswer || "").trim().toLowerCase();
                    const firstLet = currentQuestion.firstLetter.toLowerCase();
                    
                    if (input === ans || (firstLet + input) === ans) {
                        correct = true;
                    }
                }
                else if (currentQuestion.type === 'drag-drop') {
                    const requiredKeys = Object.keys(currentQuestion.answers);
                    let allMatch = true;
                    for (let key of requiredKeys) {
                        if (dropZones[key] !== currentQuestion.answers[key]) {
                            allMatch = false;
                            break;
                        }
                    }
                    correct = allMatch;
                }

                setIsCorrect(correct);
                if (correct) {
                    setShowSolution(true); // Auto show solution on correct
                }
            };

            // Render Functions
            const renderFilters = () => (
                <div className="relative z-10">
                    <button
                        onClick={() => setIsFilterOpen(!isFilterOpen)}
                        className="flex items-center gap-2 bg-white dark:bg-slate-700 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition text-slate-700 dark:text-slate-200"
                    >
                        Filter Subtopics <ChevronDown />
                    </button>

                    {isFilterOpen && (
                        <div className="absolute right-0 mt-2 w-72 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl p-4 z-50">
                            <h3 className="font-semibold text-slate-700 dark:text-slate-200 mb-3 border-b dark:border-slate-600 pb-2">Select Subtopics</h3>
                            <div className="flex flex-col gap-2 mb-4 max-h-60 overflow-y-auto">
                                {SUBTOPICS.map(topic => (
                                    <label key={topic} className="flex items-start gap-2 cursor-pointer p-1 hover:bg-slate-50 dark:hover:bg-slate-700 rounded">
                                        <input
                                            type="checkbox"
                                            className="mt-1 w-4 h-4 text-blue-600 rounded"
                                            checked={tempSelectedTopics.includes(topic)}
                                            onChange={() => toggleTopic(topic)}
                                        />
                                        <span className="text-sm text-slate-700 dark:text-slate-300 leading-tight">{topic}</span>
                                    </label>
                                ))}
                            </div>
                            <button
                                onClick={handleApplyFilters}
                                className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition"
                            >
                                Apply & Restart Loop
                            </button>
                        </div>
                    )}
                </div>
            );

            const renderMCQ = () => (
                <div className="flex flex-col gap-3 mt-4">
                    {shuffledOptions.map((opt, i) => (
                        <button
                            key={i}
                            onClick={() => !showSolution && setUserAnswer(opt)}
                            disabled={showSolution}
                            className={`p-4 text-left border rounded-xl transition ${
                                userAnswer === opt 
                                    ? 'border-blue-500 ring-2 ring-blue-200 bg-blue-50' 
                                    : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'
                            } ${showSolution && opt === currentQuestion.answer ? 'border-green-500 bg-green-50 ring-2 ring-green-200' : ''}
                              ${showSolution && userAnswer === opt && opt !== currentQuestion.answer ? 'border-red-500 bg-red-50 ring-2 ring-red-200' : ''}`}
                        >
                            {opt}
                        </button>
                    ))}
                </div>
            );

            const handleToggleSelect = (opt) => {
                if (showSolution) return;
                setUserAnswer(prev => {
                    const arr = Array.isArray(prev) ? prev : [];
                    if (arr.includes(opt)) return arr.filter(o => o !== opt);
                    return [...arr, opt];
                });
            };

            const renderMultiSelect = () => (
                <div className="flex flex-col gap-3 mt-4">
                    <p className="text-sm font-semibold text-slate-500 mb-2">Select all that apply:</p>
                    {shuffledOptions.map((opt, i) => {
                        const isSelected = Array.isArray(userAnswer) && userAnswer.includes(opt);
                        const isCorrectAnswer = currentQuestion.answers.includes(opt);
                        
                        let borderClass = 'border-slate-200 hover:border-blue-300 hover:bg-slate-50';
                        
                        if (showSolution) {
                            if (isCorrectAnswer) {
                                borderClass = 'border-green-500 bg-green-50 ring-2 ring-green-200';
                            } else if (isSelected && !isCorrectAnswer) {
                                borderClass = 'border-red-500 bg-red-50 ring-2 ring-red-200';
                            } else {
                                borderClass = 'border-slate-200 opacity-60';
                            }
                        } else if (isSelected) {
                            borderClass = 'border-blue-500 ring-2 ring-blue-200 bg-blue-50';
                        }

                        return (
                            <button
                                key={i}
                                onClick={() => !showSolution && handleToggleSelect(opt)}
                                disabled={showSolution}
                                className={`p-4 text-left border rounded-xl transition flex items-start gap-3 ${borderClass}`}
                            >
                                <div className={`mt-0.5 w-5 h-5 flex-shrink-0 rounded flex items-center justify-center border ${isSelected ? 'bg-blue-600 border-blue-600' : 'border-slate-400 bg-white'} ${showSolution && isCorrectAnswer ? '!bg-green-600 !border-green-600' : ''} ${showSolution && isSelected && !isCorrectAnswer ? '!bg-red-600 !border-red-600' : ''}`}>
                                    {(isSelected || (showSolution && isCorrectAnswer)) && <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-white" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" /></svg>}
                                </div>
                                <span className={`${showSolution && isCorrectAnswer ? 'font-medium text-green-900' : ''} ${showSolution && isSelected && !isCorrectAnswer ? 'text-red-900' : ''}`}>{opt}</span>
                            </button>
                        );
                    })}
                </div>
            );

            const renderFIB = () => (
                <div className="mt-6 p-6 bg-blue-50/50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-900 text-lg">
                    <span>{currentQuestion.text}</span>
                    <span className="font-bold text-blue-700 ml-1">{currentQuestion.firstLetter}</span>
                    <input
                        type="text"
                        value={userAnswer || ""}
                        onChange={(e) => setUserAnswer(e.target.value)}
                        disabled={showSolution}
                        className={`mx-1 px-2 py-1 border-b-2 bg-white outline-none w-32 focus:border-blue-500 font-bold text-blue-700
                            ${showSolution && isCorrect ? 'border-green-500' : ''}
                            ${showSolution && isCorrect === false ? 'border-red-500' : ''}
                            ${!showSolution ? 'border-slate-400' : ''}
                        `}
                    />
                    <span>{currentQuestion.textAfter}</span>
                </div>
            );

            const renderDragDrop = () => {
                const handleZoneClick = (zoneId) => {
                    if (showSolution) return;
                    
                    if (activeDropLabel) {
                        // Place label
                        setDropZones(prev => ({...prev, [zoneId]: activeDropLabel}));
                        setActiveDropLabel(null);
                    } else if (dropZones[zoneId]) {
                        // Remove label
                        setDropZones(prev => {
                            const newZ = {...prev};
                            newZ[zoneId] = null;
                            return newZ;
                        });
                    }
                };

                const handleLabelClick = (lbl) => {
                    if (showSolution) return;
                    setActiveDropLabel(activeDropLabel === lbl ? null : lbl);
                };

                const handleDragStart = (e, lbl) => {
                    if (showSolution) return;
                    e.dataTransfer.setData("text/plain", lbl);
                    setActiveDropLabel(lbl);
                };

                const handleDragOver = (e) => {
                    e.preventDefault(); // Necessary to allow dropping
                };

                const handleDrop = (e, zoneId) => {
                    e.preventDefault();
                    if (showSolution) return;
                    const lbl = e.dataTransfer.getData("text/plain");
                    if (lbl) {
                        setDropZones(prev => ({...prev, [zoneId]: lbl}));
                        setActiveDropLabel(null);
                    }
                };

                // Filter out used labels
                const usedLabels = Object.values(dropZones).filter(Boolean);
                const availableLabels = currentQuestion.labels.filter(l => !usedLabels.includes(l));

                return (
                    <div className="mt-6 flex flex-col gap-6">
                        {/* Label Bank */}
                        <div className="p-4 bg-slate-100 dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600 min-h-[80px]">
                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-3 font-medium uppercase tracking-wider">Label Bank</p>
                            <div className="flex flex-wrap gap-2">
                                {availableLabels.map((lbl) => (
                                    <button
                                        key={lbl}
                                        onClick={() => handleLabelClick(lbl)}
                                        draggable={!showSolution}
                                        onDragStart={(e) => handleDragStart(e, lbl)}
                                        disabled={showSolution}
                                        className={`px-3 py-1.5 rounded-lg border-2 text-sm font-semibold transition shadow-sm
                                            ${activeDropLabel === lbl ? 'border-blue-500 bg-blue-100 text-blue-800 scale-105' : 'border-slate-300 bg-white hover:border-blue-400 text-slate-700'}
                                            ${!showSolution ? 'cursor-grab active:cursor-grabbing' : 'cursor-default'}
                                        `}
                                    >
                                        {lbl}
                                    </button>
                                ))}
                                {availableLabels.length === 0 && <span className="text-slate-400 italic text-sm py-1.5">All labels placed.</span>}
                            </div>
                        </div>

                        {/* Code area */}
                        <div className="bg-slate-800 p-6 rounded-xl overflow-x-auto shadow-inner">
                            <div className="grid grid-cols-[auto_min-content] gap-x-8 gap-y-2 text-slate-100 code-font items-center min-w-max">
                                {currentQuestion.codeLines.map((lineObj, idx) => {
                                    if (lineObj.code === "" && !lineObj.zoneId) return <div key={idx} className="col-span-2 h-4"></div>;
                                    
                                    const zId = lineObj.zoneId;
                                    let currentLabel = null, showCorrect = false, showWrong = false;
                                    
                                    if (zId) {
                                        currentLabel = dropZones[zId];
                                        showCorrect = showSolution && currentLabel === currentQuestion.answers[zId];
                                        showWrong = showSolution && currentLabel !== currentQuestion.answers[zId];
                                    }

                                    return (
                                        <React.Fragment key={idx}>
                                            <div className="whitespace-pre py-1">{lineObj.code}</div>
                                            <div>
                                                {zId && (
                                                    <button
                                                        onClick={() => handleZoneClick(zId)}
                                                        onDragOver={handleDragOver}
                                                        onDrop={(e) => handleDrop(e, zId)}
                                                        disabled={showSolution}
                                                        className={`drop-zone px-2 py-1 border-2 border-dashed rounded text-xs font-bold transition
                                                            ${currentLabel ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-500 bg-slate-700/50 hover:bg-slate-600'}
                                                            ${activeDropLabel && !currentLabel ? 'ring-2 ring-yellow-400 ring-offset-2 ring-offset-slate-800 border-yellow-400' : ''}
                                                            ${showCorrect ? '!bg-green-600 !border-green-600' : ''}
                                                            ${showWrong ? '!bg-red-600 !border-red-600' : ''}
                                                        `}
                                                    >
                                                        {currentLabel || (showSolution ? currentQuestion.answers[zId] : "Drop here")}
                                                    </button>
                                                )}
                                            </div>
                                        </React.Fragment>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            if (!currentQuestion) {
                return (
                    <div className="min-h-screen flex flex-col bg-slate-50 dark:bg-slate-900">
                        {/* CS Learning Header */}
                        <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
                          <a
                            href="index.html"
                            className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline"
                          >
                            <span className="text-slate-500">&lt;</span>CS
                            <span className="text-slate-500">&gt;</span>&nbsp;Learning
                          </a>
                          <nav className="flex items-center gap-6">
                            <a
                              href="index.html"
                              className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                            >
                              Home
                            </a>
                            <button
                              onClick={toggleTheme}
                              className="text-slate-400 hover:text-headerAccent transition-colors p-1"
                              aria-label="Toggle Dark Mode"
                            >
                              {theme === "dark" ? (
                                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                                </svg>
                              ) : (
                                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                                </svg>
                              )}
                            </button>
                          </nav>
                        </header>
                        <div className="flex-1 flex items-center justify-center p-6 text-center">
                            <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-lg max-w-md w-full">
                                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-4">No Questions Found</h2>
                                <p className="text-slate-600 dark:text-slate-400 mb-6">You have filtered out all available questions. Please select at least one subtopic to continue learning.</p>
                                {renderFilters()}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
                    {/* CS Learning Header */}
                    <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
                      <a href="index.html" className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline">
                        <span className="text-slate-500">&lt;</span>CS<span className="text-slate-500">&gt;</span>&nbsp;Learning
                      </a>
                      <nav className="flex items-center gap-6">
                        <a href="index.html" className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors">Home</a>
                        <button onClick={toggleTheme} className="text-slate-400 hover:text-headerAccent transition-colors p-1" aria-label="Toggle Dark Mode">
                          {theme === "dark" ? (
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                          ) : (
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                          )}
                        </button>
                      </nav>
                    </header>

                    <div className="flex-1 p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">

                        {/* Page title row */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                            <div>
                                <h1 className="text-2xl font-extrabold text-slate-900 dark:text-slate-100">AQA CS: Subprograms</h1>
                                <p className="text-slate-500 dark:text-slate-400 font-medium mt-1">Section 4.1.1.10 - 4.1.1.14</p>
                            </div>
                            {renderFilters()}
                        </div>

                        {/* Progress Bar */}
                        <div className="mb-6 flex items-center justify-between">
                            <span className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide">
                                Question {currentIndex} of {totalInLoop} in loop
                            </span>
                            <span className="text-sm font-semibold px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 rounded-full">
                                {currentQuestion.subtopic}
                            </span>
                        </div>
                        <div className="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full mb-8 overflow-hidden">
                            <div
                                className="bg-blue-600 dark:bg-sky-500 h-full transition-all duration-500 ease-out"
                                style={{ width: `${(currentIndex / totalInLoop) * 100}%` }}
                            ></div>
                        </div>

                        {/* Question Card */}
                        <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                            <div className="p-6 md:p-8">
                                <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 mb-4">{currentQuestion.text}</h2>

                                {currentQuestion.code && (
                                    <pre className="bg-slate-800 text-slate-100 p-4 rounded-lg overflow-x-auto code-font mb-6 shadow-inner">
                                        <code>{currentQuestion.code}</code>
                                    </pre>
                                )}

                                {currentQuestion.type === 'mcq' || currentQuestion.type === 'code-mcq' ? renderMCQ() : null}
                                {currentQuestion.type === 'multi-select' ? renderMultiSelect() : null}
                                {currentQuestion.type === 'fib' ? renderFIB() : null}
                                {currentQuestion.type === 'drag-drop' ? renderDragDrop() : null}

                            </div>

                            {/* Footer / Actions */}
                            <div className="bg-slate-50 dark:bg-slate-800/50 p-6 md:p-8 border-t border-slate-100 dark:border-slate-700 flex flex-col gap-4">

                                {/* Feedback Area */}
                                {isCorrect !== null && (
                                    <div className={`p-4 rounded-xl flex items-start gap-3 ${isCorrect ? 'bg-green-100 dark:bg-green-900/20 text-green-900 dark:text-green-100 border border-green-200 dark:border-green-800' : 'bg-red-50 dark:bg-red-900/20 text-red-900 dark:text-red-100 border border-red-200 dark:border-red-800'}`}>
                                        <div className="mt-0.5">
                                            {isCorrect ? <Check /> : <X />}
                                        </div>
                                        <div className="flex-1">
                                            <p className="font-bold">{isCorrect ? 'Correct!' : 'Incorrect. Try again or view the solution.'}</p>
                                            {showSolution && (
                                                <div className="mt-3 pt-3 border-t border-black/10 dark:border-white/10 flex gap-2">
                                                    <Lightbulb className="shrink-0 mt-0.5" />
                                                    <p className="text-sm font-medium">{currentQuestion.explanation}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* Buttons */}
                                <div className="flex flex-wrap gap-3 mt-2">
                                    {!showSolution ? (
                                        <>
                                            <button
                                                onClick={checkAnswer}
                                                className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-sm"
                                            >
                                                Check Answer
                                            </button>
                                            {isCorrect === false && (
                                                <button
                                                    onClick={() => setShowSolution(true)}
                                                    className="bg-white dark:bg-slate-700 hover:bg-slate-100 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-bold py-3 px-6 rounded-xl border border-slate-300 dark:border-slate-600 transition"
                                                >
                                                    Show Solution
                                                </button>
                                            )}
                                        </>
                                    ) : (
                                        <button
                                            onClick={handleNextQuestion}
                                            className="bg-slate-800 dark:bg-slate-600 hover:bg-slate-900 dark:hover:bg-slate-500 text-white font-bold py-3 px-6 rounded-xl transition shadow-sm w-full md:w-auto"
                                        >
                                            {currentIndex === totalInLoop ? 'Restart Loop / Next Topic' : 'Next Question'}
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                    </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
