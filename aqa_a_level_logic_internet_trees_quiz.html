<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computer Science A Level Revision Quiz - Logic, Internet and Trees</title>
    <style>
      :root {
        --bg: #020617;
        --panel: #0f172a;
        --panel-soft: #1e293b;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent-dark: #0891b2;
        --success: #34d399;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 950px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0;
        color: var(--accent);
        font-size: 1.8rem;
      }
      .subtitle {
        margin-top: 8px;
        color: var(--muted);
      }
      .path {
        position: relative;
        height: 90px;
        margin: 20px 0;
        border: 1px solid #334155;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.8);
      }
      .node {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: #64748b;
      }
      .node.done { background: var(--success); }
      .player {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
      }
      .panel {
        background: var(--panel);
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 20px;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        margin-bottom: 15px;
      }
      .topic {
        display: inline-block;
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.15);
        color: var(--accent);
        padding: 6px 10px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 700;
      }
      .progress { color: var(--muted); font-size: 14px; }
      #question-text {
        font-size: 1.25rem;
        line-height: 1.45;
        margin: 0 0 18px;
      }
      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 10px;
      }
      .option {
        border: 1px solid #475569;
        background: var(--panel-soft);
        color: var(--text);
        border-radius: 10px;
        padding: 12px;
        text-align: left;
        font-size: 15px;
        cursor: pointer;
      }
      .option:hover { border-color: var(--accent); }
      .result {
        text-align: center;
      }
      .result h2 {
        margin-top: 0;
        color: var(--accent);
      }
      .btn {
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #082f49;
        padding: 11px 18px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn:hover { background: var(--accent-dark); color: #e0f2fe; }
      .shake {
        animation: shake 0.45s linear;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Computer Science A Level Revision Quiz</h1>
      <p class="subtitle">Logic, Internet and Trees • 25 Questions</p>

      <div class="path" id="path"></div>

      <main class="panel" id="panel"></main>
    </div>

    <script>
      const rawQuestions = [
        { topic: "Boolean Simplification", text: "Simplify the Boolean expression \\( \\overline{A} \\cdot B + A \\cdot B \\).", answer: "\\( B \\)", distractors: ["\\( A \\)", "\\( 1 \\)", "\\( 0 \\)"] },
        { topic: "Boolean Simplification", text: "Simplify the Boolean expression \\( A + \\overline{A} \\cdot B \\).", answer: "\\( A + B \\)", distractors: ["\\( A \\cdot B \\)", "\\( 1 \\)", "\\( A + \\overline{B} \\)"] },
        { topic: "Adders", text: "What is the Boolean expression for the Sum (\\( S \\)) output of a Half Adder with inputs \\( A \\) and \\( B \\)?", answer: "\\( A \\oplus B \\)", distractors: ["\\( A \\cdot B \\)", "\\( A + B \\)", "\\( \\overline{A \\oplus B} \\)"] },
        { topic: "Adders", text: "What is the Boolean expression for the Carry Out (\\( C_{out} \\)) of a Full Adder with inputs \\( A, B \\) and \\( C_{in} \\)?", answer: "\\( (A \\cdot B) + (C_{in} \\cdot (A \\oplus B)) \\)", distractors: ["\\( A \\oplus B \\oplus C_{in} \\)", "\\( (A + B) \\cdot (C_{in} + (A \\oplus B)) \\)", "\\( A \\cdot B \\cdot C_{in} \\)"] },
        { topic: "D-Type Flip-Flops", text: "Which of the following describes the operation of a D-type flip-flop?", answer: "Its output updates to match the data input only on a rising clock edge.", distractors: ["It toggles its output state every clock cycle continuously.", "It acts as a half-adder for two binary inputs.", "It divides the frequency of the data input by two without a clock."] },
        { topic: "De Morgan's Laws", text: "According to De Morgan's Laws, what is the equivalent of \\( \\overline{A + B} \\)?", answer: "\\( \\overline{A} \\cdot \\overline{B} \\)", distractors: ["\\( \\overline{A} + \\overline{B} \\)", "\\( A \\cdot B \\)", "\\( A + B \\)"] },
        { topic: "Boolean Simplification", text: "Simplify the expression \\( A \\cdot (A + B) \\) using Boolean identities.", answer: "\\( A \\)", distractors: ["\\( B \\)", "\\( A \\cdot B \\)", "\\( 1 \\)"] },
        { topic: "Boolean Simplification", text: "Simplify the expression \\( \\overline{\\overline{A} + \\overline{B}} \\).", answer: "\\( A \\cdot B \\)", distractors: ["\\( A + B \\)", "\\( \\overline{A} \\cdot \\overline{B} \\)", "\\( 1 \\)"] },
        { topic: "Tree Definitions", text: "Which is the correct mathematical definition of a general tree?", answer: "A connected, undirected graph with no cycles.", distractors: ["A directed graph where every node has exactly two children.", "A fully connected graph where every node links to every other node.", "A graph where data is stored strictly in ascending order."] },
        { topic: "Tree Definitions", text: "What is the defining characteristic of a Binary Tree compared to a general tree?", answer: "Each node has a maximum of two child nodes.", distractors: ["The data must be ordered chronologically.", "It cannot contain leaf nodes.", "It must be perfectly balanced at all times."] },
        { topic: "Binary Search Trees", text: "In a Binary Search Tree (BST), which traversal algorithm will output the nodes in ascending sequence?", answer: "In-order", distractors: ["Pre-order", "Post-order", "Breadth-first"] },
        { topic: "Tree Traversals", text: "Which tree traversal follows the sequence: Visit Left Subtree, Visit Right Subtree, Visit Root?", answer: "Post-order", distractors: ["Pre-order", "In-order", "Level-order"] },
        { topic: "Tree Traversals", text: "Which tree traversal is typically used to safely delete an entire tree from memory by deleting children before parents?", answer: "Post-order", distractors: ["In-order", "Pre-order", "Level-order"] },
        { topic: "Tree Traversals", text: "Which tree traversal is often used to create a structural copy (clone) of a tree?", answer: "Pre-order", distractors: ["In-order", "Post-order", "Depth-first (bottom-up)"] },
        { topic: "Binary Search Trees", text: "If the numbers 15, 10, 20, 8, 12 are inserted into an initially empty Binary Search Tree, what will be the right child of the node containing 10?", answer: "12", distractors: ["8", "15", "20"] },
        { topic: "Tree Representation", text: "When representing a binary tree using a 2D array (with Left Pointer, Data, and Right Pointer fields), what value is typically stored in a pointer field if there is no child node?", answer: "A null pointer or -1.", distractors: ["The index of the root node.", "The index of the current node.", "0 (assuming 1-based indexing)."] },
        { topic: "DNS System", text: "What is the primary role of the Domain Name System (DNS)?", answer: "To resolve Fully Qualified Domain Names (FQDNs) to IP addresses.", distractors: ["To assign MAC addresses to network interface cards.", "To encrypt traffic between a client and a web server.", "To allocate IP addresses dynamically using DHCP."] },
        { topic: "Internet Registries", text: "What is the primary purpose of an Internet Registrar?", answer: "To act as an agent providing domain name registration services to the public.", distractors: ["To physically host the root DNS servers for the Internet.", "To assign physical MAC addresses to hardware manufacturers.", "To act as a central firewall for a wide area network."] },
        { topic: "Packet Switching", text: "In packet switching, how do packets travel from source to destination?", answer: "They may take different routes and are reassembled into order at the destination.", distractors: ["They all follow a single, dedicated, pre-established circuit.", "They are broadcast to all nodes on the network until claimed.", "They are sent sequentially and must arrive in the exact order sent."] },
        { topic: "Networking Hardware", text: "What is the main difference between a router and a gateway?", answer: "A gateway connects networks using different protocols, while a router connects networks using the same protocol.", distractors: ["A router acts as a firewall, while a gateway only forwards packets.", "A gateway works at the MAC sublayer, while a router works at the Application layer.", "A router is always hardware, whereas a gateway is always software."] },
        { topic: "Firewalls", text: "How does dynamic packet filtering (stateful inspection) improve upon static packet filtering?", answer: "It remembers the context and state of active network connections.", distractors: ["It scans the actual payload of the packet for virus signatures.", "It encrypts every packet before allowing it through the firewall.", "It dynamically changes the router's IP address to hide it."] },
        { topic: "Digital Signatures", text: "In public-key cryptography, how is a digital signature created to prove the sender's identity?", answer: "The sender encrypts the message digest (hash) using their private key.", distractors: ["The sender encrypts the message digest using the recipient's public key.", "The sender encrypts the message digest using the recipient's private key.", "The sender encrypts the entire message using their public key."] },
        { topic: "Malware", text: "What distinguishes a computer worm from a virus?", answer: "A worm self-replicates and spreads across networks without needing a host file.", distractors: ["A worm is a piece of hardware, while a virus is software.", "A worm only infects boot sectors, while viruses infect executables.", "A worm requires a user to execute a host program to spread."] },
        { topic: "Vulnerabilities", text: "Which of the following is an example of a buffer overflow vulnerability?", answer: "A program writes data outside the bounds of an allocated block of memory.", distractors: ["A user enters SQL commands into a login form to bypass authentication.", "An attacker intercepts and alters a packet in transit.", "A program gets stuck in an infinite loop, consuming all CPU resources."] },
        { topic: "Code Quality", text: "Which technique is most effective at protecting against SQL injection vulnerabilities in web applications?", answer: "Using parameterized queries (prepared statements).", distractors: ["Encrypting the database passwords using SHA-256.", "Putting the database server behind a stateful inspection firewall.", "Obfuscating the JavaScript code on the client side."] },
      ];

      let gameQuestions = [];
      let currentOptions = [];
      let currentIndex = 0;
      let gameState = "loading";

      const panel = document.getElementById("panel");
      const path = document.getElementById("path");

      function shuffleArray(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      }

      function getPathPosition(index) {
        const startX = 15;
        const startY = 85;
        const endX = 50;
        const endY = 15;
        const progress = gameQuestions.length > 0 ? index / gameQuestions.length : 0;
        return {
          left: `${startX + (endX - startX) * progress}%`,
          top: `${startY + (endY - startY) * progress}%`,
        };
      }

      function setCurrentOptions() {
        if (gameQuestions.length > 0 && currentIndex < gameQuestions.length) {
          const q = gameQuestions[currentIndex];
          currentOptions = shuffleArray([q.answer, ...q.distractors]);
        }
      }

      function renderPath() {
        path.innerHTML = "";
        gameQuestions.forEach((_, index) => {
          const node = document.createElement("div");
          node.className = `node ${index < currentIndex ? "done" : ""}`;
          Object.assign(node.style, getPathPosition(index));
          path.appendChild(node);
        });

        const player = document.createElement("div");
        player.className = "player";
        Object.assign(player.style, getPathPosition(Math.min(currentIndex, gameQuestions.length - 1)));
        path.appendChild(player);
      }

      function handleRestart() {
        gameQuestions = shuffleArray(rawQuestions);
        currentIndex = 0;
        gameState = "playing";
        setCurrentOptions();
        render();
      }

      function handleOptionSelect(selectedOption) {
        if (gameState !== "playing") return;

        const correctAnswer = gameQuestions[currentIndex].answer;
        if (selectedOption === correctAnswer) {
          if (currentIndex === gameQuestions.length - 1) {
            gameState = "won";
            currentIndex = gameQuestions.length;
          } else {
            currentIndex += 1;
            setCurrentOptions();
          }
          render();
        } else {
          gameState = "wrong";
          panel.classList.add("shake");
          setTimeout(() => panel.classList.remove("shake"), 500);
          render();
        }
      }

      function renderPlaying() {
        const currentQ = gameQuestions[currentIndex];
        panel.innerHTML = "";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `<span class="topic">${currentQ.topic}</span><span class="progress">Question ${currentIndex + 1}/${gameQuestions.length}</span>`;
        panel.appendChild(meta);

        const h2 = document.createElement("h2");
        h2.id = "question-text";
        h2.textContent = currentQ.text;
        panel.appendChild(h2);

        const options = document.createElement("div");
        options.className = "options";

        currentOptions.forEach((option) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "option";
          btn.textContent = option;
          btn.addEventListener("click", () => handleOptionSelect(option));
          options.appendChild(btn);
        });

        panel.appendChild(options);
      }

      function renderState() {
        panel.classList.remove("shake");
        const title = gameState === "won" ? "Peak Reached!" : "Not this time";
        const text =
          gameState === "won"
            ? "Excellent work — you answered all 25 questions correctly."
            : `You reached question ${currentIndex + 1}. Restart to try a different random order.`;

        panel.innerHTML = `<div class="result"><h2>${title}</h2><p>${text}</p></div>`;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn";
        btn.textContent = "Restart Quiz";
        btn.addEventListener("click", handleRestart);
        panel.querySelector(".result").appendChild(btn);
      }

      function render() {
        if (gameState === "loading" || gameQuestions.length === 0) {
          panel.textContent = "Loading quiz...";
          return;
        }

        renderPath();

        if (gameState === "playing") {
          renderPlaying();
        } else {
          renderState();
        }
      }

      handleRestart();
    </script>
  </body>
</html>
