    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Smooth SVG Animations */
      .fade-in {
        animation: fadeIn 0.8s ease-in-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .draw-line {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: drawLine 1.5s ease-out forwards;
      }
      @keyframes drawLine {
        to {
          stroke-dashoffset: 0;
        }
      }

      /* Rotations - explicitly using CSS combined with inline transform-origin for SVG browser compatibility */
      .spin {
        animation: spin 4s linear infinite;
      }
      .spin-slow {
        animation: spin 8s linear infinite;
      }
      .spin-fast {
        animation: spin 2s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      /* Actuator Arm Animation */
      @keyframes seekArm {
        0% {
          transform: rotate(10deg);
        }
        50% {
          transform: rotate(25deg);
        }
        100% {
          transform: rotate(10deg);
        }
      }
      .seek-arm {
        animation: seekArm 2s ease-in-out infinite;
      }

      /* Electron Charge Animation */
      @keyframes trapCharge {
        0% {
          transform: translateY(0);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        80% {
          transform: translateY(-30px);
          opacity: 1;
        }
        100% {
          transform: translateY(-30px);
          opacity: 0;
        }
      }
      .trap-charge {
        animation: trapCharge 2s ease-in-out infinite;

      @keyframes slideRight {

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // --- DATA DEFINITIONS FOR STORAGE HARDWARE ---

      const TOPICS = [
        { id: "hdd", name: "Hard Disk Drive (HDD)" },
        { id: "ssd", name: "Solid State Drive (SSD)" },
        { id: "optical", name: "Optical Disk" },
        { id: "comparison", name: "Storage Comparisons" },
      ];

      const SIMULATIONS = {
        hdd: {
          title: "Hard Disk Drive (HDD) Operation",
          stages: [
            {
              desc: "The magnetic surface of the spinning platter is logically divided into concentric tracks, which are further divided into sectors.",
              question:
                "How is the magnetic surface of the disk logically structured to organise data?",
              options: [
                "Into a single continuous spiral track",
                "Into concentric tracks divided into sectors",
                "Into a 2D grid of rows and columns",
                "Into independent silicon blocks and pages",
              ],
              answer: "Into concentric tracks divided into sectors",
            },
            {
              desc: "An actuator arm moves a floating read/write head across the surface of the platter without physically touching it.",
              question:
                "What prevents the read/write head from scraping and destroying the spinning platter?",
              options: [
                "It floats on a microscopic cushion of air",
                "It is coated in a lubricating oil",
                "It uses quantum levitation",
                "It rolls on microscopic ball bearings",
              ],
              answer: "It floats on a microscopic cushion of air",
            },
            {
              desc: "Data is stored as microscopic dots of magnetic charge. A North (N) polarity represents a 1, and a South (S) polarity represents a 0.",
              question:
                "How are the binary values physically represented on the HDD platter?",
              options: [
                "Pits and lands on the surface",
                "Trapped electrons in a floating gate",
                "Dots of magnetic charge with North (1) or South (0) polarity",
                "Reflective and non-reflective dyes",
              ],
              answer:
                "Dots of magnetic charge with North (1) or South (0) polarity",
            },
            {
              desc: "Accessing data takes time. Seek time is the physical movement of the actuator head to the correct track. Rotational latency is waiting for the sector to spin underneath the head.",
              question:
                "Which two physical movements primarily contribute to the latency (delay) of accessing data on an HDD?",
              options: [
                "Seek time (head movement) and Rotational latency (platter spinning)",
                "Controller processing and RAM caching",
                "Laser focusing and tracking",
                "Capacitor charging and discharging",
              ],
              answer:
                "Seek time (head movement) and Rotational latency (platter spinning)",
            },
          ],
        },
        ssd: {
          title: "Solid State Drive (SSD) Operation",
          stages: [
            {
              desc: "An SSD contains no moving parts. It consists of banks of NAND flash memory chips managed by a controller chip.",
              question:
                "What are the two primary integrated circuit components found inside an SSD?",
              options: [
                "A magnetic platter and a read head",
                "NAND flash memory and a controller chip",
                "A laser diode and a photodiode",
                "Volatile RAM and a CPU",
              ],
              answer: "NAND flash memory and a controller chip",
            },
            {
              desc: "The NAND flash memory is built from blocks of millions of microscopic floating gate transistors.",
              question:
                "What is the fundamental electronic component used to store a single bit of data in an SSD?",
              options: [
                "A magnetic domain",
                "A floating gate transistor",
                "An optical pit",
                "A mechanical relay",
              ],
              answer: "A floating gate transistor",
            },
            {
              desc: "Counter-intuitively, if electrons are trapped in the floating gate (trapped charge), it represents a 0. If there is no charge, it represents a 1.",
              question:
                "How are the binary states represented in terms of electrical charge in the floating gate?",
              options: [
                "Trapped charge = 1, No charge = 0",
                "Trapped charge = 0, No charge = 1",
                "Positive charge = 1, Negative charge = 0",
                "High voltage = 0, Low voltage = 1",
              ],
              answer: "Trapped charge = 0, No charge = 1",
            },
            {
              desc: "Data can be read sequentially in small pages (rows). However, the architecture requires that an entire block of pages must be erased at once.",
              question:
                "What is the key limitation regarding the reading and erasing of data in NAND flash memory?",
              options: [
                "Data can only be read backwards",
                "Data must be read and erased one single bit at a time",
                "Pages can be read, but whole blocks must be erased at the same time",
                "Erasing data physically burns the silicon, reducing its life to 1 write",
              ],
              answer:
                "Pages can be read, but whole blocks must be erased at the same time",
            },
          ],
        },
        optical: {
          title: "Optical Disk Operation",
          stages: [
            {
              desc: "Unlike an HDD, an optical disk stores data on a single, continuous spiral track starting from the center and moving outwards.",
              question: "How is the data track structured on an optical disk?",
              options: [
                "As concentric parallel circles",
                "As a single continuous spiral track from the center outwards",
                "As a grid of sectors",
                "As scattered, randomly accessed blocks",

              answer:
                "As a single continuous spiral track from the center outwards",

            {
              desc: "The surface of the track is physically manufactured or burned with microscopic indentations called 'pits' and flat areas called 'lands'.",
              question:
                "How is data physically encoded onto the surface of an optical disk?",
              options: [
                "Using magnetic North and South polarities",
                "Using trapped electrons in a floating gate",
                "Using microscopic indentations ('pits') and flat areas ('lands')",

                "How does the optical drive interpret the physical pits and lands into binary data?",
              options: [
                "A pit is a 0 and a land is a 1",

                "Transitions reflect light representing 0s, deep pits trap light representing 1s",
              ],
              answer:
                "Transitions (which scatter light) represent a 1; continuous flat areas represent a 0",

            {
              desc: "To read the data at a steady rate, the disk uses Constant Linear Velocity (CLV). It spins faster when reading the center and slower at the outer edge.",
              question:
                "Why does an optical drive change the rotational speed (Variable Angular Velocity) as the laser moves outwards?",
              options: [
                "To stop the disk from overheating",
                "To maintain a Constant Linear Velocity (CLV) so data is read at a steady rate",

          question:

          options: [

            "SSDs have no moving parts, making them immune to mechanical head-crashes caused by vibration.",

          question:
            "Why is an Optical Disk (like a DVD) the best choice for this mass distribution scenario?",

          options: [

            "An SSD compresses the video files automatically.",

      // --- HELPER COMPONENTS ---

      const CheckboxList = ({ topics, selectedTopics, onChange }) => {
        const [isOpen, setIsOpen] = useState(false);

        const handleToggle = (id) => {
          if (selectedTopics.includes(id)) {
            if (selectedTopics.length > 1) {
              onChange(selectedTopics.filter((t) => t !== id));
            }
          } else {
            onChange([...selectedTopics, id]);

        };

        return (
          <div className="relative">
            <button
              onClick={() => setIsOpen(!isOpen)}
              className="bg-white border border-gray-300 px-4 py-2 rounded-lg shadow-sm font-medium text-gray-700 hover:bg-gray-50 flex items-center gap-2"
            >
              Topics Selected: {selectedTopics.length}

                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"

            {isOpen && (
              <div className="absolute right-0 mt-2 w-64 bg-white border border-gray-200 rounded-lg shadow-xl z-50 p-3">

                      {topic.name}
                    </span>
                  </label>
                ))}
              </div>
            )}
          </div>

      // --- SIMULATION VISUAL COMPONENTS ---

            {/* Rotational Latency Indication (Stage 3) - Dotted red arrow around outside */}

                  {/* Block 2: S (0) */}

                  <text

                    fontSize="14"
                    fontWeight="bold"
                  >
                    S
                  </text>
                  <text
                    x="65"
                    y="45"
                    textAnchor="middle"
                    fill="#22c55e"
                    fontSize="12"
                    fontFamily="monospace"
                  >
                    0
                  </text>

                  {/* Block 3: S (0) */}
                  <rect x="90" y="0" width="40" height="30" fill="#ef4444" />
                  <text
                    x="110"
                    y="20"
                    textAnchor="middle"

                  <text

                  <text

                    1

      // 2. Solid State Drive (SSD)
      const SSDVis = ({ stage }) => {
        return (
          <svg
            viewBox="0 0 600 350"
            className="w-full h-full bg-white rounded-lg"
          >
            {/* Base PCB (Stage 0 mostly) */}
            <g transform="translate(30, 80)">
              <rect
                x="0"

                height="180"
                fill="#064e3b"

                x="130"

              <text
                x="50"

            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];

            setShuffledOptions(

                  ) : (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  )}
                </button>
              </nav>
            </header>
            {/* Sub-header */}
            <header className="bg-slate-800 text-white p-3 shadow-lg flex justify-between items-center z-40 sticky top-[58px]">
              <p className="text-sm text-slate-300 font-medium">
                Storage Hardware: Principles of Operation
              </p>
              <CheckboxList
                topics={TOPICS}
                selectedTopics={selectedTopics}
                onChange={setSelectedTopics}
              />
            </header>

            {/* Main Content Area */}
            <main className="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
              {/* LEFT: VISUAL SIMULATION OR SCENARIO */}
              <div className="flex flex-col space-y-4">
                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex-grow flex flex-col">
                  <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-4 border-b border-slate-100 dark:border-slate-600 pb-3">
                    {isSim
                      ? currentTask.data.title
                      : "Storage Comparison Scenario"}
                  </h2>

                  {isSim ? (
                    <>
                      {/* Status / Stage Tracker */}
                      <div className="flex gap-2 mb-6">
                        {currentTask.data.stages.map((_, idx) => (
                          <div
                            key={idx}
                            className={`h-2.5 flex-grow rounded-full transition-colors duration-300 ${idx <= currentTask.stage ? "bg-blue-600" : "bg-slate-100 dark:bg-slate-700"}`}
                          ></div>
                        ))}
                      </div>

                      {/* Dynamic SVG Visualisation */}
                      <div className="w-full aspect-video bg-slate-50 dark:bg-slate-700 rounded-xl overflow-hidden flex items-center justify-center border border-slate-200 dark:border-slate-600 relative mb-6 shadow-inner">
                        {currentTask.id === "hdd" && (
                          <HDDVis stage={currentTask.stage} />
                        )}
                        {currentTask.id === "ssd" && (
                          <SSDVis stage={currentTask.stage} />
                        )}
                        {currentTask.id === "optical" && (
                          <OpticalVis stage={currentTask.stage} />
                        )}
                      </div>

                      <div className="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800 p-5 rounded-xl text-base text-slate-800 dark:text-slate-200 mb-2 flex-grow">
                        <p className="font-bold text-blue-800 dark:text-blue-300 mb-2 uppercase tracking-wide text-sm">
                          Principle of Operation:
                        </p>
                        <p className="leading-relaxed">
                          {currentStageData.desc}
                        </p>
                      </div>
                    </>
                  ) : (
                    <div className="flex-grow flex flex-col justify-center">
                      <div className="bg-purple-50 dark:bg-purple-900/20 border border-purple-100 dark:border-purple-800 p-8 rounded-2xl text-slate-800 dark:text-slate-200 shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                          <svg
                            className="w-10 h-10 text-purple-600"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                          >
                            <path
                              strokeLinecap="round"
                              strokeLinejoin="round"
                              strokeWidth="2"
                              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
                            ></path>
                          </svg>
                          <span className="bg-purple-200 text-purple-800 px-3 py-1 rounded-full text-sm font-bold">
                            Scenario {currentTask.stage + 1} of{" "}
                            {currentTask.data.stages.length}
                          </span>
                        </div>
                        <h3 className="font-bold text-purple-900 text-lg mb-3">
                          Context:
                        </h3>
                        <p className="text-xl leading-relaxed">
                          {currentStageData.scenario}
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* RIGHT: QUESTION & INTERACTION */}
              <div className="flex flex-col space-y-4">
                <div className="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex-grow flex flex-col">
                  <h3 className="text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 flex items-center gap-3">
                    <span className="bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-300 p-2 rounded-lg">
                      <svg
                        className="w-6 h-6"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          strokeLinecap="round"
                          strokeLinejoin="round"
                          strokeWidth="2"
                          d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                        ></path>
                      </svg>
                    </span>
                    Knowledge Check
                  </h3>

                  <p className="text-slate-800 dark:text-slate-100 font-semibold mb-6 text-lg leading-relaxed">
                    {currentStageData.question}
                  </p>

                  {/* Multiple Choice Options */}
                  <div className="space-y-3 mb-8 flex-grow">
                    {shuffledOptions.map((option, idx) => (
                      <label
                        key={idx}
                        className={`mcq-option block cursor-pointer relative ${isCorrect ? "pointer-events-none" : ""}`}
                      >
                        <input
                          type="radio"
                          name="answer"
                          value={option}
                          checked={selectedOption === option}
                          onChange={() => handleOptionClick(option)}
                          className="absolute opacity-0 w-0 h-0"
                        />
                        <div
                          className={`p-4 rounded-xl border-2 transition-all duration-200 flex items-center gap-4
                                                ${selectedOption === option ? "border-blue-500 bg-blue-50 dark:bg-blue-900/30" : "border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 hover:border-blue-300 hover:bg-slate-50 dark:hover:bg-slate-600"}
                                                ${isCorrect && option === currentStageData.answer ? "border-green-500 bg-green-50 dark:bg-green-900/30 ring-2 ring-green-200 dark:ring-green-800" : ""}
                                                ${isCorrect && selectedOption === option && option !== currentStageData.answer ? "border-red-500 bg-red-50 dark:bg-red-900/30" : ""}
                                            `}
                        >
                          <div
                            className={`w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center
                                                    ${selectedOption === option ? "border-blue-500" : "border-slate-300"}
                                                    ${isCorrect && option === currentStageData.answer ? "border-green-500 bg-green-500" : ""}
                                                `}
                          >
                            {isCorrect &&
                              option === currentStageData.answer && (
                                <svg
                                  className="w-3 h-3 text-white"
                                  fill="none"
                                  viewBox="0 0 24 24"
                                  stroke="currentColor"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth="3"
                                    d="M5 13l4 4L19 7"
                                  />
                                </svg>
                              )}
                          </div>
                          <span className="text-slate-700 dark:text-slate-200 font-medium">
                            {option}
                          </span>
                        </div>
                      </label>
                    ))}
                  </div>

                  {/* Controls & Feedback */}
                  <div className="space-y-4 pt-4 border-t border-slate-100 dark:border-slate-700 mt-auto">
                    {!isCorrect ? (
                      <div className="flex flex-col gap-3">
                        <button
                          onClick={checkAnswer}
                          disabled={!selectedOption}
                          className={`w-full py-4 rounded-xl font-bold text-lg transition-all shadow-sm
                                                    ${selectedOption ? "bg-blue-600 text-white hover:bg-blue-700 hover:shadow-md active:transform active:scale-[0.98]" : "bg-slate-100 dark:bg-slate-700 text-slate-400 dark:text-slate-500 cursor-not-allowed"}`}
                        >
                          Check Answer
                        </button>

                        {feedback?.type === "incorrect" && (
                          <div className="p-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 text-center font-medium animate-pulse border border-red-100 dark:border-red-800">
                            {feedback.text}
                          </div>
                        )}
                      </div>
                    ) : (
                      <div className="flex flex-col gap-4 fade-in">
                        <div className="p-4 rounded-xl bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-300 flex items-center gap-3">
                          <div className="bg-green-100 dark:bg-green-900/40 p-2 rounded-full text-green-600 dark:text-green-400">
                            <svg
                              className="w-6 h-6"
                              fill="none"
                              stroke="currentColor"
                              viewBox="0 0 24 24"
                            >
                              <path
                                strokeLinecap="round"
                                strokeLinejoin="round"
                                strokeWidth="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                              ></path>
                            </svg>
                          </div>
                          <p className="font-bold text-lg">Correct!</p>
                        </div>

                        <button
                          onClick={advanceStage}
                          className="w-full bg-slate-800 dark:bg-slate-700 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-900 dark:hover:bg-slate-600 transition-all shadow-md flex items-center justify-center gap-2 hover:gap-3"
                        >
                          {currentTask.stage <
                          currentTask.data.stages.length - 1
                            ? isSim
                              ? "Next Step"
                              : "Next Scenario"
                            : "Next Topic"}
                          <svg
                            className="w-5 h-5 transition-transform"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                          >
                            <path
                              strokeLinecap="round"
                              strokeLinejoin="round"
                              strokeWidth="2"
                              d="M14 5l7 7m0 0l-7 7m7-7H3"
                            ></path>
                          </svg>
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
