      // --- UTILITY ALGORITHMS & DATA GENERATORS ---
      class UnionFind {
        constructor(n) {
          this.parent = Array.from({ length: n }, (_, i) => i);
        }
        find(i) {
          if (this.parent[i] === i) return i;
          return (this.parent[i] = this.find(this.parent[i]));
        }
        union(i, j) {
          let rootI = this.find(i),
            rootJ = this.find(j);
          if (rootI !== rootJ) {
            this.parent[rootI] = rootJ;
            return true;
          }
          return false;
        }
      }

      const shuffleArray = (array) => {
        const newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
      };

      const TOPICS = {
        bfs: "BFS Graph Traversal (Shortest Path)",
        dfs: "DFS Graph Traversal (Navigating a Maze)",
        tree: "Tree Traversals (Pre/In/Post-order)",
        apps: "Applications of Traversals",
      };

      const APPS_QUESTIONS = [
        {
          q: "Which traversal algorithm is typically used for copying a tree?",
          a: "Pre-order",
        },
        {
          q: "Which traversal algorithm is used to output the contents of a Binary Search Tree in ascending order?",
          a: "In-order",
        },
        {
          q: "Which traversal algorithm is used for Infix to Reverse Polish Notation (RPN) conversions?",
          a: "Post-order",
        },
        {
          q: "Which traversal algorithm is used to produce a postfix expression from an expression tree?",
          a: "Post-order",
        },
        {
          q: "Which traversal algorithm is typically used for emptying or deleting a tree?",
          a: "Post-order",
        },
        {
          q: "Which search algorithm is guaranteed to find the shortest path in an unweighted graph?",
          a: "Breadth-First Search (BFS)",
        },
        {
          q: "Which search algorithm is typically used for navigating a maze?",
          a: "Depth-First Search (DFS)",
        },
      ];

      const TRAVERSAL_TYPES = [
        "Pre-order",
        "In-order",
        "Post-order",
        "Breadth-First Search (BFS)",
        "Depth-First Search (DFS)",
      ];

      // Generator: BFS Graph
      const generateBFSProblem = () => {
        const nodeLetters = ["A", "B", "C", "D", "E", "F", "G"];
        // Arranged roughly as a hexagon around a central node (G)
        const nodes = [
          { id: "A", x: 150, y: 40 },
          { id: "B", x: 260, y: 100 },
          { id: "C", x: 260, y: 200 },
          { id: "D", x: 150, y: 260 },
          { id: "E", x: 40, y: 200 },
          { id: "F", x: 40, y: 100 },
          { id: "G", x: 150, y: 150 },
        ];

        const uf = new UnionFind(7);
        const edges = [];
        const allPossibleEdges = [];

        for (let i = 0; i < 7; i++) {
          for (let j = i + 1; j < 7; j++) {
            // PREVENT VISUAL BUG: Prevent edges that draw straight through the center node G (index 6)
            if (
              (i === 0 && j === 3) ||
              (i === 1 && j === 4) ||
              (i === 2 && j === 5)
            )
              continue;
            allPossibleEdges.push([i, j]);
          }
        }
        const shuffledEdges = shuffleArray(allPossibleEdges);

        // Spanning tree to ensure connectivity
        for (let [u, v] of shuffledEdges) {
          if (uf.union(u, v)) edges.push([u, v]);
        }
        // Add 2-3 random extra edges for loops
        let extra = 2 + Math.floor(Math.random() * 2);
        for (let [u, v] of shuffledEdges) {
          if (extra === 0) break;
          if (
            !edges.some(
              (e) => (e[0] === u && e[1] === v) || (e[0] === v && e[1] === u),
            )
          ) {
            edges.push([u, v]);
            extra--;
          }
        }

        const adjList = {};
        nodeLetters.forEach((l) => (adjList[l] = []));
        edges.forEach(([u, v]) => {
          adjList[nodeLetters[u]].push(nodeLetters[v]);
          adjList[nodeLetters[v]].push(nodeLetters[u]);
        });

        const startIdx = Math.floor(Math.random() * 7);
        let targetIdx;
        do {
          targetIdx = Math.floor(Math.random() * 7);
        } while (targetIdx === startIdx);

        const start = nodeLetters[startIdx];
        const target = nodeLetters[targetIdx];

        // BFS Trace Logic (AQA standard: alphabetical tie-breaking)
        let visited = [start];
        let queue = [start];
        let trace = [start];
        let found = start === target;

        while (queue.length > 0 && !found) {
          let curr = queue.shift();
          let neighbors = adjList[curr]
            .filter((n) => !visited.includes(n))
            .sort();
          for (let n of neighbors) {
            visited.push(n);
            queue.push(n);
            trace.push(n);
            if (n === target) {
              found = true;
              break;
            }
          }
        }

        const edgeStrings = edges.map(
          ([u, v]) => `${nodeLetters[u]}-${nodeLetters[v]}`,
        );
        return {
          type: "bfs",
          nodes,
          edges: edgeStrings,
          start,
          target,
          solution: trace,
          adjList,
        };
      };

      // Generator: DFS Maze
      const generateDFSProblem = () => {
        const letters = "ABCDEFGHI";
        // 3x3 Grid pattern
        const nodes = letters.split("").map((l, i) => ({
          id: l,
          x: 50 + (i % 3) * 100,
          y: 50 + Math.floor(i / 3) * 100,
        }));

        const allGridEdges = [
          [0, 1],
          [1, 2],
          [3, 4],
          [4, 5],
          [6, 7],
          [7, 8], // Horizontal
          [0, 3],
          [1, 4],
          [2, 5],
          [3, 6],
          [4, 7],
          [5, 8], // Vertical
        ]; // Will never cross nodes due to 3x3 layout

        const shuffledEdges = shuffleArray(allGridEdges);
        const uf = new UnionFind(9);
        const mazeEdges = [];

        // Perfect maze (spanning tree)
        for (let [u, v] of shuffledEdges) {
          if (uf.union(u, v)) mazeEdges.push([u, v]);
        }

        const adjList = {};
        letters.split("").forEach((l) => (adjList[l] = []));
        mazeEdges.forEach(([u, v]) => {
          adjList[letters[u]].push(letters[v]);
          adjList[letters[v]].push(letters[u]);
        });

        const start = "A";
        const target =
          Math.random() > 0.5 ? "I" : Math.random() > 0.5 ? "G" : "C";

        // DFS Trace Logic (AQA standard: recursive, alphabetical tie-breaking)
        let trace = [];
        let found = false;

        const dfs = (node) => {
          if (found) return;
          trace.push(node);
          if (node === target) {
            found = true;
            return;
          }
          let neighbors = adjList[node]
            .filter((n) => !trace.includes(n))
            .sort();
          for (let n of neighbors) {
            if (found) break;
            dfs(n);
          }
        };
        dfs(start);

        const edgeStrings = mazeEdges.map(
          ([u, v]) => `${letters[u]}-${letters[v]}`,
        );
        return {
          type: "dfs",
          nodes,
          edges: edgeStrings,
          start,
          target,
          solution: trace,
          adjList,
        };
      };

      // Generator: Tree
      const generateTreeProblem = () => {
        const type = ["Pre-order", "In-order", "Post-order"][
          Math.floor(Math.random() * 3)
        ];
        const letters = shuffleArray("ABCDEFG".split(""));

        const shapes = [
          [
            { left: 1, right: 2 },
            { left: 3, right: 4 },
            { left: 5, right: 6 },
            {},
            {},
            {},
            {},
          ], // Full
          [
            { left: 1, right: 2 },
            { left: 3, right: 4 },
            { left: 5 },
            {},
            {},
            {},
          ], // Left heavy
          [
            { left: 1, right: 2 },
            { right: 3 },
            { left: 4, right: 5 },
            {},
            {},
            {},
          ], // Right heavy
        ];

        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        const nNodes = shape.length;
        const currentLetters = letters.slice(0, nNodes);

        const nodes = currentLetters.map((id, i) => ({ id, originalIdx: i }));
        const edges = [];

        const coords = [
          { x: 150, y: 40 },
          { x: 75, y: 120 },
          { x: 225, y: 120 },
          { x: 40, y: 200 },
          { x: 110, y: 200 },
          { x: 190, y: 200 },
          { x: 260, y: 200 },
        ];

        nodes.forEach((n, i) => {
          n.x = coords[i].x;
          n.y = coords[i].y;
          const s = shape[i];
          if (s.left !== undefined) {
            n.left = currentLetters[s.left];
            edges.push(`${n.id}-${currentLetters[s.left]}`);
          }
          if (s.right !== undefined) {
            n.right = currentLetters[s.right];
            edges.push(`${n.id}-${currentLetters[s.right]}`);
          }
        });

        const getPreOrder = (nodeId, arr) => {
          if (!nodeId) return;
          arr.push(nodeId);
          const node = nodes.find((n) => n.id === nodeId);
          getPreOrder(node.left, arr);
          getPreOrder(node.right, arr);
        };

        const getInOrder = (nodeId, arr) => {
          if (!nodeId) return;
          const node = nodes.find((n) => n.id === nodeId);
          getInOrder(node.left, arr);
          arr.push(nodeId);
          getInOrder(node.right, arr);
        };

        const getPostOrder = (nodeId, arr) => {
          if (!nodeId) return;
          const node = nodes.find((n) => n.id === nodeId);
          getPostOrder(node.left, arr);
          getPostOrder(node.right, arr);
          arr.push(nodeId);
        };

        const solution = [];
        if (type === "Pre-order") getPreOrder(nodes[0].id, solution);
        else if (type === "In-order") getInOrder(nodes[0].id, solution);
        else getPostOrder(nodes[0].id, solution);

        return { type: "tree", traversalType: type, nodes, edges, solution };
      };

      // Generator: Applications
      const generateAppProblem = () => {
        const q =
          APPS_QUESTIONS[Math.floor(Math.random() * APPS_QUESTIONS.length)];
        return {
          type: "apps",
          question: q.q,
          solution: q.a,
          options: shuffleArray(TRAVERSAL_TYPES),
        };
      };

      // --- MAIN COMPONENT ---
      function App() {
        const [activeTopics, setActiveTopics] = useState(Object.keys(TOPICS));
        const [showTopicsMenu, setShowTopicsMenu] = useState(false);
        const [question, setQuestion] = useState(null);

        const [userPath, setUserPath] = useState([]);
        const [userChoice, setUserChoice] = useState(null);
        const [status, setStatus] = useState("playing"); // playing, correct, incorrect, solution
        const [viewMode, setViewMode] = useState("graphical"); // 'graphical', 'list', 'matrix'

        const menuRef = useRef(null);

        // Close dropdown on outside click
        useEffect(() => {
          const handleClickOutside = (event) => {
            if (menuRef.current && !menuRef.current.contains(event.target)) {
              setShowTopicsMenu(false);
            }
          };
          document.addEventListener("mousedown", handleClickOutside);
          return () =>
            document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        useEffect(() => {
          handleNextQuestion();
        }, []);

        const handleNextQuestion = () => {
          if (activeTopics.length === 0) return;
          const topic =
            activeTopics[Math.floor(Math.random() * activeTopics.length)];
          let q;
          if (topic === "bfs") q = generateBFSProblem();
          else if (topic === "dfs") q = generateDFSProblem();
          else if (topic === "tree") q = generateTreeProblem();
          else q = generateAppProblem();

          setQuestion(q);
          setUserPath([]);
          setUserChoice(null);
          setStatus("playing");
          setViewMode("graphical");
        };

        const toggleTopic = (key) => {
          setActiveTopics((prev) =>
            prev.includes(key) ? prev.filter((t) => t !== key) : [...prev, key],
          );
        };

        const handleNodeClick = (nodeId) => {
          if (status !== "playing" && status !== "incorrect") return;
          if (!userPath.includes(nodeId)) {
            setUserPath([...userPath, nodeId]);
            setStatus("playing");
          }
        };

        const undoLastNode = () => {
          if (userPath.length > 0) {
            setUserPath(userPath.slice(0, -1));
            setStatus("playing");
          }
        };

        const clearPath = () => {
          setUserPath([]);
          setStatus("playing");
        };

        const checkAnswer = () => {
          if (!question) return;
          let isCorrect = false;

          if (question.type === "apps") {
            isCorrect = userChoice === question.solution;
          } else {
            isCorrect =
              userPath.length === question.solution.length &&
              userPath.every((val, index) => val === question.solution[index]);
          }

          setStatus(isCorrect ? "correct" : "incorrect");
        };

        const showSolution = () => {
          setStatus("solution");
          if (question.type !== "apps") {
            setUserPath([...question.solution]);
          } else {
            setUserChoice(question.solution);
          }
        };

        // --- Render Alternate Views ---
        const renderAdjList = () => {
          const nodes = Object.keys(question.adjList).sort();
          return (
            <div className="p-6 w-full flex justify-center items-center">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-lg">
                {nodes.map((node) => (
                  <div
                    key={node}
                    className="flex border rounded-md overflow-hidden shadow-sm bg-white"
                  >
                    <div className="bg-blue-100 text-blue-800 font-bold px-4 py-3 border-r border-blue-200 flex items-center justify-center w-16">
                      {node}
                    </div>
                    <div className="px-4 py-3 text-slate-700 flex-1 flex items-center">
                      {question.adjList[node].sort().join(", ") || "-"}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const renderAdjMatrix = () => {
          const nodes = Object.keys(question.adjList).sort();
          return (
            <div className="p-6 w-full overflow-x-auto flex justify-center items-center">
              <table className="border-collapse bg-white shadow-sm rounded-lg overflow-hidden text-sm sm:text-base">
                <thead>
                  <tr>
                    <th className="border-b border-r p-3 bg-slate-100 text-slate-500 font-bold">
                      Node
                    </th>
                    {nodes.map((n) => (
                      <th
                        key={n}
                        className="border-b p-3 bg-slate-100 text-slate-700 font-bold w-12"
                      >
                        {n}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {nodes.map((rowNode, i) => (
                    <tr
                      key={rowNode}
                      className={i % 2 === 0 ? "bg-white" : "bg-slate-50"}
                    >
                      <th className="border-r p-3 bg-slate-100 text-slate-700 font-bold">
                        {rowNode}
                      </th>
                      {nodes.map((colNode) => {
                        const hasEdge =
                          question.adjList[rowNode].includes(colNode);
                        return (
                          <td
                            key={colNode}
                            className="p-3 text-center border-slate-200 border-b"
                          >
                            <span
                              className={
                                hasEdge
                                  ? "text-blue-600 font-bold"
                                  : "text-slate-300"
                              }
                            >
                              {hasEdge ? "1" : "0"}
                            </span>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        };

        if (!question && activeTopics.length > 0)
          return <div className="p-8 text-center">Loading...</div>;

        return (
          <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-12">
            {/* Header */}
            <header className="bg-blue-700 text-white p-4 shadow-md relative z-20">
              <div className="max-w-5xl mx-auto flex justify-between items-center">
                <div>
                  <h1 className="text-xl font-bold">
                    AQA A-Level CS: Graph & Tree Traversals
                  </h1>
                  <p className="text-sm text-blue-100">
                    Interactive Algorithm Tracing
                  </p>
                </div>

                <div className="relative" ref={menuRef}>
                  <button
                    onClick={() => setShowTopicsMenu(!showTopicsMenu)}
                    className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded transition"
                  >
                    <Settings size={18} />
                    <span className="hidden sm:inline">Sub-topics</span>
                    <ChevronDown size={18} />
                  </button>

                  {showTopicsMenu && (
                    <div className="absolute right-0 mt-2 w-72 bg-white rounded shadow-xl text-slate-800 p-3 border border-slate-200 z-50">
                      <h3 className="font-bold text-sm mb-2 border-b pb-1">
                        Filter Topics
                      </h3>
                      {Object.entries(TOPICS).map(([key, label]) => (
                        <label
                          key={key}
                          className="flex items-center gap-2 py-1.5 cursor-pointer hover:bg-slate-50 rounded px-1"
                        >
                          <input
                            type="checkbox"
                            checked={activeTopics.includes(key)}
                            onChange={() => toggleTopic(key)}
                            className="rounded text-blue-600 focus:ring-blue-500"
                          />
                          <span className="text-sm">{label}</span>
                        </label>
                      ))}
                      {activeTopics.length === 0 && (
                        <p className="text-xs text-red-500 mt-2">
                          Please select at least one topic.
                        </p>
                      )}
                      <button
                        onClick={() => {
                          setShowTopicsMenu(false);
                          if (activeTopics.length > 0) handleNextQuestion();
                        }}
                        className="mt-3 w-full bg-blue-600 text-white text-sm py-1.5 rounded hover:bg-blue-700 disabled:opacity-50"
                        disabled={activeTopics.length === 0}
                      >
                        Apply & New Question
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </header>

            {/* Main Content */}
            <main className="max-w-5xl mx-auto p-4 mt-6">
              {activeTopics.length === 0 ? (
                <div className="text-center p-12 bg-white rounded-xl shadow border">
                  <h2 className="text-2xl font-bold text-slate-700 mb-2">
                    No Topics Selected
                  </h2>
                  <p className="text-slate-500">
                    Please open the settings menu in the top right to select
                    sub-topics.
                  </p>
                </div>
              ) : (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                  {/* Instructions Banner */}
                  <div className="bg-slate-100 border-b border-slate-200 p-5">
                    <h2 className="text-lg font-bold text-slate-800 mb-1 flex items-center gap-2">
                      Task:
                      {question.type === "bfs" && " Trace Breadth-First Search"}
                      {question.type === "dfs" &&
                        " Trace Depth-First Search (Maze)"}
                      {question.type === "tree" &&
                        ` Trace ${question.traversalType} Traversal`}
                      {question.type === "apps" &&
                        " Match Application to Algorithm"}
                    </h2>

                    <p className="text-slate-600">
                      {question.type === "bfs" &&
                        `Starting at node [${question.start}], find the shortest path to node [${question.target}]. Add nodes to your trace in the exact order they are added to the Visited list. Assume alphabetical tie-breaking. Stop as soon as the target is added.`}
                      {question.type === "dfs" &&
                        `Starting at node [${question.start}], navigate the maze to find node [${question.target}]. Add nodes to your trace in the exact order they are visited by a standard recursive DFS. Assume alphabetical tie-breaking. Stop as soon as the target is reached.`}
                      {question.type === "tree" &&
                        `Add all the nodes to your trace in the correct order for a ${question.traversalType} traversal of this binary tree.`}
                      {question.type === "apps" &&
                        "Read the scenario and select the most appropriate algorithm from the list below."}
                    </p>
                  </div>

                  {/* Interactive Area */}
                  <div className="p-6">
                    {question.type === "apps" ? (
                      // Application Multiple Choice
                      <div className="max-w-2xl mx-auto">
                        <div className="text-xl font-medium text-center p-8 bg-blue-50 rounded-lg text-blue-900 border border-blue-100 mb-6 shadow-inner">
                          "{question.question}"
                        </div>
                        <div className="grid gap-3">
                          {question.options.map((opt) => (
                            <button
                              key={opt}
                              onClick={() => {
                                if (
                                  status === "playing" ||
                                  status === "incorrect"
                                ) {
                                  setUserChoice(opt);
                                  setStatus("playing");
                                }
                              }}
                              disabled={
                                status === "solution" || status === "correct"
                              }
                              className={`p-4 text-left rounded border-2 transition-all ${
                                userChoice === opt
                                  ? status === "correct"
                                    ? "bg-green-100 border-green-500 text-green-800"
                                    : status === "solution"
                                      ? "bg-blue-100 border-blue-500 text-blue-800"
                                      : "bg-blue-100 border-blue-500 text-blue-800"
                                  : status === "solution" &&
                                      opt === question.solution
                                    ? "bg-green-100 border-green-500 text-green-800 shadow-[0_0_15px_rgba(34,197,94,0.4)]"
                                    : "bg-white border-slate-200 hover:border-blue-300 hover:bg-slate-50 disabled:opacity-50"
                              }`}
                            >
                              {opt}
                            </button>
                          ))}
                        </div>
                      </div>
                    ) : (
                      // Graph / Tree Visualizer
                      <div className="flex flex-col md:flex-row gap-8">
                        {/* Left Column: Canvas/Text View */}
                        <div className="flex-1 bg-slate-50 border border-slate-200 rounded-lg flex flex-col p-4 min-h-[350px]">
                          {/* View Mode Selector (Only for Graphs/Mazes) */}
                          {(question.type === "bfs" ||
                            question.type === "dfs") && (
                            <div className="flex justify-end mb-2">
                              <div className="inline-flex bg-slate-200 p-1 rounded-md">
                                {["graphical", "list", "matrix"].map((mode) => (
                                  <button
                                    key={mode}
                                    onClick={() => setViewMode(mode)}
                                    className={`px-3 py-1.5 text-xs font-semibold rounded transition ${
                                      viewMode === mode
                                        ? "bg-white shadow-sm text-blue-700"
                                        : "text-slate-600 hover:text-slate-800 hover:bg-slate-300"
                                    }`}
                                  >
                                    {mode === "graphical"
                                      ? "Graphical View"
                                      : mode === "list"
                                        ? "Adjacency List"
                                        : "Adjacency Matrix"}
                                  </button>
                                ))}
                              </div>
                            </div>
                          )}

                          <div className="flex-1 flex items-center justify-center relative">
                            {viewMode === "graphical" ||
                            question.type === "tree" ? (
                              <svg
                                viewBox="0 0 300 300"
                                className="w-full max-w-[400px] h-auto drop-shadow-sm"
                              >
                                {/* Edges */}
                                {question.edges.map((e, i) => {
                                  const [uId, vId] = e.split("-");
                                  const u = question.nodes.find(
                                    (n) => n.id === uId,
                                  );
                                  const v = question.nodes.find(
                                    (n) => n.id === vId,
                                  );
                                  const isTraversed =
                                    userPath.includes(uId) &&
                                    userPath.includes(vId);
                                  return (
                                    <line
                                      key={i}
                                      x1={u.x}
                                      y1={u.y}
                                      x2={v.x}
                                      y2={v.y}
                                      stroke={
                                        isTraversed ? "#93c5fd" : "#cbd5e1"
                                      }
                                      strokeWidth={isTraversed ? "3" : "2"}
                                    />
                                  );
                                })}

                                {/* Nodes */}
                                {question.nodes.map((n) => {
                                  const pathIdx = userPath.indexOf(n.id);
                                  const isSelected = pathIdx !== -1;
                                  const isStart = n.id === question.start;
                                  const isTarget = n.id === question.target;

                                  let fillClass = "white";
                                  let strokeClass = "#64748b"; // slate-500
                                  let strokeWidth = "2";

                                  if (isSelected) {
                                    fillClass =
                                      status === "correct"
                                        ? "#dcfce7"
                                        : "#dbeafe"; // green/blue
                                    strokeClass =
                                      status === "correct"
                                        ? "#22c55e"
                                        : "#3b82f6";
                                    strokeWidth = "3";
                                  } else if (
                                    isStart &&
                                    question.type !== "tree"
                                  ) {
                                    strokeClass = "#10b981"; // emerald-500
                                    strokeWidth = "3";
                                  } else if (
                                    isTarget &&
                                    question.type !== "tree"
                                  ) {
                                    strokeClass = "#ef4444"; // red-500
                                    strokeWidth = "3";
                                  }

                                  return (
                                    <g
                                      key={n.id}
                                      onClick={() => handleNodeClick(n.id)}
                                      className={
                                        status === "playing" ||
                                        status === "incorrect"
                                          ? "cursor-pointer hover:opacity-80 transition-opacity"
                                          : ""
                                      }
                                    >
                                      <circle
                                        cx={n.x}
                                        cy={n.y}
                                        r="18"
                                        fill={fillClass}
                                        stroke={strokeClass}
                                        strokeWidth={strokeWidth}
                                      />
                                      <text
                                        x={n.x}
                                        y={n.y}
                                        textAnchor="middle"
                                        dy=".3em"
                                        className="text-sm font-bold fill-slate-700 pointer-events-none"
                                      >
                                        {n.id}
                                      </text>

                                      {/* Sequence Badge */}
                                      {isSelected && (
                                        <g
                                          transform={`translate(${n.x + 12}, ${n.y - 12})`}
                                        >
                                          <circle
                                            r="8"
                                            fill={
                                              status === "correct"
                                                ? "#22c55e"
                                                : "#2563eb"
                                            }
                                          />
                                          <text
                                            textAnchor="middle"
                                            dy=".3em"
                                            fontSize="10"
                                            fontWeight="bold"
                                            fill="white"
                                            className="pointer-events-none"
                                          >
                                            {pathIdx + 1}
                                          </text>
                                        </g>
                                      )}

                                      {/* Start/Target Labels */}
                                      {isStart &&
                                        !isSelected &&
                                        question.type !== "tree" && (
                                          <text
                                            x={n.x}
                                            y={n.y - 24}
                                            textAnchor="middle"
                                            fontSize="10"
                                            fill="#10b981"
                                            fontWeight="bold"
                                          >
                                            START
                                          </text>
                                        )}
                                      {isTarget &&
                                        !isSelected &&
                                        question.type !== "tree" && (
                                          <text
                                            x={n.x}
                                            y={n.y - 24}
                                            textAnchor="middle"
                                            fontSize="10"
                                            fill="#ef4444"
                                            fontWeight="bold"
                                          >
                                            TARGET
                                          </text>
                                        )}
                                    </g>
                                  );
                                })}
                              </svg>
                            ) : viewMode === "list" ? (
                              renderAdjList()
                            ) : (
                              renderAdjMatrix()
                            )}
                          </div>
                        </div>

                        {/* Sidebar Controls */}
                        <div className="w-full md:w-64 flex flex-col gap-4">
                          {/* NEW Node Input Palette - Allows input even when visual graph is hidden */}
                          {question.type !== "apps" && (
                            <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                              <h3 className="font-bold text-sm mb-3 text-slate-700 uppercase tracking-wide border-b pb-2">
                                Select Node
                              </h3>
                              <div className="flex flex-wrap gap-2">
                                {question.nodes.map((n) => {
                                  const isSelected = userPath.includes(n.id);
                                  const isStart =
                                    n.id === question.start &&
                                    question.type !== "tree";
                                  const isTarget =
                                    n.id === question.target &&
                                    question.type !== "tree";

                                  return (
                                    <button
                                      key={n.id}
                                      onClick={() => handleNodeClick(n.id)}
                                      disabled={
                                        isSelected ||
                                        status === "correct" ||
                                        status === "solution"
                                      }
                                      className={`w-10 h-10 rounded-full font-bold flex items-center justify-center transition-all ${
                                        isSelected
                                          ? "bg-slate-100 text-slate-400 border border-slate-200"
                                          : isStart
                                            ? "bg-emerald-50 text-emerald-700 border-2 border-emerald-400 hover:bg-emerald-100 shadow-sm"
                                            : isTarget
                                              ? "bg-red-50 text-red-700 border-2 border-red-400 hover:bg-red-100 shadow-sm"
                                              : "bg-white text-blue-600 border border-blue-300 hover:bg-blue-50 hover:border-blue-400 shadow-sm"
                                      }`}
                                    >
                                      {n.id}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>
                          )}

                          <div className="bg-slate-100 p-4 rounded-lg border border-slate-200 flex-1 flex flex-col">
                            <h3 className="font-bold text-sm mb-2 text-slate-700 uppercase tracking-wide border-b pb-2">
                              Your Trace
                            </h3>
                            {userPath.length === 0 ? (
                              <p className="text-sm text-slate-400 italic">
                                Select nodes to build your path.
                              </p>
                            ) : (
                              <div className="flex flex-wrap gap-2 mb-4">
                                {userPath.map((node, i) => (
                                  <span
                                    key={i}
                                    className="bg-white border border-blue-300 text-blue-700 text-xs font-bold px-2 py-1 rounded shadow-sm"
                                  >
                                    {i + 1}. {node}
                                  </span>
                                ))}
                              </div>
                            )}

                            <div className="flex gap-2 mt-auto pt-4 border-t border-slate-200">
                              <button
                                onClick={undoLastNode}
                                disabled={
                                  userPath.length === 0 ||
                                  status === "correct" ||
                                  status === "solution"
                                }
                                className="flex-1 flex items-center justify-center gap-1 bg-white border border-slate-300 text-slate-600 px-2 py-1.5 rounded text-sm hover:bg-slate-50 disabled:opacity-50"
                              >
                                <Undo size={14} /> Undo
                              </button>
                              <button
                                onClick={clearPath}
                                disabled={
                                  userPath.length === 0 ||
                                  status === "correct" ||
                                  status === "solution"
                                }
                                className="flex-1 flex items-center justify-center gap-1 bg-white border border-slate-300 text-slate-600 px-2 py-1.5 rounded text-sm hover:bg-slate-50 hover:text-red-600 disabled:opacity-50"
                              >
                                <Trash2 size={14} /> Clear
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Status Banner & Action Buttons */}
                  <div className="bg-slate-50 border-t border-slate-200 p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div className="flex-1 flex items-center">
                      {status === "playing" && (
                        <p className="text-sm text-slate-500">
                          Build your answer then click "Check Answer".
                        </p>
                      )}
                      {status === "incorrect" && (
                        <div className="flex items-center gap-2 text-red-600 font-medium bg-red-50 px-3 py-1.5 rounded border border-red-200">
                          <XCircle size={18} /> Incorrect. Keep trying or show
                          the solution.
                        </div>
                      )}
                      {status === "correct" && (
                        <div className="flex items-center gap-2 text-green-600 font-medium bg-green-50 px-3 py-1.5 rounded border border-green-200">
                          <CheckCircle size={18} /> Correct! Well done.
                        </div>
                      )}
                      {status === "solution" && (
                        <div className="flex items-center gap-2 text-blue-600 font-medium bg-blue-50 px-3 py-1.5 rounded border border-blue-200">
                          <Eye size={18} /> Showing Solution:{" "}
                          {question.type === "apps"
                            ? question.solution
                            : question.solution.join(" → ")}
                        </div>
                      )}
                    </div>

                    <div className="flex gap-2 w-full sm:w-auto">
                      {status === "playing" || status === "incorrect" ? (
                        <React.Fragment>
                          <button
                            onClick={checkAnswer}
                            disabled={
                              question.type === "apps"
                                ? !userChoice
                                : userPath.length === 0
                            }
                            className="flex-1 sm:flex-none bg-blue-600 text-white px-5 py-2 rounded font-medium hover:bg-blue-700 disabled:opacity-50 transition"
                          >
                            Check Answer
                          </button>
                          {status === "incorrect" && (
                            <button
                              onClick={showSolution}
                              className="flex-1 sm:flex-none bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded font-medium hover:bg-slate-50 transition"
                            >
                              Show Solution
                            </button>
                          )}
                        </React.Fragment>
                      ) : (
                        <button
                          onClick={handleNextQuestion}
                          className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-blue-600 text-white px-5 py-2 rounded font-medium hover:bg-blue-700 transition"
                        >
                          <RefreshCw size={18} /> Next Question
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>
        );
      }

      // Render the React application
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
