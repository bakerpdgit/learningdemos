<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQA A Level CS: Programming Features</title>
    <!-- Google tag (gtag.js) -->

    <script
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              headerBg: "#0f172a",
              headerAccent: "#38bdf8",
            },
          },
        },
      };
    </script>

    <style>
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      .shake { animation: shake 0.4s ease-in-out; }
      .fade-in { animation: fadeIn 0.3s ease-in-out; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("uimode");
          if (
            mode === "dark" ||
            (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef } = React;

      // --- THEME ICONS ---
      const SunIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      );
      const MoonIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      );

      // --- ICONS ---
      const Icons = {
        Filter: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
        ),
        Check: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        ),
        X: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        ),
        ChevronDown: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        ),
        Code: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
        ),
        FileText: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        ),
        ArrowRight: () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        ),
      };

      // --- UTILS ---
      const shuffleArray = (array) => {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      };

      const checkTextMatch = (correct, prefix, input) => {
        const cleanInput = input.trim().toLowerCase();
        const cleanCorrect = correct.trim().toLowerCase();
        const cleanPrefix = prefix.trim().toLowerCase();
        if (cleanInput === cleanCorrect) return true;
        if (cleanPrefix + cleanInput === cleanCorrect) return true;
        if (cleanInput === cleanCorrect.replace(cleanPrefix, "").trim()) return true;
        return false;
      };

      // --- TOPICS & GENERATORS ---
      const TOPICS = [
        { id: "rng", title: "Random Number Generation" },
        { id: "exc", title: "Exception Handling" },
        { id: "file", title: "Reading & Writing Files" },
      ];

      const generators = {
        rng: [
          () => {
            const isSeed = Math.random() > 0.5;
            if (isSeed) {
              return {
                id: `rng-text-1-${Date.now()}`,
                type: "text",
                topic: "rng",
                question: "A mathematical random number generator requires an initial starting value to begin its sequence. What is this value called?",
                prefix: "S",
                answer: "eed",
                fullWord: "Seed",
                solutionText: "A Pseudo-Random Number Generator (PRNG) uses a mathematical algorithm. It requires a starting value called a 'Seed'. Given the same seed, the sequence generated will always be identical.",
              };
            } else {
              return {
                id: `rng-text-2-${Date.now()}`,
                type: "text",
                topic: "rng",
                question: "What term describes numbers generated by a mathematical algorithm that appear random but are actually deterministic?",
                prefix: "P",
                answer: "seudo-random",
                fullWord: "Pseudo-random",
                solutionText: "Pseudo-random numbers are generated by algorithms. They appear random but are entirely predictable if you know the starting seed and the algorithm.",
              };
            }
          },
          () => {
            return {
              id: `rng-mcq-1-${Date.now()}`,
              type: "mcq",
              topic: "rng",
              question: "Which of the following is true regarding a Hardware Random Number Generator (HRG)?",
              options: [
                { text: "It derives randomness from physical phenomena like radioactive decay or thermal noise.", correct: true },
                { text: "It relies on a mathematical algorithm and an initial seed to generate a sequence.", correct: false },
                { text: "It always produces numbers faster than a Pseudo-Random Number Generator.", correct: false },
                { text: "It guarantees that the exact same sequence of numbers can be generated again for testing.", correct: false },
              ],
              solutionText: "An HRG (or TRNG - True Random Number Generator) measures physical processes (like electronic noise) to generate randomness. It does not use seeds or deterministic formulas, meaning its sequences cannot be replicated.",
            };
          },
          () => {
            const m = [10, 20][Math.floor(Math.random() * 2)];
            const a = [3, 7][Math.floor(Math.random() * 2)];
            const c = [1, 3][Math.floor(Math.random() * 2)];
            const x0 = Math.floor(Math.random() * (m - 1)) + 1;
            const ans1 = (a * x0 + c) % m;
            return {
              id: `rng-lcg-${Date.now()}`,
              type: "interactive-lcg",
              topic: "rng",
              a, c, m, x0,
              ans1: ans1.toString(),
              question: "Pseudo-random numbers are generated by following a mathematical sequence. Below is a simple algorithm for a Pseudo-Random Number Generator. Calculate the output for the given input.",
              solutionText: `(${a} * ${x0} + ${c}) MOD ${m} = ${a * x0 + c} MOD ${m} = ${ans1}.`,
            };
          },
        ],
        exc: [
          () => {
            return {
              id: `exc-mcq-1-${Date.now()}`,
              type: "mcq",
              topic: "exc",
              question: "What is the primary purpose of Exception Handling in programming?",
              options: [
                { text: "To prevent a program from crashing when an unexpected runtime error occurs.", correct: true },
                { text: "To identify and fix syntax errors before the program is compiled.", correct: false },
                { text: "To speed up the execution of code blocks that perform risky file operations.", correct: false },
                { text: "To guarantee that a specific variable always stays within a defined range.", correct: false },
              ],
              solutionText: "Exception handling (using try/catch blocks) allows a program to gracefully handle runtime errors (like division by zero or missing files) instead of crashing abruptly.",
            };
          },
          () => {
            return {
              id: `exc-text-1-${Date.now()}`,
              type: "text",
              topic: "exc",
              question: "In object-oriented exception handling, when an error occurs, the system creates an object representing that error. What 'E' is the name given to this object?",
              prefix: "E",
              answer: "xception",
              fullWord: "Exception",
              solutionText: "When an error occurs, an 'Exception' object is thrown/raised. This object contains data about the error and the state of the program when it happened.",
            };
          },
          () => {
            const vars = ["total", "score", "value"];
            const v = vars[Math.floor(Math.random() * vars.length)];
            const lines = [
              { id: 1, text: `${v} <- 100` },
              { id: 2, text: `divisor <- 0` },
              { id: 3, text: `TRY` },
              { id: 4, text: `  result <- ${v} / divisor` },
              { id: 5, text: `  OUTPUT "Calculation complete"` },
              { id: 6, text: `EXCEPT` },
              { id: 7, text: `  OUTPUT "Error: Cannot divide by zero"` },
              { id: 8, text: `ENDEXCEPT` },
            ];
            return {
              id: `exc-trace-${Date.now()}`,
              type: "interactive-code-trace",
              topic: "exc",
              question: "Trace the execution of this program by clicking the lines of code in the exact order they will execute.",
              lines,
              expectedPath: [1, 2, 3, 4, 6, 7, 8],
              solutionText: "The execution starts sequentially. When line 4 attempts division by zero, it throws an exception. Execution immediately jumps to the matching EXCEPT block on line 6, skipping line 5. It finishes with ENDEXCEPT.",
            };
          },
        ],
        file: [
          () => {
            return {
              id: `file-eof-${Date.now()}`,
              type: "interactive-eof",
              topic: "file",
              question: "The pseudocode snippet below reads lines from a file until there is no more data. What does 'EOF' stand for?",
              solutionText: "EOF stands for 'End Of File'. A common pattern is checking `WHILE NOT EOF(file)` to continuously process a file until all data has been read.",
            };
          },
          () => {
            return {
              id: `file-text-1-${Date.now()}`,
              type: "text",
              topic: "file",
              question: "Files are stored on secondary storage because it retains its contents even when power is lost. What 'N' describes this type of storage?",
              prefix: "N",
              answer: "on-volatile",
              fullWord: "Non-volatile",
              solutionText: "Non-volatile memory retains saved data even if power is removed, making it essential for file storage (e.g., HDDs, SSDs). RAM is volatile.",
            };
          },
          () => {
            const initialLines = Math.floor(Math.random() * 4) + 2;
            const newLines = Math.floor(Math.random() * 3) + 2;
            const answer = initialLines + newLines;
            return {
              id: `file-aw-append-${Date.now()}`,
              type: "interactive-file-aw",
              topic: "file",
              isAppend: true,
              initialLines,
              newLines,
              answer: answer.toString(),
              question: `The user executes the code shown on the left. How many lines in total will exist in the file after the code finishes?`,
              solutionText: `The file is opened in APPEND_MODE, which adds to the end of the existing file. It had ${initialLines} lines, and ${newLines} were added, resulting in a total of ${answer} lines.`,
            };
          },
          () => {
            const initialLines = Math.floor(Math.random() * 4) + 2;
            const newLines = Math.floor(Math.random() * 3) + 2;
            const answer = newLines;
            return {
              id: `file-aw-write-${Date.now()}`,
              type: "interactive-file-aw",
              topic: "file",
              isAppend: false,
              initialLines,
              newLines,
              answer: answer.toString(),
              question: `The user executes the code shown on the left. How many lines in total will exist in the file after the code finishes?`,
              solutionText: `The file is opened in WRITE_MODE, which overwrites any existing contents. It originally had ${initialLines} lines, but these are deleted and replaced entirely by the ${newLines} new lines. Total is ${answer}.`,
            };
          },
          () => {
            const b1 = Math.floor(Math.random() * 16) + 5;
            const b2 = Math.floor(Math.random() * 16) + 2;
            const hex1 = b1.toString(16).toUpperCase().padStart(2, "0");
            const hex2 = b2.toString(16).toUpperCase().padStart(2, "0");
            return {
              id: `file-bin-${Date.now()}`,
              type: "interactive-file-bin",
              topic: "file",
              b1, b2, hex1, hex2,
              answer: (b1 + b2).toString(),
              question: "A binary file contains raw bytes. The code reads the first two bytes and adds them. What decimal value is output?",
              solutionText: `The first byte is 0x${hex1} (Decimal ${b1}). The second byte is 0x${hex2} (Decimal ${b2}). ${b1} + ${b2} = ${b1 + b2}. Binary files store direct byte sequences, unlike text files which encode characters.`,
            };
          },
        ],
      };

      const generateQuestionPool = (selectedTopics) => {
        let pool = [];
        selectedTopics.forEach((topicId) => {
          if (generators[topicId]) {
            generators[topicId].forEach((gen) => pool.push(gen()));
          }
        });
        return shuffleArray(pool);
      };

      // --- COMPONENTS ---

      const FilterBar = ({ topics, setTopics, applyFilter }) => {
        const [isOpen, setIsOpen] = useState(false);

        const toggleTopic = (id) => {
          setTopics(topics.map((t) => t.id === id ? { ...t, selected: !t.selected } : t));
        };

        const handleApply = () => {
          applyFilter();
          setIsOpen(false);
        };

        return (
          <div className="bg-indigo-700 dark:bg-slate-800 text-white shadow-md p-4 flex justify-between items-center relative z-20">
            <div>
              <h1 className="text-xl font-bold flex items-center gap-2">
                <Icons.Code /> AQA A Level CS
              </h1>
              <p className="text-indigo-200 dark:text-slate-400 text-sm">Programming Features Interactive</p>
            </div>

            <div className="relative">
              <button
                onClick={() => setIsOpen(!isOpen)}
                className="flex items-center gap-2 bg-indigo-800 dark:bg-slate-700 hover:bg-indigo-600 dark:hover:bg-slate-600 px-4 py-2 rounded-md transition-colors"
              >
                <Icons.Filter />
                <span>Filter Sub-topics</span>
                <Icons.ChevronDown />
              </button>

              {isOpen && (
                <div className="absolute right-0 mt-2 w-64 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 rounded-md shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden fade-in">
                  <div className="p-3 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-700 font-semibold">
                    Select Topics
                  </div>
                  <div className="max-h-60 overflow-y-auto p-2">
                    {topics.map((t) => (
                      <label key={t.id} className="flex items-center gap-3 p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded cursor-pointer">
                        <input
                          type="checkbox"
                          checked={t.selected}
                          onChange={() => toggleTopic(t.id)}
                          className="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer"
                        />
                        <span className="text-sm">{t.title}</span>
                      </label>
                    ))}
                  </div>
                  <div className="p-3 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-700 flex justify-end">
                    <button
                      onClick={handleApply}
                      disabled={topics.filter((t) => t.selected).length === 0}
                      className="bg-indigo-600 text-white px-4 py-2 rounded text-sm hover:bg-indigo-700 disabled:opacity-50 transition-colors font-medium"
                    >
                      Apply & Reload
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- QUESTION RENDERERS ---

      const MCQRenderer = ({ question, userAnswer, setUserAnswer, isEvaluated }) => {
        const [options, setOptions] = useState([]);
        useEffect(() => { setOptions(shuffleArray(question.options)); }, [question]);

        return (
          <div className="space-y-3 mt-4">
            {options.map((opt, idx) => {
              const isSelected = userAnswer === opt.text;
              let btnClass = "w-full text-left p-4 border-2 rounded-lg transition-all cursor-pointer ";
              if (isEvaluated && opt.correct)
                btnClass += "bg-green-50 dark:bg-green-900/20 border-green-500 text-green-900 dark:text-green-300";
              else if (isEvaluated && isSelected && !opt.correct)
                btnClass += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-300";
              else if (isSelected)
                btnClass += "bg-indigo-50 dark:bg-indigo-900/30 border-indigo-500 text-indigo-900 dark:text-indigo-200";
              else
                btnClass += "bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 hover:border-indigo-300 dark:hover:border-indigo-500 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-600";

              return (
                <button
                  key={idx}
                  disabled={isEvaluated}
                  onClick={() => setUserAnswer(opt.text)}
                  className={btnClass}
                >
                  <div className="flex items-center gap-3">
                    <div className={`w-5 h-5 rounded-full border flex items-center justify-center flex-shrink-0 ${isSelected ? "border-indigo-500 bg-indigo-500" : "border-slate-400 dark:border-slate-500"}`}>
                      {isSelected && <div className="w-2 h-2 rounded-full bg-white" />}
                    </div>
                    <span className="leading-relaxed">{opt.text}</span>
                  </div>
                </button>
              );
            })}
          </div>
        );
      };

      const TextRenderer = ({ question, userAnswer, setUserAnswer, isEvaluated, showSolution }) => {
        return (
          <div className="mt-6 flex flex-col items-center">
            <div className="flex items-end gap-1 text-2xl font-mono text-slate-700 dark:text-slate-300">
              <span className="font-bold border-b-2 border-slate-400 dark:border-slate-500 pb-1">
                {question.prefix}
              </span>
              <input
                type="text"
                disabled={isEvaluated}
                value={userAnswer || ""}
                onChange={(e) => setUserAnswer(e.target.value)}
                className="bg-transparent border-b-2 border-slate-400 dark:border-slate-500 focus:border-indigo-500 outline-none pb-1 w-48 px-1 text-slate-800 dark:text-slate-100"
              />
            </div>
            {showSolution && (
              <div className="mt-4 text-green-700 dark:text-green-300 font-semibold bg-green-50 dark:bg-green-900/20 px-4 py-2 rounded-md border border-green-200 dark:border-green-800">
                Correct Keyword: {question.fullWord}
              </div>
            )}
          </div>
        );
      };

      const EOFInteractive = ({ question, userAnswer, setUserAnswer, isEvaluated, showSolution }) => {
        const [w1, setW1] = useState(userAnswer?.w1 || "");
        const [w2, setW2] = useState(userAnswer?.w2 || "");
        const [w3, setW3] = useState(userAnswer?.w3 || "");

        useEffect(() => setUserAnswer({ w1, w2, w3 }), [w1, w2, w3]);
        useEffect(() => { setW1(""); setW2(""); setW3(""); }, [question.id]);

        return (
          <div className="mt-6 flex flex-col items-center gap-8">
            <div className="bg-slate-900 text-slate-300 p-6 rounded-lg font-mono text-sm w-full max-w-lg shadow-lg border border-slate-700">
              <span className="text-pink-400">WHILE NOT</span>{" "}
              <span className="text-green-300">EOF</span>(f)
              <br />
              &nbsp;&nbsp;line <span className="text-pink-400">&lt;-</span>{" "}
              <span className="text-green-300">READ_LINE</span>(f)
              <br />
              &nbsp;&nbsp;<span className="text-green-300">OUTPUT</span> line
              <br />
              <span className="text-pink-400">ENDWHILE</span>
            </div>

            <div className="flex flex-wrap items-center justify-center gap-6 text-2xl font-mono text-slate-700 dark:text-slate-300">
              <div className="flex items-end gap-1">
                <span className="font-bold border-b-2 border-slate-400 dark:border-slate-500 pb-1">E</span>
                <input type="text" disabled={isEvaluated} value={w1} onChange={(e) => setW1(e.target.value)}
                  className="bg-transparent border-b-2 border-slate-400 dark:border-slate-500 focus:border-indigo-500 outline-none pb-1 w-16 px-1 text-slate-800 dark:text-slate-100" />
              </div>
              <div className="flex items-end gap-1">
                <span className="font-bold border-b-2 border-slate-400 dark:border-slate-500 pb-1">O</span>
                <input type="text" disabled={isEvaluated} value={w2} onChange={(e) => setW2(e.target.value)}
                  className="bg-transparent border-b-2 border-slate-400 dark:border-slate-500 focus:border-indigo-500 outline-none pb-1 w-10 px-1 text-slate-800 dark:text-slate-100" />
              </div>
              <div className="flex items-end gap-1">
                <span className="font-bold border-b-2 border-slate-400 dark:border-slate-500 pb-1">F</span>
                <input type="text" disabled={isEvaluated} value={w3} onChange={(e) => setW3(e.target.value)}
                  className="bg-transparent border-b-2 border-slate-400 dark:border-slate-500 focus:border-indigo-500 outline-none pb-1 w-20 px-1 text-slate-800 dark:text-slate-100" />
              </div>
            </div>

            {showSolution && (
              <div className="mt-2 text-green-700 dark:text-green-300 font-semibold bg-green-50 dark:bg-green-900/20 px-4 py-2 rounded-md border border-green-200 dark:border-green-800">
                Correct Phrase: End Of File
              </div>
            )}
          </div>
        );
      };

      const LCGInteractive = ({ question, userAnswer, setUserAnswer, isEvaluated, showSolution }) => {

                  <input
                    type="number"

      const CodeTraceInteractive = ({ question, userAnswer, setUserAnswer, isEvaluated }) => {
        const path = Array.isArray(userAnswer) ? userAnswer : [];

        useEffect(() => {
          if (!Array.isArray(userAnswer)) { setUserAnswer([]); }
        }, [question.id]);

        const handleLineClick = (lineId) => {
          if (isEvaluated) return;
          setUserAnswer([...path, lineId]);
        };

        const handleUndo = () => {
          if (isEvaluated || path.length === 0) return;
          setUserAnswer(path.slice(0, -1));
        };

        return (
          <div className="mt-6 flex flex-col items-center">
            <div className="flex justify-between w-full max-w-xl mb-2 items-center">
              <p className="text-sm text-slate-500 dark:text-slate-400 font-semibold">
                Click lines in order of execution.
              </p>
              <button
                onClick={handleUndo}
                disabled={path.length === 0 || isEvaluated}
                className="text-xs bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 disabled:opacity-50 px-2 py-1 rounded text-slate-700 dark:text-slate-200 font-bold transition-colors"
              >
                Undo Last Step
              </button>
            </div>

            <div className="w-full max-w-xl bg-slate-900 rounded-lg shadow-lg overflow-hidden font-mono text-sm border border-slate-700">
              <div className="flex bg-slate-800 text-slate-400 px-4 py-2 border-b border-slate-700 gap-2 items-center text-xs">
                <div className="w-3 h-3 rounded-full bg-red-500"></div>
                <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div className="w-3 h-3 rounded-full bg-green-500"></div>
                <span className="ml-2">script.txt</span>
              </div>
              <div className="p-4 space-y-1">
                {question.lines.map((line) => {
                  const executionSteps = [];
                  path.forEach((id, idx) => { if (id === line.id) executionSteps.push(idx + 1); });
                  const isSelected = executionSteps.length > 0;
                  let lineClass = "px-2 py-1 rounded transition-colors flex items-center gap-3 cursor-pointer ";
                  if (isSelected) lineClass += "bg-indigo-900/40 text-indigo-200";
                  else lineClass += "text-slate-300 hover:bg-slate-800 hover:text-white";

                  return (
                    <div key={line.id} className={lineClass} onClick={() => handleLineClick(line.id)}>
                      <span className="w-6 text-right text-slate-600 select-none">{line.id}</span>
                      <span className="w-8 flex gap-1 flex-wrap">
                        {executionSteps.map((step) => (
                          <span key={step} className="bg-indigo-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">
                            {step}
                          </span>
                        ))}
                      </span>
                      <span className="whitespace-pre">{line.text}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {isEvaluated && path.join(",") !== question.expectedPath.join(",") && (
              <div className="mt-4 fade-in bg-red-100 dark:bg-red-900/20 text-red-800 dark:text-red-300 px-6 py-3 rounded-md border border-red-200 dark:border-red-800 text-sm shadow-sm">
                <strong>Expected execution order:</strong> {question.expectedPath.join(" → ")}
                <br />
                <strong>Your order:</strong> {path.length > 0 ? path.join(" → ") : "None"}
              </div>
            )}
          </div>
        );
      };

      const FileAppendInteractive = ({ question, userAnswer, setUserAnswer, isEvaluated, showSolution }) => {
        const [val, setVal] = useState(userAnswer || "");
        useEffect(() => setUserAnswer(val), [val]);
        useEffect(() => setVal(""), [question.id]);

        return (
          <div className="mt-6 flex flex-col md:flex-row gap-6">
            <div className="flex-1">
              <div className="bg-slate-900 text-slate-300 rounded-lg shadow-lg font-mono text-sm overflow-hidden h-full border border-slate-700">
                <div className="bg-slate-800 px-4 py-2 border-b border-slate-700 text-xs text-slate-400">code</div>
                <div className="p-4 leading-relaxed">
                  <span className="text-blue-300">file</span>{" "}
                  <span className="text-pink-400">&lt;-</span>{" "}
                  <span className="text-green-300">OPEN</span>("log.txt",{" "}
                  <span className="text-orange-300">{question.isAppend ? "APPEND_MODE" : "WRITE_MODE"}</span>)
                  <br />
                  <span className="text-pink-400">FOR</span> i{" "}
                  <span className="text-pink-400">&lt;-</span> 1{" "}
                  <span className="text-pink-400">TO</span>{" "}
                  <span className="text-orange-300">{question.newLines}</span>
                  <br />
                  &nbsp;&nbsp;<span className="text-green-300">WRITE</span>(
                  <span className="text-blue-300">file</span>,{" "}
                  <span className="text-orange-300">"Log Date: 2026-10-0"</span>{" "}+ INT_TO_STR(i))
                  <br />
                  <span className="text-pink-400">ENDFOR</span>
                  <br />
                  <span className="text-green-300">CLOSE</span>(<span className="text-blue-300">file</span>)
                </div>
              </div>
            </div>

            <div className="flex-1 bg-white dark:bg-slate-700 border-2 border-slate-200 dark:border-slate-600 rounded-lg p-4 shadow-sm flex flex-col">
              <div className="flex items-center gap-2 border-b border-slate-200 dark:border-slate-600 pb-2 mb-3 text-slate-600 dark:text-slate-300 font-semibold">
                <Icons.FileText /> log.txt (Initial State)
              </div>
              <div className="bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-600 rounded flex-grow p-3 font-mono text-xs text-slate-500 dark:text-slate-400 overflow-y-auto max-h-32">
                {Array.from({ length: question.initialLines }).map((_, i) => (
                  <div key={i}>Log Date: 2026-09-{String(10 + i).padStart(2, "0")}</div>
                ))}
              </div>
              <div className="mt-4 flex items-center justify-between bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-md border border-indigo-100 dark:border-indigo-800">
                <span className="text-sm font-semibold text-indigo-900 dark:text-indigo-300">Final Line Count:</span>
                <input
                  type="number"
                  disabled={isEvaluated}
                  value={val}
                  onChange={(e) => setVal(e.target.value)}
                  className={`w-20 px-2 py-1 text-center font-mono text-lg rounded border-2 outline-none transition-colors ${
                    isEvaluated
                      ? val === question.answer
                        ? "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300"
                        : "border-red-500 bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300"
                      : "border-slate-300 dark:border-slate-500 focus:border-indigo-500 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100"
                  }`}
                />
              </div>
            </div>
          </div>
        );
      };

      const FileBinaryInteractive = ({ question, userAnswer, setUserAnswer, isEvaluated }) => {
        const [val, setVal] = useState(userAnswer || "");
        useEffect(() => setUserAnswer(val), [val]);
        useEffect(() => setVal(""), [question.id]);

        return (
          <div className="mt-6 flex flex-col md:flex-row gap-6">
            <div className="flex-1">
              <div className="bg-slate-900 text-slate-300 rounded-lg shadow-lg font-mono text-sm overflow-hidden h-full border border-slate-700">
                <div className="bg-slate-800 px-4 py-2 border-b border-slate-700 text-xs text-slate-400">code</div>
                <div className="p-4 leading-relaxed">
                  f <span className="text-pink-400">&lt;-</span>{" "}
                  <span className="text-green-300">OPEN</span>("data.bin", READ_BINARY_MODE)
                  <br />
                  b1 <span className="text-pink-400">&lt;-</span>{" "}
                  <span className="text-green-300">BYTE_TO_INT</span>(<span className="text-green-300">READ</span>(f, 1))
                  <br />
                  b2 <span className="text-pink-400">&lt;-</span>{" "}
                  <span className="text-green-300">BYTE_TO_INT</span>(<span className="text-green-300">READ</span>(f, 1))
                  <br />
                  <span className="text-green-300">OUTPUT</span>{" "}
                  <span className="text-green-300">INT_TO_STR</span>(b1 + b2)
                </div>
              </div>
            </div>

            <div className="flex-1 bg-white dark:bg-slate-700 border-2 border-slate-200 dark:border-slate-600 rounded-lg p-4 shadow-sm flex flex-col">
              <div className="flex items-center gap-2 border-b border-slate-200 dark:border-slate-600 pb-2 mb-4 text-slate-600 dark:text-slate-300 font-semibold text-sm">
                <Icons.Code /> data.bin (Hex Dump)
              </div>
              <div className="flex justify-center gap-2 mb-6">
                <div className="w-16 h-16 bg-slate-100 dark:bg-slate-600 border-2 border-slate-300 dark:border-slate-500 rounded-md flex items-center justify-center font-mono font-bold text-slate-700 dark:text-slate-200 shadow-inner">
                  {question.hex1}
                </div>
                <div className="w-16 h-16 bg-slate-100 dark:bg-slate-600 border-2 border-slate-300 dark:border-slate-500 rounded-md flex items-center justify-center font-mono font-bold text-slate-700 dark:text-slate-200 shadow-inner">
                  {question.hex2}
                </div>
                <div className="w-16 h-16 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 border-dashed rounded-md flex items-center justify-center font-mono text-slate-400 dark:text-slate-500">
                  00
                </div>
              </div>

              <div className="mt-auto flex items-center justify-between bg-slate-50 dark:bg-slate-700/50 p-3 rounded-md border border-slate-200 dark:border-slate-600">
                <span className="text-sm font-semibold text-slate-700 dark:text-slate-200">Decimal Output:</span>
                <input
                  type="number"
                  disabled={isEvaluated}
                  value={val}
                  onChange={(e) => setVal(e.target.value)}
                  className={`w-24 px-2 py-1 text-center font-mono text-lg rounded border-2 outline-none transition-colors ${
                    isEvaluated
                      ? val === question.answer
                        ? "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300"
                        : "border-red-500 bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300"
                      : "border-slate-300 dark:border-slate-500 focus:border-indigo-500 bg-white dark:bg-slate-600 text-slate-800 dark:text-slate-100"
                  }`}
                  placeholder="?"
                />
              </div>
            </div>
          </div>
        );
      };

      // --- MAIN APP COMPONENT ---

      const App = () => {
        const [theme, setTheme] = useState(() => {
          try {
            return localStorage.getItem("uimode") ||
              (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          } catch { return "light"; }
        });

        useEffect(() => {
          document.documentElement.classList.toggle("dark", theme === "dark");
          try { localStorage.setItem("uimode", theme); } catch {}
        }, [theme]);

        const toggleTheme = () => setTheme((t) => (t === "dark" ? "light" : "dark"));

        const [topics, setTopics] = useState([
          { id: "rng", title: "Random Number Generation", selected: true },
          { id: "exc", title: "Exception Handling", selected: true },
          { id: "file", title: "Reading & Writing Files", selected: true },
        ]);

        const [loop, setLoop] = useState([]);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [userAnswer, setUserAnswer] = useState(null);
        const [isEvaluated, setIsEvaluated] = useState(false);
        const [isCorrect, setIsCorrect] = useState(false);
        const [showSolution, setShowSolution] = useState(false);
        const [feedbackMsg, setFeedbackMsg] = useState("");

        const loadNewLoop = (forceTopics = null) => {
          const activeTopics = forceTopics || topics;
          const selectedIds = activeTopics.filter((t) => t.selected).map((t) => t.id);
          if (selectedIds.length === 0) return;
          setLoop(generateQuestionPool(selectedIds));
          setCurrentIndex(0);
          resetInteraction();
        };

        useEffect(() => { loadNewLoop(); }, []);

        const resetInteraction = () => {
          setUserAnswer(null);
          setIsEvaluated(false);
          setIsCorrect(false);
          setShowSolution(false);
          setFeedbackMsg("");
        };

        const currentQuestion = loop[currentIndex];

        const validateAnswer = () => {
          if (!currentQuestion) return;
          let correct = false;

          const checkWordPart = (input, fullWord) => {
            const cleanInput = input?.trim().toLowerCase() || "";
            const target = fullWord.toLowerCase();
            return cleanInput === target || cleanInput === target.slice(1);
          };

          if (currentQuestion.type === "mcq") {
            correct = userAnswer && currentQuestion.options.find((o) => o.text === userAnswer)?.correct;
          } else if (currentQuestion.type === "text") {
            if (userAnswer) correct = checkTextMatch(currentQuestion.answer, currentQuestion.prefix, userAnswer);
          } else if (currentQuestion.type === "interactive-eof") {
            correct = userAnswer && checkWordPart(userAnswer.w1, "end") && checkWordPart(userAnswer.w2, "of") && checkWordPart(userAnswer.w3, "file");
          } else if (currentQuestion.type === "interactive-lcg") {
            correct = userAnswer === currentQuestion.ans1;
          } else if (currentQuestion.type === "interactive-code-trace") {
            correct = userAnswer && Array.isArray(userAnswer) && userAnswer.join(",") === currentQuestion.expectedPath.join(",");
          } else if (currentQuestion.type === "interactive-file-aw" || currentQuestion.type === "interactive-file-bin") {
            correct = userAnswer === currentQuestion.answer;
          }

          setIsEvaluated(true);
          setIsCorrect(correct);

          if (correct) {
            setFeedbackMsg("Excellent! That is correct.");
          } else {
            if (currentQuestion.type === "interactive-code-trace" && (!userAnswer || userAnswer.length === 0)) {
              setFeedbackMsg("You haven't selected any lines yet!");
              setIsEvaluated(false);
            } else if (currentQuestion.type === "interactive-eof" && (!userAnswer || (!userAnswer.w1 && !userAnswer.w2 && !userAnswer.w3))) {
              setFeedbackMsg("You haven't entered an answer!");
              setIsEvaluated(false);
            } else {
              setFeedbackMsg("Not quite right. Try adjusting your answer or view the solution.");
            }
          }
        };

        const handleNext = () => {
          if (currentIndex < loop.length - 1) {
            setCurrentIndex((prev) => prev + 1);
            resetInteraction();
          } else {
            loadNewLoop();
          }
        };

        if (!currentQuestion)
          return (
            <div className="min-h-screen flex items-center justify-center font-bold text-slate-400 dark:text-slate-500 bg-slate-100 dark:bg-slate-900">
              Loading interactive...
            </div>
          );

        const remaining = loop.length - currentIndex;
        const progressPct = (currentIndex / loop.length) * 100;
        const isCheckDisabled = (isEvaluated && isCorrect) || (currentQuestion.type !== "interactive-code-trace" && !userAnswer);

        return (
          <div className="min-h-screen flex flex-col bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 relative pb-24">
            {/* CS Learning Header */}
            <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
              <a
                href="index.html"
                className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline"
              >
                <span className="text-slate-500">&lt;</span>CS
                <span className="text-slate-500">&gt;</span>&nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a
                  href="index.html"
                  className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                >
                  Home
                </a>
                <button
                  onClick={toggleTheme}
                  className="text-slate-400 hover:text-headerAccent transition-colors p-1"
                  aria-label="Toggle Dark Mode"
                >
                  {theme === "dark" ? (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  )}
                </button>
              </nav>
            </header>

            {/* Filter/Page Sub-header */}
            <FilterBar topics={topics} setTopics={setTopics} applyFilter={loadNewLoop} />

            {/* Progress Bar */}
            <div className="w-full bg-slate-200 dark:bg-slate-700 h-1">
              <div className="bg-indigo-500 h-1 transition-all duration-500" style={{ width: `${progressPct}%` }}></div>
            </div>

            <main className="flex-grow container mx-auto max-w-4xl p-4 md:p-8 flex flex-col">
              {/* Status Header */}
              <div className="flex justify-between items-center mb-6 text-sm font-semibold text-slate-500 dark:text-slate-400">
                <span className="bg-slate-200 dark:bg-slate-700 px-3 py-1 rounded-full uppercase tracking-wider text-xs text-slate-600 dark:text-slate-300">
                  {TOPICS.find((t) => t.id === currentQuestion.topic)?.title}
                </span>
                <span>
                  {remaining} {remaining === 1 ? "question" : "questions"} remaining in loop
                </span>
              </div>

              {/* Question Card */}
              <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 p-6 md:p-10 flex-grow flex flex-col fade-in relative overflow-hidden">
                <h2 className="text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 leading-tight">
                  {currentQuestion.question}
                </h2>

                <div className="flex-grow">
                  {currentQuestion.type === "mcq" && (
                    <MCQRenderer question={currentQuestion} userAnswer={userAnswer} setUserAnswer={setUserAnswer} isEvaluated={isEvaluated} />
                  )}
                  {currentQuestion.type === "text" && (
                    <TextRenderer question={currentQuestion} userAnswer={userAnswer} setUserAnswer={setUserAnswer} isEvaluated={isEvaluated} showSolution={showSolution} />
                  )}
                  {currentQuestion.type === "interactive-eof" && (
                    <EOFInteractive question={currentQuestion} userAnswer={userAnswer} setUserAnswer={setUserAnswer} isEvaluated={isEvaluated} showSolution={showSolution} />
                  )}
                  {currentQuestion.type === "interactive-lcg" && (
                    <LCGInteractive question={currentQuestion} userAnswer={userAnswer} setUserAnswer={setUserAnswer} isEvaluated={isEvaluated} showSolution={showSolution} />
                  )}
                  {currentQuestion.type === "interactive-code-trace" && (
                    <CodeTraceInteractive question={currentQuestion} userAnswer={userAnswer} setUserAnswer={setUserAnswer} isEvaluated={isEvaluated} />
                  )}
                  {currentQuestion.type === "interactive-file-aw" && (
                    <FileAppendInteractive question={currentQuestion} userAnswer={userAnswer} setUserAnswer={setUserAnswer} isEvaluated={isEvaluated} showSolution={showSolution} />
                  )}
                  {currentQuestion.type === "interactive-file-bin" && (
                    <FileBinaryInteractive question={currentQuestion} userAnswer={userAnswer} setUserAnswer={setUserAnswer} isEvaluated={isEvaluated} showSolution={showSolution} />
                  )}
                </div>

                {showSolution && (
                  <div className="mt-8 bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 p-4 rounded-r-md text-blue-900 dark:text-blue-200 text-sm md:text-base fade-in shadow-inner">
                    <strong>Solution / Explanation:</strong>
                    <br />
                    <span className="mt-1 block leading-relaxed">{currentQuestion.solutionText}</span>
                  </div>
                )}
              </div>
            </main>

            {/* Footer Actions Fixed at Bottom */}
            <div className="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 px-4 md:px-8 z-10">
              <div className="container mx-auto max-w-4xl flex items-center justify-between">
                <div className="flex-1 font-semibold text-lg flex items-center gap-2">
                  {isEvaluated && (
                    isCorrect ? (
                      <span className="text-green-600 dark:text-green-400 flex items-center gap-2 fade-in">
                        <Icons.Check /> {feedbackMsg}
                      </span>
                    ) : (
                      <span className="text-red-500 dark:text-red-400 flex items-center gap-2 shake">
                        <Icons.X /> {feedbackMsg}
                      </span>
                    )
                  )}
                </div>

                <div className="flex gap-4">
                  {!isEvaluated && (
                    <button
                      onClick={validateAnswer}
                      disabled={isCheckDisabled}
                      className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      Check Answer
                    </button>
                  )}

                  {isEvaluated && !isCorrect && !showSolution && (
                    <>
                      <button
                        onClick={() => setIsEvaluated(false)}
                        className="bg-white dark:bg-slate-800 border-2 border-indigo-600 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-slate-700 px-6 py-3 rounded-xl font-bold transition-all"
                      >
                        Try Again
                      </button>
                      <button
                        onClick={() => setShowSolution(true)}
                        className="bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-6 py-3 rounded-xl font-bold transition-all"
                      >
                        View Solution
                      </button>
                    </>
                  )}

                  {isEvaluated && (isCorrect || showSolution) && (
                    <button
                      onClick={handleNext}
                      className="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:shadow-lg transition-all flex items-center gap-2 animate-pulse"
                      style={{ animationDuration: "2s" }}
                    >
                      Next Question <Icons.ArrowRight />
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
