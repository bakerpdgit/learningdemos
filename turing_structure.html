      <!-- Prevent FOUC: apply dark class before render -->
    <script>

        try {
          var mode = localStorage.getItem("uimode");

          ) {
            document.documentElement.classList.add("dark");

                " executes the encoded TM exactly as the original TM would have done, thus acting as an ",

                ". The UTM is profoundly important because it provides a formal mathematical model of a general-purpose ",

          topic: "UTM & Computability",

          segments: [
            {
              type: "text",
              content:
                "The Halting Problem asks: Is it possible to create a Turing Machine which takes on its tape the ",

            {
              type: "text",

          segments: [
            {
              type: "text",
              content:
                "Given that Alan Turing proved that the Halting Problem could not be solved (it is ",
            },
            { type: "blank", id: 1, hint: "u", answer: "undecidable" },
            {
              type: "text",
              content:
                "), this demonstrates that there are inherent limits to computation, and that some problems are simply not ",
            },
            { type: "blank", id: 2, hint: "c", answer: "computable" },
            { type: "text", content: "." },
          ],
        },
        {
          id: "q_mcq1",
          topic: "UTM & Computability",
          type: "mcq",
          title: "The Halting Problem",
          text: "Which of the following best describes the significance of the Halting Problem in Computer Science?",
          options: [
            {
              id: "a",
              text: "It proves that there are some problems that cannot be solved by any algorithm or computer.",
              isCorrect: true,
            },
            {
              id: "b",
              text: "It provides a reliable method to fix infinite loops in all software programs.",
              isCorrect: false,
            },
            {
              id: "c",
              text: "It demonstrates that Universal Turing Machines execute instructions faster than standard machines.",
              isCorrect: false,
            },
            {
              id: "d",

              isCorrect: false,
            },
          ],
          explanation:
            "Alan Turing proved the Halting Problem is undecidable, demonstrating that not all problems are computable.",
        },
      ];

      // --- REUSABLE COMPONENTS ---

      // Common action bar for Check / Reveal operations
      const QuestionActions = ({
        onCheck,
        onReveal,
        showSolution,
        isCorrect,
        feedback,
        feedbackType,
        extraButtons,
        checkText = "Check Answer",
        revealText = "Reveal Solution",
      }) => {
        let fbClass = isCorrect
          ? "bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 border-green-200 dark:border-green-800"
          : "bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300 border-red-200 dark:border-red-800";
        if (feedbackType === "info")
          fbClass = "bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-300 border-blue-200 dark:border-blue-800";
        else if (feedbackType === "success")
          fbClass = "bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 border-green-200 dark:border-green-800";
        else if (feedbackType === "error")
          fbClass = "bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300 border-red-200 dark:border-red-800";

        return (
          <div className="mt-8 pt-6 border-t border-gray-200 dark:border-slate-600">
            <div className="flex flex-wrap gap-3 items-center">
              <button
                onClick={onCheck}
                disabled={showSolution || isCorrect}
                className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded shadow transition disabled:opacity-50"
              >
                {checkText}
              </button>
              {extraButtons}
              <button
                onClick={onReveal}
                disabled={showSolution || isCorrect}
                className="px-6 py-2.5 bg-gray-200 dark:bg-slate-600 hover:bg-gray-300 dark:hover:bg-slate-500 text-gray-800 dark:text-slate-200 font-semibold rounded shadow transition disabled:opacity-50 ml-auto"

            </div>
            {feedback && (

      };

      // --- INTERACTIVE QUESTION COMPONENTS ---

      // 1. Structure Drag and Drop
      const Q_StructureDragDrop = ({ onSolved }) => {
        const [placements, setPlacements] = useState({
          dz_tape: null,
          dz_cell: null,
          dz_alphabet: null,
          dz_head: null,
          dz_states: null,
          dz_rules: null,
        });
        const [showSolution, setShowSolution] = useState(false);
        const [isCorrect, setIsCorrect] = useState(false);
        const [feedback, setFeedback] = useState("");

        const drags = [
          { id: "tape", label: "Infinite tape" },
          { id: "cell", label: "Cell" },
          { id: "alphabet", label: "Alphabet" },
          { id: "head", label: "Moving read/write head" },
          { id: "states", label: "Finite set of states" },
          { id: "rules", label: "Finite set of transition rules" },
        ];

        const availableDrags = drags.filter(
          (d) => !Object.values(placements).includes(d.id),
        );

        const handleDragStart = (e, id) =>
          e.dataTransfer.setData("text/plain", id);

        const handleDrop = (e, zone) => {
          e.preventDefault();
          if (showSolution || isCorrect) return;
          const id = e.dataTransfer.getData("text/plain");
          if (id) {
            const newPlacements = { ...placements };
            for (let z in newPlacements)
              if (newPlacements[z] === id) newPlacements[z] = null;
            newPlacements[zone] = id;
            setPlacements(newPlacements);
          }
        };

        const handleRemove = (zone) => {
          if (showSolution || isCorrect) return;
          setPlacements({ ...placements, [zone]: null });
        };

        const handleCheck = () => {
          if (
            placements.dz_tape === "tape" &&
            placements.dz_cell === "cell" &&
            placements.dz_alphabet === "alphabet" &&
            placements.dz_head === "head" &&
            placements.dz_states === "states" &&
            placements.dz_rules === "rules"
          ) {
            setIsCorrect(true);
            setFeedback(
              "Excellent! You have correctly identified all the components of a Turing Machine.",
            );
            onSolved();
          } else {
            setFeedback(
              "Not quite. Review the connections carefully and try rearranging them.",
            );
          }
        };

        const handleReveal = () => {
          setShowSolution(true);
          setPlacements({
            dz_tape: "tape",
            dz_cell: "cell",
            dz_alphabet: "alphabet",
            dz_head: "head",
            dz_states: "states",
            dz_rules: "rules",
          });
          setFeedback("Solution revealed.");
          onSolved();
        };

        // Defines exactly where each DropZone `<foreignObject>` is positioned in the SVG space
        const dzPos = {
          dz_tape: { x: 20, y: 40 },
          dz_alphabet: { x: 20, y: 190 },
          dz_states: { x: 20, y: 340 },
          dz_cell: { x: 750, y: 40 },
          dz_head: { x: 750, y: 190 },
          dz_rules: { x: 750, y: 340 },
        };

        const renderDropZone = (zone) => (
          <foreignObject
            x={dzPos[zone].x}
            y={dzPos[zone].y}
            width="190"
            height="60"
          >
            <div
              className={`w-full h-full border-2 border-dashed ${placements[zone] ? "border-blue-500 bg-blue-50 dark:bg-blue-900/30 hover:bg-red-50 dark:hover:bg-red-900/20" : "border-gray-400 dark:border-slate-500 bg-gray-50/90 dark:bg-slate-600/80 hover:bg-white dark:hover:bg-slate-600"} flex items-center justify-center rounded-lg cursor-pointer transition relative group shadow-sm px-2 py-1 select-none`}
              onDragOver={(e) => e.preventDefault()}
              onDrop={(e) => handleDrop(e, zone)}
              onClick={() => handleRemove(zone)}
            >
              {placements[zone] ? (
                <span className="font-bold text-blue-800 dark:text-blue-300 text-center text-sm leading-tight group-hover:opacity-10 transition">
                  {drags.find((d) => d.id === placements[zone]).label}
                </span>
              ) : (
                <span className="text-gray-400 text-xs uppercase tracking-wider font-semibold text-center">
                  Drop here
                </span>
              )}
              {placements[zone] && !showSolution && !isCorrect && (
                <span className="absolute inset-0 flex items-center justify-center text-red-600 opacity-0 group-hover:opacity-100 font-bold transition bg-white/90 rounded-lg text-sm">
                  Remove
                </span>
              )}
            </div>
          </foreignObject>
        );

        return (
          <div className="fade-in">
            <p className="mb-6 text-gray-700 dark:text-slate-300">
              Drag and drop the labels to correctly identify the structural
              components of a Turing Machine model.
            </p>

                viewBox="0 0 960 450"
                className="w-full h-full bg-gray-50/30"

                    id="pointer"
                    markerWidth="8"
                    markerHeight="8"
                    refX="7"
                    refY="4"
                    orient="auto"

                  <marker
                    id="arrowFSM"
                    markerWidth="10"
                    markerHeight="7"
                    refX="9"
                    refY="3.5"
                    orient="auto"
                  >
                    <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
                  </marker>
                </defs>

                {/* --- TURING MACHINE VISUALS --- */}

                    x="330"
                    y="40"
                    width="300"
                    height="60"
                    fill="#ffffff"
                    stroke="#1f2937"
                    strokeWidth="3"
                  />
                  {/* Cell dividers */}
                  <line
                    x1="390"
                    y1="40"
                    x2="390"
                    y2="100"
                    stroke="#1f2937"
                    strokeWidth="2"
                  />
                  <line
                    x1="450"
                    y1="40"
                    x2="450"
                    y2="100"
                    stroke="#1f2937"
                    strokeWidth="2"
                  />
                  <line
                    x1="510"
                    y1="40"
                    x2="510"
                    y2="100"
                    stroke="#1f2937"
                    strokeWidth="2"
                  />
                  <line
                    x1="570"
                    y1="40"
                    x2="570"
                    y2="100"
                    stroke="#1f2937"
                    strokeWidth="2"
                  />

                  {/* Symbols */}
                  <text
                    x="360"

                    textAnchor="middle"
                    dominantBaseline="central"
                    fontFamily="monospace"

                    fill="#9ca3af"
                  >
                    _

                  <text

                    dominantBaseline="central"

                    fontSize="24"
                    fontWeight="bold"
                  >
                    1

                  {/* Active Cell highlight */}
                  <rect x="451" y="41" width="58" height="58" fill="#fef08a" />
                  <line
                    x1="450"

                    stroke="#f59e0b"
                    strokeWidth="4"
                  />
                  <text
                    x="480"

                  >

                  </text>

                  <text

                    textAnchor="middle"
                    dominantBaseline="central"
                    fontFamily="monospace"
                    fontSize="24"

                    fill="#2563eb"
                  >
                    1
                  </text>
                  <text

                    textAnchor="middle"
                    dominantBaseline="central"
                    fontFamily="monospace"
                    fontSize="24"
                    fill="#9ca3af"
                  >
                    _
                  </text>

                  {/* Faded ends to indicate infinity */}
                  <rect
                    x="300"
                    y="38"
                    width="30"
                    height="64"
                    fill="url(#leftGradient)"
                  />
                  <rect
                    x="630"
                    y="38"
                    width="30"
                    height="64"
                    fill="url(#rightGradient)"
                  />
                  <defs>
                    <linearGradient
                      id="leftGradient"
                      x1="0"
                      y1="0"
                      x2="1"
                      y2="0"
                    >
                      <stop offset="0%" stopColor="#f9fafb" />
                      <stop offset="100%" stopColor="transparent" />
                    </linearGradient>
                    <linearGradient
                      id="rightGradient"

                      y1="0"
                      x2="1"
                      y2="0"
                    >
                      <stop offset="0%" stopColor="transparent" />

                  </defs>

                {/* 2. Head (pointing at x=480, y=100) */}

                {/* 3. Alphabet Legend */}

                  <rect

                    height="110"
                    rx="12"

                    stroke="#bfdbfe"

                  />

                  {/* State S0 */}
                  <circle
                    cx="415"
                    cy="370"
                    r="25"
                    fill="#ffffff"
                    stroke="#f59e0b"
                    strokeWidth="3"
                    strokeDasharray="4 2"
                  />
                  <text x="415" y="370" className="state-text" fill="#1f2937">
                    S0
                  </text>

                  {/* State S1 */}
                  <circle
                    cx="565"
                    cy="370"
                    r="25"
                    fill="#ffffff"
                    stroke="#3b82f6"
                    strokeWidth="2"
                  />

                    S1
                  </text>

                  {/* Transition Rule */}
                  <path
                    d="M 440 370 L 530 370"
                    stroke="#3b82f6"
                    strokeWidth="2.5"
                    markerEnd="url(#arrowFSM)"
                  />
                  <rect x="455" y="350" width="60" height="20" fill="#eff6ff" />
                  <text
                    x="485"
                    y="360"
                    textAnchor="middle"
                    dominantBaseline="central"
                    fontFamily="monospace"
                    fontSize="14"
                    fontWeight="bold"
                    fill="#1e3a8a"
                  >
                    1, 0, R
                  </text>
                </g>

                {/* --- CONNECTION LINES (from DropZone edges to specific targets) --- */}

                {/* Tape Line */}
                <path
                  d="M 210 70 L 325 70"
                  stroke="#9ca3af"
                  strokeWidth="2.5"
                  strokeDasharray="4 4"
                  markerEnd="url(#pointer)"
                />
                {/* Cell Line (Points down to top of active cell) */}
                <path
                  d="M 750 60 Q 620 15 480 35"
                  stroke="#9ca3af"
                  fill="none"
                  strokeWidth="2.5"
                  strokeDasharray="4 4"
                  markerEnd="url(#pointer)"
                />

                {/* Alphabet Line */}
                <path
                  d="M 210 220 Q 260 220 315 167"
                  stroke="#9ca3af"
                  fill="none"
                  strokeWidth="2.5"
                  strokeDasharray="4 4"
                  markerEnd="url(#pointer)"
                />
                {/* Head Line */}
                <path
                  d="M 750 220 Q 550 220 505 155"
                  stroke="#9ca3af"
                  fill="none"
                  strokeWidth="2.5"
                  strokeDasharray="4 4"
                  markerEnd="url(#pointer)"
                />

                {/* States Line (Points to left edge of S0) */}
                <path
                  d="M 210 370 L 385 370"
                  stroke="#9ca3af"
                  strokeWidth="2.5"
                  strokeDasharray="4 4"
                  markerEnd="url(#pointer)"
                />
                {/* Rules Line (Curves from top down to point at transition text) */}
                <path
                  d="M 750 370 Q 600 310 485 345"
                  stroke="#9ca3af"
                  fill="none"
                  strokeWidth="2.5"
                  strokeDasharray="4 4"
                  markerEnd="url(#pointer)"
                />

                {/* --- HTML DROP ZONES (via foreignObject) --- */}
                {renderDropZone("dz_tape")}
                {renderDropZone("dz_alphabet")}
                {renderDropZone("dz_states")}
                {renderDropZone("dz_cell")}
                {renderDropZone("dz_head")}
                {renderDropZone("dz_rules")}

            </div>

            {/* Word Bank */}
            <div className="flex gap-3 justify-center mt-6 p-5 bg-gray-200 dark:bg-slate-700 rounded-xl min-h-[5rem] flex-wrap shadow-inner">
              {availableDrags.map((d) => (
                <div
                  key={d.id}
                  draggable
                  onDragStart={(e) => handleDragStart(e, d.id)}
                  className="bg-white dark:bg-slate-600 border-2 border-gray-300 dark:border-slate-500 px-4 py-2.5 rounded-lg shadow-sm hover:shadow-md hover:border-blue-400 hover:text-blue-700 cursor-grab active:cursor-grabbing font-bold text-gray-700 dark:text-slate-200 transition"
                >
                  {d.label}
                </div>
              ))}
              {availableDrags.length === 0 && (
                <span className="text-gray-500 font-medium italic flex items-center">
                  All labels placed.
                </span>
              )}
            </div>

            <QuestionActions
              onCheck={handleCheck}
              onReveal={handleReveal}
              showSolution={showSolution}
              isCorrect={isCorrect}
              feedback={feedback}
            />
          </div>
        );
      };

      // 2. Notation: Transition Function
      const Q_NotationFunc = ({ onSolved }) => {
        const [inputs, setInputs] = useState(["", "", "", "", ""]);
        const [showSolution, setShowSolution] = useState(false);
        const [isCorrect, setIsCorrect] = useState(false);
        const [feedback, setFeedback] = useState("");

        const expected = ["S0", "0", "S1", "1", "R"];

        const handleCheck = () => {
          const isMatch = inputs.every(
            (val, i) => val.trim().toLowerCase() === expected[i].toLowerCase(),
          );
          if (isMatch) {
            setIsCorrect(true);
            setFeedback(
              "Correct! You've successfully converted the diagram into transition function notation.",
            );

      // 3. Notation: Transition Table
      const Q_NotationTable = ({ onSolved }) => {
        const [inputs, setInputs] = useState(["", "", "", "", ""]);

        const [isCorrect, setIsCorrect] = useState(false);
        const [feedback, setFeedback] = useState("");
        const expected = ["S2", "1", "S3", "0", "L"];

        const handleCheck = () => {
          if (
            inputs.every(
              (v, i) => v.trim().toLowerCase() === expected[i].toLowerCase(),
            )
          ) {
            setIsCorrect(true);
            setFeedback(
              "Great! The transition function is correctly mapped to the table row.",
            );
            onSolved();
          } else {
            setFeedback(
              "Incorrect. Map the function carefully: δ(Current, Input) = (Next, Output, Direction).",
            );
          }
        };
        const handleReveal = () => {
          setShowSolution(true);
          setInputs(expected);
          setFeedback("Solution revealed.");
          onSolved();
        };
        const vals = showSolution ? expected : inputs;
        const setVal = (i, v) => {
          const n = [...inputs];
          n[i] = v;
          setInputs(n);
        };

        return (

      // 4. Fill in the Blanks (Theory)
      const Q_FillBlanks = ({ question, onSolved }) => {
        const initialAnswers = {};
        question.segments.forEach((s) => {
          if (s.type === "blank") initialAnswers[s.id] = "";
        });

        const [answers, setAnswers] = useState(initialAnswers);
        const [showSolution, setShowSolution] = useState(false);
        const [isCorrect, setIsCorrect] = useState(false);
        const [feedback, setFeedback] = useState("");

        const handleCheck = () => {
          let allOk = true;
          question.segments.forEach((s) => {
            if (s.type === "blank") {
              const u = answers[s.id].trim().toLowerCase();
              const t = s.answer.toLowerCase();
              if (u !== t && u !== t.substring(1)) allOk = false;
            }
          });
          if (allOk) {
            setIsCorrect(true);
            setFeedback(
              "Perfect! You correctly identified all the missing words.",
            );
            onSolved();
          } else {
            setFeedback(
              "Some words are incorrect. Use the first letter hints to guide you.",
            );
          }
        };

        const handleReveal = () => {
          setShowSolution(true);
          const solvedAnswers = {};
          question.segments.forEach((s) => {
            if (s.type === "blank") solvedAnswers[s.id] = s.answer.substring(1);
          });
          setAnswers(solvedAnswers);
          setFeedback("Solution revealed.");
          onSolved();
        };

        return (
          <div className="fade-in">
            <p className="mb-6 text-gray-700 dark:text-slate-300">{question.instructions}</p>

                if (seg.type === "text")
                  return <span key={idx}>{seg.content}</span>;
                if (seg.type === "blank") {
                  const val = answers[seg.id];
                  const isFieldCorrect =
                    val.trim().toLowerCase() === seg.answer.toLowerCase() ||
                    val.trim().toLowerCase() ===
                      seg.answer.toLowerCase().substring(1);
                  const colorClass = showSolution
                    ? "text-green-700 dark:text-green-400 border-green-500"
                    : isCorrect
                      ? "text-green-700 dark:text-green-400"
                      : "text-blue-800 dark:text-blue-400";

                  return (
                    <span
                      key={idx}
                      className="inline-flex items-baseline border-b-2 border-gray-400 dark:border-slate-500 bg-gray-50 dark:bg-slate-600 px-1 mx-1 rounded-t shadow-sm"
                    >
                      <span className={`font-bold ${colorClass}`}>
                        {seg.hint}
                      </span>
                      <input
                        type="text"
                        value={
                          showSolution
                            ? seg.answer.substring(1)
                            : answers[seg.id]
                        }
                        onChange={(e) =>
                          setAnswers({ ...answers, [seg.id]: e.target.value })
                        }
                        disabled={showSolution || isCorrect}
                        style={{ width: `max(4rem, ${seg.answer.length}ch)` }}
                        className={`bg-transparent outline-none focus:bg-white px-1 ${colorClass} font-semibold`}
                        placeholder="..."
                      />
                    </span>
                  );
                }
              })}
            </div>

            <QuestionActions
              onCheck={handleCheck}
              onReveal={handleReveal}
              showSolution={showSolution}
              isCorrect={isCorrect}
              feedback={feedback}
            />
          </div>
        );
      };

      // 5. Multiple Choice
      const Q_MCQ = ({ question, onSolved }) => {

      // 6. Trace Table
      const Q_TraceTable = ({ onSolved }) => {
        const solutionTrace = [

          S2: { x: 500, y: 100 },

        const handleCheckRow = () => {

          const targetRow = solutionTrace[history.length];

          if (isRowCorrect) {

          const newHistory = [...history, targetRow];

          setHistory(newHistory);
          setCurrentRowInput(Array(9).fill(""));

          if (newHistory.length === solutionTrace.length) {
            setIsCorrect(true);
            setFeedbackType("info");
            setFeedback("Complete trace revealed.");

              <path
                class="transition-line"

              />
              <rect x="275" y="25" width="50" height="20" fill="white" />
              <text x="300" y="38" class="transition-text" textAnchor="middle">

              </text>
              <path

                markerEnd="url(#arrowhead2)"

              {/* State Highlight Indicator */}

                    <tr className="bg-white dark:bg-slate-700 relative shadow-inner ring-2 ring-blue-400 inset-0">
                      {currentRowInput.map((val, cIdx) => (
                        <td key={cIdx} className="border border-gray-200 dark:border-slate-600 p-0">
                          <input
                            type="text"
                            value={val}
                            onChange={(e) => {
                              const newRow = [...currentRowInput];
                              newRow[cIdx] = e.target.value;
                              setCurrentRowInput(newRow);
                            }}
                            className="w-full h-full p-2 text-center focus:outline-none bg-transparent font-bold text-blue-700 dark:text-blue-400"
                            placeholder="?"
                          />
                        </td>
                      ))}
                    </tr>
                  )}
                </tbody>
              </table>
            </div>

            <QuestionActions
              onCheck={handleCheckRow}
              onReveal={handleReveal}
              showSolution={showSolution}
              isCorrect={isCorrect}
              feedback={feedback}
              feedbackType={feedbackType}
              checkText="Check Current Row"
              revealText="Reveal Next Row"
              extraButtons={null}
            />
          </div>
        );
      };

      // --- DEFINED OUTSIDE TO PREVENT REMOUNT/STATE LOSS BUG ---
      const QuestionRenderer = ({ question, onSolved }) => {
        if (!question) return null;
        const props = { question, onSolved };
        switch (question.type) {
          case "dragdrop":
            return <Q_StructureDragDrop {...props} />;
          case "notation_func":
            return <Q_NotationFunc {...props} />;
          case "notation_table":
            return <Q_NotationTable {...props} />;
          case "trace_table":
            return <Q_TraceTable {...props} />;
          case "fillblanks":
            return <Q_FillBlanks {...props} />;
          case "mcq":
            return <Q_MCQ {...props} />;
          default:
            return <div>Unknown question type.</div>;
        }
      };

      // --- MAIN APP AND LOGIC ---

      const SunIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      );
      const MoonIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      );

      const FilterMenu = ({ activeTopics, onApply }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [local, setLocal] = useState(activeTopics);

        return (
          <div className="relative">
            <button
              onClick={() => setIsOpen(!isOpen)}
              className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg shadow flex items-center gap-2 font-medium text-white transition"
            >
              <svg
                className="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  strokeWidth="2"
                  d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
                ></path>
              </svg>
              Filter Sub-topics
            </button>
            {isOpen && (
              <div className="absolute right-0 mt-2 w-64 bg-white dark:bg-slate-700 rounded-xl shadow-2xl border border-gray-200 dark:border-slate-600 z-50 p-5">
                <h4 className="font-bold mb-4 text-gray-800 dark:text-slate-100 border-b dark:border-slate-600 pb-2">
                  Select Sub-topics
                </h4>
                {Object.keys(local).map((topic) => (
                  <label
                    key={topic}
                    className="flex items-center gap-3 mb-3 cursor-pointer group"
                  >
                    <input
                      type="checkbox"
                      checked={local[topic]}
                      onChange={() =>
                        setLocal({ ...local, [topic]: !local[topic] })
                      }
                      className="rounded text-blue-600 focus:ring-blue-500 w-5 h-5 cursor-pointer"
                    />
                    <span className="text-gray-700 dark:text-slate-200 group-hover:text-blue-600 transition font-medium">
                      {topic}
                    </span>
                  </label>
                ))}
                <button
                  onClick={() => {
                    onApply(local);
                    setIsOpen(false);
                  }}
                  className="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg shadow transition"
                >
                  Apply Selection
                </button>
              </div>
            )}
          </div>
        );
      };

      const App = () => {
        const [isDark, setIsDark] = useState(() => {
          try { return localStorage.getItem("uimode") === "dark" || (!localStorage.getItem("uimode") && window.matchMedia("(prefers-color-scheme: dark)").matches); } catch(e) { return false; }
        });
        useEffect(() => {
          document.documentElement.classList.toggle("dark", isDark);
          try { localStorage.setItem("uimode", isDark ? "dark" : "light"); } catch(e) {}
        }, [isDark]);

        const defaultTopics = {
          Structure: true,
          Notation: true,
          Tracing: true,
          "UTM & Computability": true,
        };
        const [activeTopics, setActiveTopics] = useState(defaultTopics);
        const [history, setHistory] = useState([]);
        const [currentQuestion, setCurrentQuestion] = useState(null);
        const [canNext, setCanNext] = useState(false);

        const pickNextQuestion = (topics) => {
          setHistory((prevHistory) => {
            let available = ALL_QUESTIONS.filter((q) => topics[q.topic]);
            if (available.length === 0) {
              setCurrentQuestion(null);
              return prevHistory;
            }

            let unasked = available.filter((q) => !prevHistory.includes(q.id));

            // Reset history for these specific topics if all questions have been asked
            if (unasked.length === 0) {
              const availableIds = available.map((q) => q.id);
              let newHistory = prevHistory.filter(
                (id) => !availableIds.includes(id),
              );
              unasked = available;

              // Try to prevent immediately repeating the exact same question if possible
              if (unasked.length > 1 && currentQuestion) {
                unasked = unasked.filter((q) => q.id !== currentQuestion.id);
              }

              const pick = unasked[Math.floor(Math.random() * unasked.length)];
              setCurrentQuestion(pick);
              setCanNext(false);
              return [...newHistory, pick.id];
            }

            const pick = unasked[Math.floor(Math.random() * unasked.length)];
            setCurrentQuestion(pick);
            setCanNext(false);
            return [...prevHistory, pick.id];
          });
        };

        useEffect(() => {
          pickNextQuestion(activeTopics);
        }, []);

        const handleApplyFilter = (newTopics) => {
          setActiveTopics(newTopics);
          pickNextQuestion(newTopics);
        };

        return (
          <div className="flex flex-col min-h-screen bg-gray-100 dark:bg-slate-900">
            {/* CS Learning Header */}
            <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
              <a
                href="index.html"
                className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline"
              >
                <span className="text-slate-500">&lt;</span>CS
                <span className="text-slate-500">&gt;</span>&nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a
                  href="index.html"
                  className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                >
                  Home
                </a>
                <button
                  onClick={() => setIsDark(d => !d)}
                  className="text-slate-400 hover:text-headerAccent transition-colors p-1"
                  aria-label="Toggle Dark Mode"
                >
                  {isDark ? (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  )}
                </button>
              </nav>
            </header>
            <header className="bg-gray-800 dark:bg-slate-800 text-white p-4 shadow-lg border-b-4 border-indigo-500 sticky top-[58px] z-40">
              <div className="max-w-5xl mx-auto flex justify-between items-center">
                <h2 className="text-indigo-300 font-medium">
                  Interactive Turing Machines
                </h2>
                <FilterMenu
                  activeTopics={activeTopics}
                  onApply={handleApplyFilter}
                />
              </div>
            </header>

            <main className="flex-grow max-w-5xl mx-auto w-full p-6 py-10">
              {currentQuestion ? (
                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 relative border border-gray-200 dark:border-slate-700">
                  <div className="absolute -top-4 -right-4 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-800 dark:text-indigo-300 text-xs font-bold px-4 py-1.5 rounded-full uppercase tracking-widest shadow-md border border-indigo-200 dark:border-indigo-700">
                    {currentQuestion.topic}
                  </div>

                  <h2 className="text-2xl font-bold text-gray-800 dark:text-slate-100 border-b-2 border-gray-100 dark:border-slate-600 pb-4 mb-6 flex items-center gap-3">
                    <span className="bg-blue-600 w-2 h-8 rounded-full"></span>
                    {currentQuestion.title}
                  </h2>

                  <QuestionRenderer
                    key={currentQuestion.id}
                    question={currentQuestion}
                    onSolved={() => setCanNext(true)}
                  />

                  {canNext && (
                    <div className="mt-8 text-right border-t border-gray-100 dark:border-slate-600 pt-6 fade-in">
                      <button
                        onClick={() => pickNextQuestion(activeTopics)}
                        className="px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5"
                      >
                        Next Question ➜
                      </button>
                    </div>
                  )}
                </div>
              ) : (
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-md p-12 text-center text-gray-500 dark:text-slate-400 border border-gray-200 dark:border-slate-700">
                  <svg
                    className="w-16 h-16 mx-auto mb-4 text-gray-300"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"
                    ></path>
                  </svg>
                  <p className="text-lg">
                    No questions available for the selected topics.
                  </p>
                  <p className="text-sm mt-2">
                    Use the filter menu in the top right to select sub-topics.
                  </p>
                </div>
              )}
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
