                  accept=".py,.txt,text/x-python"
                  className="hidden"
                  onChange={handleCodeFileChange}
                />
                <div className="bg-slate-900 py-2 px-4 border-b border-slate-700 text-slate-400 text-xs">
                  <div className="flex justify-between items-start gap-3">
                    <div>
                      <div className="font-bold uppercase tracking-wider">
                        Code Trace ({codeFileName || DEFAULT_CODE_FILENAME})
                      </div>
                      <div className="mt-1 normal-case tracking-normal text-[11px] text-slate-500">
                        {codeLabel} • {codeStatus}
                      </div>
                    </div>
                    <div className="flex flex-wrap items-center justify-end gap-2">
                      <button
                        onClick={handleLoadButtonClick}
                        disabled={isRunning || isCodeBusy}
                        className="rounded border border-slate-600 px-2 py-1 text-[11px] font-semibold text-slate-200 hover:border-blue-400 disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        Load
                      </button>
                      <button
                        onClick={handleSaveCode}
                        disabled={!hasCode || isCodeBusy}
                        className="rounded border border-slate-600 px-2 py-1 text-[11px] font-semibold text-slate-200 hover:border-amber-400 disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        Save
                      </button>
                      <span className="min-w-[72px] text-right font-bold uppercase tracking-wider">
                        {currentLine > 0 ? `Line ${currentLine}` : hasCode ? "Ready" : "No code"}
                      </span>
                    </div>
                  </div>
                </div>
                <div className="relative flex-1 overflow-hidden bg-slate-950/70">
                  <div
                    ref={editorContainerRef}
                    className="absolute inset-0"
                  ></div>
                  {!hasCode && isEditorReady && !editorError && (
                    <div className="pointer-events-none absolute inset-0 flex items-center justify-center px-8 text-center text-slate-500 italic leading-relaxed">
                      Open the prelim code from a local Python file before
                      running this interactive.
                    </div>
                  )}
                  {!isEditorReady && !editorError && (
                    <div className="absolute inset-0 flex items-center justify-center text-slate-500">
                      Loading Monaco editor...
                    </div>
                  )}
                  {editorError && (
                    <div className="absolute inset-0 flex items-center justify-center px-8 text-center text-red-300">
                      Monaco editor could not be loaded.
                      <br />
                      {editorError}
                    </div>
                  )}
                </div>
              </div>

              {/* Drag handle: left ↔ right */}
              <div
                className="resize-handle-col"
                onMouseDown={(e) => { e.preventDefault(); resizeDragRef.current = 'col-main'; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; }}
              >
                <div className="resize-bar" style={{ width: '3px', height: '48px' }} />
              </div>

              {/* Right side */}
              <div ref={rightSideRef} className="flex flex-col flex-1 overflow-hidden">
              {/* PANEL 2: Visualizer */}
              <div className="bg-slate-800 rounded-lg shadow border border-slate-700 flex flex-col overflow-hidden flex-shrink-0" style={{ height: `calc(${rightTopHeight}% - 6px)` }}>
                <div className="bg-slate-900 py-2 px-4 border-b border-slate-700 flex justify-between items-center gap-4">
                  <div>
                    <span className="font-bold uppercase tracking-wider text-slate-400 text-xs">
                      {visualMode === "grid"
                        ? "Live Simulation Visualizer"
                        : "State Inspector"}
                    </span>
                    {visualMode === "attributes" && activeInspectorView && (
                      <div className="text-[11px] text-slate-500 mt-1">
                        Focus: {activeInspectorView.label}
                      </div>
                    )}
                  </div>

                  <div className="flex items-center gap-4">
                    <div className="flex rounded-md border border-slate-600 overflow-hidden text-[11px] font-bold">
                      <button
                        onClick={() => setVisualMode("grid")}
                        className={`px-3 py-1 ${visualMode === "grid" ? "bg-blue-600 text-white" : "bg-slate-800 text-slate-300"}`}
                      >
                        Grid
                      </button>
                      <button
                        onClick={() => setVisualMode("attributes")}
                        className={`px-3 py-1 ${visualMode === "attributes" ? "bg-blue-600 text-white" : "bg-slate-800 text-slate-300"}`}
                      >
                        Inspector
                      </button>
                    </div>

                    {visualMode === "attributes" &&
                      availableInspectorViews.length > 0 && (
                        <div className="flex rounded-md border border-slate-600 overflow-hidden text-[11px] font-bold">
                          {availableInspectorViews.map(([viewKey, view]) => (
                            <button
                              key={viewKey}
                              onClick={() => setInspectorView(viewKey)}
                              className={`px-3 py-1 ${inspectorView === viewKey ? "bg-sky-600 text-white" : "bg-slate-800 text-slate-300"}`}
                            >
                              {viewKey === "attributes" ? "Attributes" : "Locals"}
                            </button>
                          ))}
                        </div>
                      )}

                    {visualMode === "grid" && (
                      <div className="flex gap-4 text-xs font-semibold">
                        <label className="flex items-center gap-1 cursor-pointer">
                          <input
                            type="checkbox"
                            checked={showAnts}
                            onChange={(e) => setShowAnts(e.target.checked)}
                          />{" "}
                          🐜 Ants
                        </label>
                        <label className="flex items-center gap-1 cursor-pointer">
                          <input
                            type="checkbox"
                            checked={showFood}
                            onChange={(e) => setShowFood(e.target.checked)}
                          />{" "}
                          🟢 Food
                        </label>
                        <label className="flex items-center gap-1 cursor-pointer">
                          <input
                            type="checkbox"
                            checked={showPheromones}
                            onChange={(e) => setShowPheromones(e.target.checked)}
                          />{" "}
                          💨 Pheromones
                        </label>
                      </div>
                    )}
                  </div>
                </div>

                <div
                  className={`flex-1 overflow-auto p-4 ${visualMode === "grid" ? "grid-bg flex items-center justify-center" : "bg-slate-800/60"}`}
                >
                  {visualMode === "grid" ? (
                    simState && simState.Rows ? (
                      <div
                        className="inline-grid gap-1 border-2 border-slate-600 bg-slate-700 p-1 rounded"
                        style={{
                          gridTemplateColumns: `repeat(${simState.Cols}, minmax(40px, 1fr))`,
                          gridTemplateRows: `repeat(${simState.Rows}, minmax(40px, 1fr))`,
                        }}
                      >
                        {Array.from({
                          length: simState.Rows * simState.Cols,
                        }).map((_, idx) => {
                          const r = Math.floor(idx / simState.Cols) + 1;
                          const c = (idx % simState.Cols) + 1;

                          const nest = simState.Nests.find(
                            (n) => n.r === r && n.c === c,
                          );
                          const food = simState.Food.find(
                            (f) => f.r === r && f.c === c,
                          );
                          const ants = simState.Ants.filter(
                            (a) => a.r === r && a.c === c,
                          );
                          const phers = simState.Pheromones.filter(
                            (p) => p.r === r && p.c === c,
                          );

                          let bgClass = "bg-slate-800";
                          if (showFood && food && food.amt > 0)
                            bgClass = "bg-green-900/40";
                          else if (showPheromones && phers.length > 0)
                            bgClass = "bg-blue-900/40";

                          return (
                            <div
                              key={idx}
                              className={`w-10 h-10 ${bgClass} border border-slate-700 rounded relative flex items-center justify-center group cursor-pointer hover:border-slate-400`}
                              title={`R:${r} C:${c}`}
                            >
                              {nest && (
                                <span
                                  className="absolute text-lg z-10"
                                  style={{ bottom: "0px" }}
                                >
                                  🏠
                                </span>
                              )}
                              {showFood && food && food.amt > 0 && !nest && (
                                <span className="absolute text-green-400 text-xs font-bold top-0 right-0 p-0.5">
                                  {food.amt}
                                </span>
                              )}
                              {showPheromones && phers.length > 0 && !nest && (
                                <span className="absolute w-2 h-2 rounded-full bg-blue-500/80 bottom-1 left-1 blur-[1px]"></span>
                              )}

                              {showAnts && ants.length > 0 && (
                                <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                                  <span className="text-xl">🐜</span>
                                  {ants.length > 1 && (
                                    <span className="absolute -top-1 -right-1 bg-red-500 text-[9px] font-bold px-1 rounded-full">
                                      {ants.length}
                                    </span>
                                  )}
                                </div>
                              )}

                              <div className="hidden group-hover:block absolute z-50 top-full left-1/2 -translate-x-1/2 mt-1 w-48 bg-slate-900 text-xs p-2 rounded shadow-xl border border-slate-600 pointer-events-none">
                                <div className="font-bold border-b border-slate-700 mb-1 pb-1">
                                  Cell ({r}, {c})
                                </div>
                                {nest && <div>Nest: {nest.food} Food</div>}
                                {food && <div>Food: {food.amt}</div>}
                                {ants.length > 0 && (
                                  <div>
                                    Ants: {ants.length} (
                                    {
                                      ants.filter((a) => a.type === "queen")
                                        .length
                                    }
                                    Q,{" "}
                                    {
                                      ants.filter((a) => a.type === "worker")
                                        .length
                                    }
                                    W)
                                  </div>
                                )}
                                {phers.length > 0 && (
                                  <div>
                                    Pheromones: {phers.length} (Max Str:{" "}
                                    {Math.max(...phers.map((p) => p.s))})
                                  </div>
                                )}
                                {!nest &&
                                  !food &&
                                  ants.length === 0 &&
                                  phers.length === 0 && (
                                    <div className="text-slate-500">Empty</div>
                                  )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="text-slate-500 italic">
                        Grid visualization will appear when Simulation
                        initializes.
                      </div>
                    )
                  ) : inspectorViewRoot?.node ? (
                    <div className="mx-auto flex h-full w-full max-w-6xl flex-col gap-4">
                      <div className="flex flex-wrap items-center gap-2 text-xs">
                        {inspectorBreadcrumbs.map((crumb, index) => (
                          <React.Fragment key={`${crumb.label}-${index}`}>
                            {index > 0 && (
                              <span className="text-slate-500">/</span>
                            )}
                            <button
                              onClick={() => setInspectorPath(crumb.path)}
                              className={`px-2 py-1 rounded border ${index === inspectorBreadcrumbs.length - 1 ? "border-sky-500 bg-sky-900/40 text-sky-100" : "border-slate-600 bg-slate-900/60 text-slate-300 hover:border-sky-500"}`}
                            >
                              {crumb.label}
                            </button>
                          </React.Fragment>
                        ))}
                        {inspectorPath.length > 0 && (
                          <button
                            onClick={() => setInspectorPath([])}
                            className="ml-auto px-2 py-1 rounded border border-slate-600 text-slate-300 hover:border-sky-500"
                          >
                            Reset Focus
                          </button>
                        )}
                      </div>

                      <div className="rounded-lg border border-slate-600 bg-slate-900/80 p-4">
                        <div className="text-[11px] uppercase tracking-wider text-slate-500">
                          {activeInspectorView?.label || "Inspector"}
                        </div>
                        <div className="mt-2 flex flex-wrap items-center justify-between gap-2">
                          <h3 className="text-lg font-bold text-white">
                            {activeInspectorNode?.type || "Value"}
                          </h3>
                          {isInspectorCompound(activeInspectorNode) && (
                            <span className="text-xs text-slate-400">
                              {inspectorChildren.length} visible children
                            </span>
                          )}
                        </div>
                        <p className="mt-1 text-sm text-slate-300">
                          {formatInspectorValue(activeInspectorNode)}
                        </p>
                        {activeInspectorNode?.truncated && (
                          <div className="mt-3 text-xs text-amber-300">
                            Showing the first 120 entries in this collection.
                          </div>
                        )}
                        {!isInspectorCompound(activeInspectorNode) && (
                          <pre className="mt-3 whitespace-pre-wrap rounded bg-black/40 p-3 text-xs text-emerald-300">
                            {formatInspectorPrimitive(activeInspectorNode)}
                          </pre>
                        )}
                      </div>

                      {isInspectorCompound(activeInspectorNode) ? (
                        inspectorChildren.length > 0 ? (
                          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
                            {inspectorChildren.map((child, index) => {
                              const childNode = child.value;
                              const canOpen = isInspectorCompound(childNode);
                              const cardClasses = `rounded-lg border p-3 text-left transition-colors ${canOpen ? "border-slate-600 bg-slate-900/70 hover:border-sky-500 cursor-pointer" : "border-slate-700 bg-slate-900/40"}`;

                              if (canOpen) {
                                return (
                                  <button
                                    key={`${child.label}-${index}`}
                                    onClick={() =>
                                      setInspectorPath([
                                        ...inspectorPath,
                                        { index, label: child.label },
                                      ])
                                    }
                                    className={cardClasses}
                                  >
                                    <div className="flex items-start justify-between gap-2">
                                      <span className="font-semibold text-slate-100 break-all">
                                        {child.label}
                                      </span>
                                      <span className="text-[10px] uppercase tracking-wider text-slate-500">
                                        {childNode.type}
                                      </span>
                                    </div>
                                    <div className="mt-2 text-xs text-slate-300">
                                      {formatInspectorValue(childNode)}
                                    </div>
                                    <div className="mt-3 text-[11px] text-sky-300">
                                      Open
                                    </div>
                                  </button>
                                );
                              }

                              return (
                                <div
                                  key={`${child.label}-${index}`}
                                  className={cardClasses}
                                >
                                  <div className="flex items-start justify-between gap-2">
                                    <span className="font-semibold text-slate-100 break-all">
                                      {child.label}
                                    </span>
                                    <span className="text-[10px] uppercase tracking-wider text-slate-500">
                                      {childNode?.type || "value"}
                                    </span>
                                  </div>
                                  <div className="mt-2 text-xs text-emerald-300 break-all whitespace-pre-wrap">
                                    {formatInspectorPrimitive(childNode)}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="text-slate-500 italic">
                            No inspectable values are available at this scope.
                          </div>
                        )
                      ) : null}
                    </div>
                  ) : (
                    <div className="text-slate-500 italic">
                      Attribute inspection becomes available once execution
                      reaches a live scope or object instance.
                    </div>
                  )}
                </div>
              </div>

              {/* Drag handle: top ↕ bottom (right side) */}
              <div
                className="resize-handle-row"
                onMouseDown={(e) => { e.preventDefault(); resizeDragRef.current = 'row-right'; document.body.style.cursor = 'row-resize'; document.body.style.userSelect = 'none'; }}
              >
                <div className="resize-bar" style={{ height: '3px', width: '48px' }} />
              </div>

              {/* Bottom row */}
              <div ref={bottomRowRef} className="flex flex-1 overflow-hidden">
              {/* PANEL 3: Class Diagram */}
              <div className="bg-slate-800 rounded-lg shadow border border-slate-700 flex flex-col overflow-hidden flex-shrink-0" style={{ width: `calc(${bottomLeftWidth}% - 6px)` }}>
                <div className="bg-slate-900 py-2 px-4 border-b border-slate-700 text-slate-400 text-xs">
                  <div className="font-bold uppercase tracking-wider">
                    Class Diagram Context
                  </div>
                  <div className="mt-1 text-[11px] normal-case tracking-normal text-slate-500">
                    Live from the current editor: {diagramModel.classes.length}{" "}
                    classes detected
                  </div>
                </div>
                <div className="flex-1 overflow-auto p-4">
                  <div className="mx-auto min-h-[420px] min-w-[320px]">
                    <UmlDiagram
                      currentClass={currentClass}
                      diagramModel={diagramModel}
                    />
                  </div>
                </div>
              </div>

              {/* Drag handle: Panel 3 ↔ Panel 4 */}
              <div
                className="resize-handle-col"
                onMouseDown={(e) => { e.preventDefault(); resizeDragRef.current = 'col-bottom'; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; }}
              >
                <div className="resize-bar" style={{ width: '3px', height: '48px' }} />
              </div>

              {/* PANEL 4: Explanation & Output */}
              <div className="bg-slate-800 rounded-lg shadow border border-slate-700 flex flex-col overflow-hidden flex-1">
                <div className="flex bg-slate-900 border-b border-slate-700">
                  <div className="py-2 px-4 font-bold uppercase tracking-wider text-blue-400 text-xs border-r border-slate-700 w-1/2">
                    Execution Insight
                  </div>
                  <div className="py-2 px-4 font-bold uppercase tracking-wider text-emerald-400 text-xs w-1/2">
                    Console Output
                  </div>
                </div>

                <div className="flex-1 flex overflow-hidden">
                  {/* Context Box */}
                  <div className="w-1/2 border-r border-slate-700 p-4 bg-slate-800/50 overflow-auto">
                    <h3 className="text-sm font-bold text-white mb-2">
                      {currentClass
                        ? `${currentClass}.${currentFunc}()`
                        : currentFunc
                          ? `${currentFunc}()`
                          : "Global Scope"}
                    </h3>
                    <p className="text-slate-300 leading-relaxed">
                      {currentFunc
                        ? getExplanation(currentFunc, currentClass)
                        : "Waiting for simulation to step into a defined function..."}
                    </p>
                  </div>

                  {/* Terminal Output */}
                  <div
                    className="w-1/2 p-2 bg-black font-mono text-[11px] text-green-400 overflow-auto"
                    ref={outputRef}
                  >
                    <pre className="whitespace-pre-wrap">{outputLog}</pre>
                    {!outputLog && (
                      <span className="text-slate-600">No output yet...</span>
                    )}
                  </div>
                </div>
              </div>
              </div>{/* end bottom row */}
              </div>{/* end right side */}
            </div>{/* end main container */}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
