<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQA A Level Computer Science - Mastery Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- KaTeX for Math Rendering -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />

    <script>
      /**
       * Safely renders LaTeX math in the provided element.
       * Checks for both the element's existence and the KaTeX library.
       */
      function renderMath(element) {
        const target = element || document.body;
        if (!target || !window.renderMathInElement) return;

        try {
          window.renderMathInElement(target, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
            ],
            throwOnError: false,
          });
        } catch (e) {
          console.error("KaTeX rendering error:", e);
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }

      .option-card {
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .option-card:hover:not(.disabled) {
        transform: translateY(-2px);
        background-color: #1e293b;
        border-color: #38bdf8;
      }

      .correct {
        background-color: #065f46 !important;
        border-color: #10b981 !important;
        color: #ecfdf5 !important;
      }

      .incorrect {
        background-color: #7f1d1d !important;
        border-color: #ef4444 !important;
        color: #fef2f2 !important;
      }

      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .progress-bar {
        transition: width 0.4s ease-in-out;
      }

      .katex {
        font-size: 1.1em;
      }
    </style>
  
  <style id="global-home-link-style">
    .global-home-link {
      display: inline-block;
      margin: 0.75rem 0 0 0.75rem;
      font-size: 0.85rem;
      color: inherit;
      opacity: 0.8;
      text-decoration: none;
    }
    .global-home-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4">
  <a class="global-home-link" href="index.html">&larr; Back to Learning Demos</a>

    <div class="w-full max-w-4xl mb-8">
      <div class="flex justify-between items-end mb-2">
        <div>
          <h1 class="text-2xl font-extrabold text-sky-400 tracking-tight">
            AQA A LEVEL COMPUTER SCIENCE
          </h1>
          <p
            id="topic-label"
            class="text-slate-400 text-sm font-semibold uppercase tracking-widest"
          >
            Topic: Mixed Specification Review
          </p>
        </div>
        <div class="text-right">
          <span id="progress-text" class="text-lg font-bold text-sky-400"
            >Question 1/24</span
          >
        </div>
      </div>
      <div
        class="w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700"
      >
        <div
          id="progress-fill"
          class="progress-bar h-full bg-gradient-to-r from-sky-500 to-indigo-500"
          style="width: 4%"
        ></div>
      </div>
    </div>

    <main
      id="quiz-container"
      class="w-full max-w-4xl bg-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-800 relative overflow-hidden"
    >
      <div id="question-content" class="fade-in">
        <h2 id="question-text" class="text-3xl font-bold mb-8 leading-tight">
          Loading question...
        </h2>

        <div
          id="options-grid"
          class="grid grid-cols-1 md:grid-cols-2 gap-4"
        ></div>

        <div id="feedback-area" class="mt-8 hidden">
          <div
            id="feedback-message"
            class="p-4 rounded-xl font-semibold flex items-center gap-3"
          ></div>

          <div class="mt-6 flex justify-end">
            <button
              id="next-btn"
              class="bg-sky-500 hover:bg-sky-400 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg hidden"
            >
              Next Question 
            </button>
          </div>
        </div>
      </div>
    </main>

    <div class="mt-8 text-slate-500 text-sm text-center">
      Designed for Classroom Display • AQA Specification Alignment
    </div>

    <script>
      const questions = [
            {
                text: "Which logic gate outputs a 1 if and only if both inputs are different?",
                options: ["AND", "OR", "XOR", "NAND"],
                correct: 2,
                feedback: "Correct! The XOR (Exclusive OR) gate outputs 1 only when inputs are 1 and 0, or 0 and 1."
            },
            {
                text: "Simplify the Boolean expression using De Morgan's Laws: $\\overline{\\overline{A} + \\overline{B}}$",
                options: ["$A + B$", "$A \\cdot B$", "$\\overline{A \\cdot B}$", "$1$"],
                correct: 1,
                feedback: "Correct! Breaking the bar over the $+$ changes it to $\\cdot$, and double negations cancel out, resulting in $A \\cdot B$."
            },
            {
                text: "What are the Boolean expressions for the Sum ($S$) and Carry ($C$) outputs of a Half-Adder?",
                options: ["$S = A + B,\\; C = A \\cdot B$", "$S = A \\oplus B,\\; C = A \\cdot B$", "$S = A \\cdot B,\\; C = A \\oplus B$", "$S = A \\oplus B,\\; C = A + B$"],
                correct: 1,
                feedback: "Correct! The Sum is generated by an XOR gate ($A \\oplus B$) and the Carry is generated by an AND gate ($A \\cdot B$)."
            },
            {
                text: "How many inputs does a standard Full-Adder circuit have?",
                options: ["1", "2", "3", "4"],
                correct: 2,
                feedback: "Correct! A Full-Adder takes 3 inputs: $A$, $B$, and a Carry-In ($C_{in}$) from a previous less significant bit."
            },
            {
                text: "What is the primary function of a D-type flip-flop?",
                options: ["To add two bits together", "To store one bit of data and delay it by one clock cycle", "To invert a digital signal", "To multiply the clock frequency"],
                correct: 1,
                feedback: "Correct! A D-type flip-flop is a sequential logic circuit used to store 1 bit of data, synchronised to a clock signal."
            },
            {
                text: "In a positive edge-triggered D-type flip-flop, when does the output $Q$ change to match the data input $D$?",
                options: ["When the clock signal is 0", "When the clock signal is 1", "On the falling edge of the clock signal", "On the rising edge of the clock signal"],
                correct: 3,
                feedback: "Correct! 'Positive edge-triggered' means the state only updates at the exact moment the clock changes from 0 to 1 (the rising edge)."
            },
            {
                text: "In a Binary Search Tree (BST), where must a new node with a value less than the root node be placed?",
                options: ["In the left subtree", "In the right subtree", "At the root", "As a sibling to the root"],
                correct: 0,
                feedback: "Correct! In a BST, values less than the parent node are always placed in the left subtree."
            },
            {
                text: "Which tree traversal algorithm will output the nodes of a Binary Search Tree in ascending numerical order?",
                options: ["Pre-order", "In-order", "Post-order", "Breadth-first"],
                correct: 1,
                feedback: "Correct! In-order traversal visits the Left child, then the Root, then the Right child, resulting in a sorted output for a BST."
            },
            {
                text: "Performing a post-order traversal on a mathematical expression tree produces which type of notation?",
                options: ["Infix notation", "Prefix notation", "Reverse Polish Notation (RPN)", "Boolean notation"],
                correct: 2,
                feedback: "Correct! Post-order traversal (Left, Right, Root) yields postfix notation, also known as Reverse Polish Notation (RPN)."
            },
            {
                text: "If a complete binary tree is represented as a 0-indexed array, where is the left child of a node at index $i$ located?",
                options: ["$i + 1$", "$2i$", "$2i + 1$", "$2i + 2$"],
                correct: 2,
                feedback: "Correct! For a 0-indexed array, the left child is at $2i + 1$ and the right child is at $2i + 2$."
            },
            {
                text: "If the values `[50, 30, 70, 20, 40]` are sequentially inserted into an initially empty Binary Search Tree, what will be the parent node of `40`?",
                options: ["20", "30", "50", "70"],
                correct: 1,
                feedback: "Correct! `50` is the root. `30` goes left. `40` is less than 50 (left) but greater than 30 (right), so it becomes the right child of `30`."
            },
            {
                text: "In the context of internetworking, what does 'URL' stand for?",
                options: ["Universal Routing Link", "Uniform Resource Locator", "Unified Resource Link", "Universal Relay Locator"],
                correct: 1,
                feedback: "Correct! A URL (Uniform Resource Locator) specifies the location of a web resource and the protocol used to retrieve it."
            },
            {
                text: "In the address `https://www.example.co.uk/index.html`, which part is the Fully Qualified Domain Name (FQDN)?",
                options: ["`https://`", "`www.example.co.uk`", "`example.co.uk`", "`/index.html`"],
                correct: 1,
                feedback: "Correct! The FQDN specifies the exact device/host (`www`) within the domain (`example.co.uk`)."
            },
            {
                text: "What is the primary function of the Domain Name System (DNS)?",
                options: ["To assign MAC addresses", "To host web pages", "To translate fully-qualified domain names into IP addresses", "To encrypt web traffic"],
                correct: 2,
                feedback: "Correct! DNS acts like a phonebook for the Internet, converting human-readable domain names into machine-readable IP addresses."
            },
            {
                text: "What essential service is provided by Internet Registries?",
                options: ["They manufacture network routers", "They allocate IP addresses and manage domain names", "They provide home broadband connections", "They act as global firewalls"],
                correct: 1,
                feedback: "Correct! Organizations like RIRs (Regional Internet Registries) allocate IP address blocks and ensure domain names are uniquely registered."
            },
            {
                text: "Which statement best describes the role of packet switching on the Internet?",
                options: ["A dedicated circuit is established for the entire session", "Packets travel together taking the exact same route", "Data is split into packets that are routed independently", "It is only used for analog voice calls"],
                correct: 2,
                feedback: "Correct! In packet switching, each packet finds its own best path to the destination, maximizing network efficiency."
            },
            {
                text: "Which of the following data is typically found in the header of a network packet?",
                options: ["The actual webpage content", "The Sender and Receiver IP addresses", "The sender's MAC address only", "The router's entire routing table"],
                correct: 1,
                feedback: "Correct! The header contains control information, including source and destination IP addresses, sequence numbers, and checksums."
            },
            {
                text: "When is a Gateway required instead of a standard Router?",
                options: ["When connecting two networks that use different protocols", "When connecting computers within the same LAN", "When broadcasting a wireless signal", "When resolving domain names"],
                correct: 0,
                feedback: "Correct! While routers connect networks using the same protocol (like IP), gateways translate data between completely different network protocols."
            },
            {
                text: "How is routing achieved across the Internet?",
                options: ["By broadcasting packets to all connected networks", "By checking MAC addresses against a switch table", "By using routing tables to determine the best next hop", "By querying the DNS server for every packet"],
                correct: 2,
                feedback: "Correct! Routers inspect the destination IP and use their routing tables to forward the packet to the next optimal router along the path."
            },
            {
                text: "Simplify the Boolean expression $A \\cdot (A + B)$",
                options: ["$A$", "$B$", "$A + B$", "$1$"],
                correct: 0,
                feedback: "Correct! Expanding gives $A\\cdot A + A\\cdot B$, which is $A + AB$. Factoring out $A$ gives $A(1 + B)$. Since $1 + B = 1$, the result is $A \\cdot 1 = A$."
            }
        ];

      let currentQuestionIndex = 0;
      let canProgress = false;

      const questionText = document.getElementById("question-text");
      const optionsGrid = document.getElementById("options-grid");
      const feedbackArea = document.getElementById("feedback-area");
      const feedbackMessage = document.getElementById("feedback-message");
      const nextBtn = document.getElementById("next-btn");
      const progressFill = document.getElementById("progress-fill");
      const progressText = document.getElementById("progress-text");

      function loadQuestion() {
        const q = questions[currentQuestionIndex];
        canProgress = false;

        const progressPercent =
          ((currentQuestionIndex + 1) / questions.length) * 100;
        progressFill.style.width = `${progressPercent}%`;
        progressText.innerText = `Question ${currentQuestionIndex + 1}/${questions.length}`;

        questionText.innerHTML = q.text.replace(/\n/g, "<br>");

        optionsGrid.innerHTML = "";
        feedbackArea.classList.add("hidden");
        nextBtn.classList.add("hidden");

        q.options.forEach((opt, index) => {
          const button = document.createElement("div");
          button.className =
            "option-card bg-slate-800 border-2 border-slate-700 p-6 rounded-2xl flex items-center gap-4 text-xl font-medium";
          button.innerHTML = `
                    <span class="w-10 h-10 flex-shrink-0 flex items-center justify-center bg-slate-700 rounded-lg text-sm font-bold text-slate-400">${String.fromCharCode(65 + index)}</span>
                    <span class="opt-content">${opt}</span>
                `;
          button.onclick = () => handleAnswer(index, button);
          optionsGrid.appendChild(button);
        });

        renderMath(document.body);

        const container = document.getElementById("question-content");
        container.classList.remove("fade-in");
        void container.offsetWidth;
        container.classList.add("fade-in");
      }

      function handleAnswer(index, element) {
        if (canProgress) return;

        const q = questions[currentQuestionIndex];
        const isCorrect = index === q.correct;

        if (isCorrect) {
          element.classList.add("correct");
          showFeedback(true, q.feedback);
          canProgress = true;
          nextBtn.classList.remove("hidden");

          Array.from(optionsGrid.children).forEach((child) => {
            if (child !== element)
              child.classList.add("opacity-30", "disabled");
          });
        } else {
          element.classList.add("incorrect");
          showFeedback(false, "Incorrect. Consider the logic and try again.");
          setTimeout(() => {
            if (!canProgress) element.classList.remove("incorrect");
          }, 1200);
        }
      }

      function showFeedback(isCorrect, message) {
        feedbackArea.classList.remove("hidden");
        feedbackMessage.className = `p-4 rounded-xl font-semibold flex items-center gap-3 ${isCorrect ? "bg-emerald-900/30 text-emerald-400" : "bg-rose-900/30 text-rose-400"}`;

        const icon = isCorrect
          ? '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
          : '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';

        feedbackMessage.innerHTML = `${icon} <span>${message}</span>`;
        renderMath(feedbackMessage);
      }

      nextBtn.onclick = () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
          loadQuestion();
        } else {
          showFinalResults();
        }
      };

      function showFinalResults() {
        document.getElementById("quiz-container").innerHTML = `
                <div class="text-center py-12 fade-in">
                    <div class="inline-block p-4 bg-sky-500/10 rounded-full mb-6">
                        <svg class="w-16 h-16 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <h2 class="text-5xl font-extrabold mb-4">Mastery Complete!</h2>
                    <p class="text-slate-400 text-xl mb-8">You have successfully reviewed the A Level fundamental concepts.</p>
                    <button onclick="location.reload()" class="bg-white text-slate-900 font-bold py-4 px-10 rounded-2xl hover:bg-slate-200 transition-all text-lg shadow-xl">
                        Restart Session
                    </button>
                </div>
            `;
      }

      window.onload = loadQuestion;
    </script>
  </body>
</html>
