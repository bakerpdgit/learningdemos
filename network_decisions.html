<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQA A-Level CS: Network Decision Making</title>
    <!-- React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f3f4f6;
      }
      .fade-in {
        animation: fadeIn 0.5s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .packet-move {
        animation: slideRight 1s forwards;
      }
      @keyframes slideRight {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(100px);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // --- REUSABLE COMPONENTS ---

      // SVG Icons
      const Icons = {
        Server: () => (
          <svg
            className="w-10 h-10 text-gray-700"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth="2"
              d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"
            ></path>
          </svg>
        ),
        Router: () => (
          <svg
            className="w-10 h-10 text-blue-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth="2"
              d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
            ></path>
          </svg>
        ),
        Firewall: () => (
          <svg
            className="w-10 h-10 text-red-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth="2"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
            ></path>
          </svg>
        ),
        Globe: () => (
          <svg
            className="w-10 h-10 text-green-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth="2"
              d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"
            ></path>
          </svg>
        ),
        Packet: ({ color = "bg-blue-500", text = "Data" }) => (
          <div
            className={`flex items-center justify-center text-xs font-bold text-white ${color} p-1 rounded shadow-md border border-gray-800`}
            style={{ minWidth: "50px" }}
          >
            {text}
          </div>
        ),
        DetailedPacket: ({
          color = "bg-blue-500",
          src,
          dest,
          payload = "Payload",
        }) => (
          <div
            className={`flex flex-col text-xs font-bold text-white shadow-md border border-gray-800 rounded overflow-hidden z-10 relative`}
            style={{ minWidth: "130px" }}
          >
            <div
              className={`${color} p-1 border-b border-white border-opacity-30 flex flex-col gap-1 text-left`}
            >
              <div>
                <span className="opacity-75 font-normal ml-1">Src:</span> {src}
              </div>
              <div>
                <span className="opacity-75 font-normal ml-1">Dst:</span> {dest}
              </div>
            </div>
            <div className="bg-gray-200 text-gray-800 p-1 text-center font-semibold">
              {payload}
            </div>
          </div>
        ),
      };

      // Interactive Question Component
      const QuestionBlock = ({
        question,
        type = "text",
        options = [],
        correctAnswer,
        explanation,
        onCorrect,
        onCorrectStart,
        stepKey,
      }) => {
        const [answer, setAnswer] = useState("");
        const [status, setStatus] = useState("idle"); // idle, wrong, correct, revealed
        const [isChecking, setIsChecking] = useState(false);
        const [isFlashing, setIsFlashing] = useState(false);

        // Reset when step changes
        useEffect(() => {
          setAnswer("");
          setStatus("idle");
          setIsChecking(false);
          setIsFlashing(false);
        }, [stepKey]);

        const handleSubmit = async () => {
          if (isChecking) return;
          const cleanUserAnswer = answer.trim().toLowerCase();
          const cleanCorrectAnswer = correctAnswer.trim().toLowerCase();

          if (cleanUserAnswer === cleanCorrectAnswer) {
            setIsChecking(true);
            setStatus("correct");

            if (onCorrectStart) {
              await onCorrectStart();
            }

            setIsFlashing(true);
            setTimeout(() => {
              setIsFlashing(false);
              setIsChecking(false);
              onCorrect();
            }, 250);
          } else {
            setStatus("wrong");
          }
        };

        const handleRevealClick = () => {
          setStatus("revealed");
          setAnswer(correctAnswer);
        };

        const handleSolutionOk = () => {
          setStatus("correct");
          onCorrect(); // skip animation triggers if they had to view solution
        };

        return (
          <div className="bg-white p-4 rounded-lg shadow-md border-l-4 border-blue-500 my-4 fade-in relative">
            <p className="font-semibold text-gray-800 mb-3">{question}</p>

            <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
              {type === "text" && (
                <input
                  type="text"
                  className="border rounded p-2 flex-grow focus:outline-blue-500 w-full sm:w-auto"
                  placeholder="Type your answer here..."
                  value={answer}
                  onChange={(e) => setAnswer(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") handleSubmit();
                  }}
                  disabled={
                    status === "correct" || status === "revealed" || isChecking
                  }
                />
              )}
              {type === "select" && (
                <select
                  className="border rounded p-2 flex-grow focus:outline-blue-500 w-full sm:w-auto"
                  value={answer}
                  onChange={(e) => setAnswer(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") handleSubmit();
                  }}
                  disabled={
                    status === "correct" || status === "revealed" || isChecking
                  }
                >
                  <option value="">-- Select an option --</option>
                  {options.map((opt) => (
                    <option key={opt} value={opt}>
                      {opt}
                    </option>
                  ))}
                </select>
              )}

              {(status !== "correct" || isFlashing || isChecking) &&
                status !== "revealed" && (
                  <button
                    onClick={handleSubmit}
                    className={
                      isFlashing
                        ? "bg-green-500 text-white font-bold py-2 px-4 rounded w-full sm:w-auto transition-colors duration-150"
                        : "bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full sm:w-auto transition-colors duration-150"
                    }
                    disabled={status === "correct" || isChecking}
                  >
                    {isFlashing ? "Correct!" : "Check Answer"}
                  </button>
                )}
            </div>

            {(status === "wrong" || status === "revealed") && (
              <div className="mt-3 text-red-600 flex items-center justify-between bg-red-50 p-2 rounded">
                <span>Incorrect. Review the table/diagram and try again.</span>
                {status === "wrong" && (
                  <button
                    onClick={handleRevealClick}
                    className="text-sm underline hover:text-red-800 font-semibold"
                  >
                    View Solution
                  </button>
                )}
              </div>
            )}

            {status === "revealed" && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 transition-opacity">
                <div className="bg-white p-6 rounded-lg shadow-xl max-w-md w-full mx-4 fade-in text-gray-800">
                  <h3 className="text-xl font-bold text-blue-800 mb-2">
                    Solution Required
                  </h3>
                  <p className="mb-4 text-lg">
                    <strong>Correct Answer:</strong> <br />
                    <span className="font-mono bg-gray-100 border px-3 py-1 rounded inline-block mt-2 text-blue-700">
                      {correctAnswer}
                    </span>
                  </p>
                  <p className="text-sm text-gray-700 mb-6 border-t pt-4">
                    {explanation}
                  </p>
                  <button
                    onClick={handleSolutionOk}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-bold transition"
                  >
                    OK, Continue
                  </button>
                </div>
              </div>
            )}

            {status === "correct" && !isFlashing && !isChecking && (
              <div className="mt-3 text-green-700 bg-green-50 p-3 rounded">
                <span className="font-bold flex items-center gap-2">
                  <svg
                    className="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M5 13l4 4L19 7"
                    ></path>
                  </svg>
                  Correct!
                </span>
                {explanation && (
                  <p className="mt-1 text-sm text-gray-700">{explanation}</p>
                )}
              </div>
            )}
          </div>
        );
      };

      // --- SPECIFIC SIMULATIONS ---

      // 1. Firewall Simulation
      const SimFirewall = () => {
        const [step, setStep] = useState(0);
        const [completedSteps, setCompletedSteps] = useState([]);

        const nextStep = () => {
          setCompletedSteps([...completedSteps, step]);
          setStep(step + 1);
        };

        return (
          <div className="fade-in">
            <h2 className="text-2xl font-bold mb-4 text-gray-800">
              Firewall Rules & Stateful Inspection
            </h2>
            <p className="mb-4 text-gray-600">
              A firewall protects a network by analyzing incoming and outgoing
              packets. AQA requires understanding of{" "}
              <b>static packet filtering</b> (checking headers against rules)
              and <b>stateful inspection</b> (remembering active connections).
            </p>

            <div className="flex justify-around items-center bg-gray-100 p-6 rounded-lg shadow-inner mb-6 min-h-[140px]">
              <div className="text-center">
                <Icons.Globe />
                <p className="text-xs font-bold mt-1">Internet</p>
              </div>
              <div className="flex-grow flex justify-center">
                {step === 0 && (
                  <Icons.DetailedPacket
                    color="bg-red-500"
                    src="18.2.4.5:80"
                    dest="192.168.1.100"
                    payload="Data"
                  />
                )}
                {step >= 1 && (
                  <Icons.DetailedPacket
                    color="bg-green-500"
                    src="8.8.8.8:443"
                    dest="192.168.1.100"
                    payload="Data"
                  />
                )}
              </div>
              <div className="text-center">
                <Icons.Firewall />
                <p className="text-xs font-bold mt-1">Firewall</p>
              </div>
              <div className="flex-grow"></div>
              <div className="text-center">
                <Icons.Server />
                <p className="text-xs font-bold mt-1">LAN</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
              <div>
                <h3 className="font-bold bg-gray-200 p-2 rounded-t">
                  Static Packet Filtering Rules
                </h3>
                <table className="w-full text-sm text-left border">
                  <thead className="bg-gray-50 border-b">
                    <tr>
                      <th>Rule</th>
                      <th>Source IP</th>
                      <th>Source Port</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr className={step === 0 ? "bg-yellow-100" : ""}>
                      <td>1</td>
                      <td>18.2.4.5</td>
                      <td>Any</td>
                      <td className="text-red-600 font-bold">DROP</td>
                    </tr>
                    <tr>
                      <td>2</td>
                      <td>Any</td>
                      <td>22</td>
                      <td className="text-red-600 font-bold">DROP</td>
                    </tr>
                    <tr>
                      <td>3</td>
                      <td>Any</td>
                      <td>Any</td>
                      <td className="text-green-600 font-bold">ACCEPT</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div>
                <h3 className="font-bold bg-gray-200 p-2 rounded-t">
                  Stateful Inspection Table
                </h3>
                <table className="w-full text-sm text-left border">
                  <thead className="bg-gray-50 border-b">
                    <tr>
                      <th>Session ID</th>
                      <th>External IP</th>
                      <th>State</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>S-101</td>
                      <td>203.0.113.1</td>
                      <td>Established</td>
                    </tr>
                    <tr className={step >= 1 ? "bg-yellow-100" : ""}>
                      <td>S-102</td>
                      <td>8.8.8.8</td>
                      <td>Established</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            {step === 0 && (
              <QuestionBlock
                stepKey="fw0"
                question="An incoming packet arrives from IP 18.2.4.5 on Port 80. Based on top-down processing of the Static Rules, what action will the firewall take?"
                type="select"
                options={["ACCEPT", "DROP"]}
                correctAnswer="DROP"
                explanation="Correct. Static packet filtering evaluates rules sequentially. Rule 1 matches the Source IP and drops the packet."
                onCorrect={nextStep}
              />
            )}
            {step === 1 && (
              <QuestionBlock
                stepKey="fw1"
                question="A new packet arrives from 8.8.8.8. It does not match an explicit static ACCEPT rule for its specific port, but the firewall allows it through. By looking at the Stateful Inspection Table, what is the status of the connection with 8.8.8.8?"
                type="select"
                options={["Blocked", "Established", "Unknown"]}
                correctAnswer="Established"
                explanation="Correct! Stateful inspection (or dynamic packet filtering) remembers outbound requests. Since an internal device previously requested data from 8.8.8.8, the session is 'Established', allowing the return packet through without needing a specific open port rule."
                onCorrect={nextStep}
              />
            )}
            {step === 2 && (
              <QuestionBlock
                stepKey="fw2"
                question="Since the session with 8.8.8.8 is 'Established', what final action will the firewall take on this returning packet?"
                type="select"
                options={["ACCEPT", "DROP"]}
                correctAnswer="ACCEPT"
                explanation="Correct. The firewall accepts the packet because it belongs to a recognized, actively tracked session, bypassing the default static DROP rule."
                onCorrect={nextStep}
              />
            )}
            {step === 3 && (
              <div className="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative">
                <strong className="font-bold">Simulation Complete!</strong>
                <span className="block sm:inline">
                  {" "}
                  You understand both static rules and state/context checking.
                </span>
              </div>
            )}
          </div>
        );
      };

      // 2. Router Simulation
      const SimRouter = () => {
        const [step, setStep] = useState(0);
        const [packetStyle, setPacketStyle] = useState({
          left: "25%",
          top: "50%",
          transform: "translate(-50%, -50%) scale(1)",
          opacity: 1,
        });
        const [highlightedRow, setHighlightedRow] = useState(null);

        // Animation trigger for Q0
        const handleRouterQ0Correct = async () => {
          setHighlightedRow(1); // highlight Eth3 row
          // Move to router
          setPacketStyle({
            left: "50%",
            top: "50%",
            transform: "translate(-50%, -50%) scale(0.6)",
            opacity: 1,
            transition: "all 1s ease-in-out",
          });
          await new Promise((r) => setTimeout(r, 1000));
          // Move to Eth3
          setPacketStyle({
            left: "90%",
            top: "50%",
            transform: "translate(-50%, -50%) scale(0.2)",
            opacity: 0,
            transition: "all 1s ease-in-out",
          });
          await new Promise((r) => setTimeout(r, 1000));
        };

        return (
          <div className="fade-in">
            <h2 className="text-2xl font-bold mb-4 text-gray-800">
              Standard Router & Routing Tables
            </h2>
            <p className="mb-4 text-gray-600">
              Routers operate at the Network Layer. They read the destination IP
              address of a packet and consult their <b>Routing Table</b> to
              decide the best outbound interface (Next Hop).
            </p>

            <div className="flex justify-center items-center bg-gray-100 p-6 rounded-lg shadow-inner mb-6 relative h-64 overflow-hidden">
              <div className="absolute left-10 top-1/2 transform -translate-y-1/2 text-center">
                <Icons.Server />
                <p className="text-xs font-bold mt-1">Eth0 (LAN 1)</p>
              </div>

              <div className="absolute z-20" style={packetStyle}>
                {step >= 0 && (
                  <Icons.DetailedPacket
                    color="bg-purple-600"
                    src="192.168.1.15"
                    dest="192.168.3.50"
                    payload="Data"
                  />
                )}
              </div>

              <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10">
                <Icons.Router />
                <p className="text-xs font-bold mt-1 text-center">Router</p>
              </div>

              <div className="absolute right-10 top-4 text-center">
                <p className="text-xs font-bold mb-1">Eth1 (LAN 2)</p>
                <Icons.Server />
              </div>
              <div className="absolute right-10 top-1/2 transform -translate-y-1/2 text-center">
                <p className="text-xs font-bold mb-1">Eth3 (LAN 3)</p>
                <Icons.Server />
              </div>
              <div className="absolute right-10 bottom-4 text-center">
                <p className="text-xs font-bold mb-1">Eth2 (Internet)</p>
                <Icons.Globe />
              </div>
            </div>

            <h3 className="font-bold bg-gray-200 p-2 rounded-t mt-4">
              Router 1 - Routing Table
            </h3>
            <table className="w-full text-sm text-left border mb-6">
              <thead className="bg-gray-50 border-b">
                <tr>
                  <th>Network Destination</th>
                  <th>Subnet Mask</th>
                  <th>Next Hop</th>
                  <th>Interface</th>
                  <th>Current Cost Metric</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>192.168.2.0</td>
                  <td>255.255.255.0</td>
                  <td>On-link</td>
                  <td>Eth1</td>
                  <td>10</td>
                </tr>
                <tr
                  className={
                    highlightedRow === 1
                      ? "bg-yellow-200 transition-colors duration-500"
                      : "transition-colors duration-500"
                  }
                >
                  <td>192.168.3.0</td>
                  <td>255.255.255.0</td>
                  <td>On-link</td>
                  <td>Eth3</td>
                  <td>10</td>
                </tr>
                <tr>
                  <td>10.0.0.0</td>
                  <td>255.0.0.0</td>
                  <td>10.0.0.1</td>
                  <td>Eth2</td>
                  <td>20</td>
                </tr>
                <tr>
                  <td>0.0.0.0 (Default)</td>
                  <td>0.0.0.0</td>
                  <td>82.1.1.254</td>
                  <td>Eth2</td>
                  <td>50</td>
                </tr>
              </tbody>
            </table>

            {step === 0 && (
              <QuestionBlock
                stepKey="rt0"
                question="A packet arrives with Destination IP: 192.168.3.50 (Sender: 192.168.1.15). Look at the routing table. Which interface will the router forward this packet out of?"
                type="select"
                options={["Eth1", "Eth2", "Eth3"]}
                correctAnswer="Eth3"
                explanation="Correct. The Destination IP 192.168.3.50 falls within the 192.168.3.0 network. The table shows this is accessible via interface Eth3."
                onCorrectStart={handleRouterQ0Correct}
                onCorrect={() => setStep(1)}
              />
            )}
            {step === 1 && (
              <QuestionBlock
                stepKey="rt1"
                question="If multiple paths to a destination existed in the table, the router would choose the path with the lowest numerical value in which column?"
                type="select"
                options={[
                  "Network Destination",
                  "Subnet Mask",
                  "Next Hop",
                  "Interface",
                  "Current Cost Metric",
                ]}
                correctAnswer="Current Cost Metric"
                explanation="Correct! The metric (often based on hop count, bandwidth, or delay) determines the lowest 'cost' path."
                onCorrect={() => setStep(2)}
              />
            )}
            {step === 2 && (
              <div className="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative">
                <strong className="font-bold">Simulation Complete!</strong>
              </div>
            )}
          </div>
        );
      };

      // 3. Gateway Simulation
      const SimGateway = () => {
        const [step, setStep] = useState(0);

        return (
          <div className="fade-in">
            <h2 className="text-2xl font-bold mb-4 text-gray-800">
              Gateway Protocol Conversion
            </h2>
            <p className="mb-4 text-gray-600">
              AQA emphasizes that while routers connect similar networks, a{" "}
              <b>Gateway</b> connects networks that use{" "}
              <b>different protocols</b>. Because the ethernet header needs
              stripping off, the whole packet needs to be rebuilt because of the
              change of protocol.
            </p>

            <div className="flex justify-around items-center bg-gray-100 p-6 rounded-lg shadow-inner mb-6">
              <div className="text-center w-1/3 border-r border-gray-300">
                <p className="font-bold text-blue-800">Network A</p>
                <p className="text-xs mb-2">Protocol: Ethernet / TCP/IP</p>
                {step === 0 && (
                  <div className="mx-auto w-16 h-8 bg-blue-500 text-white text-xs flex items-center justify-center rounded">
                    Eth Hdr | Data
                  </div>
                )}
              </div>
              <div className="text-center w-1/3">
                <div className="w-16 h-16 bg-purple-600 text-white font-bold rounded-full flex items-center justify-center mx-auto shadow-lg border-4 border-purple-300">
                  GW
                </div>
                {step === 1 && (
                  <div className="mt-2 text-xs font-bold text-purple-700 animate-pulse">
                    Rebuilding...
                  </div>
                )}
              </div>
              <div className="text-center w-1/3 border-l border-gray-300">
                <p className="font-bold text-green-800">Network B</p>
                <p className="text-xs mb-2">Protocol: Frame Relay</p>
                {step >= 2 && (
                  <div className="mx-auto w-16 h-8 bg-green-500 text-white text-xs flex items-center justify-center rounded">
                    FR Hdr | Data
                  </div>
                )}
              </div>
            </div>

            {step === 0 && (
              <QuestionBlock
                stepKey="gw0"
                question="Fill in the blank: A gateway is required here instead of a standard router because Network A and Network B use different _________."
                type="text"
                correctAnswer="protocols"
                explanation="Correct. Gateways act as translators between different network architectures and protocols."
                onCorrect={() => setStep(1)}
              />
            )}
            {step === 1 && (
              <QuestionBlock
                stepKey="gw1"
