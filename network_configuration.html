      // --- FILTER COMPONENT ---
      const FilterMenu = ({ activeTopics, setActiveTopics, applyFilter }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [localTopics, setLocalTopics] = useState(activeTopics);

        useEffect(() => {
          setLocalTopics(activeTopics);
        }, [activeTopics]);

        const toggleTopic = (topicId) => {
          if (localTopics.includes(topicId)) {
            if (localTopics.length > 1)
              setLocalTopics(localTopics.filter((t) => t !== topicId));
            else alert("You must have at least one topic selected.");
          } else {
            setLocalTopics([...localTopics, topicId]);
          }
        };

        const handleApply = () => {
          setActiveTopics(localTopics);
          applyFilter(localTopics);
          setIsOpen(false);
        };

        return (
          <div className="relative">
            <button
              onClick={() => setIsOpen(!isOpen)}
              className="flex items-center space-x-2 bg-indigo-800 text-white border border-indigo-600 px-4 py-2 rounded-lg shadow-sm hover:bg-indigo-700 transition"
            >
              <Icons.Filter />
              <span className="font-medium">Filter Topics</span>
              <Icons.ChevronDown />
            </button>
            {isOpen && (
              <div className="absolute right-0 mt-2 w-64 bg-white border border-gray-200 rounded-lg shadow-2xl z-50">
                <div className="p-4 border-b border-gray-100">
                  <h3 className="font-bold text-gray-800">Select Sub-topics</h3>
                </div>
                <div className="max-h-60 overflow-y-auto p-2">
                  {TOPICS.map((topic) => (
                    <label
                      key={topic.id}
                      className="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer"
                    >
                      <div className="relative flex items-center">
                        <input
                          type="checkbox"
                          className="checkbox-custom opacity-0 absolute h-0 w-0"
                          checked={localTopics.includes(topic.id)}
                          onChange={() => toggleTopic(topic.id)}
                        />
                        <div className="bg-white border-2 border-gray-300 rounded w-5 h-5 flex flex-shrink-0 justify-center items-center mr-2 focus-within:border-indigo-500">
                          <svg
                            className="fill-current hidden w-3 h-3 text-white pointer-events-none"
                            viewBox="0 0 20 20"
                          >
                            <path d="M0 11l2-2 5 5L18 3l2 2L7 18z" />
                          </svg>
                        </div>
                      </div>
                      <span className="text-sm text-gray-700">
                        {topic.label}
                      </span>
                    </label>
                  ))}
                </div>
                <div className="p-3 bg-gray-50 rounded-b-lg border-t border-gray-100">
                  <button
                    onClick={handleApply}
                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition"

      // --- QUESTION COMPONENTS ---

      // 1. Fill in the Blanks
      const FillBlank = ({ question, onComplete, showSolution }) => {
        // Parse: "Text [hint:answer] more text"
        const parts = useMemo(() => {
          const regex = /(\[[^\]]+:[^\]]+\])/g;
          const splitStr = question.question.split(regex);
          return splitStr.map((part, idx) => {
            if (part.startsWith("[") && part.endsWith("]")) {
              const content = part.slice(1, -1);
              const [hint, answer] = content.split(":");
              return { isBlank: true, hint, answer, id: idx };
            }
            return { isBlank: false, text: part, id: idx };
          });
        }, [question.question]);

        const [inputs, setInputs] = useState({});

        const handleChange = (id, val) => {
          setInputs((prev) => ({ ...prev, [id]: val }));
        };

        const handleSubmit = () => {
          let correct = true;
          parts.forEach((p) => {
            if (p.isBlank) {
              const rawUserAns = inputs[p.id] || "";
              const cleanUserAns = rawUserAns.replace(/\s+/g, "").toLowerCase();
              const cleanAns = p.answer.replace(/\s+/g, "").toLowerCase();
              const cleanHint = p.hint.replace(/\s+/g, "").toLowerCase();

              const expectedFull = cleanAns;
              const expectedSuffix = cleanAns.startsWith(cleanHint)
                ? cleanAns.substring(cleanHint.length)
                : cleanAns;

              if (
                cleanUserAns !== expectedFull &&
                cleanUserAns !== expectedSuffix
              ) {
                correct = false;
              }
            }
          });
          onComplete(correct);
        };

        const getDisplayAnswer = (hint, answer) => {
          if (answer.toLowerCase().startsWith(hint.toLowerCase())) {
            return answer.substring(hint.length);
          }
          return answer;
        };

        return (
          <div className="space-y-6 fade-in">
            <p className="text-sm text-indigo-600 font-bold uppercase tracking-wider mb-2">
              Fill in the blanks (First letter provided)
            </p>
            <div className="text-xl leading-loose text-gray-800">
              {parts.map((p) => {
                if (!p.isBlank) return <span key={p.id}>{p.text}</span>;

                const rawUserAns = inputs[p.id] || "";
                const cleanUserAns = rawUserAns
                  .replace(/\s+/g, "")
                  .toLowerCase();
                const cleanAns = p.answer.replace(/\s+/g, "").toLowerCase();
                const cleanHint = p.hint.replace(/\s+/g, "").toLowerCase();
                const expectedSuffix = cleanAns.startsWith(cleanHint)
                  ? cleanAns.substring(cleanHint.length)
                  : cleanAns;

                const isActualCorrect =
                  cleanUserAns === cleanAns || cleanUserAns === expectedSuffix;

                let inputClass = "fib-input w-28 mx-1";
                if (showSolution) {
                  inputClass += isActualCorrect
                    ? " fib-correct"
                    : " fib-incorrect";
                }

                return (
                  <span
                    key={p.id}
                    className="inline-flex items-center bg-gray-100 rounded px-2 mx-1 border border-gray-200"
                  >
                    <span className="text-gray-500 font-bold mr-1">
                      {p.hint}
                    </span>
                    <input
                      type="text"
                      value={
                        showSolution
                          ? getDisplayAnswer(p.hint, p.answer)
                          : rawUserAns
                      }
                      onChange={(e) => handleChange(p.id, e.target.value)}
                      disabled={showSolution}
                      className={inputClass}
                      style={{ width: `${Math.max(4, p.answer.length)}ch` }}
                      autoComplete="off"
                      spellCheck="false"
                    />
                  </span>
                );
              })}
            </div>
            {!showSolution && (
              <button
                onClick={handleSubmit}
                className="mt-6 px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-bold shadow-md"
              >
                Submit Answers
              </button>
            )}
          </div>
        );
      };

      // 2. MCQ / Multi-Select combined logic
      const OptionsQuestion = ({ question, onComplete, showSolution }) => {
        const isMulti = question.type === "multi-select";
        const [selected, setSelected] = useState(isMulti ? [] : null);

        const toggleOpt = (opt) => {
          if (!isMulti) return setSelected(opt);
          if (selected.includes(opt))
            setSelected(selected.filter((o) => o !== opt));
          else setSelected([...selected, opt]);
        };

        const handleSubmit = () => {
          if (isMulti) {
            if (selected.length === 0) return;
            const correctCount = selected.filter((s) =>
              question.correctAnswer.includes(s),
            ).length;
            const isCorrect =
              correctCount === question.correctAnswer.length &&
              selected.length === question.correctAnswer.length;
            onComplete(isCorrect);
          } else {
            if (!selected) return;
            onComplete(selected === question.correctAnswer);
          }
        };

        return (
          <div className="space-y-4 fade-in">
            <p className="text-xl font-semibold text-gray-800">
              {question.question}
            </p>
            <div className="space-y-2">
              {question.options.map((opt, idx) => {
                const isSelected = isMulti
                  ? selected.includes(opt)
                  : selected === opt;
                const isActualCorrect = isMulti
                  ? question.correctAnswer.includes(opt)
                  : question.correctAnswer === opt;

                let itemClass =
                  "w-full text-left p-4 rounded-lg border-2 transition-all flex items-center space-x-3 ";

                if (showSolution) {
                  if (isActualCorrect)
                    itemClass +=
                      "bg-green-100 border-green-500 text-green-900 font-bold";
                  else if (isSelected)
                    itemClass += "bg-red-100 border-red-500 text-red-900";
                  else itemClass += "bg-gray-50 border-gray-200 text-gray-500";
                } else {
                  if (isSelected)
                    itemClass +=
                      "bg-indigo-50 border-indigo-500 text-indigo-900";
                  else
                    itemClass +=
                      "bg-white border-gray-200 text-gray-700 hover:border-indigo-300";
                }

                return (
                  <button
                    key={idx}
                    onClick={() => !showSolution && toggleOpt(opt)}
                    disabled={showSolution}
                    className={itemClass}
                  >
                    {isMulti && (
                      <div
                        className={`w-5 h-5 border-2 rounded flex-shrink-0 flex items-center justify-center ${isSelected ? "border-indigo-500 bg-indigo-500" : "border-gray-400"}`}
                      >
                        {isSelected && (
                          <svg
                            className="w-3 h-3 text-white"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                          >
                            <path
                              strokeLinecap="round"
                              strokeLinejoin="round"
                              strokeWidth="3"
                              d="M5 13l4 4L19 7"
                            ></path>
                          </svg>
                        )}
                      </div>
                    )}
                    <span>{opt}</span>
                  </button>
                );
              })}
            </div>
            {!showSolution && (
              <button
                onClick={handleSubmit}
                disabled={isMulti ? selected.length === 0 : !selected}
                className="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-lg disabled:opacity-50 hover:bg-indigo-700 transition font-bold shadow-md"
              >
                Submit Answer
              </button>
            )}
          </div>
        );
      };

      // 3. Categoriser (Thin/Thick, JSON/XML, Topologies)
      const Categoriser = ({ question, onComplete, showSolution }) => {
        const [answers, setAnswers] = useState(question.items.map(() => null));

        const setVal = (idx, val) => {
          const newAns = [...answers];
          newAns[idx] = val;
          setAnswers(newAns);
        };

        const handleSubmit = () => {
          if (answers.includes(null)) {
            alert("Categorise all items first.");
            return;
          }
          const correct = answers.every(
            (ans, idx) => ans === question.items[idx].type,
          );
          onComplete(correct);
        };

        return (
          <div className="space-y-4 fade-in">
            <p className="text-xl font-semibold text-gray-800">
              {question.question}
            </p>
            <div className="space-y-3">
              {question.items.map((item, idx) => {
                const val = showSolution ? item.type : answers[idx];
                // Apply code formatting for JSON/XML
                const isCode =
                  item.text.includes("{") || item.text.includes("<");
                const rowOptions = item.options || [
                  ...new Set(question.items.map((i) => i.type)),
                ];

                return (
                  <div
                    key={idx}
                    className={`p-4 rounded-lg border-2 flex flex-col md:flex-row items-start md:items-center justify-between transition-colors ${showSolution ? "border-green-400 bg-green-50" : "bg-white border-gray-200"}`}
                  >
                    <span
                      className={`flex-1 mb-3 md:mb-0 pr-4 ${isCode ? "font-mono text-sm bg-gray-100 p-2 rounded text-indigo-900 border border-gray-200" : "font-medium text-gray-700"}`}
                    >
                      {item.text}
                    </span>
                    <div className="flex space-x-2 w-full md:w-auto">
                      {rowOptions.map((typeLabel, tIdx) => {
                        const colors = ["blue", "orange", "purple"];
                        const c = colors[tIdx % colors.length];
                        const isSelected = val === typeLabel;
                        return (
                          <button
                            key={tIdx}
                            disabled={showSolution}
                            onClick={() => setVal(idx, typeLabel)}
                            className={`flex-1 md:flex-none px-4 py-2 md:py-1 rounded border-2 font-bold transition-all whitespace-nowrap
                                                        ${isSelected ? `bg-${c}-600 text-white border-${c}-600` : `bg-white text-${c}-600 border-${c}-600 hover:bg-${c}-50`} 
                                                        ${showSolution && !isSelected ? "opacity-30" : ""}`}
                          >
                            {typeLabel}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            {!showSolution && (
              <button
                onClick={handleSubmit}
                className="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-bold shadow-md"
              >
                Submit Categories
              </button>
            )}
          </div>
        );
      };

      // 4. REST Matcher
      const RestMatcher = ({ question, onComplete, showSolution }) => {
        const methods = ["GET", "POST", "PUT", "DELETE"];
        const crudOpts = ["Create", "Retrieve", "Update", "Delete"];
        const sqlOpts = ["SELECT", "INSERT", "UPDATE", "DELETE"];
        const [answers, setAnswers] = useState({
          GET: { crud: "", sql: "" },
          POST: { crud: "", sql: "" },
          PUT: { crud: "", sql: "" },
          DELETE: { crud: "", sql: "" },
        });

        const handleChange = (method, field, val) =>
          setAnswers((prev) => ({
            ...prev,
            [method]: { ...prev[method], [field]: val },
          }));

        const handleSubmit = () => {
          let allFilled = true;
          methods.forEach((m) => {
            if (!answers[m].crud || !answers[m].sql) allFilled = false;
          });
          if (!allFilled) {
            alert("Please fill all dropdowns.");
            return;
          }

          let correct = true;
          methods.forEach((m) => {
            if (
              answers[m].crud !== question.correctAnswer[m].crud ||
              answers[m].sql !== question.correctAnswer[m].sql
            )
              correct = false;
          });
          onComplete(correct);
        };

        return (
          <div className="space-y-4 fade-in">
            <p className="text-xl font-semibold text-gray-800">
              {question.question}
            </p>
            <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
              <div className="grid grid-cols-3 gap-4 mb-4 font-bold text-gray-600 border-b pb-2 hidden md:grid">
                <div>REST Method</div>
                <div>CRUD Equivalent</div>
                <div>SQL Equivalent</div>
              </div>
              {methods.map((method) => (
                <div
                  key={method}
                  className="grid grid-cols-1 md:grid-cols-3 gap-4 items-center mb-4 p-3 md:p-0 border md:border-0 rounded-lg md:rounded-none bg-gray-50 md:bg-transparent"
                >
                  <div className="font-mono text-lg font-bold text-indigo-700 bg-indigo-100 py-2 px-4 rounded text-center md:inline-block">
                    {method}
                  </div>
                  <select
                    disabled={showSolution}
                    value={
                      showSolution
                        ? question.correctAnswer[method].crud
                        : answers[method].crud
                    }
                    onChange={(e) =>
                      handleChange(method, "crud", e.target.value)
                    }
                    className={`p-2 border rounded-md shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 ${showSolution ? "bg-green-50 border-green-400 font-semibold" : "bg-white"}`}
                  >
                    <option value="" disabled>
                      Select CRUD
                    </option>
                    {crudOpts.map((opt) => (
                      <option key={opt} value={opt}>
                        {opt}
                      </option>
                    ))}
                  </select>
                  <select
                    disabled={showSolution}
                    value={
                      showSolution
                        ? question.correctAnswer[method].sql
                        : answers[method].sql
                    }
                    onChange={(e) =>
                      handleChange(method, "sql", e.target.value)
                    }
                    className={`p-2 border rounded-md shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 ${showSolution ? "bg-green-50 border-green-400 font-semibold" : "bg-white"}`}
                  >
                    <option value="" disabled>
                      Select SQL
                    </option>
                    {sqlOpts.map((opt) => (
                      <option key={opt} value={opt}>
                        {opt}
                      </option>
                    ))}
                  </select>
                </div>
              ))}
            </div>
            {!showSolution && (
              <button
                onClick={handleSubmit}
                className="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-bold shadow-md"
              >
                Submit Matchings
              </button>
            )}
          </div>
        );
      };

      // --- MAIN APP COMPONENT ---
      const App = () => {
        const [activeTopics, setActiveTopics] = useState(
          TOPICS.map((t) => t.id),
        );
        const [unaskedQs, setUnaskedQs] = useState([]);
        const [currentQ, setCurrentQ] = useState(null);

        const [status, setStatus] = useState("idle"); // 'idle', 'incorrect', 'correct'
        const [showSolution, setShowSolution] = useState(false);

        const setupNewPool = (topics) => {
          const pool = ALL_QUESTIONS.filter((q) => topics.includes(q.topic));
          if (pool.length === 0) return;
          const shuffled = [...pool].sort(() => Math.random() - 0.5);
          setUnaskedQs(shuffled.slice(1));
          setCurrentQ(shuffled[0]);
          resetState();
        };

        useEffect(() => {
          setupNewPool(activeTopics);
        }, []);

        const resetState = () => {
          setStatus("idle");
          setShowSolution(false);
        };

        const handleNextQuestion = () => {
          if (unaskedQs.length > 0) {
            const nextQ = unaskedQs[0];
            setUnaskedQs(unaskedQs.slice(1));
            setCurrentQ(nextQ);
          } else {
            setupNewPool(activeTopics);
            alert(
              "You've completed all questions for the selected topics! The pool has been reset.",
            );
          }
          resetState();
        };

        const handleFilterApply = (newTopics) => setupNewPool(newTopics);

        const onQuestionComplete = (isCorrect) => {
          if (isCorrect) {
            setStatus("correct");
            setShowSolution(true);
          } else setStatus("incorrect");
        };

        if (!currentQ)
          return (
            <div className="p-10 text-center text-xl font-bold text-indigo-800 mt-20">
              Loading AQA Interactive...
            </div>
          );

        const topicLabel = TOPICS.find((t) => t.id === currentQ.topic)?.label;

        return (
          <div className="min-h-screen flex flex-col font-sans">
            <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-40">
              <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                  <h1 className="text-2xl font-bold tracking-wide">
                    Network Configuration{" "}
                    <span className="text-indigo-400">Mastery</span>
                  </h1>
                  <p className="text-sm text-slate-400 mt-1">
                    LANs & Web Technologies
                  </p>
                </div>
                <FilterMenu
                  activeTopics={activeTopics}
                  setActiveTopics={setActiveTopics}
                  applyFilter={handleFilterApply}
                />
              </div>
            </header>

            <main className="flex-grow w-full max-w-6xl mx-auto p-4 md:p-8">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                {/* Left Panel: Visuals & Info */}
                <div className="lg:col-span-4 flex flex-col">
                  <div className="bg-white rounded-xl shadow-lg border border-slate-200 p-6 sticky top-24">
                    <div className="mb-4 inline-block bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm font-bold border border-indigo-200">
                      Topic: {topicLabel}
                    </div>
                    <IllustrationPanel topic={currentQ.topic} />
                  </div>
                </div>

                {/* Right Panel: Interactive Question */}
                <div className="lg:col-span-8 flex flex-col">
                  <div className="bg-white rounded-xl shadow-lg p-6 md:p-10 border border-slate-200 relative min-h-[400px] flex flex-col">
                    <div className="flex-grow">
                      {["mcq", "multi-select"].includes(currentQ.type) && (
                        <OptionsQuestion
                          key={currentQ.id}
                          question={currentQ}
                          onComplete={onQuestionComplete}
                          showSolution={showSolution}
                        />
                      )}
                      {currentQ.type === "rest-matcher" && (
                        <RestMatcher
                          key={currentQ.id}
                          question={currentQ}
                          onComplete={onQuestionComplete}
                          showSolution={showSolution}
                        />
                      )}
                      {currentQ.type === "categoriser" && (
                        <Categoriser
                          key={currentQ.id}
                          question={currentQ}
                          onComplete={onQuestionComplete}
                          showSolution={showSolution}
                        />
                      )}
                      {currentQ.type === "fill-blank" && (
                        <FillBlank
                          key={currentQ.id}
                          question={currentQ}
                          onComplete={onQuestionComplete}
                          showSolution={showSolution}
                        />
                      )}
                    </div>

                    {status !== "idle" && (
                      <div
                        className={`mt-8 p-5 rounded-xl border-2 fade-in flex flex-col md:flex-row items-start justify-between shadow-sm gap-6 ${status === "correct" ? "bg-green-50 border-green-200" : "bg-red-50 border-red-200"}`}
                      >
                        <div className="flex items-start space-x-4 flex-1">
                          <div className="mt-1 bg-white rounded-full p-1 shadow-sm flex-shrink-0">
                            {status === "correct" ? (
                              <Icons.Check />
                            ) : (
                              <Icons.X />
                            )}
                          </div>
                          <div className="flex-1">
                            <h3
                              className={`font-bold text-xl ${status === "correct" ? "text-green-800" : "text-red-800"}`}
                            >
                              {status === "correct"
                                ? "Correct!"
                                : "Not quite right."}
                            </h3>
                            {status === "incorrect" && !showSolution && (
                              <p className="text-red-700 mt-1">
                                Review your answer and try again, or view the
                                solution.
                              </p>
                            )}
                            {showSolution && currentQ.explanation && (
                              <div className="mt-3 text-slate-700 bg-white p-4 rounded-lg border border-slate-200 shadow-sm text-sm">
                                <strong className="text-indigo-700">
                                  AQA Mark Scheme / Explanation:
                                </strong>
                                <br />
                                <span className="mt-1 inline-block">
                                  {currentQ.explanation}
                                </span>
                              </div>
                            )}
                          </div>
                        </div>

                        <div className="flex flex-col space-y-2 min-w-[160px] flex-shrink-0">
                          {status === "incorrect" && !showSolution && (
                            <button
                              onClick={() => setShowSolution(true)}
                              className="px-4 py-2 bg-white text-red-600 border border-red-300 rounded-lg font-bold hover:bg-red-100 transition shadow-sm"
                            >
                              Show Solution
                            </button>
                          )}
                          {(status === "correct" || showSolution) && (
                            <button
                              onClick={handleNextQuestion}
                              className="px-6 py-3 bg-slate-800 text-white rounded-lg font-bold shadow-md hover:bg-slate-700 transition flex items-center justify-center space-x-2"
                            >
                              <span>Next Question</span>
                              <svg
                                className="w-5 h-5"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  strokeLinecap="round"
                                  strokeLinejoin="round"
                                  strokeWidth="2"
                                  d="M9 5l7 7-7 7"
                                ></path>
                              </svg>
                            </button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </main>

            <footer className="bg-slate-900 text-slate-400 py-8 text-center text-sm mt-auto border-t border-slate-800">
              <p className="font-bold text-slate-300">
                Designed for AQA Computer Science A-Level
              </p>
              <p className="mt-2 text-xs max-w-2xl mx-auto">
                Topics aligned to Specification: Client-Server & P2P,
                Websockets, Web CRUD/REST Applications, JSON vs XML, Network
                Topologies, and Thin vs Thick Clients.
              </p>
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
