      // --- AUTOMARKING & ENGINE UTILITIES ---
      const generateAllStrings = (alphabet, maxLength) => {
        let result = [""]; // Include empty string
        for (let len = 1; len <= maxLength; len++) {
          let currentLenStrings = [""];
          for (let i = 0; i < len; i++) {
            let nextLenStrings = [];
            for (let str of currentLenStrings) {
              for (let char of alphabet) {
                nextLenStrings.push(str + char);
              }
            }
            currentLenStrings = nextLenStrings;
          }
          result = result.concat(currentLenStrings);
        }
        return result;
      };

      const validateDFA = (fsm, alphabet) => {
        const startStates = fsm.states.filter((s) => s.isStart);
        if (startStates.length === 0)
          return "Error: No start state defined. Select a state and mark it as 'Start'.";
        if (startStates.length > 1)
          return "Error: Multiple start states defined. A DFA can only have one.";

        for (const state of fsm.states) {
          const outgoing = fsm.transitions.filter((t) => t.from === state.id);
          const coveredSymbols = new Set();
          for (const t of outgoing) {
            const symbols = t.label.split(/[\|*,]/).map((s) => s.trim());
            for (const sym of symbols) {
              if (sym === "") continue;
              if (coveredSymbols.has(sym)) {
                return `Error: State '${state.id}' has multiple transitions for symbol '${sym}'. DFAs require exactly one path per symbol.`;
              }
              coveredSymbols.add(sym);
            }
          }
          for (const a of alphabet) {
            if (!coveredSymbols.has(a)) {
              return `Error: State '${state.id}' is missing a transition for symbol '${a}'. A fully defined DFA requires rules for all alphabet possibilities. You may need to create a 'Trap' or 'Dead' state.`;
            }
          }
        }
        return null; // Valid
      };

      const runDFA = (fsm, str) => {
        let currentState = fsm.states.find((s) => s.isStart);
        if (!currentState) return false;
        if (str === "") return currentState.isAccept;

        for (let char of str) {
          const transition = fsm.transitions.find((t) => {
            if (t.from !== currentState.id) return false;
            const symbols = t.label.split(/[\|*,]/).map((x) => x.trim());
            return symbols.includes(char);
          });
          if (!transition) return false;
          currentState = fsm.states.find((s) => s.id === transition.to);
        }
        return currentState.isAccept;
      };

      const testRegex = (regexStr, str) => {
        try {
          // Ensure regex anchors to match full string, exactly as FSM does
          const r = new RegExp("^(" + regexStr + ")$");
          return r.test(str);
        } catch (e) {
          return false;
        }
      };

      const checkRegexValidity = (regexStr) => {
        try {
          new RegExp("^(" + regexStr + ")$");
          return null;
        } catch (e) {
          return "Syntax Error in Regular Expression. Check your parentheses and metacharacters.";
        }
      };

      const runExhaustiveTest = (studentAns, targetRegex, alphabet, mode) => {
        const strings = generateAllStrings(alphabet, 8); // Test up to length 8

        for (let str of strings) {
          let studentResult;
          if (mode === "REGEX") {
            studentResult = testRegex(studentAns, str);
          } else {
            studentResult = runDFA(studentAns, str);
          }

          const targetResult = testRegex(targetRegex, str);

          if (studentResult !== targetResult) {
            const displayStr = str === "" ? "<empty string>" : str;
            if (studentResult && !targetResult) {
              return {
                correct: false,
                msg: `Incorrect. Your answer ACCEPTED the string "${displayStr}", but it should be REJECTED.`,
              };
            } else {
              return {
                correct: false,
                msg: `Incorrect. Your answer REJECTED the string "${displayStr}", but it should be ACCEPTED.`,
              };
            }
          }
        }
        return {
          correct: true,
          msg: "Correct! Your answer perfectly matches the target language requirements.",
        };

      // --- COMPONENTS ---

      const InteractiveFSM = ({ fsm, setFsm, readOnly }) => {
        const svgRef = useRef(null);
        const [mode, setMode] = useState("SELECT"); // SELECT, ADD_STATE, ADD_EDGE
        const [selectedId, setSelectedId] = useState(null);
        const [draggedState, setDraggedState] = useState(null);
        const [drawingEdgeStart, setDrawingEdgeStart] = useState(null);
        const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

        const getMouseCoords = (e) => {
          const rect = svgRef.current.getBoundingClientRect();
          return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top,
          };
        };

        const handleMouseDown = (e, type, item) => {
          if (readOnly) return;
          e.stopPropagation();

          if (mode === "SELECT") {
            if (type === "STATE") {
              setSelectedId({ type: "STATE", id: item.id });
              setDraggedState(item.id);
            } else if (type === "EDGE") {
              setSelectedId({ type: "EDGE", id: item.id });
            } else {
              setSelectedId(null);
            }
          } else if (mode === "ADD_EDGE") {
            if (type === "STATE") {
              setDrawingEdgeStart(item.id);
            }
          }
        };

        const handleMouseMove = (e) => {
          if (readOnly) return;
          const coords = getMouseCoords(e);
          setMousePos(coords);

          if (draggedState && mode === "SELECT") {
            setFsm((prev) => ({
              ...prev,
              states: prev.states.map((s) =>
                s.id === draggedState ? { ...s, x: coords.x, y: coords.y } : s,
              ),
            }));
          }
        };

        const handleMouseUp = (e, type, item) => {
          if (readOnly) return;
          e.stopPropagation();

          if (draggedState) {
            setDraggedState(null);
          }

          if (mode === "ADD_EDGE" && drawingEdgeStart) {
            if (type === "STATE") {
              // Create Edge
              const newEdge = {
                id: "t" + Date.now(),
                from: drawingEdgeStart,
                to: item.id,
                label: "0",
              };
              setFsm((prev) => ({
                ...prev,
                transitions: [...prev.transitions, newEdge],
              }));
              setSelectedId({ type: "EDGE", id: newEdge.id });
              setMode("SELECT"); // revert to select mode
            }
            setDrawingEdgeStart(null);
          } else if (mode === "ADD_STATE" && type === "BG") {
            const coords = getMouseCoords(e);
            const newState = {
              id:
                "S" +
                (fsm.states.length > 0
                  ? Math.max(
                      ...fsm.states.map(
                        (s) => parseInt(s.id.substring(1)) || 0,
                      ),
                    ) + 1
                  : 0),
              x: coords.x,
              y: coords.y,
              isStart: fsm.states.length === 0,
              isAccept: false,
            };
            setFsm((prev) => ({ ...prev, states: [...prev.states, newState] }));
            setSelectedId({ type: "STATE", id: newState.id });
            setMode("SELECT");
          }
        };

        const updateSelectedState = (updates) => {
          if (!selectedId || selectedId.type !== "STATE") return;
          setFsm((prev) => {
            let newStates = prev.states.map((s) =>
              s.id === selectedId.id ? { ...s, ...updates } : s,
            );
            if (updates.isStart) {
              newStates = newStates.map((s) =>
                s.id === selectedId.id ? s : { ...s, isStart: false },
              );
            }
            return { ...prev, states: newStates };
          });
        };

        const updateSelectedEdge = (updates) => {
          if (!selectedId || selectedId.type !== "EDGE") return;
          setFsm((prev) => ({
            ...prev,
            transitions: prev.transitions.map((t) =>
              t.id === selectedId.id ? { ...t, ...updates } : t,
            ),
          }));
        };

        const deleteSelected = () => {
          if (!selectedId) return;
          if (selectedId.type === "STATE") {
            setFsm((prev) => ({
              states: prev.states.filter((s) => s.id !== selectedId.id),
              transitions: prev.transitions.filter(
                (t) => t.from !== selectedId.id && t.to !== selectedId.id,
              ),
            }));
          } else {
            setFsm((prev) => ({
              ...prev,
              transitions: prev.transitions.filter(
                (t) => t.id !== selectedId.id,
              ),
            }));
          }
          setSelectedId(null);
        };

        // Render calculations
        const renderEdge = (t, index) => {
          const source = fsm.states.find((s) => s.id === t.from);
          const target = fsm.states.find((s) => s.id === t.to);
          if (!source || !target) return null;

          const isSelected =
            selectedId && selectedId.type === "EDGE" && selectedId.id === t.id;

          // Self Loop
          if (source.id === target.id) {
            const r = 20;
            const path = `M ${source.x - 10} ${source.y - r} C ${source.x - 50} ${source.y - 80}, ${source.x + 50} ${source.y - 80}, ${source.x + 10} ${source.y - r}`;
            return (
              <g
                key={t.id}
                onMouseDown={(e) => handleMouseDown(e, "EDGE", t)}
                className="fsm-edge"
              >
                <path
                  d={path}
                  fill="transparent"
                  stroke={isSelected ? "#3b82f6" : "#4B5563"}
                  strokeWidth={isSelected ? 3 : 2}
                  markerEnd={`url(#arrow${isSelected ? "-selected" : ""})`}
                />
                <rect
                  x={source.x - 15}
                  y={source.y - 70}
                  width="30"
                  height="20"
                  fill="white"
                  rx="4"
                />
                <text
                  x={source.x}
                  y={source.y - 56}
                  textAnchor="middle"
                  className="fsm-label"
                  fill={isSelected ? "#3b82f6" : "#1f2937"}
                  style={{ pointerEvents: "none" }}
                >
                  {t.label}
                </text>
              </g>
            );
          }

          // Normal Edge
          const dx = target.x - source.x;
          const dy = target.y - source.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          // Curve slightly to avoid bidirectional overlap
          const isBidirectional = fsm.transitions.some(
            (other) => other.from === target.id && other.to === source.id,
          );
          const offset =
            t.curve !== undefined ? t.curve : isBidirectional ? 0.2 : 0;

          const midX = (source.x + target.x) / 2 - dy * offset;
          const midY = (source.y + target.y) / 2 + dx * offset;

          // Move arrow start/end to circle edge
          const angle = Math.atan2(target.y - midY, target.x - midX);
          const targetX = target.x - Math.cos(angle) * 22; // 20 radius + 2 padding
          const targetY = target.y - Math.sin(angle) * 22;

          const path = `M ${source.x} ${source.y} Q ${midX} ${midY} ${targetX} ${targetY}`;

          // Calculate actual midpoint of quadratic bezier curve for perfect label placement
          const curveMidX = 0.25 * source.x + 0.5 * midX + 0.25 * target.x;
          const curveMidY = 0.25 * source.y + 0.5 * midY + 0.25 * target.y;

          return (
            <g
              key={t.id}
              onMouseDown={(e) => handleMouseDown(e, "EDGE", t)}
              className="fsm-edge"
            >
              <path
                d={path}
                fill="transparent"
                stroke={isSelected ? "#3b82f6" : "#4B5563"}
                strokeWidth={isSelected ? 3 : 2}
                markerEnd={`url(#arrow${isSelected ? "-selected" : ""})`}
              />
              <rect
                x={curveMidX - 15}
                y={curveMidY - 10}
                width="30"
                height="20"
                fill="#f3f4f6"
                rx="4"
                opacity="0.9"
              />
              <text
                x={curveMidX}
                y={curveMidY + 4}
                textAnchor="middle"
                className="fsm-label"
                fill={isSelected ? "#3b82f6" : "#1f2937"}
                style={{ pointerEvents: "none" }}
              >
                {t.label}
              </text>
            </g>
          );
        };

        return (
          <div className="flex flex-col h-full bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            {!readOnly && (
              <div className="flex bg-gray-50 border-b border-gray-200 p-2 gap-2">
                <button
                  onClick={() => setMode("SELECT")}
                  className={`px-3 py-1 text-sm rounded ${mode === "SELECT" ? "bg-blue-600 text-white" : "bg-gray-200 hover:bg-gray-300"}`}
                >
                  Select / Move
                </button>
                <button
                  onClick={() => setMode("ADD_STATE")}
                  className={`px-3 py-1 text-sm rounded ${mode === "ADD_STATE" ? "bg-blue-600 text-white" : "bg-gray-200 hover:bg-gray-300"}`}
                >
                  + Add State
                </button>
                <button
                  onClick={() => setMode("ADD_EDGE")}
                  className={`px-3 py-1 text-sm rounded ${mode === "ADD_EDGE" ? "bg-blue-600 text-white" : "bg-gray-200 hover:bg-gray-300"}`}
                >
                  ↗ Draw Transition
                </button>
              </div>
            )}

            <div className="flex-1 relative">
              <svg
                ref={svgRef}
                className="w-full h-full min-h-[400px] bg-gray-50 canvas-container"
                onMouseDown={(e) => handleMouseDown(e, "BG", null)}
                onMouseMove={handleMouseMove}
                onMouseUp={(e) => handleMouseUp(e, "BG", null)}
              >
                <defs>
                  <marker
                    id="arrow"
                    viewBox="0 -5 10 10"
                    refX="8"
                    refY="0"
                    markerWidth="6"
                    markerHeight="6"
                    orient="auto"
                  >
                    <path d="M0,-5L10,0L0,5" fill="#4B5563" />
                  </marker>
                  <marker
                    id="arrow-selected"
                    viewBox="0 -5 10 10"
                    refX="8"
                    refY="0"
                    markerWidth="6"
                    markerHeight="6"
                    orient="auto"
                  >
                    <path d="M0,-5L10,0L0,5" fill="#3b82f6" />
                  </marker>
                </defs>

                {/* Render completed edges */}
                {fsm.transitions.map((t, i) => renderEdge(t, i))}

                {/* Render drawing edge */}
                {mode === "ADD_EDGE" &&
                  drawingEdgeStart &&
                  (() => {
                    const source = fsm.states.find(
                      (s) => s.id === drawingEdgeStart,
                    );
                    return (
                      <path
                        d={`M ${source.x} ${source.y} L ${mousePos.x} ${mousePos.y}`}
                        stroke="#9ca3af"
                        strokeWidth="2"
                        strokeDasharray="5,5"
                        fill="transparent"
                      />
                    );
                  })()}

                {/* Render states */}
                {fsm.states.map((s) => {
                  const isSelected =
                    selectedId &&
                    selectedId.type === "STATE" &&
                    selectedId.id === s.id;
                  return (
                    <g
                      key={s.id}
                      transform={`translate(${s.x}, ${s.y})`}
                      onMouseDown={(e) => handleMouseDown(e, "STATE", s)}
                      onMouseUp={(e) => handleMouseUp(e, "STATE", s)}
                      className="fsm-node"
                    >
                      {/* Start State Arrow */}
                      {s.isStart && (
                        <path
                          d="M -40 0 L -22 0"
                          stroke="#4B5563"
                          strokeWidth="2"
                          markerEnd="url(#arrow)"
                        />
                      )}

                      {/* Main Circle */}
                      <circle
                        r="20"
                        fill="white"
                        stroke={isSelected ? "#3b82f6" : "#4B5563"}
                        strokeWidth={isSelected ? 3 : 2}
                      />

                      {/* Accept State Inner Circle */}
                      {s.isAccept && (
                        <circle
                          r="15"
                          fill="transparent"
                          stroke={isSelected ? "#3b82f6" : "#4B5563"}
                          strokeWidth={isSelected ? 2 : 1}
                        />
                      )}

                      <text
                        textAnchor="middle"
                        y="5"
                        fontSize="12"
                        fill="#1f2937"
                        style={{ pointerEvents: "none" }}
                      >
                        {s.id}
                      </text>
                    </g>
                  );
                })}
              </svg>

              {/* Properties Panel Overlay */}
              {!readOnly && selectedId && (
                <div className="absolute top-2 right-2 bg-white p-3 rounded shadow-lg border border-gray-200 w-64 text-sm z-10">
                  {selectedId.type === "STATE" ? (
                    <div>
                      <h4 className="font-bold mb-2 border-b pb-1">
                        State: {selectedId.id}
                      </h4>
                      <label className="flex items-center gap-2 mb-2 cursor-pointer">
                        <input
                          type="checkbox"
                          checked={
                            fsm.states.find((s) => s.id === selectedId.id)
                              ?.isStart || false
                          }
                          onChange={(e) =>
                            updateSelectedState({ isStart: e.target.checked })
                          }
                        />
                        Is Start State
                      </label>
                      <label className="flex items-center gap-2 mb-3 cursor-pointer">
                        <input
                          type="checkbox"
                          checked={
                            fsm.states.find((s) => s.id === selectedId.id)
                              ?.isAccept || false
                          }
                          onChange={(e) =>
                            updateSelectedState({ isAccept: e.target.checked })
                          }
                        />
                        Is Accept State (Double Circle)
                      </label>
                      <button
                        onClick={deleteSelected}
                        className="w-full text-red-600 bg-red-50 hover:bg-red-100 py-1 rounded"
                      >
                        Delete State
                      </button>
                    </div>
                  ) : (
                    <div>
                      <h4 className="font-bold mb-2 border-b pb-1">
                        Transition Rule
                      </h4>
                      <div className="mb-3">
                        <label className="block text-xs text-gray-500 mb-1">
                          Alphabet Condition (e.g. 0 or 0|1)
                        </label>
                        <input
                          type="text"
                          className="w-full border rounded p-1"
                          value={
                            fsm.transitions.find((t) => t.id === selectedId.id)
                              ?.label || ""
                          }
                          onChange={(e) =>
                            updateSelectedEdge({ label: e.target.value })
                          }
                        />
                      </div>
                      <button
                        onClick={deleteSelected}
                        className="w-full text-red-600 bg-red-50 hover:bg-red-100 py-1 rounded"
                      >
                        Delete Transition
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      };

      const App = () => {
        const [currentQIndex, setCurrentQIndex] = useState(0);

        const currentQ = QUESTIONS[currentQIndex];

        // User Answers
        const [studentRegex, setStudentRegex] = useState("");
        const [studentFsm, setStudentFsm] = useState({
          states: [],
          transitions: [],
        });

        // UI State
        const [feedback, setFeedback] = useState(null);
        const [showSolution, setShowSolution] = useState(false);

        // Reset when question changes
        useEffect(() => {
          setStudentRegex("");
          setStudentFsm({ states: [], transitions: [] });
          setFeedback(null);
          setShowSolution(false);
        }, [currentQ?.id]);

        const handleCheckAnswer = () => {
          if (currentQ.type === "FSM_TO_REGEX") {
            // Validate regex syntax first
            const regexError = checkRegexValidity(studentRegex);
            if (regexError) {
              setFeedback({ correct: false, msg: regexError });
              return;
            }
            const result = runExhaustiveTest(
              studentRegex,
              currentQ.targetRegex,
              currentQ.alphabet,
              "REGEX",
            );
            setFeedback(result);
          } else {
            // Validate DFA rules first
            const dfaError = validateDFA(studentFsm, currentQ.alphabet);
            if (dfaError) {
              setFeedback({ correct: false, msg: dfaError });
              return;
            }
            const result = runExhaustiveTest(
              studentFsm,
              currentQ.targetRegex,
              currentQ.alphabet,
              "FSM",
            );
            setFeedback(result);
          }
        };

        if (!currentQ)
          return (
            <div className="p-10 text-center">
              No questions match your filter.
            </div>
          );

        return (
          <div className="max-w-6xl mx-auto p-4 md:p-6 min-h-screen flex flex-col">
            {/* Header */}
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-white p-4 rounded-lg shadow-sm border border-gray-200 gap-4">
              <div>
                <h1 className="text-2xl font-bold text-gray-800">
                  FSM & Regex Automarker
                </h1>
                <p className="text-gray-500 text-sm">
                  AQA A-Level Computer Science
                </p>
              </div>
            </div>

            {/* Navigation */}
            <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
              <button
                disabled={currentQIndex === 0}
                onClick={() => setCurrentQIndex((prev) => prev - 1)}
                className="px-4 py-2 bg-white border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 font-medium"
              >
                ← Previous
              </button>

              <select
                value={currentQIndex}
                onChange={(e) => setCurrentQIndex(Number(e.target.value))}
                className="w-full sm:w-auto px-4 py-2 border border-gray-300 rounded bg-white font-semibold text-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                {QUESTIONS.map((q, idx) => (
                  <option key={q.id} value={idx}>
                    Question {idx + 1}:{" "}
                    {q.type === "FSM_TO_REGEX" ? "FSM → Regex" : "Regex → FSM"}{" "}
                    ({q.difficulty})
                  </option>
                ))}
              </select>

              <button
                disabled={currentQIndex === QUESTIONS.length - 1}
                onClick={() => setCurrentQIndex((prev) => prev + 1)}
                className="px-4 py-2 bg-white border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 font-medium"
              >
                Next →
              </button>
            </div>

            {/* Main Workspace */}
            <div className="flex flex-col lg:flex-row gap-6 flex-1">
              {/* Left Column: Instructions & Interaction */}
              <div className="w-full lg:w-1/3 flex flex-col gap-4">
                <div className="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                  <h2 className="font-bold text-lg mb-2 text-blue-800">
                    Task Instructions
                  </h2>
                  <p className="mb-2 text-gray-700">{currentQ.description}</p>
                  <div className="bg-blue-50 p-3 rounded border border-blue-100 text-sm">
                    <strong>Alphabet (Σ): </strong>{" "}
                    {`{${currentQ.alphabet.join(", ")}}`}
                  </div>
                </div>

                {/* FSM -> Regex Input */}
                {currentQ.type === "FSM_TO_REGEX" && (
                  <div className="bg-white p-5 rounded-lg shadow-sm border border-gray-200 flex-1">
                    <h3 className="font-bold mb-3">Your Answer (Regex)</h3>
                    <input
                      type="text"
                      className="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 font-mono text-lg"
                      placeholder="e.g. (a|b)*"
                      value={studentRegex}
                      onChange={(e) => setStudentRegex(e.target.value)}
                      spellCheck="false"
                    />
                    <div className="flex gap-2 mt-3 flex-wrap">
                      {["*", "+", "?", "|", "(", ")"].map((char) => (
                        <button
                          key={char}
                          onClick={() => setStudentRegex((prev) => prev + char)}
                          className="px-3 py-1 bg-gray-100 border border-gray-300 rounded hover:bg-gray-200 font-mono font-bold"
                        >
                          {char}
                        </button>
                      ))}
                    </div>
                    <p className="text-xs text-gray-500 mt-4">
                      Use AQA standard metacharacters. The system will
                      exhaustively test your regex against the FSM for
                      equivalence.
                    </p>
                  </div>
                )}

                {/* Regex -> FSM Target Display */}
                {currentQ.type === "REGEX_TO_FSM" && (
                  <div className="bg-white p-5 rounded-lg shadow-sm border border-gray-200 flex-1">
                    <h3 className="font-bold mb-3">Target Regex</h3>
                    <div className="p-4 bg-gray-800 text-green-400 font-mono text-2xl text-center rounded">
                      {currentQ.targetRegex}
                    </div>
                    <ul className="text-xs text-gray-600 mt-4 list-disc pl-4 space-y-1">
                      <li>Build an equivalent DFA using the visual editor.</li>
                      <li>
                        Your FSM must have rules for <strong>all</strong>{" "}
                        alphabet symbols from every state.
                      </li>
                      <li>
                        Create a non-accepting loop-back state (a 'Trap') if
                        paths need to explicitly fail.
                      </li>
                    </ul>
                  </div>
                )}

                {/* Actions & Feedback */}
                <div className="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                  <div className="flex gap-3 mb-4">
                    <button
                      onClick={handleCheckAnswer}
                      className="flex-1 bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition-colors"
                    >
                      Check Answer
                    </button>
                    <button
                      onClick={() => setShowSolution(!showSolution)}
                      className="bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded hover:bg-gray-300 transition-colors"
                    >
                      {showSolution ? "Hide Solution" : "Show Solution"}
                    </button>
                  </div>

                  {feedback && (
                    <div
                      className={`p-4 rounded border ${feedback.correct ? "bg-green-50 border-green-200 text-green-800" : "bg-red-50 border-red-200 text-red-800"}`}
                    >
                      {feedback.msg}
                    </div>
                  )}
                </div>
              </div>

              {/* Right Column: Visualizer / Builder */}
              <div className="w-full lg:w-2/3 flex flex-col bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                {showSolution ? (
                  <div className="p-6 bg-yellow-50 h-full flex flex-col">
                    <h3 className="font-bold text-yellow-800 mb-4 text-xl">
                      Solution Provided
                    </h3>
                    {currentQ.type === "FSM_TO_REGEX" ? (
                      <div className="text-center mt-10">
                        <p className="text-gray-600 mb-2">
                          Equivalent Regular Expression:
                        </p>
                        <p className="font-mono text-3xl font-bold bg-white inline-block p-4 rounded shadow">
                          {currentQ.targetRegex}
                        </p>
                        <p className="text-sm text-gray-500 mt-4 max-w-md mx-auto">
                          Note: Your answer may look different but still be
                          marked correct if it evaluates to the same logical
                          language.
                        </p>
                      </div>
                    ) : (
                      <div className="flex-1">
                        <p className="text-sm text-gray-600 mb-2">
                          Equivalent DFA Visualization:
                        </p>
                        <InteractiveFSM
                          fsm={currentQ.targetFSM}
                          readOnly={true}
                        />
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="flex-1 h-full min-h-[400px]">
                    {currentQ.type === "FSM_TO_REGEX" ? (
                      <InteractiveFSM
                        fsm={currentQ.targetFSM}
                        readOnly={true}
                      />
                    ) : (
                      <InteractiveFSM
                        fsm={studentFsm}
                        setFsm={setStudentFsm}
                        readOnly={false}
                      />
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
