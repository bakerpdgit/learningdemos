<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vectors Interactive</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-DYQESQXT38"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-DYQESQXT38");
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              headerBg: "#0f172a",
              headerAccent: "#38bdf8",
            },
          },
        },
      };
    </script>
    <!-- Prevent FOUC: apply dark class before render -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("uimode");
          if (
            mode === "dark" ||
            (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      const { useState, useEffect, useRef } = React;

      const SunIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.707.707M6.343 17.657l-.707.707m12.728 0-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14A7 7 0 0012 5z" />
        </svg>
      );

      const MoonIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
      );

      // --- UTILITY FUNCTIONS ---
      const formatFloat = (n) => {
        if (typeof n !== "number") return n;
        let str = Number(n.toFixed(5)).toString();
        if (!str.includes(".")) str += ".0";
        return str;
      };

      const randInt = (min, max, exclude = []) => {
        let val;
        do { val = Math.floor(Math.random() * (max - min + 1)) + min; }
        while (exclude.includes(val));
        return val;
      };

      const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];

      // --- QUESTION GENERATORS ---
      const generateType1 = () => {
        const formats = ["list", "dict", "func", "visual"];
        const fromType = pickRandom(formats);
        const toType = pickRandom(formats.filter((f) => f !== fromType));
        const vector = [randInt(-8, 8, [0]), randInt(-8, 8, [0])];
        return {
          type: 1, subType: "representation", fromType, toType, vector,
          prompt: `Convert the following ${fromType.toUpperCase()} representation to a ${toType.toUpperCase()} representation.`,
        };
      };

      const generateType2 = () => {
        const dim = pickRandom([2, 3, 4]);
        const u = Array.from({ length: dim }, () => randInt(-5, 5));
        const v = Array.from({ length: dim }, () => randInt(-5, 5));
        const c1 = randInt(-4, 4, [0]);
        const c2 = randInt(-4, 4, [0]);
        const answer = u.map((val, i) => c1 * val + c2 * v[i]);
        return {
          type: 2, subType: "combination", dim, u, v, c1, c2, answer,
          prompt: `Given vectors u and v, evaluate the linear combination: ${c1 === 1 ? "" : c1 === -1 ? "-" : c1}u ${c2 > 0 ? "+" : "-"} ${Math.abs(c2) === 1 ? "" : Math.abs(c2)}v`,
        };
      };

      const generateType3 = () => {
        const isCalcVec = Math.random() > 0.5;
        if (isCalcVec) {
          const dim = pickRandom([2, 3]);
          const u = Array.from({ length: dim }, () => randInt(-10, 10));
          const v = Array.from({ length: dim }, () => randInt(-10, 10));
          const alpha = pickRandom([0.1, 0.2, 0.25, 0.4, 0.5, 0.6, 0.75, 0.8, 0.9]);
          const beta = Number((1 - alpha).toFixed(2));
          const answer = u.map((val, i) => alpha * val + beta * v[i]);
          return {
            type: 3, subType: "convex_calc", dim, u, v, alpha, beta, answer,
            prompt: `Evaluate the convex combination αu + βv, where α = ${formatFloat(alpha)} and β = ${formatFloat(beta)}.`,
          };
        } else {
          const p = randInt(1, 5);
          const q = randInt(1, 5);
          const alpha = q / (p + q);
          const beta = p / (p + q);
          return {
            type: 3, subType: "convex_ratio", p, q, alpha, beta,
            prompt: `Find the values of α and β for a convex combination αu + βv that defines a point X on the line segment between vectors u and v, such that it splits the distance from u to v in the ratio ${p}:${q} (i.e., uX:Xv = ${p}:${q}). (Provide your answers to 3 significant figures).`,
          };
        }
      };

      const generateType4 = () => {
        const dim = pickRandom([2, 3]);
        const u = Array.from({ length: dim }, () => randInt(-6, 6, [0]));
        const v = Array.from({ length: dim }, () => randInt(-6, 6, [0]));
        let dot = 0, magU2 = 0, magV2 = 0;
        for (let i = 0; i < dim; i++) {
          dot += u[i] * v[i]; magU2 += u[i] * u[i]; magV2 += v[i] * v[i];
        }
        const cosTheta = dot / (Math.sqrt(magU2) * Math.sqrt(magV2));
        const angleRad = Math.acos(Math.max(-1, Math.min(1, cosTheta)));
        const angleDeg = (angleRad * 180) / Math.PI;
        return {
          type: 4, subType: "angle", dim, u, v, answer: angleDeg,
          prompt: `Find the angle between vectors u and v in degrees. (Provide your answer to 1 decimal place).`,
        };
      };

      // --- COMPONENTS ---

      const VectorGrid = ({ vector, onChange, readOnly = true }) => {
        const canvasRef = useRef(null);
        const [isDragging, setIsDragging] = useState(false);
        const size = 300;
        const center = size / 2;
        const scale = 15;

        const draw = (ctx, vec) => {
          ctx.clearRect(0, 0, size, size);
          ctx.strokeStyle = "#e2e8f0";
          ctx.lineWidth = 1;
          for (let i = 0; i <= size; i += scale) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
          }
          ctx.strokeStyle = "#94a3b8";
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(center, 0); ctx.lineTo(center, size); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, center); ctx.lineTo(size, center); ctx.stroke();

          const headX = center + vec[0] * scale;
          const headY = center - vec[1] * scale;

          if (vec[0] !== 0 || vec[1] !== 0) {
            ctx.strokeStyle = "#3b82f6";
            ctx.fillStyle = "#3b82f6";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(center, center); ctx.lineTo(headX, headY); ctx.stroke();
            const angle = Math.atan2(headY - center, headX - center);
            ctx.beginPath();
            ctx.moveTo(headX, headY);
            ctx.lineTo(headX - 10 * Math.cos(angle - Math.PI / 6), headY - 10 * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(headX - 10 * Math.cos(angle + Math.PI / 6), headY - 10 * Math.sin(angle + Math.PI / 6));
            ctx.fill();
          }

          if (!readOnly) {
            const xSize = 6;
            ctx.strokeStyle = "#ef4444";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(headX - xSize, headY - xSize); ctx.lineTo(headX + xSize, headY + xSize);
            ctx.moveTo(headX + xSize, headY - xSize); ctx.lineTo(headX - xSize, headY + xSize);
            ctx.stroke();
          }
        };

        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");
          draw(ctx, vector || [0, 0]);
        }, [vector, readOnly]);

        const updateVectorFromEvent = (e) => {
          const rect = canvasRef.current.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const gx = Math.round((x - center) / scale);
          const gy = Math.round(-(y - center) / scale);
          onChange([Math.max(-10, Math.min(10, gx)), Math.max(-10, Math.min(10, gy))]);
        };

        const handlePointerDown = (e) => {
          if (readOnly) return;
          e.currentTarget.setPointerCapture(e.pointerId);
          setIsDragging(true);
          updateVectorFromEvent(e);
        };

        const handlePointerMove = (e) => {
          if (readOnly || !isDragging) return;
          updateVectorFromEvent(e);
        };

        const handlePointerUp = (e) => {
          if (readOnly) return;
          setIsDragging(false);
          e.currentTarget.releasePointerCapture(e.pointerId);
        };

        return (
          <div className="relative inline-block border-2 border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-800 shadow-sm overflow-hidden">
            <canvas
              ref={canvasRef}
              width={size}
              height={size}
              className={readOnly ? "cursor-default" : "cursor-crosshair"}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerCancel={handlePointerUp}
              style={{ touchAction: "none" }}
            />
            {!readOnly && (
              <div className="absolute top-2 left-2 bg-white/90 dark:bg-slate-800/90 px-2 py-1 text-xs font-semibold text-slate-600 dark:text-slate-400 rounded shadow">
                Drag the red 'x' to set vector
              </div>
            )}
          </div>
        );
      };

      const Calculator = () => {
        const [expr, setExpr] = useState("");
        const [result, setResult] = useState("");

        const calculate = () => {
          try {
            const replacements = {
              asin: "Math.asin", acos: "Math.acos", atan: "Math.atan",
              sin: "Math.sin", cos: "Math.cos", tan: "Math.tan",
              sqrt: "Math.sqrt", pow: "Math.pow", abs: "Math.abs", pi: "Math.PI",
            };
            let parsed = expr.toLowerCase().replace(/\b([a-z]+)\b/g, (match) => replacements[match] || match);
            const res = Function(`"use strict"; return (${parsed})`)();
            setResult(Number.isFinite(res) ? Number(res.toFixed(4)).toString() : "Error");
          } catch (e) {
            setResult("Invalid Expr");
          }
        };

        return (
          <div className="bg-slate-800 text-slate-100 p-4 rounded-xl shadow-lg w-full max-w-sm">
            <h3 className="font-bold mb-2 text-emerald-400 flex items-center">
              <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
              </svg>
              Scientific Calculator
            </h3>
            <div className="text-xs text-slate-400 mb-3 space-y-1">
              <p>Type expressions like: <code className="bg-slate-700 px-1 rounded">acos(0.5) * 180 / PI</code></p>
              <p>Supports: sqrt, sin, cos, acos, PI</p>
            </div>
            <input
              type="text"
              className="w-full bg-slate-900 border border-slate-600 rounded p-2 mb-2 font-mono text-sm focus:outline-none focus:border-emerald-500 transition-colors"
              placeholder="Expression..."
              value={expr}
              onChange={(e) => setExpr(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && calculate()}
            />
            <div className="flex gap-2">
              <button onClick={calculate} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition-colors">=</button>
              <div className="flex-2 bg-slate-900 border border-slate-600 rounded p-2 font-mono text-emerald-400 w-32 flex items-center justify-end overflow-hidden">
                {result || "0.0"}
              </div>
            </div>
          </div>
        );
      };

      const InputCell = ({ id, label, value, onChange, disabled }) => (
        <div className="flex items-center gap-2">
          {label && <span className="font-mono text-slate-600 dark:text-slate-400">{label}</span>}
          <input
            type="number"
            step="any"
            className="w-24 p-2 border-2 border-slate-300 dark:border-slate-600 rounded text-center focus:border-blue-500 focus:outline-none font-mono bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 transition-colors [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
            value={value || ""}
            onChange={(e) => onChange(id, e.target.value)}
            disabled={disabled}
          />
        </div>
      );

      // --- MAIN APP ---
      function App() {
        const [theme, setTheme] = useState(() => {
          try {
            return localStorage.getItem("uimode") ||
              (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          } catch { return "light"; }
        });

        useEffect(() => {
          document.documentElement.classList.toggle("dark", theme === "dark");
          try { localStorage.setItem("uimode", theme); } catch {}
        }, [theme]);

        const toggleTheme = () => setTheme(t => t === "dark" ? "light" : "dark");

        const [q, setQ] = useState(null);
        const [inputs, setInputs] = useState({});
        const [feedback, setFeedback] = useState(null);
        const [showSolution, setShowSolution] = useState(false);
        const [selectedTopics, setSelectedTopics] = useState([1, 2, 3, 4]);
        const [isDropdownMenuOpen, setIsDropdownMenuOpen] = useState(false);
        const dropdownRef = useRef(null);

        useEffect(() => {
          const handleClickOutside = (event) => {
            if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
              setIsDropdownMenuOpen(false);
            }
          };
          document.addEventListener("mousedown", handleClickOutside);
          return () => document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        const generateNewQuestion = () => {
          const availableTopics = selectedTopics.length > 0 ? selectedTopics : [1, 2, 3, 4];
          const type = pickRandom(availableTopics);
          let newQ;
          switch (type) {
            case 1: newQ = generateType1(); break;
            case 2: newQ = generateType2(); break;
            case 3: newQ = generateType3(); break;
            case 4: newQ = generateType4(); break;
          }
          setQ(newQ);
          setInputs({});
          setFeedback(null);
          setShowSolution(false);
        };

        useEffect(() => { generateNewQuestion(); }, []);

        const handleInputChange = (key, value) => {
          setInputs((prev) => ({ ...prev, [key]: value }));
        };

        const checkAnswer = () => {
          let isCorrect = false;
          let expected = "";
          const tolerance = 0.05;

          try {
            if (q.type === 1) {
              if (q.toType === "visual") {
                const vx = parseFloat(inputs.v0 || 0);
                const vy = parseFloat(inputs.v1 || 0);
                isCorrect = Math.abs(vx - q.vector[0]) < tolerance && Math.abs(vy - q.vector[1]) < tolerance;
                expected = `Arrow to (${formatFloat(q.vector[0])}, ${formatFloat(q.vector[1])})`;
              } else {
                const vx = parseFloat(inputs.v0);
                const vy = parseFloat(inputs.v1);
                isCorrect = Math.abs(vx - q.vector[0]) < tolerance && Math.abs(vy - q.vector[1]) < tolerance;
                expected = `x: ${formatFloat(q.vector[0])}, y: ${formatFloat(q.vector[1])}`;
              }
            } else if (q.type === 2 || (q.type === 3 && q.subType === "convex_calc")) {
              let correctCount = 0;
              for (let i = 0; i < q.dim; i++) {
                if (Math.abs(parseFloat(inputs[`v${i}`]) - q.answer[i]) < tolerance) correctCount++;
              }
              isCorrect = correctCount === q.dim;
              expected = `[${q.answer.map(formatFloat).join(", ")}]`;
            } else if (q.type === 3 && q.subType === "convex_ratio") {
              const uA = parseFloat(inputs.alpha);
              const uB = parseFloat(inputs.beta);
              const expectedA = Number(q.alpha.toPrecision(3));
              const expectedB = Number(q.beta.toPrecision(3));
              isCorrect = Math.abs(uA - expectedA) < 0.002 && Math.abs(uB - expectedB) < 0.002;
              expected = `α = ${expectedA}, β = ${expectedB}`;
            } else if (q.type === 4) {
              const uAns = parseFloat(inputs.angle);
              const expectedAngle = Number(q.answer.toFixed(1));
              isCorrect = Math.abs(uAns - expectedAngle) < 0.1;
              expected = `${expectedAngle.toFixed(1)}°`;
            }
          } catch (e) {
            isCorrect = false;
          }

          setFeedback({ correct: isCorrect, expected });
          if (isCorrect) setShowSolution(false);
        };

        const renderRepresentation = (type, vec) => {
          if (type === "list")
            return <div className="font-mono text-lg font-bold bg-blue-50 dark:bg-blue-900/30 p-3 rounded border border-blue-200 dark:border-blue-800 dark:text-blue-100">[{vec.map(formatFloat).join(", ")}]</div>;
          if (type === "dict")
            return <div className="font-mono text-lg font-bold bg-blue-50 dark:bg-blue-900/30 p-3 rounded border border-blue-200 dark:border-blue-800 dark:text-blue-100">{`{0: ${formatFloat(vec[0])}, 1: ${formatFloat(vec[1])}}`}</div>;
          if (type === "func")
            return <div className="font-mono text-lg font-bold bg-blue-50 dark:bg-blue-900/30 p-3 rounded border border-blue-200 dark:border-blue-800 dark:text-blue-100">0 ↦ {formatFloat(vec[0])}, 1 ↦ {formatFloat(vec[1])}</div>;
          if (type === "visual")
            return <VectorGrid vector={vec} readOnly={true} />;
        };

        const renderInputForm = () => {
          if (!q) return null;

          if (q.type === 1) {
            if (q.toType === "visual") {
              return (
                <VectorGrid
                  vector={inputs.v0 !== undefined ? [inputs.v0, inputs.v1] : [0, 0]}
                  onChange={(vec) => { handleInputChange("v0", vec[0]); handleInputChange("v1", vec[1]); }}
                  readOnly={feedback?.correct === true}
                />
              );
            }
            return (
              <div className="flex flex-wrap items-center gap-4 text-xl">
                {q.toType === "list" && (
                  <> [
                    <InputCell id="v0" value={inputs.v0} onChange={handleInputChange} disabled={feedback?.correct} />,
                    <InputCell id="v1" value={inputs.v1} onChange={handleInputChange} disabled={feedback?.correct} />
                  ] </>
                )}
                {q.toType === "dict" && (
                  <> {"{"}
                    <InputCell id="v0" label="0:" value={inputs.v0} onChange={handleInputChange} disabled={feedback?.correct} />,
                    <InputCell id="v1" label="1:" value={inputs.v1} onChange={handleInputChange} disabled={feedback?.correct} />
                  {"}"} </>
                )}
                {q.toType === "func" && (
                  <div className="flex flex-col gap-2">
                    <InputCell id="v0" label="0 ↦" value={inputs.v0} onChange={handleInputChange} disabled={feedback?.correct} />
                    <InputCell id="v1" label="1 ↦" value={inputs.v1} onChange={handleInputChange} disabled={feedback?.correct} />
                  </div>
                )}
              </div>
            );
          }

          if (q.type === 2 || (q.type === 3 && q.subType === "convex_calc")) {
            return (
              <div className="flex flex-wrap items-center gap-2 text-xl font-mono bg-slate-50 dark:bg-slate-700 p-4 rounded-xl border border-slate-200 dark:border-slate-600">
                [
                {Array.from({ length: q.dim }).map((_, i) => (
                  <React.Fragment key={i}>
                    <InputCell id={`v${i}`} value={inputs[`v${i}`]} onChange={handleInputChange} disabled={feedback?.correct} />
                    {i < q.dim - 1 && <span className="text-slate-400 dark:text-slate-500">,</span>}
                  </React.Fragment>
                ))}
                ]
              </div>
            );
          }

          if (q.type === 3 && q.subType === "convex_ratio") {
            return (
              <div className="flex flex-wrap items-center gap-6 text-lg font-mono">
                <InputCell id="alpha" label="α =" value={inputs.alpha} onChange={handleInputChange} disabled={feedback?.correct} />
                <InputCell id="beta" label="β =" value={inputs.beta} onChange={handleInputChange} disabled={feedback?.correct} />
              </div>
            );
          }

          if (q.type === 4) {
            return (
              <div className="flex items-center gap-2 text-lg">
                <span className="italic font-serif">θ = </span>
                <InputCell id="angle" value={inputs.angle} onChange={handleInputChange} disabled={feedback?.correct} />
                <span className="text-slate-500 dark:text-slate-400 font-bold">°</span>
              </div>
            );
          }
        };

        if (!q) return <div className="min-h-screen flex items-center justify-center">Loading...</div>;

        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 flex flex-col">
            {/* CS Learning Header */}
            <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
              <a
                href="index.html"
                className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline"
              >
                <span className="text-slate-500">&lt;</span>CS
                <span className="text-slate-500">&gt;</span>&nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a
                  href="index.html"
                  className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                >
                  Home
                </a>
                <button
                  onClick={toggleTheme}
                  className="text-slate-400 hover:text-headerAccent transition-colors p-1"
                  aria-label="Toggle Dark Mode"
                >
                  {theme === "dark" ? (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  )}
                </button>
              </nav>
            </header>

            <div className="p-4 md:p-8">
              <div className="max-w-6xl mx-auto space-y-6">
                {/* Inner header card */}
                <header className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div>
                    <h1 className="text-3xl font-extrabold text-blue-900 dark:text-blue-300 tracking-tight">Vectors Interactive</h1>
                    <p className="text-slate-500 dark:text-slate-400 mt-1 font-medium">AQA CS A-Level Specification Coverage</p>
                  </div>

                  <div className="relative" ref={dropdownRef}>
                    <button
                      onClick={() => setIsDropdownMenuOpen(!isDropdownMenuOpen)}
                      className="bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-100 dark:hover:bg-blue-900/50 text-blue-800 dark:text-blue-300 px-4 py-2 rounded-lg font-bold shadow-sm border border-blue-200 dark:border-blue-800 w-full md:w-auto flex items-center justify-between gap-3 transition-colors"
                    >
                      <span>Question Topics ({selectedTopics.length}/4)</span>
                      <svg className={`w-4 h-4 transition-transform duration-200 ${isDropdownMenuOpen ? "rotate-180" : ""}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path>
                      </svg>
                    </button>

                    {isDropdownMenuOpen && (
                      <div className="absolute right-0 mt-2 w-64 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl shadow-lg z-10 overflow-hidden">
                        <div className="p-2 space-y-1">
                          {[
                            { id: 1, label: "Representations" },
                            { id: 2, label: "Linear Combinations" },
                            { id: 3, label: "Convex Combinations" },
                            { id: 4, label: "Dot Product & Angle" },
                          ].map((topic) => (
                            <label key={topic.id} className="flex items-center gap-3 p-2 hover:bg-slate-50 dark:hover:bg-slate-600 rounded cursor-pointer transition-colors">
                              <input
                                type="checkbox"
                                className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer"
                                checked={selectedTopics.includes(topic.id)}
                                onChange={() => {
                                  setSelectedTopics((prev) => {
                                    if (prev.includes(topic.id)) {
                                      if (prev.length === 1) return prev;
                                      return prev.filter((t) => t !== topic.id);
                                    }
                                    return [...prev, topic.id];
                                  });
                                }}
                              />
                              <span className="text-sm font-medium text-slate-700 dark:text-slate-200">
                                Topic {topic.id}: {topic.label}
                              </span>
                            </label>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </header>

                <div className="flex flex-col lg:flex-row gap-6">
                  {/* Main Question Area */}
                  <main className="flex-1 bg-white dark:bg-slate-800 p-6 lg:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                    <div className="mb-8 border-l-4 border-blue-500 pl-4">
                      <div className="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">
                        Topic {q.type}:{" "}
                        {q.type === 1 ? "Representations" : q.type === 2 ? "Linear Combinations" : q.type === 3 ? "Convex Combinations" : "Dot Product & Angle"}
                      </div>
                      <h2 className="text-xl font-semibold text-slate-700 dark:text-slate-200 mb-2">{q.prompt}</h2>

                      {q.type === 1 && <div className="mt-4">{renderRepresentation(q.fromType, q.vector)}</div>}
                      {q.type === 2 && (
                        <div className="mt-4 space-y-2 font-mono bg-slate-50 dark:bg-slate-700 p-4 rounded-xl border border-slate-200 dark:border-slate-600 inline-block">
                          <div>u = [{q.u.map(formatFloat).join(", ")}]</div>
                          <div>v = [{q.v.map(formatFloat).join(", ")}]</div>
                        </div>
                      )}
                      {q.type === 3 && q.subType === "convex_calc" && (
                        <div className="mt-4 space-y-2 font-mono bg-slate-50 dark:bg-slate-700 p-4 rounded-xl border border-slate-200 dark:border-slate-600 inline-block">
                          <div>u = [{q.u.map(formatFloat).join(", ")}]</div>
                          <div>v = [{q.v.map(formatFloat).join(", ")}]</div>
                        </div>
                      )}
                      {q.type === 4 && (
                        <div className="mt-4 space-y-2 font-mono bg-slate-50 dark:bg-slate-700 p-4 rounded-xl border border-slate-200 dark:border-slate-600 inline-block">
                          <div>u = [{q.u.map(formatFloat).join(", ")}]</div>
                          <div>v = [{q.v.map(formatFloat).join(", ")}]</div>
                        </div>
                      )}
                    </div>

                    <div className="mb-8">
                      <h3 className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4">Your Answer</h3>
                      {renderInputForm()}
                    </div>

                    <div className="flex flex-col sm:flex-row items-center gap-4 border-t border-slate-100 dark:border-slate-700 pt-6">
                      <button
                        onClick={checkAnswer}
                        disabled={feedback?.correct}
                        className={`px-8 py-3 rounded-xl font-bold text-white transition-all shadow-md w-full sm:w-auto ${
                          feedback?.correct
                            ? "bg-slate-300 dark:bg-slate-600 dark:text-slate-400 cursor-not-allowed"
                            : "bg-blue-600 hover:bg-blue-700 hover:-translate-y-0.5"
                        }`}
                      >
                        Check Answer
                      </button>
                      <button
                        onClick={generateNewQuestion}
                        className="px-8 py-3 rounded-xl font-bold text-blue-700 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-all w-full sm:w-auto"
                      >
                        Next Question ➔
                      </button>
                    </div>

                    {feedback && (
                      <div className={`mt-6 p-4 rounded-xl flex items-start gap-4 border ${
                        feedback.correct
                          ? "bg-emerald-50 dark:bg-emerald-900/30 border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-300"
                          : "bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-800 dark:text-red-300"
                      }`}>
                        <div className={`p-2 rounded-full mt-1 shrink-0 ${feedback.correct ? "bg-emerald-200 dark:bg-emerald-800" : "bg-red-200 dark:bg-red-800"}`}>
                          {feedback.correct ? (
                            <svg className="w-5 h-5 text-emerald-700 dark:text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                          ) : (
                            <svg className="w-5 h-5 text-red-700 dark:text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                          )}
                        </div>
                        <div className="flex-1">
                          <h4 className="font-bold text-lg">{feedback.correct ? "Correct!" : "Incorrect"}</h4>
                          {!feedback.correct && !showSolution && (
                            <div className="mt-2">
                              <button
                                onClick={() => setShowSolution(true)}
                                className="text-sm font-semibold bg-red-100 dark:bg-red-900/50 hover:bg-red-200 dark:hover:bg-red-900/70 text-red-800 dark:text-red-300 py-1 px-3 rounded transition-colors"
                              >
                                See Solution
                              </button>
                            </div>
                          )}
                          {!feedback.correct && showSolution && (
                            <p className="opacity-90 mt-2">
                              The expected answer is approximately:{" "}
                              <strong className="font-mono bg-white dark:bg-slate-700 px-1.5 py-0.5 rounded opacity-100 shadow-sm break-all">
                                {feedback.expected}
                              </strong>
                            </p>
                          )}
                        </div>
                      </div>
                    )}
                  </main>

                  {/* Sidebar / Tools */}
                  <aside className="w-full lg:w-80 flex flex-col gap-6 shrink-0">
                    <Calculator />
                  </aside>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
