      // Extract <img src="..."> file references from an HTML body. Returns

      const extractImageRefs = (html) => {
        const refs = [];
        const seen = new Set();
        const re = /<img\b[^>]*\bsrc\s*=\s*["']([^"']+)["']/gi;
        let m;
        while ((m = re.exec(html)) !== null) {
          if (!seen.has(m[1])) {
            seen.add(m[1]);
            refs.push(m[1]);
          }
        }
        return refs;
      };

      // Resolve a URL string against a base server IP. Returns { ip, path }
      // where path is normalised to a leading slash. Absolute http(s):// URLs
      // route to whatever IP they specify; relative URLs stay on baseIp.
      const resolveUrl = (urlStr, baseIp) => {
        if (!urlStr) return null;
        const absMatch = urlStr.match(
          /^https?:\/\/([0-9]{1,3}(?:\.[0-9]{1,3}){3})(?::\d+)?(\/.*)?$/i,
        );
        if (absMatch) {
          return { ip: absMatch[1], path: absMatch[2] || "/" };
        }
        if (urlStr.startsWith("/")) return { ip: baseIp, path: urlStr };
        return { ip: baseIp, path: "/" + urlStr };
      };

      // Convert a resolved path back to the server filesystem key.

        return path.replace(/^\//, "");
      };

      const isValidIp = (value) =>

        const input = (raw || "").trim();

        if (input.startsWith("/") && basePage && basePage.serverIp) {
          return {
            host: basePage.host || basePage.serverIp,
            path: input,
            displayUrl: `http://${basePage.host || basePage.serverIp}${input}`,
            isIp: isValidIp(basePage.serverIp),
            targetIp: basePage.serverIp,
          };
        }
        let candidate = input;
        if (!/^[a-z][a-z0-9+.-]*:\/\//i.test(candidate)) {
          candidate = `http://${candidate}`;
        }
        try {
          const parsed = new URL(candidate);
          if (!["http:", "https:"].includes(parsed.protocol)) {
            return { error: "Only http:// style browser requests are supported." };
          }
          const host = normaliseHostname(parsed.hostname);
          const path = parsed.pathname || "/";
          return {
            host,
            path,
            displayUrl: `http://${host}${path}`,
            isIp: isValidIp(host),
            targetIp: isValidIp(host) ? host : null,
          };
        } catch (e) {
          return { error: `Cannot parse browser address: ${input}` };
        }

              metric: 1,
            },
            {
              dest: "0.0.0.0",
              mask: "0.0.0.0",
              nextHop: "10.0.0.254",
              iface: 1,
              metric: 10,
            },
          ],
        },
        RT_EDGE: {
          id: "RT_EDGE",
          type: "Router",
          name: "Edge NAT Router",
          x: 500,
          y: 150,
          natTable: [],
          interfaces: [
            {
              name: "eth0 (LAN)",
              ip: "10.0.0.254",
              mac: "EE:EE:EE:EE:EE:01",
              connectedTo: "SW_CORE",
            },
            {
              name: "eth1 (WAN)",
              ip: "214.123.72.15",
              mac: "EE:EE:EE:EE:EE:02",
              connectedTo: "INT_SRV",
            },
          ],
          routes: [
            {
              dest: "10.0.0.0",
              mask: "255.255.255.0",
              nextHop: "0.0.0.0",
              iface: 0,
              metric: 0,
            },
            {
              dest: "192.168.1.0",
              mask: "255.255.255.0",
              nextHop: "10.0.0.1",
              iface: 0,
              metric: 1,
            },
            {
              dest: "192.168.2.0",
              mask: "255.255.255.0",
              nextHop: "10.0.0.2",
              iface: 0,
              metric: 1,
            },
            {
              dest: "203.0.113.0",
              mask: "255.255.255.0",
              nextHop: "0.0.0.0",
              iface: 1,
              metric: 0,
            },
          ],
        },
        INT_SRV: {
          id: "INT_SRV",
          type: "Server",
          name: "Internet Web Server",
          ip: "203.0.113.50",
          mac: "WW:WW:WW:WW:WW:WW",
          gw: "214.123.72.15",
          subnet: "255.255.255.0",
          switch: "RT_EDGE",
          x: 500,
          y: 50,
          browserOutput: "",
          files: {
            "index.html": { type: "html", content: DEFAULT_INDEX_INTERNET },
            "dog.jpg": { type: "image", animal: "dog" },
            "gerbil.jpg": { type: "image", animal: "gerbil" },
          },
        },
      };

      const LINKS = [
        { id: "L1", source: "PC1", target: "SW_A" },
        { id: "L2", source: "SRV1", target: "SW_A" },
        { id: "L13", source: "DNS_A", target: "SW_A" },
        { id: "L14", source: "DHCP_A", target: "SW_A" },
        { id: "L3", source: "SW_A", target: "RT_A" },
        { id: "L4", source: "RT_A", target: "SW_CORE" },
        { id: "L5", source: "SW_CORE", target: "RT_B" },
        { id: "L6", source: "SW_CORE", target: "RT_EDGE" },
        { id: "L7", source: "RT_EDGE", target: "INT_SRV" },
        { id: "L8", source: "SW_B", target: "RT_B" },
        { id: "L9", source: "PC2", target: "SW_B" },
        { id: "L10", source: "PC3", target: "SW_B" },
        { id: "L11", source: "SW_B", target: "WAP_B" },
        { id: "L12", source: "WAP_B", target: "LAP_B", wireless: true },
      ];

      // ==========================================
      // 2. NETWORK ENGINE LOGIC
      // ==========================================

      const ipToNum = (ip) =>
        ip
          .split(".")
          .reduce((acc, octet) => (acc << 8) + parseInt(octet, 10), 0) >>> 0;

      const isIpInSubnet = (ip, subnet, mask) => {
        return (
          (ipToNum(ip) & ipToNum(mask)) === (ipToNum(subnet) & ipToNum(mask))
        );
      };

      class NetworkEngine {
        static getLinkProtocol(srcId, dstId) {
          const link = LINKS.find(
            (l) =>
              (l.source === srcId && l.target === dstId) ||
              (l.target === srcId && l.source === dstId),
          );
          return link && link.wireless ? "Wi-Fi (802.11)" : "Ethernet";
        }

        static getNextL2Hop(currentId, destId) {
          const directLink = LINKS.find(
            (l) =>
              (l.source === currentId && l.target === destId) ||
              (l.target === currentId && l.source === destId),
          );
          if (directLink) return destId;

          const neighbors = LINKS.filter(
            (l) => l.source === currentId || l.target === currentId,
          ).map((l) => (l.source === currentId ? l.target : l.source));
          for (const neighborId of neighbors) {
            const n = INITIAL_NODES[neighborId];
            if (n && (n.type === "Switch" || n.type === "WAP")) {
              return neighborId;
            }
          }
          return destId;
        }

        static createRequestPacket(srcNode, targetIp, type, options = {}) {
          const isLocal = isIpInSubnet(targetIp, srcNode.ip, srcNode.subnet);
          const nextHopIp = isLocal ? targetIp : srcNode.gw;
          const nextHopMac = IP_MAC_TABLE[nextHopIp];

          if (!nextHopMac)
            return {
              error: `ARP failed for IP ${nextHopIp}. Cannot route from ${srcNode.name}.`,
            };

          let p = {
            id: generateId(),
            transactionId: options.transactionId || generateId(),
            state: "TRANSIT",
            currentNode: srcNode.id,
            nextNode: srcNode.switch,
            progress: 0,
            networkLayer: {
              protocol: "IPv4",
              srcIP: srcNode.ip,
              dstIP: targetIp,
              ttl: 64,
            },
            linkLayer: {
              protocol: this.getLinkProtocol(srcNode.id, srcNode.switch),
              srcMAC: srcNode.mac,
              dstMAC: nextHopMac,
            },
          };

          if (type === "PING") {
            p.appLayer = { protocol: "Ping" };
            p.payload = "ICMP Echo Request Data";
            p.transportLayer = {
              protocol: "ICMP",
              srcPort: "N/A",
              dstPort: "N/A",
              seq: Math.floor(Math.random() * 100),
              total: 1,
              checksum:
                "0x" +
                Math.floor(Math.random() * 65535)
                  .toString(16)
                  .toUpperCase(),
            };
          } else if (type === "HTTP") {
            const path = options.path || "/";
            const host = options.host || targetIp;
            p.appLayer = {
              protocol: "HTTP",
              method: "GET",
              path,
              host,
              requestedUrl: options.requestedUrl || `http://${host}${path}`,
            };
            p.payload = `GET ${path} HTTP/1.1\nHost: ${host}`;
            p.transportLayer = {
              protocol: "TCP",
              srcPort: 49152 + Math.floor(Math.random() * 16000),
              dstPort: 80,
              seq: 1,
              total: 1,
              checksum:
                "0x" +
                Math.floor(Math.random() * 65535)
                  .toString(16)
                  .toUpperCase(),
            };
          } else if (type === "DNS") {
            const hostname = normaliseHostname(options.hostname);
            p.appLayer = {
              protocol: "DNS",
              method: "QUERY",
              hostname,
              path: options.path || "/",
              requestedUrl:
                options.requestedUrl || `http://${hostname}${options.path || "/"}`,
            };
            p.payload = `DNS QUERY A ${hostname}`;
            p.transportLayer = {
              protocol: "UDP",
              srcPort: 49152 + Math.floor(Math.random() * 16000),
              dstPort: 53,
              seq: 1,
              total: 1,
              checksum:
                "0x" +
                Math.floor(Math.random() * 65535)
                  .toString(16)
                  .toUpperCase(),
            };
          }
          return { packet: p };
        }

        static processSwitch(p, node) {
          let destNodeId = MAC_NODE_TABLE[p.linkLayer.dstMAC];
          if (!destNodeId)
            return {
              action: "DROP",
              reason: `Switch ${node.name} dropped packet: Unknown MAC address ${p.linkLayer.dstMAC}`,
            };

          // If the destination is reachable via another L2 device (e.g. a WAP
          // bridging the wireless segment), hop to that device first instead of
          // teleporting directly to the endpoint.
          const destNode = INITIAL_NODES[destNodeId];
          if (destNode && destNode.switch && destNode.switch !== node.id) {
            destNodeId = destNode.switch;
          }

          // If the resolved destination isn't directly linked to this node
          // (e.g. a WAP forwarding a reply destined for a router beyond its
          // wired uplink), hop via a neighbouring switch/WAP first.
          destNodeId = this.getNextL2Hop(node.id, destNodeId);

          return {
            action: "FORWARD",
            packet: {
              ...p,
              currentNode: node.id,
              nextNode: destNodeId,
              state: "TRANSIT",
              progress: 0,
              linkLayer: {
                ...p.linkLayer,
                protocol: this.getLinkProtocol(node.id, destNodeId),
              },
            },
          };
        }

        static processRouter(p, router) {
          let isForMe = router.interfaces.some(
            (i) => i.ip === p.networkLayer.dstIP,
          );
          let updatedRouter = null;
          let extraLogs = [];

          // NAT INBOUND (WAN -> LAN)
          if (
            isForMe &&
            router.natTable &&
            p.networkLayer.dstIP === router.interfaces[1].ip
          ) {
            const checkPort =
              p.transportLayer.protocol === "TCP"
                ? p.transportLayer.dstPort
                : p.transportLayer.seq;
            const natEntry = router.natTable.find(
              (entry) => entry.externalPort === checkPort,
            );

            if (natEntry) {
              p = { ...p };
              p.networkLayer = {
                ...p.networkLayer,
                dstIP: natEntry.internalIp,
              };
              p.transportLayer = { ...p.transportLayer };
              if (p.transportLayer.protocol === "TCP")
                p.transportLayer.dstPort = natEntry.internalPort;
              else p.transportLayer.seq = natEntry.internalPort;

              extraLogs.push(
                `NAT Translation (DNAT): Dest mapped back to ${natEntry.internalIp}:${natEntry.internalPort}`,
              );
              isForMe = false; // It's no longer for the router itself, it needs routing to the LAN
            }
          }

          if (isForMe) {
            if (
              p.appLayer.protocol === "Ping" &&
              p.payload.includes("Request")
            ) {
              return {
                ...this.createReplyPacket(p, {
                  ip: p.networkLayer.dstIP,
                  mac: p.linkLayer.dstMAC,
                  switch: p.currentNode,
                  id: router.id,
                  gw: p.networkLayer.srcIP,
                  subnet: "0.0.0.0",
                }),
                extraLogs,
              };
            }
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: Service unavailable on this port.`,
              extraLogs,
            };
          }

          // Routing Step
          const newTtl = p.networkLayer.ttl - 1;
          if (newTtl <= 0)
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: TTL expired.`,
              extraLogs,
            };

          let bestMatch = null;
          let longestMask = -1;

          router.routes.forEach((route) => {
            if (isIpInSubnet(p.networkLayer.dstIP, route.dest, route.mask)) {
              const maskNum = ipToNum(route.mask);
              let maskLen = 0;
              for (let i = 0; i < 32; i++) {
                if ((maskNum & (1 << i)) !== 0) maskLen++;
              }
              if (maskLen > longestMask) {
                longestMask = maskLen;
                bestMatch = route;
              }
            }
          });

          if (!bestMatch)
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: No route to host ${p.networkLayer.dstIP}.`,
              extraLogs,
            };

          // NAT OUTBOUND (LAN -> WAN)
          if (router.natTable !== undefined && bestMatch.iface === 1) {
            // WAN Interface
            const extIp = router.interfaces[1].ip;
            if (
              p.networkLayer.srcIP !== extIp &&
              !p.networkLayer.srcIP.startsWith("203.")
            ) {
              const internalPort =
                p.transportLayer.protocol === "TCP"
                  ? p.transportLayer.srcPort
                  : p.transportLayer.seq;

              let extPort;
              const existing = router.natTable.find(
                (e) =>
                  e.internalIp === p.networkLayer.srcIP &&
                  e.internalPort === internalPort,
              );
              if (existing) {
                extPort = existing.externalPort;
              } else {
                extPort = 50000 + Math.floor(Math.random() * 10000);
                updatedRouter = {
                  ...router,
                  natTable: [
                    ...router.natTable,
                    {
                      internalIp: p.networkLayer.srcIP,
                      internalPort,
                      externalPort: extPort,
                      protocol: p.transportLayer.protocol,
                    },
                  ],
                };
              }

              p = { ...p };
              p.networkLayer = { ...p.networkLayer, srcIP: extIp };
              p.transportLayer = { ...p.transportLayer };
              if (p.transportLayer.protocol === "TCP")
                p.transportLayer.srcPort = extPort;
              else p.transportLayer.seq = extPort;

              extraLogs.push(
                `NAT Translation (SNAT): Source mapped to ${extIp}:${extPort}`,
              );
            }
          }

          const outIface = router.interfaces[bestMatch.iface];
          const nextHopIp =
            bestMatch.nextHop === "0.0.0.0"
              ? p.networkLayer.dstIP
              : bestMatch.nextHop;
          const nextHopMac = IP_MAC_TABLE[nextHopIp];

          if (!nextHopMac)
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: ARP resolution failed for ${nextHopIp}.`,
              extraLogs,
            };

          return {
            action: "FORWARD",
            packet: {
              ...p,
              currentNode: router.id,
              nextNode: outIface.connectedTo,
              state: "TRANSIT",
              progress: 0,
              networkLayer: { ...p.networkLayer, ttl: newTtl },
              linkLayer: {
                protocol: this.getLinkProtocol(router.id, outIface.connectedTo),
                srcMAC: outIface.mac,
                dstMAC: nextHopMac,
              },
            },
            updatedNode: updatedRouter,
            extraLogs,
          };
        }

        static processPC(p, node) {
          if (p.networkLayer.dstIP !== node.ip) {
            return {
              action: "DROP",
              reason: `${node.name} dropped packet: IP mismatch.`,
            };
          }

          const isHttpResponse =
            p.appLayer.protocol === "HTTP" && p.appLayer.method === "RESPONSE";
          const isDnsResponse =
            p.appLayer.protocol === "DNS" && p.appLayer.method === "RESPONSE";
          const isPingReply =
            p.appLayer.protocol === "Ping" &&
            p.payload &&
            p.payload.includes("Reply");

          if (isHttpResponse || isDnsResponse || isPingReply) {
            return {
              action: "CONSUME",
              message: `${node.name} received response from ${p.networkLayer.srcIP}.`,
              responseData: p.payload,
              responsePacket: p,
            };
          }

          if (p.appLayer.protocol === "DNS" && node.service !== "DNS") {
            return {
              action: "DROP",
              reason: `${node.name} dropped DNS query: DNS service is not running.`,
            };
          }

          if (p.appLayer.protocol === "HTTP" && !node.files) {
            return {
              action: "DROP",
              reason: `${node.name} dropped HTTP request: Web service is not running on port 80.`,
            };
          }

          if (!["Ping", "HTTP", "DNS"].includes(p.appLayer.protocol)) {
            return {
              action: "DROP",
              reason: `${node.name} dropped packet: Unknown application protocol ${p.appLayer.protocol}.`,
            };
          }

          // Hand the request to the node's service for processing instead
          // of replying immediately. The simulator will tick down the
          // processing entry and emit the reply (possibly fragmented) when
          // the simulated "compute" finishes.
          return {
            action: "PROCESSING",
            request: p,
            requestType: p.appLayer.protocol,
            summary:
              p.appLayer.protocol === "Ping"
                ? `Ping (seq ${p.transportLayer.seq}/${p.transportLayer.total || 1})`
                : p.appLayer.protocol === "DNS"
                  ? `DNS A query for ${p.appLayer.hostname}`
                  : `${p.appLayer.method || "HTTP"} ${p.appLayer.path || "/"}`,
          };
        }

        // Build one or more reply packets for an incoming request. Image
        // responses are split into 3 fragments with staggered delayRemaining
        // so they leave the server one step apart; everything else returns
        // a single packet.
        static createReplyPackets(p, node) {
          const isLocal = isIpInSubnet(
            p.networkLayer.srcIP,
            node.ip,
            node.subnet || "255.255.255.0",
          );
          const nextHopIp = isLocal
            ? p.networkLayer.srcIP
            : node.gw || p.networkLayer.srcIP;
          const nextHopMac = IP_MAC_TABLE[nextHopIp];

          if (!nextHopMac)
            return {
              action: "DROP",
              reason: `${node.name} dropped reply: No ARP for return route.`,
            };

          const replyNextNode = node.switch || p.currentNode;
          const baseReply = {
            transactionId: p.transactionId,
            state: "TRANSIT",
            currentNode: node.id,
            nextNode: replyNextNode,
            progress: 0,
            networkLayer: {
              protocol: "IPv4",
              srcIP: node.ip,
              dstIP: p.networkLayer.srcIP,
              ttl: 64,
            },
            linkLayer: {
              protocol: this.getLinkProtocol(node.id, replyNextNode),
              srcMAC: node.mac,
              dstMAC: nextHopMac,
            },
          };

          if (p.appLayer.protocol === "Ping") {
            const reply = {
              ...baseReply,
              id: p.id,
              appLayer: { protocol: "Ping" },
              payload: "ICMP Echo Reply Data",
              transportLayer: { ...p.transportLayer },
            };
            return { action: "FORWARD", packets: [reply] };
          }

          if (p.appLayer.protocol === "DNS") {
            if (node.service !== "DNS") {
              return { action: "DROP", reason: "DNS service is not running." };
            }
            const hostname = normaliseHostname(p.appLayer.hostname);
            const record = (node.records || []).find(
              (r) =>
                normaliseHostname(r.hostname) === hostname &&
                (r.type || "A").toUpperCase() === "A",
            );
            const status = record ? "NOERROR" : "NXDOMAIN";
            const answerIp = record ? record.value : null;
            const ttl = record ? Number(record.ttl) || 300 : 0;
            const reply = {
              ...baseReply,
              id: generateId(),
              appLayer: {
                protocol: "DNS",
                method: "RESPONSE",
                hostname,
                path: p.appLayer.path || "/",
                requestedUrl: p.appLayer.requestedUrl,
                status,
                resolvedIp: answerIp,
                ttl,
              },
              payload: answerIp
                ? `DNS RESPONSE\n${hostname} A ${answerIp}\nTTL ${ttl}`
                : `DNS RESPONSE\n${hostname} NXDOMAIN`,
              transportLayer: {
                protocol: "UDP",
                srcPort: 53,
                dstPort: p.transportLayer.srcPort,
                seq: 1,
                total: 1,
                checksum:
                  "0x" +
                  Math.floor(Math.random() * 65535)
                    .toString(16)
                    .toUpperCase(),
              },
            };
            return { action: "FORWARD", packets: [reply] };
          }

          if (p.appLayer.protocol !== "HTTP") {
            return { action: "DROP", reason: "Unknown protocol" };
          }

          const requestedPath = (p.appLayer && p.appLayer.path) || "/";
          const fileName =
            requestedPath === "/" || requestedPath === ""
              ? "index.html"
              : requestedPath.replace(/^\//, "");
          const files = node.files || {};
          const file = files[fileName];

          const makeChecksum = () =>
            "0x" +
            Math.floor(Math.random() * 65535)
              .toString(16)
              .toUpperCase();

          // Determine fragment count: images are 3 fragments, everything
          // else is a single packet.
          let kind, resource, payloadText;
          if (!file) {
            kind = "error";
            resource = { kind: "error", message: "Not Found" };
            payloadText = `HTTP 404 Not Found\n\nThe requested resource ${requestedPath} was not found on ${node.name}.`;
          } else if (file.type === "image") {
            kind = "image";
            resource = {
              kind: "image",
              name: fileName,
              animal: file.animal,
            };
            payloadText = `HTTP 200 OK\nContent-Type: image/jpeg\n\n[binary image data: ${fileName}]`;
          } else {
            kind = "html";
            resource = {
              kind: "html",
              name: fileName,
              content: file.content,
            };
            payloadText = `HTTP 200 OK\nContent-Type: text/html\n\n${file.content}`;
          }

          const total = kind === "image" ? 3 : 1;
          const status = !file ? 404 : 200;
          const packets = [];
          for (let i = 0; i < total; i++) {
            const seq = i + 1;
            packets.push({
              ...baseReply,
              id: generateId(),
              appLayer: {
                protocol: "HTTP",
                method: "RESPONSE",
                status,
                path: requestedPath,
                resource,
              },
              payload:
                total > 1
                  ? `${payloadText}\n[fragment ${seq}/${total}]`
                  : payloadText,
              transportLayer: {
                protocol: "TCP",
                srcPort: 80,
                dstPort: p.transportLayer.srcPort,
                seq,
                total,
                checksum: makeChecksum(),
              },
              // Each subsequent fragment starts 200 progress (one full
              // hop) after the previous so they visibly chase each
              // other on the wire.
              delayRemaining: i * 200,
            });
          }
          return { action: "FORWARD", packets };
        }

        // Backwards-compatible wrapper: returns the first reply packet
        // only. Used by processRouter for router-replies-to-ping.
        static createReplyPacket(p, node) {
          const r = this.createReplyPackets(p, node);
          if (r.action !== "FORWARD") return r;
          return { action: "FORWARD", packet: r.packets[0] };
        }
      }

      // ==========================================
      // 3. REACT COMPONENTS
      // ==========================================

            <polygon points="18 12 15 9 15 15" fill="currentColor"></polygon>
          </svg>
        ),
        WAP: () => (
          <svg
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="1.5"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <path d="M5 12a10 10 0 0 1 14 0"></path>
            <path d="M8.5 15.5a5 5 0 0 1 7 0"></path>
            <circle
              cx="12"
              cy="19"
              r="1.2"
              fill="currentColor"
              stroke="none"
            ></circle>
          </svg>
        ),
        Laptop: () => (
          <svg
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="1.5"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <rect x="4" y="5" width="16" height="11" rx="1.5" ry="1.5"></rect>
