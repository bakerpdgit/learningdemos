          </svg>
        ),
        Packet: ({ color = "#f59e0b" }) => (
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill={color}
            stroke="#fff"
            strokeWidth="1"
            strokeLinecap="round"
            strokeLinejoin="round"
            className="packet-pulse"
          >
            <path d="M4 7.00005L10.2 11.65C11.2667 12.45 12.7333 12.45 13.8 11.65L20 7" />
            <rect x="3" y="5" width="18" height="14" rx="2" />
          </svg>
        ),
        Play: () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        ),
        Pause: () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        ),
        StepForward: () => (
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
          >
            <polygon points="5 4 15 12 5 20 5 4" fill="currentColor"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        ),
      };

      const ChangedValue = ({ value, className = "" }) => {
        const [flash, setFlash] = useState(false);
        const prev = useRef(value);
        useEffect(() => {
          if (prev.current !== value) {
            setFlash(true);
            const timer = setTimeout(() => setFlash(false), 800);
            prev.current = value;
            return () => clearTimeout(timer);
          }
        }, [value]);
        return (
          <span className={`${className} ${flash ? "flash-update" : ""}`}>
            {value}
          </span>
        );
      };

      const App = () => {
        const [nodes, setNodes] = useState(INITIAL_NODES);
        const [packets, setPackets] = useState([]);
        const [logs, setLogs] = useState([
          {
            id: "init",
            time: new Date().toLocaleTimeString(),
            msg: "Simulation initialized. Select a node to start.",
            type: "info",
          },
        ]);
        const [isPlaying, setIsPlaying] = useState(false);
        const [selectedNodeId, setSelectedNodeId] = useState(null);
        const [selectedPacketId, setSelectedPacketId] = useState(null);
        const [nodeExpanded, setNodeExpanded] = useState(true);
        const [packetExpanded, setPacketExpanded] = useState(false);
        const [autoFetchQueue, setAutoFetchQueue] = useState([]);
        const [editorState, setEditorState] = useState(null); // { serverId, fileName, content } | null
        // Active request-processing on target nodes — populated when a
        // request packet arrives at a server/PC/laptop. Each entry holds
        // the original request and a progress counter that ticks at the
        // same rate as packet progress (so 200 progress = 2 hops worth).
        const [processingEntries, setProcessingEntries] = useState([]);
        // Per-client transport buffers — fragments accumulate here until
        // all expected packets of a transmission have arrived.
        // Shape: { [clientId]: { [bufKey]: { received, total, fragments[], firstPacket } } }
        const [transportBuffers, setTransportBuffers] = useState({});
        // Per-client terminals (for ping output).
        // Shape: { [clientId]: [{ id, text, type }] }
        const [terminals, setTerminals] = useState({});
        // Last requested tab focus signal — fires the inspector to
        // switch tabs when an event (processing, fragment, delivery,
        // ping reply) wants attention drawn somewhere specific.
        const [tabSignal, setTabSignal] = useState({
          nodeId: null,
          tab: null,
          n: 0,
        });
        // Per-client ping/http target inputs, lifted up to App state so
        // the IP picker can write into them from the canvas.
        const [pingTargets, setPingTargets] = useState({});
        const [httpTargets, setHttpTargets] = useState({});
        // When set, the next canvas node click feeds that node's IP
        // back into the selected client's ping or HTTP input rather
        // than navigating the inspector to that node.
        const [pickerSlot, setPickerSlot] = useState(null); // 'PING' | 'HTTP' | null

        // Resolve the most useful IP for picker purposes — endpoint
        // nodes have a single .ip; routers expose their interfaces.
        const ipForPicker = (node) => {
          if (!node) return null;
          if (node.ip) return node.ip;
          if (node.interfaces && node.interfaces.length > 0)
            return node.interfaces[0].ip;
          return null;
        };

        const startPicker = (kind) => setPickerSlot(kind);
        const cancelPicker = () => setPickerSlot(null);

        // Cancel picker on Escape.
        useEffect(() => {
          if (!pickerSlot) return;
          const onKey = (e) => {
            if (e.key === "Escape") setPickerSlot(null);
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [pickerSlot]);

        // Reset picker if focus moves to a different node (auto-select
        // from a packet event, or the user manually clicked elsewhere).
        useEffect(() => {
          setPickerSlot(null);
        }, [selectedNodeId]);
        const [speed, setSpeed] = useState(2); // Progress increment per frame
        const [isDark, setIsDark] = useState(() =>
          document.documentElement.classList.contains("dark"),
        );
        const [leftPanelWidth, setLeftPanelWidth] = useState(300);
        const [isResizingLeft, setIsResizingLeft] = useState(false);

        useEffect(() => {
          if (!isResizingLeft) return;
          const onMove = (e) => {
            const next = Math.min(460, Math.max(240, e.clientX));
            setLeftPanelWidth(next);
          };
          const onUp = () => setIsResizingLeft(false);
          const prevCursor = document.body.style.cursor;
          const prevSelect = document.body.style.userSelect;
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
          return () => {
            document.body.style.cursor = prevCursor;
            document.body.style.userSelect = prevSelect;
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          };
        }, [isResizingLeft]);

        const activePackets = packets.filter(
          (p) => p.state === "TRANSIT" || p.state === "ARRIVED",
        );
        const transactionActive =
          activePackets.length > 0 ||
          autoFetchQueue.length > 0 ||
          processingEntries.length > 0;
        const inspectedPacket =
          packets.find((p) => p.id === selectedPacketId) ||
          activePackets[0] ||
          null;

        // Map of nodeId -> list of processing entries for fast lookup in UI.
        const processingByNode = {};
        processingEntries.forEach((e) => {
          if (!processingByNode[e.nodeId]) processingByNode[e.nodeId] = [];
          processingByNode[e.nodeId].push(e);
        });

        // When a transaction starts, auto-expand packet section and collapse
        // node section. When it ends, do the reverse. The user may toggle
        // either section manually in between transitions.
        useEffect(() => {
          if (transactionActive) {
            setNodeExpanded(false);
            setPacketExpanded(true);
          } else {
            setNodeExpanded(true);
            setPacketExpanded(false);
          }
        }, [transactionActive]);

        const toggleTheme = () => {
          const next = !isDark;
          setIsDark(next);
          document.documentElement.classList.toggle("dark", next);
          try {
            localStorage.setItem("uimode", next ? "dark" : "light");
          } catch (e) {}
        };

        const reqRef = useRef();

        // Refactored pure state processor to safely execute without side-effect collision during React renders
        const handleProcessStep = useCallback(
          (currentPackets, currentBuffers) => {
            let nextPackets = [];
            let nodeUpdates = {};
            let logsToAdd = [];
            let clearSelectedPacket = false;
            let followUpRequests = []; // [{ clientId, targetIp, path, transactionId }]
            let processingAdds = []; // new processing entries to enqueue
            let terminalAdds = []; // [{ clientId, text, type }]
            let bufferUpdates = {}; // { clientId: { bufKey: bufEntry } }
            let autoSelectNodeId = null;
            let autoSelectTab = null;
            let autoExpandPacket = false;

            const addLocalLog = (msg, type = "info") =>
              logsToAdd.push({ msg, type });

            const bufKeyFor = (pkt) =>
              `${pkt.transactionId}|${pkt.appLayer.protocol}|${pkt.appLayer.path || ""}`;

            currentPackets.forEach((p) => {
              // Only TRANSIT packets that have actually finished their
              // current hop (progress >= 100, not still in delay)
              // transition to ARRIVED here. Others are still in flight
              // and must be preserved untouched.
              if (
                p.state === "TRANSIT" &&
                !(p.delayRemaining > 0) &&
                p.progress >= 100
              ) {
                let np = {
                  ...p,
                  state: "ARRIVED",
                  progress: 100,
                  prevNode: p.currentNode,
                  currentNode: p.nextNode,
                };
                nextPackets.push(np);
                addLocalLog(
                  `Packet ${p.id.substring(0, 4)} arrived at ${nodes[p.nextNode].name}`,
                );
              } else if (p.state === "TRANSIT") {
                // Still in transit or delay — preserve as-is.
                nextPackets.push(p);
              } else if (p.state === "ARRIVED") {
                const node = nodes[p.currentNode];
                const activeNode = nodeUpdates[node.id] || node;
                let result;

                addLocalLog(`Processing packet at ${activeNode.name}...`);

                if (activeNode.type === "Switch" || activeNode.type === "WAP")
                  result = NetworkEngine.processSwitch(p, activeNode);
                else if (activeNode.type === "Router")
                  result = NetworkEngine.processRouter(p, activeNode);
                else result = NetworkEngine.processPC(p, activeNode);

                if (result.extraLogs) {
                  result.extraLogs.forEach((msg) => addLocalLog(msg, "info"));
                }
                if (result.updatedNode) {
                  nodeUpdates[result.updatedNode.id] = result.updatedNode;
                }

                if (result.action === "FORWARD") {
                  nextPackets.push(result.packet);
                  addLocalLog(
                    `Packet routed from ${activeNode.name} towards ${nodes[result.packet.nextNode].name}`,
                    "success",
                  );
                } else if (result.action === "PROCESSING") {
                  // Request consumed for service-side processing — emit
                  // a processing entry; reply will be generated after the
                  // 2-step delay completes.
                  processingAdds.push({
                    id: generateId(),
                    nodeId: activeNode.id,
                    request: result.request,
                    requestType: result.requestType,
                    summary: result.summary,
                    progress: 0,
                    totalProgress: 200, // 2 simulation steps worth
                  });
                  addLocalLog(
                    `${activeNode.name} service started processing ${result.summary}`,
                    "info",
                  );
                  // Auto-select the target so students see the service view.
                  autoSelectNodeId = activeNode.id;
                  autoSelectTab = "SERVICE";
                  if (selectedPacketId === p.id) clearSelectedPacket = true;
                } else if (result.action === "CONSUME") {
                  addLocalLog(result.message, "success");
                  const rp = result.responsePacket;
                  const isHttp =
                    rp &&
                    rp.appLayer &&
                    rp.appLayer.protocol === "HTTP" &&
                    rp.appLayer.method === "RESPONSE";
                  const isDns =
                    rp &&
                    rp.appLayer &&
                    rp.appLayer.protocol === "DNS" &&
                    rp.appLayer.method === "RESPONSE";
                  const isPing =
                    rp && rp.appLayer && rp.appLayer.protocol === "Ping";

                  if (
                    isDns &&
                    (activeNode.type === "PC" || activeNode.type === "Laptop")
                  ) {
                    const hostname = rp.appLayer.hostname;
                    const resolvedIp = rp.appLayer.resolvedIp;
                    const status = rp.appLayer.status;
                    const prevBrowser = activeNode.browser || defaultBrowser();
                    if (status === "NOERROR" && resolvedIp) {
                      const nextCache = [
                        makeDnsCacheEntry(
                          hostname,
                          resolvedIp,
                          rp.appLayer.ttl || 300,
                        ),
                        ...(activeNode.dnsCache || []).filter(
                          (entry) =>
                            normaliseHostname(entry.hostname) !==
                            normaliseHostname(hostname),
                        ),
                      ];
                      nodeUpdates[activeNode.id] = {
                        ...activeNode,
                        dnsCache: nextCache,
                        browser: {
                          ...prevBrowser,
                          address:
                            rp.appLayer.requestedUrl ||
                            `http://${hostname}${rp.appLayer.path || "/"}`,
                          lastResolution: {
                            hostname,
                            ip: resolvedIp,
                            source: "DNS server",
                            status,
                            time: new Date().toLocaleTimeString(),
                          },
                        },
                      };
                      followUpRequests.push({
                        clientId: activeNode.id,
                        targetIp: resolvedIp,
                        path: rp.appLayer.path || "/",
                        host: hostname,
                        requestedUrl:
                          rp.appLayer.requestedUrl ||
                          `http://${hostname}${rp.appLayer.path || "/"}`,
                        transactionId: p.transactionId,
                      });
                      addLocalLog(
                        `${activeNode.name} cached DNS answer: ${hostname} -> ${resolvedIp}`,
                        "success",
                      );
                    } else {
                      nodeUpdates[activeNode.id] = {
                        ...activeNode,
                        browser: {
                          ...prevBrowser,
                          address:
                            rp.appLayer.requestedUrl ||
                            `http://${hostname}${rp.appLayer.path || "/"}`,
                          page: {
                            serverIp: null,
                            host: hostname,
                            path: rp.appLayer.path || "/",
                            html: null,
                            status: "DNS_ERROR",
                            message: `DNS could not resolve ${hostname}.`,
                          },
                          resources: {},
                          lastResolution: {
                            hostname,
                            ip: null,
                            source: "DNS server",
                            status,
                            time: new Date().toLocaleTimeString(),
                          },
                        },
                      };
                      addLocalLog(
                        `${activeNode.name} received DNS NXDOMAIN for ${hostname}.`,
                        "error",
                      );
                    }
                    autoSelectNodeId = activeNode.id;
                    autoSelectTab = "BROWSER";
                  } else if (
                    isHttp &&
                    (activeNode.type === "PC" || activeNode.type === "Laptop")
                  ) {
                    // Accumulate into transport buffer; only deliver once
                    // every expected fragment has arrived.
                    const bufKey = bufKeyFor(rp);
                    const clientBufs = {
                      ...(currentBuffers[activeNode.id] || {}),
                      ...(bufferUpdates[activeNode.id] || {}),
                    };
                    const prev = clientBufs[bufKey] || {
                      total: rp.transportLayer.total || 1,
                      received: 0,
                      fragments: [],
                      firstPacket: rp,
                    };
                    const fragments = [...prev.fragments, rp];
                    const received = fragments.length;
                    const total = prev.total;
                    const updatedBuf = {
                      ...prev,
                      fragments,
                      received,
                    };
                    if (!bufferUpdates[activeNode.id])
                      bufferUpdates[activeNode.id] = {};
                    bufferUpdates[activeNode.id][bufKey] = updatedBuf;
                    addLocalLog(
                      `${activeNode.name} transport layer: ${received}/${total} fragment${total > 1 ? "s" : ""} received for ${rp.appLayer.path}`,
                      "info",
                    );

                    // Focus the student on the receiving client so they
                    // can watch the transport buffer fill up. The full
                    // delivery path below will re-focus to ensure the
                    // browser tab gets attention once the page is whole.
                    autoSelectNodeId = activeNode.id;
                    autoSelectTab = received >= total ? "BROWSER" : "TRANSPORT";

                    if (received >= total) {
                      // Fully assembled — deliver to the browser layer.
                      const res = rp.appLayer.resource || {};
                      const serverIp = rp.networkLayer.srcIP;
                      const prevBrowser = activeNode.browser || {
                        page: null,
                        resources: {},
                      };
                      let newBrowser;
                      if (res.kind === "html") {
                        const imgRefs = extractImageRefs(res.content);
                        const resources = {};
                        imgRefs.forEach((ref) => {
                          const resolved = resolveUrl(ref, serverIp);
                          const key = ref;
                          resources[key] = {
                            status: "loading",
                            ref,
                            targetIp: resolved ? resolved.ip : serverIp,
                            path: resolved ? resolved.path : "/" + ref,
                          };
                          followUpRequests.push({
                            clientId: activeNode.id,
                            targetIp: resolved ? resolved.ip : serverIp,
                            path: resolved ? resolved.path : "/" + ref,
                            resourceKey: key,
                            transactionId: p.transactionId,
                          });
                        });
                        newBrowser = {
                          ...prevBrowser,
                          page: {
                            serverIp,
                            host: rp.appLayer.host || serverIp,
                            path: rp.appLayer.path,
                            requestedUrl:
                              rp.appLayer.requestedUrl ||
                              `http://${rp.appLayer.host || serverIp}${rp.appLayer.path}`,
                            html: res.content,
                            status: 200,
                          },
                          resources,
                        };
                      } else if (res.kind === "image") {
                        const resources = { ...(prevBrowser.resources || {}) };
                        const incomingName = res.name;
                        let matchedKey = null;
                        Object.keys(resources).forEach((k) => {
                          if (
                            k === incomingName ||
                            k.endsWith("/" + incomingName)
                          ) {
                            matchedKey = k;
                          }
                        });
                        if (matchedKey) {
                          resources[matchedKey] = {
                            ...resources[matchedKey],
                            status: "loaded",
                            animal: res.animal,
                          };
                        }
                        newBrowser = { ...prevBrowser, resources };
                      } else {
                        newBrowser = {
                          ...prevBrowser,
                          page: {
                            serverIp,
                            host: rp.appLayer.host || serverIp,
                            path: rp.appLayer.path,
                            requestedUrl:
                              rp.appLayer.requestedUrl ||
                              `http://${rp.appLayer.host || serverIp}${rp.appLayer.path}`,
                            html: null,
                            status: rp.appLayer.status || 500,
                            message:
                              (res && res.message) || "Error fetching resource",
                          },
                          resources: {},
                        };
                      }
                      nodeUpdates[activeNode.id] = {
                        ...activeNode,
                        browser: newBrowser,
                        browserOutput: result.responseData,
                      };
                      // Buffer fully delivered — clear it.
                      bufferUpdates[activeNode.id][bufKey] = null;
                      addLocalLog(
                        `${activeNode.name} delivered ${rp.appLayer.path} to the browser layer.`,
                        "success",
                      );
                      autoSelectNodeId = activeNode.id;
                    }
                  } else if (
                    isPing &&
                    (activeNode.type === "PC" || activeNode.type === "Laptop")
                  ) {
                    // Ping reply → terminal entry on the client.
                    terminalAdds.push({
                      clientId: activeNode.id,
                      text: `Reply from ${rp.networkLayer.srcIP}: bytes=32 seq=${rp.transportLayer.seq}/${rp.transportLayer.total || 1} time<1ms`,
                      type: "reply",
                    });
                    autoSelectNodeId = activeNode.id;
                    autoSelectTab = "TERMINAL";
                  } else if (
                    result.responseData &&
                    activeNode.type === "Server"
                  ) {
                    nodeUpdates[activeNode.id] = {
                      ...activeNode,
                      browserOutput: result.responseData,
                    };
                  }
                  if (selectedPacketId === p.id) clearSelectedPacket = true;
                } else if (result.action === "DROP") {
                  addLocalLog(result.reason, "error");
                  nextPackets.push({
                    ...p,
                    state: "DROPPED",
                    dropTime: performance.now(),
                  });
                  if (selectedPacketId === p.id) clearSelectedPacket = true;
                }
              } else if (p.state === "DROPPED") {
                nextPackets.push(p);
              }
            });

            return {
              nextPackets,
              nodeUpdates,
              logsToAdd,
              clearSelectedPacket,
              followUpRequests,
              processingAdds,
              terminalAdds,
              bufferUpdates,
              autoSelectNodeId,
              autoSelectTab,
              autoExpandPacket,
            };
          },
          [nodes, selectedPacketId],
        );

        // Safe async commit of aggregated side-effects calculated during processing
        const commitUpdates = useCallback((result) => {
          if (
            result.nodeUpdates &&
            Object.keys(result.nodeUpdates).length > 0
          ) {
            setTimeout(
              () => setNodes((n) => ({ ...n, ...result.nodeUpdates })),
              0,
            );
          }
          if (result.logsToAdd && result.logsToAdd.length > 0) {
            setTimeout(() => {
              setLogs((l) => {
                const newLogs = result.logsToAdd.map((log) => ({
                  id: generateId(),
                  time: new Date().toLocaleTimeString(),
                  msg: log.msg,
                  type: log.type,
                }));
                return [...newLogs, ...l].slice(0, 50);
              });
            }, 0);
          }
          if (result.clearSelectedPacket) {
            setTimeout(() => setSelectedPacketId(null), 0);
          }
          if (result.followUpRequests && result.followUpRequests.length > 0) {
            // Sync update so transactionActive doesn't briefly flip false
            // between the packet being consumed and the queue receiving
            // its follow-up entries (which would cause the inspector to
            // flicker collapsed for one frame).
            setAutoFetchQueue((q) => [...q, ...result.followUpRequests]);
          }
          if (result.processingAdds && result.processingAdds.length > 0) {
            // Sync to keep transactionActive true across the request->reply gap.
            setProcessingEntries((q) => [...q, ...result.processingAdds]);
          }
          if (result.terminalAdds && result.terminalAdds.length > 0) {
            setTimeout(() => {
              setTerminals((t) => {
                const next = { ...t };
                result.terminalAdds.forEach((ta) => {
                  const existing = next[ta.clientId] || [];
                  next[ta.clientId] = [
                    ...existing,
                    { id: generateId(), text: ta.text, type: ta.type },
                  ].slice(-50);
                });
                return next;
              });
            }, 0);
          }
          if (
            result.bufferUpdates &&
            Object.keys(result.bufferUpdates).length > 0
          ) {
            setTimeout(() => {
              setTransportBuffers((prev) => {
                const next = { ...prev };
                Object.entries(result.bufferUpdates).forEach(
                  ([clientId, bufs]) => {
                    const merged = { ...(next[clientId] || {}) };
                    Object.entries(bufs).forEach(([key, val]) => {
                      if (val === null) delete merged[key];
                      else merged[key] = val;
                    });
                    next[clientId] = merged;
                  },
                );
                return next;
              });
            }, 0);
          }
          if (result.autoSelectNodeId) {
            setTimeout(() => {
              setSelectedNodeId(result.autoSelectNodeId);
              setNodeExpanded(true);
              // Auto-collapse the packet section so the node view
              // (Service / Browser / Terminal) is the focus until the
              // next packet appears.
              setPacketExpanded(false);
              if (result.autoSelectTab) {
                setTabSignal((s) => ({
                  nodeId: result.autoSelectNodeId,
                  tab: result.autoSelectTab,
                  n: s.n + 1,
                }));
              }
            }, 0);
          }
        }, []);

        // Stable references so the animation loop can read the latest
        // buffer/processing state without recreating itself every frame.
        const buffersRef = useRef(transportBuffers);
        useEffect(() => {
          buffersRef.current = transportBuffers;
        }, [transportBuffers]);
        const nodesRef = useRef(nodes);
        useEffect(() => {
          nodesRef.current = nodes;
        }, [nodes]);
        const processingRef = useRef(processingEntries);
        useEffect(() => {
          processingRef.current = processingEntries;
        }, [processingEntries]);
        const packetsRef = useRef(packets);
        useEffect(() => {
          packetsRef.current = packets;
        }, [packets]);
        const handleProcessStepRef = useRef(handleProcessStep);
        useEffect(() => {
          handleProcessStepRef.current = handleProcessStep;
        }, [handleProcessStep]);

        // Tick a single simulation step's worth of "time". Used both by
        // the animation frame loop (small increments) and the manual
        // step button (one full hop = 100).
        const tickSimulation = useCallback(
          (dt, dtProc) => {
            const procDt = dtProc != null ? dtProc : dt;
            // 1. Advance processing entries; emit replies when complete.
            //    We compute the new processing list and new reply packets
            //    BEFORE dispatching any state update so React can never
            //    invoke the updater twice with a stale newReplies array.
            const currentProcessing = processingRef.current || [];
            const newReplies = [];
            const remainingProcessing = [];
            const completedProcessingMsgs = [];
            for (const entry of currentProcessing) {
              const newProgress = entry.progress + procDt;
              if (newProgress >= entry.totalProgress) {
                const targetNode = nodesRef.current[entry.nodeId];
                if (!targetNode) continue;
                const r = NetworkEngine.createReplyPackets(
                  entry.request,
                  targetNode,
                );
                if (r.action === "FORWARD") {
                  r.packets.forEach((pkt) => newReplies.push(pkt));
                  completedProcessingMsgs.push({
                    msg: `${targetNode.name} sent response (${r.packets.length} packet${r.packets.length > 1 ? "s" : ""})`,
                    type: "success",
                  });
                } else {
                  completedProcessingMsgs.push({
                    msg: r.reason || "Reply could not be built",
                    type: "error",
                  });
                }
              } else {
                remainingProcessing.push({ ...entry, progress: newProgress });
              }
            }
            if (
              remainingProcessing.length !== currentProcessing.length ||
              remainingProcessing.some(
                (e, i) => e.progress !== currentProcessing[i].progress,
              )
            ) {
              setProcessingEntries(remainingProcessing);
              processingRef.current = remainingProcessing;
            }

            if (completedProcessingMsgs.length > 0) {
              setTimeout(() => {
                setLogs((l) =>
                  [
                    ...completedProcessingMsgs.map((m) => ({
                      id: generateId(),
                      time: new Date().toLocaleTimeString(),
                      msg: m.msg,
                      type: m.type,
                    })),
                    ...l,
                  ].slice(0, 50),
                );
              }, 0);
            }

            if (newReplies.length > 0) {
              // Processing finished → focus the student on the return
              // packet that's about to travel.
              setTimeout(() => {
                setSelectedPacketId(newReplies[0].id);
                setPacketExpanded(true);
                setNodeExpanded(false);
              }, 0);
            }

            // 2. Advance packets (delay countdown first, then progress);
            //    process arrivals when a packet finishes a hop.
            //    Compute the new packet list synchronously from refs so
            //    we never depend on the functional-updater closure.
            const currentPackets = packetsRef.current || [];
            let nextPackets = currentPackets.filter(
              (p) =>
                !(
                  p.state === "DROPPED" && performance.now() - p.dropTime > 1500
                ),
            );

            let needsProcessing = false;
            nextPackets = nextPackets.map((p) => {
              if (p.state === "TRANSIT") {
                const delay = p.delayRemaining || 0;
                if (delay > 0) {
                  return {
                    ...p,
                    delayRemaining: Math.max(0, delay - dt),
                  };
                }
                const nextProgress = p.progress + dt;
                if (nextProgress >= 100) {
                  needsProcessing = true;
                  return { ...p, progress: 100 };
                }
                return { ...p, progress: nextProgress };
              } else if (p.state === "ARRIVED") {
                needsProcessing = true;
              }
              return p;
            });

            if (needsProcessing) {
              const result = handleProcessStepRef.current(
                nextPackets,
                buffersRef.current,
              );
              commitUpdates(result);
              nextPackets = result.nextPackets;
            }

            // Append newly emitted reply packets AFTER the advance step
            // so the first packet of a response is visible at its source
            // (the server) for one tick before it starts moving — same
            // behaviour the staggered 2nd/3rd fragments exhibit thanks
            // to their delayRemaining.
            if (newReplies.length > 0) {
              nextPackets = [...nextPackets, ...newReplies];
            }

            setPackets(nextPackets);
            packetsRef.current = nextPackets;
          },
          [commitUpdates],
        );

        // Animation Loop
        useEffect(() => {
          if (!isPlaying) return;

          let lastTime = performance.now();
          const animate = (time) => {
            const deltaTime = time - lastTime;
            if (deltaTime > 20) {
              // In animation mode, processing ticks at 2x packet speed so
              // the "constructing response" view doesn't drag out.
              tickSimulation(speed, speed * 2);
              lastTime = time;
            }
            reqRef.current = requestAnimationFrame(animate);
          };
          reqRef.current = requestAnimationFrame(animate);
          return () => cancelAnimationFrame(reqRef.current);
        }, [isPlaying, speed, tickSimulation]);

        const handlePlayToggle = () => {
          if (!isPlaying && !transactionActive) {
            commitUpdates({
              logsToAdd: [
                {
                  msg: "No active packets. Click a node to send a ping or HTTP request first.",
                  type: "error",
                },
              ],
              nodeUpdates: {},
            });
            return;
          }
          setIsPlaying(!isPlaying);
        };

        const manualStep = () => {
          if (!transactionActive) {
            commitUpdates({
              logsToAdd: [
                {
                  msg: "No active packets. Click a node to send a ping or HTTP request first.",
                  type: "error",
                },
              ],
              nodeUpdates: {},
            });
            return;
          }
          // One "step" = one full hop = 100 progress units.
          tickSimulation(100);
        };

        const sendUserRequest = (nodeId, targetIp, type, options = {}) => {
          const node = nodes[nodeId];
          if (!targetIp.match(/^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/)) {
            commitUpdates({
              logsToAdd: [{ msg: "Invalid IP address format.", type: "error" }],
              nodeUpdates: {},
            });
            return;
          }

          // Ping emits 4 staggered request packets per Send, mirroring
          // the default Windows `ping` behaviour. Each subsequent packet
          // starts one full hop later than the previous so students see
          // them chase one another along the wire.
          const pingCount = type === "PING" ? 4 : 1;
          const txId = generateId();
          const newPackets = [];
          let target;
          for (let i = 0; i < pingCount; i++) {
            const seq = i + 1;
            const opts = {
              ...options,
              transactionId: txId,
              ...(type === "PING"
                ? { pingSeq: seq, pingTotal: pingCount }
                : {}),
            };
            const res = NetworkEngine.createRequestPacket(
              node,
              targetIp,
              type,
              opts,
            );
            if (res.error) {
              commitUpdates({
                logsToAdd: [{ msg: res.error, type: "error" }],
                nodeUpdates: {},
              });
              return;
            }
            if (type === "PING") {
              res.packet.transportLayer.seq = seq;
              res.packet.transportLayer.total = pingCount;
            }
            res.packet.delayRemaining = i * 200; // 2-step stagger
            newPackets.push(res.packet);
          }
          target =
            type === "HTTP"
              ? `${options.host || targetIp}${options.path || "/"}`
              : type === "DNS"
                ? `${options.hostname} via ${targetIp}`
                : targetIp;

          setPackets((prev) => [...prev, ...newPackets]);
          commitUpdates({
            logsToAdd: [
              {
                msg:
                  type === "PING"
                    ? `${node.name} pinging ${target} (${pingCount} packets)`
                    : `Created ${type} request from ${node.name} to ${target}`,
                type: "success",
              },
            ],
            nodeUpdates: {},
          });
          setSelectedPacketId(newPackets[0].id);
          setPacketExpanded(true);
          setNodeExpanded(false);
        };

        // Drain the auto-fetch queue once the previous transaction fully
        // completes (no packets in flight and no processing entries left).
        useEffect(() => {
          if (activePackets.length > 0) return;
          if (processingEntries.length > 0) return;
          if (autoFetchQueue.length === 0) return;
          const [next, ...rest] = autoFetchQueue;
          const clientNode = nodes[next.clientId];
          if (!clientNode) {
            setAutoFetchQueue(rest);
            return;
          }
          setAutoFetchQueue(rest);
          const res = NetworkEngine.createRequestPacket(
            clientNode,
            next.targetIp,
            "HTTP",
            {
              path: next.path,
              host: next.host || next.targetIp,
              requestedUrl:
                next.requestedUrl || `http://${next.host || next.targetIp}${next.path}`,
              transactionId: next.transactionId,
            },
          );
          if (res.error) {
            commitUpdates({
              logsToAdd: [
                {
                  msg: `Auto-fetch failed: ${res.error}`,
                  type: "error",
                },
              ],
              nodeUpdates: {},
            });
            return;
          }
          setPackets((prev) => [...prev, res.packet]);
          commitUpdates({
            logsToAdd: [
              {
                  msg: `${clientNode.name} auto-fetching ${next.host || next.targetIp}${next.path}`,
                  type: "info",
                },
            ],
            nodeUpdates: {},
          });
          setSelectedPacketId(res.packet.id);
          setPacketExpanded(true);
          setNodeExpanded(false);
        }, [
          activePackets.length,
          processingEntries.length,
          autoFetchQueue,
          nodes,
          commitUpdates,
        ]);

        const updateNode = (nodeId, updater) => {
          setNodes((prev) => {
            const node = prev[nodeId];
            if (!node) return prev;
            return { ...prev, [nodeId]: updater(node) };
          });
        };

        const setClientBrowserAddress = (clientId, address) => {
          updateNode(clientId, (client) => ({
            ...client,
            browser: { ...(client.browser || defaultBrowser()), address },
          }));
        };

        const updateClientBrowserShell = (clientId, browserPatch) => {
          updateNode(clientId, (client) => ({
            ...client,
            browser: {
              ...(client.browser || defaultBrowser()),
              ...browserPatch,
            },
          }));
        };

        const resolveBrowserRequest = (clientId, parsed) => {
          const client = nodes[clientId];
          if (!client) return;
          const hostname = normaliseHostname(parsed.host);
          if (!hostname) {
            commitUpdates({
              logsToAdd: [{ msg: "Browser address has no host name.", type: "error" }],
              nodeUpdates: {},
            });
            return;
          }

          if (parsed.isIp && parsed.targetIp) {
            updateClientBrowserShell(clientId, {
              address: parsed.displayUrl,
              lastResolution: {
                hostname,
                ip: parsed.targetIp,
                source: "Direct IP address",
                status: "SKIPPED_DNS",
                time: new Date().toLocaleTimeString(),
              },
            });
            sendUserRequest(clientId, parsed.targetIp, "HTTP", {
              path: parsed.path,
              host: parsed.targetIp,
              requestedUrl: parsed.displayUrl,
            });
            return;
          }

          const hostsEntry = (client.hostsFile || []).find(
            (entry) => normaliseHostname(entry.hostname) === hostname,
          );
          if (hostsEntry && hostsEntry.ip) {
            updateClientBrowserShell(clientId, {
              address: parsed.displayUrl,
              lastResolution: {
                hostname,
                ip: hostsEntry.ip,
                source: "hosts file",
                status: "NOERROR",
                time: new Date().toLocaleTimeString(),
              },
            });
            commitUpdates({
              logsToAdd: [
                {
                  msg: `${client.name} resolved ${hostname} from its local hosts file.`,
                  type: "success",
                },
              ],
              nodeUpdates: {},
            });
            sendUserRequest(clientId, hostsEntry.ip, "HTTP", {
              path: parsed.path,
              host: hostname,
              requestedUrl: parsed.displayUrl,
            });
            return;
          }

          const cacheEntry = (client.dnsCache || []).find(
            (entry) => normaliseHostname(entry.hostname) === hostname,
          );
          if (cacheEntry && cacheEntry.ip) {
            updateClientBrowserShell(clientId, {
              address: parsed.displayUrl,
              lastResolution: {
                hostname,
                ip: cacheEntry.ip,
                source: "DNS cache",
                status: "NOERROR",
                time: new Date().toLocaleTimeString(),
              },
            });
            commitUpdates({
              logsToAdd: [
                {
                  msg: `${client.name} resolved ${hostname} from local DNS cache.`,
                  type: "success",
                },
              ],
              nodeUpdates: {},
            });
            sendUserRequest(clientId, cacheEntry.ip, "HTTP", {
              path: parsed.path,
              host: hostname,
              requestedUrl: parsed.displayUrl,
            });
            return;
          }

          if (!client.dns || !isValidIp(client.dns)) {
            updateClientBrowserShell(clientId, {
              address: parsed.displayUrl,
              page: {
                serverIp: null,
                host: hostname,
                path: parsed.path,
                html: null,
                status: "DNS_ERROR",
                message: "No valid DNS server is configured.",
              },
              resources: {},
              lastResolution: {
                hostname,
                ip: null,
                source: "DNS configuration",
                status: "NO_DNS_SERVER",
                time: new Date().toLocaleTimeString(),
              },
            });
            commitUpdates({
              logsToAdd: [
                {
                  msg: `${client.name} cannot resolve ${hostname}: no DNS server configured.`,
                  type: "error",
                },
              ],
              nodeUpdates: {},
            });
            return;
          }

          updateClientBrowserShell(clientId, {
            address: parsed.displayUrl,
            lastResolution: {
              hostname,
              ip: null,
              source: "DNS query pending",
              status: "PENDING",
              time: new Date().toLocaleTimeString(),
            },
          });
          sendUserRequest(clientId, client.dns, "DNS", {
            hostname,
            path: parsed.path,
            requestedUrl: parsed.displayUrl,
          });
        };

        // Handler used by the mini browser when the student clicks a link.
        const handleBrowserNavigate = (clientId, url) => {
          const client = nodes[clientId];
          if (!client) return;
          const parsed = parseBrowserTarget(url, client.browser?.page || null);
          if (parsed.error) {
            commitUpdates({
              logsToAdd: [
                {
                  msg: parsed.error,
                  type: "error",
                },
              ],
              nodeUpdates: {},
            });
            return;
          }
          resolveBrowserRequest(clientId, parsed);
        };

        // Handlers for editing server filesystems.
        const openFileEditor = (serverId, fileName) => {
          const server = nodes[serverId];
          if (!server) return;
          const file = (server.files || {})[fileName];
          if (file && file.type === "image") return;
          setEditorState({
            serverId,
            fileName,
            content: file ? file.content : "",
            isNew: !file,
          });
        };
        const closeFileEditor = () => setEditorState(null);
        const saveFile = (serverId, fileName, content) => {
          setNodes((prev) => {
            const server = prev[serverId];
            if (!server) return prev;
            const files = { ...(server.files || {}) };
            files[fileName] = { type: "html", content };
            return { ...prev, [serverId]: { ...server, files } };
          });
          setEditorState(null);
        };
        const deleteFile = (serverId, fileName) => {
          if (fileName === "index.html") return;
          setNodes((prev) => {
            const server = prev[serverId];
            if (!server) return prev;
            const files = { ...(server.files || {}) };
            delete files[fileName];
            return { ...prev, [serverId]: { ...server, files } };
          });
        };

        const addDnsRecord = (serverId, record) => {
          const hostname = normaliseHostname(record.hostname);
          const value = (record.value || "").trim();
          if (!hostname || !isValidIp(value)) return;
          updateNode(serverId, (server) => ({
            ...server,
            records: [
              ...(server.records || []),
              {
                id: generateId(),
                hostname,
                type: "A",
                value,
                ttl: Number(record.ttl) || 300,
              },
            ],
          }));
        };

        const updateDnsRecord = (serverId, recordId, field, value) => {
          updateNode(serverId, (server) => ({
            ...server,
            records: (server.records || []).map((record) =>
              record.id === recordId
                ? {
                    ...record,
                    [field]:
                      field === "hostname"
                        ? normaliseHostname(value)
                        : field === "ttl"
                          ? Number(value) || 0
                          : value,
                  }
                : record,
            ),
          }));
        };

        const deleteDnsRecord = (serverId, recordId) => {
          updateNode(serverId, (server) => ({
            ...server,
            records: (server.records || []).filter(
              (record) => record.id !== recordId,
            ),
          }));
        };

        const addHostEntry = (clientId, entry) => {
          const hostname = normaliseHostname(entry.hostname);
          const ip = (entry.ip || "").trim();
          if (!hostname || !isValidIp(ip)) return;
          updateNode(clientId, (client) => ({
            ...client,
            hostsFile: [
              ...(client.hostsFile || []),
              { id: generateId(), hostname, ip },
            ],
          }));
        };

        const updateHostEntry = (clientId, entryId, field, value) => {
          updateNode(clientId, (client) => ({
            ...client,
            hostsFile: (client.hostsFile || []).map((entry) =>
              entry.id === entryId
                ? {
                    ...entry,
                    [field]:
                      field === "hostname" ? normaliseHostname(value) : value,
                  }
                : entry,
            ),
          }));
        };

        const deleteHostEntry = (clientId, entryId) => {
          updateNode(clientId, (client) => ({
            ...client,
            hostsFile: (client.hostsFile || []).filter(
              (entry) => entry.id !== entryId,
            ),
          }));
        };

        const clearDnsCache = (clientId) => {
          updateNode(clientId, (client) => ({
            ...client,
            dnsCache: [],
            browser: {
              ...(client.browser || defaultBrowser()),
              lastResolution: null,
            },
          }));
        };

        // Render Helpers
        const getEntityColor = (nodeId) => {
          if (nodeId.includes("A") || nodeId.includes("1")) return "#3b82f6"; // Blue for Subnet A
          if (
            nodeId.includes("B") ||
            nodeId.includes("2") ||
            nodeId.includes("3")
          )
            return "#10b981"; // Green for Subnet B
          if (nodeId.includes("EDGE") || nodeId.includes("INT"))
            return "#ef4444"; // Red for Edge/Internet
          return "#8b5cf6"; // Purple for Core
        };

        return (
          <div className="flex flex-col h-screen overflow-hidden">
            {/* CS Learning Header */}
            <header className="bg-white dark:bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0 border-b border-slate-200 dark:border-transparent">
              <a
                href="index.html"
                className="font-mono text-[1.2rem] font-bold text-sky-700 dark:text-headerAccent tracking-widest no-underline"
              >
                <span className="text-slate-400 dark:text-slate-500">&lt;</span>
                CS
                <span className="text-slate-400 dark:text-slate-500">&gt;</span>
                &nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a
                  href="index.html"
                  className="text-slate-600 dark:text-slate-400 hover:text-sky-700 dark:hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                >
                  Home
                </a>
                <button
                  onClick={toggleTheme}
                  className="text-slate-600 dark:text-slate-400 hover:text-sky-700 dark:hover:text-headerAccent transition-colors p-1"
                  aria-label="Toggle Dark Mode"
                >
                  {isDark ? (
                    <svg
                      className="w-5 h-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        strokeWidth={2}
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                      />
                    </svg>
                  ) : (
                    <svg
                      className="w-5 h-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        strokeWidth={2}
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
                      />
                    </svg>
                  )}
                </button>
              </nav>
            </header>

            {/* Simulation Controls Sub-header */}
            <div className="bg-slate-100 dark:bg-slate-800 border-b border-slate-300 dark:border-slate-700 px-6 py-2 flex items-center gap-4 shrink-0 z-40">
              <span className="text-slate-700 dark:text-slate-300 text-sm font-semibold flex items-center gap-1">
                <Icons.Router /> LAN &amp; WAN Simulator
              </span>
              <div className="flex gap-3 items-center ml-auto">
                <button
                  onClick={handlePlayToggle}
                  disabled={!isPlaying && !transactionActive}
                  className={`flex items-center gap-1 px-3 py-1.5 rounded font-semibold text-sm transition disabled:opacity-50 disabled:cursor-not-allowed ${isPlaying ? "bg-amber-500 hover:bg-amber-600 text-white" : "bg-green-600 hover:bg-green-500 text-white"}`}
                >
                  {isPlaying ? (
                    <>
                      <Icons.Pause /> Pause
                    </>
                  ) : (
                    <>
                      <Icons.Play /> Play
                    </>
                  )}
                </button>
                <button
                  onClick={manualStep}
                  disabled={isPlaying || !transactionActive}
                  className="flex items-center gap-1 px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded font-semibold text-sm disabled:opacity-50 disabled:cursor-not-allowed transition"
                >
                  <Icons.StepForward /> Step Forward
                </button>
                <div className="flex items-center gap-2 text-sm text-slate-700 dark:text-slate-300 border-l border-slate-300 dark:border-slate-700 pl-4">
                  <span>Speed:</span>
                  <input
                    type="range"
                    min="0.5"
                    max="5"
                    step="0.5"
                    value={speed}
                    onChange={(e) => setSpeed(parseFloat(e.target.value))}
                    className="w-24 accent-blue-500"
                  />
                </div>
              </div>
            </div>

            {/* Main Content */}
            <div className="flex flex-1 overflow-hidden">
              {/* LEFT: Legend and event log */}
              <aside
                className="shrink-0 bg-slate-50 dark:bg-slate-950 border-r border-slate-300 dark:border-slate-700 flex flex-col overflow-hidden"
                style={{ width: leftPanelWidth }}
              >
                <div className="p-3 border-b border-slate-300 dark:border-slate-700 text-slate-900 dark:text-slate-100">
                  <h3 className="font-bold mb-2">Network Legend</h3>
                  <div className="flex flex-col gap-1 text-sm">
                    <div className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full bg-blue-500"></div>
                      Subnet A (192.168.1.0/24)
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full bg-green-500"></div>
                      Subnet B (192.168.2.0/24)
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full bg-red-500"></div>
                      Internet/WAN
                    </div>
                    <div className="flex items-center gap-2">
                      <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke={isDark ? "#10b981" : "#047857"}
                        strokeWidth="2.5"
                        strokeLinecap="round"
                      >
                        <path d="M5 12a10 10 0 0 1 14 0"></path>
                        <path d="M8.5 15.5a5 5 0 0 1 7 0"></path>
                        <circle
                          cx="12"
                          cy="19"
                          r="1"
                          fill={isDark ? "#10b981" : "#047857"}
                          stroke="none"
                        ></circle>
                      </svg>
                      Wireless link
                    </div>
                  </div>
                </div>
                <div className="flex-1 min-h-0 bg-slate-50 dark:bg-black flex flex-col font-mono text-xs">
                  <div className="bg-slate-200 dark:bg-slate-800 px-3 py-2 text-slate-700 dark:text-slate-300 font-semibold border-b border-slate-300 dark:border-slate-700">
                    Simulation Event Log
                  </div>
                  <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-1">
                    {logs.map((log) => (
                      <div
                        key={log.id}
                        className={`${log.type === "error" ? "text-red-700 dark:text-red-400" : log.type === "success" ? "text-green-700 dark:text-green-400" : "text-slate-700 dark:text-slate-300"}`}
                      >
                        <span className="text-slate-500">[{log.time}]</span>{" "}
                        <span>{log.msg}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </aside>

              <div
                className="w-1.5 shrink-0 cursor-col-resize bg-slate-300 hover:bg-sky-500 dark:bg-slate-700 dark:hover:bg-sky-500 transition-colors"
                onMouseDown={() => setIsResizingLeft(true)}
                title="Drag to resize the legend and event log panel"
              />

              {/* CENTER: Canvas */}
              <div className="flex-1 flex flex-col relative bg-slate-100 dark:bg-slate-900">
                {/* Canvas area */}
                <div
                  className="flex-1 relative overflow-hidden"
                  style={{
                    backgroundImage: `radial-gradient(${isDark ? "#334155" : "#cbd5e1"} 1px, transparent 1px)`,
                    backgroundSize: "30px 30px",
                  }}
                >
                  <svg
                    className="w-full h-full absolute inset-0"
                    viewBox="0 0 1000 700"
                    preserveAspectRatio="xMidYMid meet"
                  >
                    {/* Links */}
                    {LINKS.map((link) => {
                      const n1 = nodes[link.source];
                      const n2 = nodes[link.target];
                      if (link.wireless) {
                        // Show both fans whenever there's any traffic on the
                        // wireless link: even when only one side is sending
                        // the "main" packet, the other side is acknowledging,
                        // so both radios are actively in use.
                        const linkActive = packets.some(
                          (p) =>
                            p.state === "TRANSIT" &&
                            !(p.delayRemaining > 0) &&
                            ((p.currentNode === link.source &&
                              p.nextNode === link.target) ||
                              (p.currentNode === link.target &&
                                p.nextNode === link.source)),
                        );
                        if (!linkActive) return null;

                        const stroke = isDark ? "#10b981" : "#047857";
                        // Each fan emanates from its source toward its
                        // target, sitting just outside the node circle
                        // (node radius is 30) so the arcs stay visible.
                        // offsetDeg lets us nudge a fan visually without
                        // changing the target it's aimed at.
                        const fan = (src, tgt, k, offsetDeg = 0) => {
                          const angleDeg =
                            (Math.atan2(tgt.x - src.x, tgt.y - src.y) * 180) /
                              Math.PI +
                            offsetDeg;
                          return (
                            <g
                              key={k}
                              transform={`translate(${src.x}, ${src.y}) rotate(${angleDeg})`}
                            >
                              <path
                                d="M -21 36.37 A 42 42 0 0 0 21 36.37"
                                fill="none"
                                stroke={stroke}
                                strokeWidth="3"
                                strokeLinecap="round"
                                opacity="0.95"
                              />
                              <path
                                d="M -27 46.77 A 54 54 0 0 0 27 46.77"
                                fill="none"
                                stroke={stroke}
                                strokeWidth="3"
                                strokeLinecap="round"
                                opacity="0.7"
                              />
                              <path
                                d="M -33 57.16 A 66 66 0 0 0 33 57.16"
                                fill="none"
                                stroke={stroke}
                                strokeWidth="3"
                                strokeLinecap="round"
                                opacity="0.45"
                              />
                            </g>
                          );
                        };
                        return (
                          <g key={link.id}>
                            {fan(n1, n2, `${link.id}-a`, -40)}
                            {fan(n2, n1, `${link.id}-b`, -60)}
                          </g>
                        );
                      }
                      return (
                        <line
                          key={link.id}
                          x1={n1.x}
                          y1={n1.y}
                          x2={n2.x}
                          y2={n2.y}
                          stroke={isDark ? "#475569" : "#94a3b8"}
                          strokeWidth="4"
                          strokeDasharray="6,4"
                        />
                      );
                    })}

                    {/* Nodes */}
                    {Object.values(nodes).map((node) => {
                      const color = getEntityColor(node.id);
                      const isSelected = selectedNodeId === node.id;
                      const handleClick = () => {
                        if (pickerSlot && selectedNodeId) {
                          const ip = ipForPicker(node);
                          if (!ip) return;
                          if (pickerSlot === "PING") {
                            setPingTargets((m) => ({
                              ...m,
                              [selectedNodeId]: ip,
                            }));
                          } else if (pickerSlot === "HTTP") {
                            setHttpTargets((m) => ({
                              ...m,
                              [selectedNodeId]: ip,
                            }));
                          }
                          setPickerSlot(null);
                          return;
                        }
                        setSelectedNodeId(node.id);
                        setNodeExpanded(true);
                      };
                      return (
                        <g
                          key={node.id}
                          transform={`translate(${node.x}, ${node.y})`}
                          onClick={handleClick}
                          className="cursor-pointer"
                        >
                          <circle
                            cx="0"
                            cy="0"
                            r="30"
                            fill={isDark ? "#1e293b" : "#f8fafc"}
                            stroke={
                              isSelected ? (isDark ? "#fff" : "#0f172a") : color
                            }
                            strokeWidth={isSelected ? 4 : 2}
                          />
                          <g transform="translate(-20, -20)" fill={color}>
                            {node.type === "PC" && <Icons.PC />}
                            {node.type === "Server" && <Icons.Server />}
                            {node.type === "Switch" && <Icons.Switch />}
                            {node.type === "Router" && <Icons.Router />}
                            {node.type === "WAP" && <Icons.WAP />}
                            {node.type === "Laptop" && <Icons.Laptop />}
                          </g>
                          <text
                            x="0"
                            y="48"
                            textAnchor="middle"
                            fill={isDark ? "#cbd5e1" : "#1e293b"}
                            fontSize="14"
                            fontWeight="bold"
                          >
                            {node.name}
                          </text>
                          {(node.type === "PC" ||
                            node.type === "Server" ||
                            node.type === "Laptop") && (
                            <text
                              x="0"
                              y="66"
                              textAnchor="middle"
                              fill={isDark ? "#94a3b8" : "#475569"}
                              fontSize="13"
                            >
                              {node.ip}
                            </text>
                          )}
                        </g>
                      );
                    })}

                    {/* Packets */}
                    {packets.map((p) => {
                      // Packets still in their delay window haven't left
                      // their source yet — hide them on the canvas (the
                      // node icon will gently glow if it has queued
                      // packets, see node rendering above).
                      if (p.state === "TRANSIT" && (p.delayRemaining || 0) > 0)
                        return null;
                      let px, py;
                      const curr = nodes[p.currentNode];

                      if (p.state === "TRANSIT") {
                        const next = nodes[p.nextNode];
                        px = curr.x + (next.x - curr.x) * (p.progress / 100);
                        py = curr.y + (next.y - curr.y) * (p.progress / 100);
                      } else if (p.state === "ARRIVED" && p.prevNode) {
                        const prev = nodes[p.prevNode];
                        const dx = curr.x - prev.x;
                        const dy = curr.y - prev.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const radius = 30; // Radius of the node circle
                        if (dist > 0) {
                          px = curr.x - (dx / dist) * radius;
                          py = curr.y - (dy / dist) * radius;
                        } else {
                          px = curr.x;
                          py = curr.y;
                        }
                      } else {
                        px = curr.x;
                        py = curr.y;
                      }

                      if (p.state === "DROPPED") {
                        return (
                          <g
                            key={p.id}
                            transform={`translate(${px}, ${py})`}
                            className="opacity-80"
                          >
                            <circle
                              cx="0"
                              cy="0"
                              r="14"
                              fill={isDark ? "#1e293b" : "#fef2f2"}
                              stroke="#ef4444"
                              strokeWidth="2"
                            />
                            <line
                              x1="-8"
                              y1="-8"
                              x2="8"
                              y2="8"
                              stroke="#ef4444"
                              strokeWidth="3"
                              strokeLinecap="round"
                            />
                            <line
                              x1="8"
                              y1="-8"
                              x2="-8"
                              y2="8"
                              stroke="#ef4444"
                              strokeWidth="3"
                              strokeLinecap="round"
                            />
                          </g>
                        );
                      }

                      const isSelected = selectedPacketId === p.id;
                      return (
                        <g
                          key={p.id}
                          transform={`translate(${px}, ${py})`}
                          onClick={() => {
                            setSelectedPacketId(p.id);
                            setPacketExpanded(true);
                          }}
                          className="cursor-pointer"
                        >
                          <circle
                            cx="0"
                            cy="0"
                            r="14"
                            fill="#f59e0b"
                            stroke={
                              isSelected
                                ? isDark
                                  ? "#fff"
                                  : "#0f172a"
                                : "#b45309"
                            }
                            strokeWidth={isSelected ? 3 : 1}
                          />
                          <g transform="translate(-12, -12)">
                            <Icons.Packet color="transparent" />
                          </g>
                        </g>
                      );
                    })}
                  </svg>

                </div>
              </div>

              {/* RIGHT: Inspector Panel */}
              <div className="w-96 bg-slate-100 dark:bg-slate-800 border-l border-slate-300 dark:border-slate-700 flex flex-col">
                <div className="flex-1 overflow-y-auto flex flex-col">
                  {/* NODE SECTION */}
                  <CollapsibleSection
                    title="Node Details"
                    accent="#0ea5e9"
                    expanded={nodeExpanded}
                    onToggle={() => setNodeExpanded((e) => !e)}
                    subtitle={

                  >
                    {selectedNodeId ? (
                      <NodeInspector

                        node={nodes[selectedNodeId]}
                        processing={processingByNode[selectedNodeId] || []}
                        terminal={terminals[selectedNodeId] || []}
                        transportBuffer={transportBuffers[selectedNodeId] || {}}

                        }
                        onPingTargetChange={(ip) =>
                          setPingTargets((m) => ({
                            ...m,
                            [selectedNodeId]: ip,
                          }))
                        }
                        onHttpTargetChange={(ip) =>
                          setHttpTargets((m) => ({

                        pickerSlot={pickerSlot}

                    ) : (
                      <div className="p-6 text-center text-slate-500 text-sm">
                        Click any node on the network map to inspect its details
                        and (for PCs / Laptops / Servers) send pings or HTTP
                        requests.
                      </div>
                    )}
                  </CollapsibleSection>

                  {/* PACKET SECTION (tabbed across all in-flight packets) */}
                  <CollapsibleSection
                    title="Packet Details"

            </div>

            {editorState && (

        );
      };

      // --- SUB-COMPONENTS ---

      const CollapsibleSection = ({

              style={{ borderLeft: `4px solid ${accent}` }}
            >
              <span
                className="text-slate-700 dark:text-slate-200 text-xs"

      const FileEditorModal = ({ state, onClose, onSave }) => {

        return (

              onClick={(e) => e.stopPropagation()}
            >
              <div className="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
                <h3 className="font-bold text-lg">

                    />

                  />
                  <p className="text-xs text-slate-500 mt-1">
                    Supported tags include &lt;h1-h3&gt;, &lt;p&gt;, &lt;a
                    href&gt;, &lt;img src&gt;. Use a filename like &lt;img

                  onClick={handleSave}
                  className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded font-semibold text-sm"
