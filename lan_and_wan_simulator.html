      // Tiny in-browser HTML renderer scaled for the preview window. Only a
      // small whitelist of tags is honoured; anything else is stripped so a
      // page can't break the layout. Links and images are rendered as
      // React elements so we can wire clicks and placeholder loading.
      const MiniBrowserRenderer = ({ html, resources, onNavigate, baseIp }) => {
        if (!html) return null;
        const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        const source = bodyMatch ? bodyMatch[1] : html;

        const handleAnchor = (e, href) => {
          e.preventDefault();
          if (onNavigate) onNavigate(href);
        };

        // Tokenise the HTML body into a flat sequence of elements/text.
        const tokens = [];
        const tagRe = /<\/?([a-zA-Z][a-zA-Z0-9]*)([^>]*)>|([^<]+)/g;
        const openStack = [];
        let m;
        let key = 0;
        while ((m = tagRe.exec(source)) !== null) {
          if (m[3]) {
            // text
            const txt = m[3].replace(/\s+/g, " ");
            if (txt.trim().length) {
              tokens.push({ type: "text", text: txt, key: key++ });
            }
            continue;
          }
          const raw = m[0];
          const tag = m[1].toLowerCase();
          const closing = raw.startsWith("</");
          const attrs = m[2] || "";
          const VOID_TAGS = new Set([
            "img",
            "br",
            "hr",
            "input",
            "meta",
            "link",
          ]);
          if (closing) {
            tokens.push({ type: "close", tag, key: key++ });
          } else if (VOID_TAGS.has(tag) || /\/\s*$/.test(attrs)) {
            tokens.push({
              type: "self",
              tag,
              attrs,
              key: key++,
            });
          } else {
            tokens.push({ type: "open", tag, attrs, key: key++ });
          }
        }

        // Flatten tokens into block-ish React elements.
        const renderTokens = () => {
          const out = [];
          // Maintain a stack of open tags so anchor/heading wrappers can
          // close at the right time. For simplicity we render each
          // top-level block separately and inline tags wrap their text.
          let i = 0;
          const getAttr = (attrs, name) => {
            const re = new RegExp(name + '\\s*=\\s*"([^"]*)"', "i");
            const r = attrs.match(re);
            if (r) return r[1];
            const re2 = new RegExp(name + "\\s*=\\s*'([^']*)'", "i");
            const r2 = attrs.match(re2);
            return r2 ? r2[1] : null;
          };
          const consumeUntilClose = (openTag) => {
            const children = [];
            while (i < tokens.length) {
              const t = tokens[i];
              if (t.type === "close" && t.tag === openTag) {
                i++;
                return children;
              }
              children.push(renderOne());
            }
            return children;
          };
          const renderOne = () => {
            const t = tokens[i++];
            if (!t) return null;
            if (t.type === "text") {
              return <React.Fragment key={t.key}>{t.text}</React.Fragment>;
            }
            if (t.type === "self") {
              if (t.tag === "img") {
                const src = getAttr(t.attrs, "src") || "";
                const alt = getAttr(t.attrs, "alt") || src;
                const resource = (resources || {})[src];
                if (
                  resource &&
                  resource.status === "loaded" &&
                  resource.animal
                ) {
                  const svg = ANIMAL_SVGS[resource.animal];
                  return (
                    <span
                      key={t.key}
                      className="inline-block align-middle my-1"
                      style={{ lineHeight: 0 }}
                    >
                      <svg
                        width="60"
                        height="60"
                        viewBox="0 0 100 100"
                        dangerouslySetInnerHTML={{ __html: svg }}
                      />
                    </span>
                  );
                }
                return (
                  <span
                    key={t.key}
                    className="inline-flex flex-col items-center justify-center align-middle border border-dashed border-slate-400 text-slate-500 my-1 mr-1"
                    style={{
                      width: 60,
                      height: 60,
                      fontSize: 7,
                      lineHeight: 1.1,
                      textAlign: "center",
                      padding: 2,
                    }}
                  >
                    <span
                      className="inline-block w-2 h-2 rounded-full border-2 border-slate-400 border-t-slate-200 mb-1"
                      style={{ animation: "spin 1s linear infinite" }}
                    />
                    <span>{alt}</span>
                  </span>
                );
              }
              // <br/> and others
              if (t.tag === "br") return <br key={t.key} />;
              return null;
            }
            if (t.type === "open") {
              const children = consumeUntilClose(t.tag);
              if (t.tag === "h1")
                return (
                  <div
                    key={t.key}
                    style={{ fontSize: 14, fontWeight: 700, margin: "4px 0" }}
                  >
                    {children}
                  </div>
                );
              if (t.tag === "h2")
                return (
                  <div
                    key={t.key}
                    style={{ fontSize: 12, fontWeight: 700, margin: "3px 0" }}
                  >
                    {children}
                  </div>
                );
              if (t.tag === "h3")
                return (
                  <div
                    key={t.key}
                    style={{ fontSize: 11, fontWeight: 700, margin: "2px 0" }}
                  >
                    {children}
                  </div>
                );
              if (t.tag === "p")
                return (
                  <div
                    key={t.key}
                    style={{ fontSize: 9, margin: "2px 0", lineHeight: 1.3 }}
                  >
                    {children}
                  </div>
                );
              if (t.tag === "a") {
                const href = getAttr(t.attrs, "href") || "#";
                return (
                  <a
                    key={t.key}
                    href={href}
                    onClick={(e) => handleAnchor(e, href)}
                    style={{
                      color: "#1d4ed8",
                      textDecoration: "underline",
                      fontSize: 9,
                      cursor: "pointer",
                    }}
                  >
                    {children}
                  </a>
                );
              }
              if (t.tag === "b" || t.tag === "strong")
                return (
                  <strong key={t.key} style={{ fontSize: 9 }}>
                    {children}
                  </strong>
                );
              if (t.tag === "i" || t.tag === "em")
                return (
                  <em key={t.key} style={{ fontSize: 9 }}>
                    {children}
                  </em>
                );
              if (t.tag === "ul")
                return (
                  <ul
                    key={t.key}
                    style={{
                      fontSize: 9,
                      paddingLeft: 14,
                      margin: "2px 0",
                      listStyle: "disc",
                    }}
                  >
                    {children}
                  </ul>
                );
              if (t.tag === "li")
                return (
                  <li key={t.key} style={{ fontSize: 9 }}>
                    {children}
                  </li>
                );
              // Generic wrapper for body/html/div/span etc.
              return (
                <div key={t.key} style={{ fontSize: 9 }}>
                  {children}
                </div>
              );
            }
            // stray close
            return null;
          };
          while (i < tokens.length) {
            const piece = renderOne();
            if (piece) out.push(piece);
          }
          return out;
        };

        return (
          <div
            className="text-slate-900"
            style={{ fontSize: 9, lineHeight: 1.3 }}
          >
            {renderTokens()}
          </div>
        );
      };

      // IP text input with a small "[ip]" picker button. When the
      // picker is active, the input is replaced by an instruction to
      // click a node on the canvas (the App-level node onClick handler
      // pipes the chosen IP back into the same input via callback).
      const IpInputWithPicker = ({
        value,
        onChange,
        picking,
        onStartPicker,
        onCancelPicker,
      }) => {
        return (
          <div className="flex items-stretch gap-1">
            {picking ? (
              <div className="flex-1 bg-slate-100 dark:bg-slate-800 border border-dashed border-slate-400 dark:border-slate-600 rounded p-2 text-[11px] italic text-slate-500 dark:text-slate-400 font-sans">
                Click a node on the network to use its IP
                <span className="block text-[10px] mt-0.5 not-italic">
                  (or press <span className="font-mono">Esc</span> to cancel)
                </span>
              </div>
            ) : (
              <input
                type="text"
                value={value}
                onChange={(e) => onChange(e.target.value)}
                className="flex-1 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white rounded p-2 font-mono text-sm"
              />
            )}
            <button
              type="button"
              onClick={picking ? onCancelPicker : onStartPicker}
              title={picking ? "Cancel picker" : "Pick IP from a node"}
              className={`px-2 rounded font-mono text-xs border transition ${picking ? "bg-amber-100 dark:bg-amber-900/40 border-amber-400 text-amber-800 dark:text-amber-200" : "bg-slate-200 dark:bg-slate-700 border-slate-300 dark:border-slate-600 hover:bg-slate-300 dark:hover:bg-slate-600"}`}
            >
              &gt;ip
            </button>
          </div>
        );
      };

      const NodeInspector = ({
        node,
        processing,
        terminal,
        transportBuffer,
        tabSignal,
        pingTarget,
        httpTarget,
        onPingTargetChange,
        onHttpTargetChange,
        pickerSlot,
        onStartPicker,
        onCancelPicker,
        onSendRequest,
        onNavigate,
        onBrowserAddressChange,
        onBrowserSubmit,
        onOpenFileEditor,
        onDeleteFile,
        onAddDnsRecord,
        onUpdateDnsRecord,
        onDeleteDnsRecord,
        onAddHostEntry,
        onUpdateHostEntry,
        onDeleteHostEntry,
        onClearDnsCache,
        color,
        transactionActive,
      }) => {
        const isClient = node.type === "PC" || node.type === "Laptop";
        const isServer = node.type === "Server";
        const isDnsServer = node.service === "DNS";
        const isDhcpServer = node.service === "DHCP";

        const hasProcessing = processing && processing.length > 0;
        const hasTerminal = terminal && terminal.length > 0;
        const pendingBuffers = Object.values(transportBuffer || {}).filter(
          (b) => b && b.received < b.total,
        );
        const hasBuffer = pendingBuffers.length > 0;

        const tabs = [{ id: "INFO", label: "Info" }];
        if (hasProcessing) tabs.push({ id: "SERVICE", label: "Service" });
        if (isClient) {
          tabs.push({ id: "PING", label: "Ping" });
          tabs.push({ id: "HTTP", label: "HTTP" });
          if (hasBuffer) tabs.push({ id: "TRANSPORT", label: "Transport" });
          tabs.push({ id: "BROWSER", label: "Browser" });
          if (hasTerminal) tabs.push({ id: "TERMINAL", label: "Terminal" });
        }
        if (isServer) {
          if (isDnsServer) tabs.push({ id: "DNS", label: "DNS" });
          if (isDhcpServer) tabs.push({ id: "DHCP", label: "DHCP" });
          if (node.files) tabs.push({ id: "FILES", label: "Files" });
        }
        const validTabIds = tabs.map((t) => t.id);

        // Decide the most relevant initial tab when the inspector first
        // mounts for this node, based on the current state.
        const computeBestTab = () => {
          if (hasProcessing) return "SERVICE";
          if (hasBuffer) return "TRANSPORT";
          if (hasTerminal && !node.browser?.page) return "TERMINAL";
          if (node.browser?.page) return "BROWSER";
          return "INFO";
        };
        const [tab, setTab] = useState(computeBestTab);

        // React to App-driven tab signals (auto-switch when processing
        // starts, fragments arrive, full delivery completes, etc.). We
        // only obey signals targeted at this node so other auto-selects
        // don't yank a manually navigated user away.
        useEffect(() => {
          if (
            tabSignal &&
            tabSignal.nodeId === node.id &&
            tabSignal.tab &&
            validTabIds.includes(tabSignal.tab) &&
            tabSignal.tab !== tab
          ) {
            setTab(tabSignal.tab);
          }
        }, [tabSignal && tabSignal.n]);

        // If the current tab disappears (e.g. SERVICE removed when
        // processing completes), fall back to the best available.
        useEffect(() => {
          if (!validTabIds.includes(tab)) {
            setTab(computeBestTab());
          }
        }, [validTabIds.join(",")]);

        const [newHostEntry, setNewHostEntry] = useState({
          hostname: "mycompany.local",
          ip: "192.168.1.254",
        });
        const [newDnsRecord, setNewDnsRecord] = useState({
          hostname: "intranet.local",
          value: "192.168.1.254",
          ttl: 300,
        });
        const [selectedAllocationId, setSelectedAllocationId] = useState(
          node.allocations && node.allocations[0] ? node.allocations[0].id : null,
        );

        useEffect(() => {
          setSelectedAllocationId(
            node.allocations && node.allocations[0]
              ? node.allocations[0].id
              : null,
          );
        }, [node.id]);

        const selectedAllocation =
          (node.allocations || []).find((a) => a.id === selectedAllocationId) ||
          (node.allocations || [])[0] ||
          null;

        return (
          <div className="flex flex-col">
            <div
              className="p-3 border-b border-slate-300 dark:border-slate-700"
              style={{ borderTop: `3px solid ${color}` }}
            >
              <div className="flex items-center gap-3">
                <div style={{ color }}>
                  {node.type === "PC" && <Icons.PC />}
                  {node.type === "Server" && <Icons.Server />}
                  {node.type === "Switch" && <Icons.Switch />}
                  {node.type === "Router" && <Icons.Router />}
                  {node.type === "WAP" && <Icons.WAP />}
                  {node.type === "Laptop" && <Icons.Laptop />}
                </div>
                <div>
                  <h2 className="text-lg font-bold text-slate-900 dark:text-white">
                    {node.name}
                  </h2>
                  <p className="text-xs text-slate-600 dark:text-slate-400">
                    {node.service ? `${node.service} ${node.type}` : node.type}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex border-b border-slate-300 dark:border-slate-700 text-xs font-semibold">
              {tabs.map((tb) => (
                <button
                  key={tb.id}
                  onClick={() => setTab(tb.id)}
                  className={`flex-1 py-2 ${tab === tb.id ? "bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-white" : "text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-750"}`}
                >
                  {tb.label}
                </button>
              ))}
            </div>

            <div className="p-4">
              {tab === "INFO" && (
                <div className="flex flex-col gap-4 text-sm">
                  {node.ip && (
                    <div className="bg-white dark:bg-slate-900 p-3 rounded border border-slate-300 dark:border-slate-700">
                      <div className="text-slate-500 mb-1 font-semibold text-xs uppercase">
                        Network Configuration
                      </div>
                      <div className="grid grid-cols-[80px_1fr] gap-1">
                        <span className="text-slate-600 dark:text-slate-400">
                          IP:
                        </span>
                        <span className="font-mono text-blue-700 dark:text-blue-300">
                          {node.ip}
                        </span>
                        <span className="text-slate-600 dark:text-slate-400">
                          Mask:
                        </span>
                        <span className="font-mono text-slate-700 dark:text-slate-300">
                          {node.subnet}
                        </span>
                        <span className="text-slate-600 dark:text-slate-400">
                          Gateway:
                        </span>
                        <span className="font-mono text-slate-700 dark:text-slate-300">
                          {node.gw}
                        </span>
                        {node.dns && (
                          <>
                            <span className="text-slate-600 dark:text-slate-400">
                              DNS:
                            </span>
                            <span className="font-mono text-slate-700 dark:text-slate-300">
                              {node.dns}
                            </span>
                          </>
                        )}
                        <span className="text-slate-600 dark:text-slate-400">
                          MAC:
                        </span>
                        <span className="font-mono text-slate-700 dark:text-slate-300">
                          {node.mac}
                        </span>
                      </div>
                    </div>
                  )}

                  {isClient && (
                    <div className="bg-white dark:bg-slate-900 p-3 rounded border border-slate-300 dark:border-slate-700">
                      <div className="text-slate-500 mb-2 font-semibold text-xs uppercase">
                        Name Resolution
                      </div>
                      {node.browser?.lastResolution ? (
                        <div className="mb-3 rounded bg-slate-100 dark:bg-slate-800 p-2 text-xs">
                          <div className="font-semibold text-slate-700 dark:text-slate-200">
                            Last lookup:{" "}
                            <span className="font-mono">
                              {node.browser.lastResolution.hostname}
                            </span>
                          </div>
                          <div className="mt-1 grid grid-cols-[70px_1fr] gap-x-2">
                            <span className="text-slate-500">Source:</span>
                            <span>{node.browser.lastResolution.source}</span>
                            <span className="text-slate-500">Result:</span>
                            <span className="font-mono">
                              {node.browser.lastResolution.ip ||
                                node.browser.lastResolution.status}
                            </span>
                          </div>
                        </div>
                      ) : (
                        <div className="mb-3 text-xs italic text-slate-500">
                          No hostname lookup has been attempted yet.
                        </div>
                      )}

                      <div className="mb-3">
                        <div className="mb-1 text-xs font-bold text-slate-600 dark:text-slate-400">
                          Local hosts file
                        </div>
                        {(node.hostsFile || []).length === 0 ? (
                          <div className="text-xs italic text-slate-500 mb-2">
                            Empty. Add a row to override DNS.
                          </div>
                        ) : (
                          <div className="space-y-1 mb-2">
                            {(node.hostsFile || []).map((entry) => (
                              <div
                                key={entry.id}
                                className="grid grid-cols-[1fr_1fr_auto] gap-1"
                              >
                                <input
                                  value={entry.hostname}
                                  onChange={(e) =>
                                    onUpdateHostEntry(
                                      node.id,
                                      entry.id,
                                      "hostname",
                                      e.target.value,
                                    )
                                  }
                                  className="min-w-0 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono text-[11px]"
                                />
                                <input
                                  value={entry.ip}
                                  onChange={(e) =>
                                    onUpdateHostEntry(
                                      node.id,
                                      entry.id,
                                      "ip",
                                      e.target.value,
                                    )
                                  }
                                  className="min-w-0 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono text-[11px]"
                                />
                                <button
                                  onClick={() =>
                                    onDeleteHostEntry(node.id, entry.id)
                                  }
                                  className="px-1.5 py-1 rounded bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 text-[10px] font-bold"
                                >
                                  Del
                                </button>
                              </div>
                            ))}
                          </div>
                        )}
                        <div className="grid grid-cols-[1fr_1fr_auto] gap-1">
                          <input
                            value={newHostEntry.hostname}
                            onChange={(e) =>
                              setNewHostEntry({
                                ...newHostEntry,
                                hostname: e.target.value,
                              })
                            }
                            placeholder="hostname"
                            className="min-w-0 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono text-[11px]"
                          />
                          <input
                            value={newHostEntry.ip}
                            onChange={(e) =>
                              setNewHostEntry({
                                ...newHostEntry,
                                ip: e.target.value,
                              })
                            }
                            placeholder="IP"
                            className="min-w-0 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono text-[11px]"
                          />
                          <button
                            onClick={() => onAddHostEntry(node.id, newHostEntry)}
                            className="px-1.5 py-1 rounded bg-blue-600 text-white text-[10px] font-bold"
                          >
                            Add
                          </button>
                        </div>
                      </div>

                      <div>
                        <div className="mb-1 flex items-center justify-between gap-2">
                          <span className="text-xs font-bold text-slate-600 dark:text-slate-400">
                            DNS cache
                          </span>
                          <button
                            onClick={() => onClearDnsCache(node.id)}
                            className="px-1.5 py-0.5 rounded bg-slate-200 dark:bg-slate-700 text-[10px] font-semibold"
                          >
                            Clear
                          </button>
                        </div>
                        {(node.dnsCache || []).length === 0 ? (
                          <div className="text-xs italic text-slate-500">
                            Cache empty.
                          </div>
                        ) : (
                          <table className="w-full text-[11px]">
                            <tbody>
                              {(node.dnsCache || []).map((entry) => (
                                <tr
                                  key={`${entry.hostname}-${entry.ip}`}
                                  className="border-t border-slate-200 dark:border-slate-800"
                                >
                                  <td className="py-1 font-mono">
                                    {entry.hostname}
                                  </td>
                                  <td className="py-1 font-mono">{entry.ip}</td>
                                  <td className="py-1 text-right text-slate-500">
                                    TTL {entry.ttl}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        )}
                      </div>
                    </div>
                  )}

                  {node.type === "Router" && (
                    <>
                      <div className="bg-white dark:bg-slate-900 p-3 rounded border border-slate-300 dark:border-slate-700">
                        <div className="text-slate-500 mb-2 font-semibold text-xs uppercase">
                          Interfaces
                        </div>
                        {node.interfaces.map((iface, i) => (
                          <div
                            key={i}
                            className="mb-2 last:mb-0 border-b border-slate-200 dark:border-slate-800 pb-2 last:border-0 last:pb-0"
                          >
                            <div className="font-bold text-slate-700 dark:text-slate-300">
                              {iface.name}
                            </div>
                            <div className="grid grid-cols-[40px_1fr] gap-x-1 text-xs mt-1">
                              <span className="text-slate-500">IP:</span>
                              <span className="font-mono">{iface.ip}</span>
                              <span className="text-slate-500">MAC:</span>
                              <span className="font-mono">{iface.mac}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                      <div className="bg-white dark:bg-slate-900 p-3 rounded border border-slate-300 dark:border-slate-700">
                        <div className="text-slate-500 mb-2 font-semibold text-xs uppercase">
                          Routing Table
                        </div>
                        <table className="w-full text-xs text-left border-collapse">
                          <thead>
                            <tr className="text-slate-600 dark:text-slate-400 border-b border-slate-300 dark:border-slate-700">
                              <th className="pb-1">Destination</th>
                              <th className="pb-1">Next Hop</th>
                            </tr>
                          </thead>
                          <tbody>
                            {node.routes.map((rt, i) => (
                              <tr
                                key={i}
                                className="border-b border-slate-200 dark:border-slate-800 last:border-0"
                              >
                                <td className="py-1 font-mono">
                                  {rt.dest}/
                                  {rt.mask
                                    .split(".")
                                    .reduce(
                                      (a, c) => a + (c === "255" ? 8 : 0),
                                      0,
                                    )}
                                </td>
                                <td className="py-1 font-mono">{rt.nextHop}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      {node.natTable !== undefined && (
                        <div className="bg-white dark:bg-slate-900 p-3 rounded border border-slate-300 dark:border-slate-700 mt-4">
                          <div className="text-slate-500 mb-2 font-semibold text-xs uppercase">
                            NAT Translation Table
                          </div>
                          {node.natTable.length === 0 ? (
                            <div className="text-xs text-slate-500 italic">
                              Table is empty
                            </div>
                          ) : (
                            <table className="w-full text-[10px] text-left border-collapse">
                              <thead>
                                <tr className="text-slate-600 dark:text-slate-400 border-b border-slate-300 dark:border-slate-700">
                                  <th className="pb-1">Internal Map</th>
                                  <th className="pb-1">External Port</th>
                                  <th className="pb-1">Proto</th>
                                </tr>
                              </thead>
                              <tbody>
                                {node.natTable.map((nat, i) => (
                                  <tr
                                    key={i}
                                    className="border-b border-slate-200 dark:border-slate-800 last:border-0"
                                  >
                                    <td className="py-1 font-mono text-blue-700 dark:text-blue-300">
                                      {nat.internalIp}:{nat.internalPort}
                                    </td>
                                    <td className="py-1 font-mono text-emerald-700 dark:text-emerald-300">
                                      {nat.externalPort}
                                    </td>
                                    <td className="py-1 font-mono text-slate-700 dark:text-slate-300">
                                      {nat.protocol}
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          )}
                        </div>
                      )}
                    </>
                  )}

                  {node.type === "Switch" && (
                    <div className="bg-white dark:bg-slate-900 p-3 rounded border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-400 italic">
                      Layer 2 forwarding enabled.
                      <br />
                      MAC table populated automatically in this simulation.
                    </div>
                  )}

                  {node.type === "WAP" && (
                    <div className="bg-white dark:bg-slate-900 p-3 rounded border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-400 italic">
                      Wireless Access Point: bridges associated wireless clients
                      onto the wired LAN.
                      <br />
                      Operates at Layer 2, forwarding by MAC address just like a
                      switch.
                    </div>
                  )}
                </div>
              )}

              {tab === "PING" && (
                <div className="flex flex-col gap-3">
                  <p className="text-xs text-slate-700 dark:text-slate-300">
                    Send an ICMP Echo Request to test connectivity.
                  </p>
                  <div>
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">
                      Target IP Address
                    </label>
                    <IpInputWithPicker
                      value={pingTarget}
                      onChange={onPingTargetChange}
                      picking={pickerSlot === "PING"}
                      onStartPicker={() => onStartPicker("PING")}
                      onCancelPicker={onCancelPicker}
                    />
                  </div>
                  <button
                    onClick={() => onSendRequest(node.id, pingTarget, "PING")}
                    disabled={transactionActive || pickerSlot === "PING"}
                    className="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-2 px-4 rounded transition text-sm"
                  >
                    Send Ping Request
                  </button>
                  {transactionActive && (
                    <p className="text-[11px] text-amber-700 dark:text-amber-300 bg-amber-100 dark:bg-amber-900/30 border border-amber-300 dark:border-amber-800 rounded px-2 py-1">
                      Finish simulating the current packet before starting a new
                      one.
                    </p>
                  )}
                </div>
              )}

              {tab === "HTTP" && (
                <div className="flex flex-col gap-3">
                  <p className="text-xs text-slate-700 dark:text-slate-300">
                    Simulate a web browser HTTP GET request.
                  </p>
                  <div>
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">
                      Target IP Address
                    </label>
                    <IpInputWithPicker
                      value={httpTarget}
                      onChange={onHttpTargetChange}
                      picking={pickerSlot === "HTTP"}
                      onStartPicker={() => onStartPicker("HTTP")}
                      onCancelPicker={onCancelPicker}
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">
                      Destination Port
                    </label>
                    <input
                      type="text"
                      value="80 (HTTP)"
                      disabled
                      className="w-full bg-slate-200 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-500 rounded p-2 font-mono text-sm cursor-not-allowed"
                    />
                  </div>
                  <button
                    onClick={() =>
                      onSendRequest(node.id, httpTarget, "HTTP", { path: "/" })
                    }
                    disabled={transactionActive || pickerSlot === "HTTP"}
                    className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-2 px-4 rounded transition text-sm"
                  >
                    Send HTTP Request
                  </button>
                  {transactionActive && (
                    <p className="text-[11px] text-amber-700 dark:text-amber-300 bg-amber-100 dark:bg-amber-900/30 border border-amber-300 dark:border-amber-800 rounded px-2 py-1">
                      Finish simulating the current packet before starting a new
                      one.
                    </p>
                  )}
                </div>
              )}

              {tab === "BROWSER" && (
                <div className="flex flex-col gap-2">
                  <div className="flex items-center gap-1 rounded border border-slate-300 dark:border-slate-700 bg-slate-200 dark:bg-slate-800 p-1">
                    <span className="px-1 text-[10px] font-bold uppercase text-slate-500">
                      URL
                    </span>
                    <input
                      value={
                        (node.browser && node.browser.address) ||
                        "http://mycompany.local/"
                      }
                      onChange={(e) =>
                        onBrowserAddressChange(node.id, e.target.value)
                      }
                      onKeyDown={(e) => {
                        if (e.key === "Enter") onBrowserSubmit(node.id);
                      }}
                      className="min-w-0 flex-1 rounded bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 px-2 py-1 font-mono text-xs text-slate-900 dark:text-slate-100"
                    />
                    <button
                      onClick={() => onBrowserSubmit(node.id)}
                      disabled={transactionActive}
                      className="px-2 py-1 rounded bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-xs font-bold"
                    >
                      Go
                    </button>
                  </div>
                  {node.browser?.lastResolution && (
                    <div className="rounded bg-slate-100 dark:bg-slate-800 px-2 py-1 text-[11px] text-slate-600 dark:text-slate-300">
                      Lookup:{" "}
                      <span className="font-mono">
                        {node.browser.lastResolution.hostname}
                      </span>{" "}
                      via {node.browser.lastResolution.source}
                      {node.browser.lastResolution.ip
                        ? ` -> ${node.browser.lastResolution.ip}`
                        : ""}
                    </div>
                  )}
                  <div
                    className="bg-white text-black rounded border border-slate-400 overflow-auto shadow-inner"
                    style={{ height: 220, padding: 8 }}
                  >
                    {node.browser && node.browser.page ? (
                      node.browser.page.status === 200 ? (
                        <MiniBrowserRenderer
                          html={node.browser.page.html}
                          resources={node.browser.resources}
                          baseIp={node.browser.page.serverIp}
                          onNavigate={(href) => onNavigate(node.id, href)}
                        />
                      ) : (
                        <div className="text-red-700 font-mono text-xs">
                          {node.browser.page.status}{" "}
                          {node.browser.page.message || "Error"}
                        </div>
                      )
                    ) : (
                      <div className="flex items-center justify-center h-full text-slate-400 italic text-xs">
                        Blank new tab — type an IP address or hostname in the
                        address bar.
                      </div>
                    )}
                  </div>
                </div>
              )}

              {tab === "SERVICE" && (
                <div className="flex flex-col gap-3">
                  <p className="text-xs text-slate-600 dark:text-slate-400">
                    OS service on this device is handling incoming requests.
                    While processing, no reply has been sent yet — when the bar
                    fills, the response packet(s) will be emitted.
                  </p>
                  {(processing || []).map((entry) => {
                    const pct = Math.min(
                      100,
                      Math.round((entry.progress / entry.totalProgress) * 100),
                    );
                    const req = entry.request;
                    return (
                      <div
                        key={entry.id}
                        className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded p-2 text-xs"
                      >
                        <div className="flex items-center justify-between mb-1">
                          <span className="font-bold text-slate-800 dark:text-slate-100">
                            {entry.requestType === "Ping"
                              ? "ICMP Echo Service"
                              : entry.requestType === "DNS"
                                ? "DNS Service (UDP 53)"
                                : "HTTP Service (port 80)"}
                          </span>
                          <span className="text-[10px] uppercase text-slate-500">
                            from {req.networkLayer.srcIP}
                          </span>
                        </div>
                        <div className="text-[11px] text-slate-600 dark:text-slate-300 mb-1">
                          Handling:{" "}
                          <span className="font-mono">{entry.summary}</span>
                        </div>
                        <div className="bg-slate-100 dark:bg-slate-800 rounded p-1.5 mb-2 font-mono text-[10px] whitespace-pre-wrap break-all max-h-24 overflow-auto">
                          {req.payload}
                        </div>
                        <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 overflow-hidden">
                          <div
                            className="bg-amber-500 h-full transition-all"
                            style={{ width: `${pct}%` }}
                          />
                        </div>
                        <div className="text-[10px] text-slate-500 mt-1">
                          Constructing response ({pct}%)
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {tab === "TERMINAL" && (
                <div
                  className="bg-black text-emerald-300 font-mono text-[11px] rounded p-2 overflow-auto"
                  style={{ height: 220 }}
                >
                  {(terminal || []).length === 0 ? (
                    <span className="text-slate-500 italic">
                      Terminal is empty — send a ping to populate output.
                    </span>
                  ) : (
                    (terminal || []).map((line) => (
                      <div key={line.id}>{line.text}</div>
                    ))
                  )}
                </div>
              )}

              {tab === "TRANSPORT" && (
                <div className="flex flex-col gap-3">
                  <p className="text-xs text-slate-600 dark:text-slate-400">
                    OS transport layer assembling multi-packet transmissions.
                    Resources are released to the application (browser) only
                    when every fragment has arrived.
                  </p>
                  {pendingBuffers.length === 0 ? (
                    <div className="text-xs italic text-slate-500">
                      No partial transmissions buffered.
                    </div>
                  ) : (
                    pendingBuffers.map((buf, idx) => {
                      const path =
                        buf.firstPacket && buf.firstPacket.appLayer.path;
                      const pct = Math.round((buf.received / buf.total) * 100);
                      return (
                        <div
                          key={idx}
                          className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded p-2 text-xs"
                        >
                          <div className="flex justify-between mb-1">
                            <span className="font-mono text-slate-800 dark:text-slate-100">
                              {path}
                            </span>
                            <span className="text-[10px] uppercase text-slate-500">
                              {buf.received}/{buf.total} packets
                            </span>
                          </div>
                          <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 overflow-hidden">
                            <div
                              className="bg-blue-500 h-full transition-all"
                              style={{ width: `${pct}%` }}
                            />
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              )}

              {tab === "DNS" && (
                <div className="flex flex-col gap-3">
                  <div className="rounded border border-emerald-300 dark:border-emerald-800 bg-emerald-50 dark:bg-emerald-900/20 p-2 text-xs text-emerald-900 dark:text-emerald-100">
                    DNS service is running on UDP port{" "}
                    <span className="font-mono font-bold">53</span>. Queries
                    return A records from this table.
                  </div>
                  <div className="space-y-1">
                    {(node.records || []).map((record) => (
                      <div
                        key={record.id}
                        className="grid grid-cols-[1fr_42px_1fr_52px_auto] gap-1 text-[11px]"
                      >
                        <input
                          value={record.hostname}
                          onChange={(e) =>
                            onUpdateDnsRecord(
                              node.id,
                              record.id,
                              "hostname",
                              e.target.value,
                            )
                          }
                          className="min-w-0 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono"
                        />
                        <input
                          value={record.type || "A"}
                          disabled
                          className="min-w-0 bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono text-slate-500"
                        />
                        <input
                          value={record.value}
                          onChange={(e) =>
                            onUpdateDnsRecord(
                              node.id,
                              record.id,
                              "value",
                              e.target.value,
                            )
                          }
                          className="min-w-0 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono"
                        />
                        <input
                          value={record.ttl}
                          onChange={(e) =>
                            onUpdateDnsRecord(
                              node.id,
                              record.id,
                              "ttl",
                              e.target.value,
                            )
                          }
                          className="min-w-0 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono"
                        />
                        <button
                          onClick={() => onDeleteDnsRecord(node.id, record.id)}
                          className="px-1.5 py-1 rounded bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 text-[10px] font-bold"
                        >
                          Del
                        </button>
                      </div>
                    ))}
                  </div>
                  <div className="rounded border border-slate-300 dark:border-slate-700 p-2">
                    <div className="mb-2 text-xs font-bold text-slate-600 dark:text-slate-400">
                      Add A record
                    </div>
                    <div className="grid grid-cols-[1fr_1fr_52px_auto] gap-1 text-[11px]">
                      <input
                        value={newDnsRecord.hostname}
                        onChange={(e) =>
                          setNewDnsRecord({
                            ...newDnsRecord,
                            hostname: e.target.value,
                          })
                        }
                        placeholder="hostname"
                        className="min-w-0 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono"
                      />
                      <input
                        value={newDnsRecord.value}
                        onChange={(e) =>
                          setNewDnsRecord({
                            ...newDnsRecord,
                            value: e.target.value,
                          })
                        }
                        placeholder="IP address"
                        className="min-w-0 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono"
                      />
                      <input
                        value={newDnsRecord.ttl}
                        onChange={(e) =>
                          setNewDnsRecord({
                            ...newDnsRecord,
                            ttl: e.target.value,
                          })
                        }
                        placeholder="TTL"
                        className="min-w-0 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded px-1.5 py-1 font-mono"
                      />
                      <button
                        onClick={() => onAddDnsRecord(node.id, newDnsRecord)}
                        className="px-2 py-1 rounded bg-blue-600 text-white text-[10px] font-bold"
                      >
                        Add
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {tab === "DHCP" && (
                <div className="flex flex-col gap-3">
                  <div className="rounded border border-blue-300 dark:border-blue-800 bg-blue-50 dark:bg-blue-900/20 p-2 text-xs text-blue-900 dark:text-blue-100">
                    DHCP service is running. This version starts after leases
                    have already been allocated; DORA animation will be added
                    when new devices can join the network.
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-[11px] border-collapse">
                      <thead>
                        <tr className="text-slate-500 border-b border-slate-300 dark:border-slate-700">
                          <th className="text-left py-1">Device</th>
                          <th className="text-left py-1">IP</th>
                          <th className="text-left py-1">Mode</th>
                        </tr>
                      </thead>
                      <tbody>
                        {(node.allocations || []).map((allocation) => (
                          <tr
                            key={allocation.id}
                            onClick={() => setSelectedAllocationId(allocation.id)}
                            className={`cursor-pointer border-b border-slate-200 dark:border-slate-800 last:border-0 ${
                              selectedAllocationId === allocation.id
                                ? "bg-blue-100 dark:bg-blue-900/40"
                                : "hover:bg-slate-100 dark:hover:bg-slate-800"
                            }`}
                          >
                            <td className="py-1 pr-2">{allocation.deviceName}</td>
                            <td className="py-1 pr-2 font-mono">
                              {allocation.ip}
                            </td>
                            <td className="py-1 pr-2">{allocation.mode}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  {selectedAllocation && (
                    <div className="rounded border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-3 text-xs">
                      <div className="mb-2 font-bold text-slate-800 dark:text-slate-100">
                        Allocation details
                      </div>
                      <div className="grid grid-cols-[110px_1fr] gap-y-1">
                        <span className="text-slate-500">Device:</span>
                        <span>{selectedAllocation.deviceName}</span>
                        <span className="text-slate-500">MAC:</span>
                        <span className="font-mono">{selectedAllocation.mac}</span>
                        <span className="text-slate-500">IP address:</span>
                        <span className="font-mono">{selectedAllocation.ip}</span>
                        <span className="text-slate-500">Subnet mask:</span>
                        <span className="font-mono">
                          {selectedAllocation.subnet}
                        </span>
                        <span className="text-slate-500">Gateway:</span>
                        <span className="font-mono">
                          {selectedAllocation.gateway}
                        </span>
                        <span className="text-slate-500">DNS server:</span>
                        <span className="font-mono">{selectedAllocation.dns}</span>
                        <span className="text-slate-500">Lease:</span>
                        <span>{selectedAllocation.lease}</span>
                        <span className="text-slate-500">Scope:</span>
                        <span>{selectedAllocation.scope}</span>
                        <span className="text-slate-500">Status:</span>
                        <span>{selectedAllocation.status}</span>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {tab === "FILES" && (
                <div className="flex flex-col gap-3">
                  <p className="text-xs text-slate-700 dark:text-slate-300">
                    Files served by this web server (root is{" "}
                    <span className="font-mono">/</span>):
                  </p>
                  <div className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded divide-y divide-slate-200 dark:divide-slate-800">
                    {Object.entries(node.files || {}).map(([name, file]) => (
                      <div
                        key={name}
                        className="flex items-center gap-2 px-2 py-1.5 text-xs"
                      >
                        <span
                          className={`inline-block w-1.5 h-1.5 rounded-full ${file.type === "image" ? "bg-purple-500" : "bg-emerald-500"}`}
                        />
                        <span className="font-mono text-slate-800 dark:text-slate-200 flex-1 truncate">
                          {name}
                        </span>
                        <span className="text-[10px] uppercase text-slate-500">
                          {file.type}
                        </span>
                        {file.type === "html" && (
                          <button
                            onClick={() => onOpenFileEditor(node.id, name)}
                            className="px-2 py-0.5 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded text-[10px] font-semibold"
                          >
                            Edit
                          </button>
                        )}
                        {file.type === "html" && name !== "index.html" && (
                          <button
                            onClick={() => onDeleteFile(node.id, name)}
                            className="px-2 py-0.5 bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 hover:bg-red-200 rounded text-[10px] font-semibold"
                          >
                            Del
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                  <button
                    onClick={() => onOpenFileEditor(node.id, "")}
                    className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-1.5 px-3 rounded self-start"
                  >
                    + New HTML file
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      const MultiPacketInspector = ({
        packets,
        selectedPacketId,
        onSelectPacket,
      }) => {
        if (!packets || packets.length === 0) return null;
        // Make sure the chosen tab is one of the active packets;
        // otherwise show the first.
        const activeTabId = packets.find((p) => p.id === selectedPacketId)
          ? selectedPacketId
          : packets[0].id;
        const current = packets.find((p) => p.id === activeTabId) || packets[0];
        const label = (p) => {
          const proto = p.appLayer?.protocol || "Pkt";
          const seq = p.transportLayer?.seq;
          const total = p.transportLayer?.total;
          if (total && total > 1) return `${proto} ${seq}/${total}`;
          return `${proto} ${p.id.substring(0, 3)}`;
        };
        return (
          <div className="flex flex-col bg-slate-100 dark:bg-slate-800">
            <div className="flex overflow-x-auto border-b border-slate-300 dark:border-slate-700 bg-slate-200/60 dark:bg-slate-900/60 text-[11px] font-semibold">
              {packets.map((p) => (
                <button
                  key={p.id}
                  onClick={() => onSelectPacket(p.id)}
                  className={`px-2 py-1.5 whitespace-nowrap border-r border-slate-300 dark:border-slate-700 ${p.id === activeTabId ? "bg-white dark:bg-slate-800 text-amber-700 dark:text-amber-300" : "text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700"}`}
                  title={p.id}
                >
                  {label(p)}
                </button>
              ))}
            </div>
            <PacketInspector packet={current} />
          </div>
        );
      };

      const PacketInspector = ({ packet }) => {
        if (!packet)
          return (
            <div className="p-6 text-center text-slate-500 text-sm">
              Packet no longer exists.
            </div>
          );

        return (
          <div className="bg-slate-100 dark:bg-slate-800">
            <div className="p-4 flex flex-col gap-3">
              <p className="text-xs text-slate-600 dark:text-slate-400">
                AQA TCP/IP 4-Layer Model Breakdown:
              </p>

              {/* Application Layer */}
              <div className="border border-blue-300 dark:border-blue-800 bg-blue-50 dark:bg-blue-900/20 rounded overflow-hidden">
                <div className="bg-blue-100 dark:bg-blue-900/50 px-3 py-1 text-blue-700 dark:text-blue-300 font-bold text-xs uppercase border-b border-blue-300 dark:border-blue-800 flex justify-between">
                  <span>Layer 1: Application</span>
                  <ChangedValue value={packet.appLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 items-start">
                  {packet.appLayer.method && (
                    <>
                      <span className="text-slate-500">Method:</span>
                      <ChangedValue
                        className="font-mono text-slate-700 dark:text-slate-300 break-all"
                        value={packet.appLayer.method}
                      />
                    </>
                  )}
                  <span className="text-slate-500">Type:</span>
                  <ChangedValue
                    className="font-mono text-slate-700 dark:text-slate-300 break-words"
                    value={
                      packet.appLayer.protocol === "Ping"
                        ? "ICMP Message"
                        : packet.appLayer.protocol === "DNS"
                          ? packet.appLayer.method === "RESPONSE"
                            ? "DNS Response"
                            : "DNS Query"
                          : "HTTP Traffic"
                    }
                  />
                  {packet.appLayer.hostname && (
                    <>
                      <span className="text-slate-500">Hostname:</span>
                      <ChangedValue
                        className="font-mono text-slate-700 dark:text-slate-300 break-all"
                        value={packet.appLayer.hostname}
                      />
                    </>
                  )}
                  {packet.appLayer.resolvedIp && (
                    <>
                      <span className="text-slate-500">Answer:</span>
                      <ChangedValue
                        className="font-mono text-slate-700 dark:text-slate-300 break-all"
                        value={packet.appLayer.resolvedIp}
                      />
                    </>
                  )}
                  {packet.appLayer.status && (
                    <>
                      <span className="text-slate-500">Status:</span>
                      <ChangedValue
                        className="font-mono text-slate-700 dark:text-slate-300 break-all"
                        value={packet.appLayer.status}
                      />
                    </>
                  )}
                </div>
              </div>

              {/* Transport Layer */}
              <div className="border border-purple-300 dark:border-purple-800 bg-purple-50 dark:bg-purple-900/20 rounded overflow-hidden">
                <div className="bg-purple-100 dark:bg-purple-900/50 px-3 py-1 text-purple-700 dark:text-purple-300 font-bold text-xs uppercase border-b border-purple-300 dark:border-purple-800 flex justify-between">
                  <span>Layer 2: Transport</span>
                  <ChangedValue value={packet.transportLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 items-start">
                  <span className="text-slate-500">Source Port:</span>
                  <ChangedValue
                    className="font-mono text-purple-700 dark:text-purple-200 break-all"
                    value={packet.transportLayer.srcPort}
                  />
                  <span className="text-slate-500">Dest Port:</span>
                  <ChangedValue
                    className="font-mono text-purple-700 dark:text-purple-200 break-all"
                    value={packet.transportLayer.dstPort}
                  />
                  <span className="text-slate-500">Sequence No:</span>
                  <ChangedValue
                    className="font-mono text-slate-700 dark:text-slate-300 break-all"
                    value={packet.transportLayer.seq}
                  />
                  <span className="text-slate-500">Total Pkts:</span>
                  <ChangedValue
                    className="font-mono text-slate-700 dark:text-slate-300 break-all"
                    value={packet.transportLayer.total}
                  />
                  <span className="text-slate-500">Checksum:</span>
                  <ChangedValue
                    className="font-mono text-slate-700 dark:text-slate-300 break-all"
                    value={packet.transportLayer.checksum}
                  />
                </div>
              </div>

              {/* Network / Internet Layer */}
              <div className="border border-emerald-300 dark:border-emerald-800 bg-emerald-50 dark:bg-emerald-900/20 rounded overflow-hidden">
                <div className="bg-emerald-100 dark:bg-emerald-900/50 px-3 py-1 text-emerald-700 dark:text-emerald-300 font-bold text-xs uppercase border-b border-emerald-300 dark:border-emerald-800 flex justify-between">
                  <span>Layer 3: Network</span>
                  <ChangedValue value={packet.networkLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 items-start">
                  <span className="text-slate-500">Sender IP:</span>
                  <ChangedValue
                    className="font-mono text-emerald-700 dark:text-emerald-200 break-all"
                    value={packet.networkLayer.srcIP}
                  />
                  <span className="text-slate-500">Dest IP:</span>
                  <ChangedValue
                    className="font-mono text-emerald-700 dark:text-emerald-200 break-all"
                    value={packet.networkLayer.dstIP}
                  />
                  <span className="text-slate-500">TTL (Time To Live):</span>
                  <ChangedValue
                    className="font-mono text-slate-700 dark:text-slate-300 break-all"
                    value={packet.networkLayer.ttl}
                  />
                </div>
              </div>

              {/* Link / Network Access Layer */}
              <div className="border border-amber-300 dark:border-amber-800 bg-amber-50 dark:bg-amber-900/20 rounded overflow-hidden">
                <div className="bg-amber-100 dark:bg-amber-900/50 px-3 py-1 text-amber-700 dark:text-amber-300 font-bold text-xs uppercase border-b border-amber-300 dark:border-amber-800 flex justify-between">
                  <span>Layer 4: Link</span>
                  <ChangedValue value={packet.linkLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 text-xs items-start">
                  <span className="text-slate-500">Protocol:</span>
                  <ChangedValue
                    className="font-mono text-slate-700 dark:text-slate-300 break-all"
                    value={packet.linkLayer.protocol}
                  />
                  <span className="text-slate-500">Current Hop MAC:</span>
                  <ChangedValue
                    className="font-mono text-amber-700 dark:text-amber-200 break-all"
                    value={packet.linkLayer.srcMAC}
                  />
                  <span className="text-slate-500">Next Hop MAC:</span>
                  <ChangedValue
                    className="font-mono text-amber-700 dark:text-amber-200 break-all"
                    value={packet.linkLayer.dstMAC}
                  />
                </div>
              </div>

              {/* Payload */}
              <div className="border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/50 rounded overflow-hidden mt-2">
                <div className="bg-slate-200 dark:bg-slate-700/50 px-3 py-1 text-slate-700 dark:text-slate-300 font-bold text-xs uppercase border-b border-slate-300 dark:border-slate-600">
                  Packet Payload Data
                </div>
                <div className="p-3 text-sm font-mono text-slate-700 dark:text-slate-300 whitespace-pre-wrap payload-scroll">
                  <ChangedValue value={packet.payload} />
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
