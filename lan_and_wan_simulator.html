      const LINKS = [
        { id: "L1", source: "PC1", target: "SW_A" },
        { id: "L2", source: "SRV1", target: "SW_A" },
        { id: "L3", source: "SW_A", target: "RT_A" },

        { id: "L5", source: "SW_CORE", target: "RT_B" },
        { id: "L6", source: "SW_CORE", target: "RT_EDGE" },
        { id: "L7", source: "RT_EDGE", target: "INT_SRV" },
        { id: "L8", source: "SW_B", target: "RT_B" },

        { id: "L10", source: "PC3", target: "SW_B" },

      // ==========================================
      // 2. NETWORK ENGINE LOGIC
      // ==========================================

      const ipToNum = (ip) =>
        ip
          .split(".")
          .reduce((acc, octet) => (acc << 8) + parseInt(octet, 10), 0) >>> 0;

      const isIpInSubnet = (ip, subnet, mask) => {
        return (
          (ipToNum(ip) & ipToNum(mask)) === (ipToNum(subnet) & ipToNum(mask))
        );
      };

      class NetworkEngine {
        static createRequestPacket(srcNode, targetIp, type) {
          const isLocal = isIpInSubnet(targetIp, srcNode.ip, srcNode.subnet);
          const nextHopIp = isLocal ? targetIp : srcNode.gw;
          const nextHopMac = IP_MAC_TABLE[nextHopIp];

          if (!nextHopMac)
            return {
              error: `ARP failed for IP ${nextHopIp}. Cannot route from ${srcNode.name}.`,
            };

          let p = {
            id: generateId(),
            state: "TRANSIT",
            currentNode: srcNode.id,
            nextNode: srcNode.switch,
            progress: 0,
            networkLayer: {
              protocol: "IPv4",
              srcIP: srcNode.ip,
              dstIP: targetIp,
              ttl: 64,
            },
            linkLayer: {
              protocol: "Ethernet",
              srcMAC: srcNode.mac,
              dstMAC: nextHopMac,
            },
          };

          if (type === "PING") {
            p.appLayer = { protocol: "Ping" };
            p.payload = "ICMP Echo Request Data";
            p.transportLayer = {
              protocol: "ICMP",
              srcPort: "N/A",
              dstPort: "N/A",
              seq: Math.floor(Math.random() * 100),
              total: 1,
              checksum:
                "0x" +
                Math.floor(Math.random() * 65535)
                  .toString(16)
                  .toUpperCase(),
            };
          } else if (type === "HTTP") {
            p.appLayer = { protocol: "HTTP", method: "GET" };
            p.payload = "GET /index.html HTTP/1.1";
            p.transportLayer = {
              protocol: "TCP",
              srcPort: 49152 + Math.floor(Math.random() * 16000),
              dstPort: 80,
              seq: 1,
              total: 1,
              checksum:
                "0x" +
                Math.floor(Math.random() * 65535)
                  .toString(16)
                  .toUpperCase(),
            };
          }
          return { packet: p };
        }

        static processSwitch(p, node) {
          const destNodeId = MAC_NODE_TABLE[p.linkLayer.dstMAC];
          if (!destNodeId)
            return {
              action: "DROP",
              reason: `Switch ${node.name} dropped packet: Unknown MAC address ${p.linkLayer.dstMAC}`,
            };

          return {
            action: "FORWARD",
            packet: {
              ...p,
              currentNode: node.id,
              nextNode: destNodeId,
              state: "TRANSIT",
              progress: 0,
            },
          };
        }

        static processRouter(p, router) {
          let isForMe = router.interfaces.some(
            (i) => i.ip === p.networkLayer.dstIP,
          );
          let updatedRouter = null;
          let extraLogs = [];

          // NAT INBOUND (WAN -> LAN)
          if (
            isForMe &&
            router.natTable &&
            p.networkLayer.dstIP === router.interfaces[1].ip
          ) {
            const checkPort =
              p.transportLayer.protocol === "TCP"
                ? p.transportLayer.dstPort
                : p.transportLayer.seq;
            const natEntry = router.natTable.find(
              (entry) => entry.externalPort === checkPort,
            );

            if (natEntry) {
              p = { ...p };
              p.networkLayer = {
                ...p.networkLayer,
                dstIP: natEntry.internalIp,
              };
              p.transportLayer = { ...p.transportLayer };
              if (p.transportLayer.protocol === "TCP")
                p.transportLayer.dstPort = natEntry.internalPort;
              else p.transportLayer.seq = natEntry.internalPort;

              extraLogs.push(
                `NAT Translation (DNAT): Dest mapped back to ${natEntry.internalIp}:${natEntry.internalPort}`,
              );
              isForMe = false; // It's no longer for the router itself, it needs routing to the LAN
            }
          }

          if (isForMe) {
            if (
              p.appLayer.protocol === "Ping" &&
              p.payload.includes("Request")
            ) {
              return {
                ...this.createReplyPacket(p, {
                  ip: p.networkLayer.dstIP,
                  mac: p.linkLayer.dstMAC,
                  switch: p.currentNode,
                  id: router.id,
                  gw: p.networkLayer.srcIP,
                  subnet: "0.0.0.0",
                }),
                extraLogs,
              };
            }
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: Service unavailable on this port.`,
              extraLogs,
            };
          }

          // Routing Step
          const newTtl = p.networkLayer.ttl - 1;
          if (newTtl <= 0)
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: TTL expired.`,
              extraLogs,
            };

          let bestMatch = null;
          let longestMask = -1;

          router.routes.forEach((route) => {
            if (isIpInSubnet(p.networkLayer.dstIP, route.dest, route.mask)) {
              const maskNum = ipToNum(route.mask);
              let maskLen = 0;
              for (let i = 0; i < 32; i++) {
                if ((maskNum & (1 << i)) !== 0) maskLen++;
              }
              if (maskLen > longestMask) {
                longestMask = maskLen;
                bestMatch = route;
              }
            }
          });

          if (!bestMatch)
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: No route to host ${p.networkLayer.dstIP}.`,
              extraLogs,
            };

          // NAT OUTBOUND (LAN -> WAN)
          if (router.natTable !== undefined && bestMatch.iface === 1) {
            // WAN Interface
            const extIp = router.interfaces[1].ip;
            if (
              p.networkLayer.srcIP !== extIp &&
              !p.networkLayer.srcIP.startsWith("203.")
            ) {
              const internalPort =
                p.transportLayer.protocol === "TCP"
                  ? p.transportLayer.srcPort
                  : p.transportLayer.seq;

              let extPort;
              const existing = router.natTable.find(
                (e) =>
                  e.internalIp === p.networkLayer.srcIP &&
                  e.internalPort === internalPort,
              );
              if (existing) {
                extPort = existing.externalPort;
              } else {
                extPort = 50000 + Math.floor(Math.random() * 10000);
                updatedRouter = {
                  ...router,
                  natTable: [
                    ...router.natTable,
                    {
                      internalIp: p.networkLayer.srcIP,
                      internalPort,
                      externalPort: extPort,
                      protocol: p.transportLayer.protocol,
                    },
                  ],
                };
              }

              p = { ...p };
              p.networkLayer = { ...p.networkLayer, srcIP: extIp };
              p.transportLayer = { ...p.transportLayer };
              if (p.transportLayer.protocol === "TCP")
                p.transportLayer.srcPort = extPort;
              else p.transportLayer.seq = extPort;

              extraLogs.push(
                `NAT Translation (SNAT): Source mapped to ${extIp}:${extPort}`,
              );
            }
          }

          const outIface = router.interfaces[bestMatch.iface];
          const nextHopIp =
            bestMatch.nextHop === "0.0.0.0"
              ? p.networkLayer.dstIP
              : bestMatch.nextHop;
          const nextHopMac = IP_MAC_TABLE[nextHopIp];

          if (!nextHopMac)
            return {
              action: "DROP",
              reason: `Router ${router.name} dropped packet: ARP resolution failed for ${nextHopIp}.`,
              extraLogs,
            };

          return {
            action: "FORWARD",
            packet: {
              ...p,
              currentNode: router.id,
              nextNode: outIface.connectedTo,
              state: "TRANSIT",
              progress: 0,
              networkLayer: { ...p.networkLayer, ttl: newTtl },
              linkLayer: {
                protocol: "Ethernet",
                srcMAC: outIface.mac,
                dstMAC: nextHopMac,
              },
            },
            updatedNode: updatedRouter,
            extraLogs,
          };
        }

        static processPC(p, node) {
          if (p.networkLayer.dstIP !== node.ip) {
            return {
              action: "DROP",
              reason: `${node.name} dropped packet: IP mismatch.`,
            };
          }

          if (
            p.payload &&
            (p.payload.includes("Reply") || p.payload.includes("HTTP 200"))
          ) {
            // Response received!
            return {
              action: "CONSUME",
              message: `${node.name} received response from ${p.networkLayer.srcIP}.`,
              responseData: p.payload,
            };
          }

          // PCs do not run web servers in this simulation
          if (p.appLayer.protocol === "HTTP" && node.type !== "Server") {
            return {
              action: "DROP",
              reason: `${node.name} dropped HTTP request: Connection refused on port 80.`,
            };
          }

          return this.createReplyPacket(p, node);
        }

        static createReplyPacket(p, node) {
          const isLocal = isIpInSubnet(
            p.networkLayer.srcIP,
            node.ip,
            node.subnet || "255.255.255.0",
          );
          const nextHopIp = isLocal
            ? p.networkLayer.srcIP
            : node.gw || p.networkLayer.srcIP;
          const nextHopMac = IP_MAC_TABLE[nextHopIp];

          if (!nextHopMac)
            return {
              action: "DROP",
              reason: `${node.name} dropped reply: No ARP for return route.`,
            };

          let reply = {
            id: p.id, // Retain ID so Inspector focus smoothly transitions to the return packet
            state: "TRANSIT",
            currentNode: node.id,
            nextNode: node.switch || p.currentNode, // If router, returns via where it came from roughly
            progress: 0,
            networkLayer: {
              protocol: "IPv4",
              srcIP: node.ip,
              dstIP: p.networkLayer.srcIP,
              ttl: 64,
            },
            linkLayer: {
              protocol: "Ethernet",
              srcMAC: node.mac,
              dstMAC: nextHopMac,
            },
          };

          if (p.appLayer.protocol === "Ping") {
            reply.appLayer = { protocol: "Ping" };
            reply.payload = "ICMP Echo Reply Data";
            reply.transportLayer = { ...p.transportLayer };
          } else if (p.appLayer.protocol === "HTTP") {
            reply.appLayer = { protocol: "HTTP", method: "RESPONSE" };
            reply.payload = `HTTP 200 OK\n\n<html>\n  <body>\n    <h1>Hello from ${node.name}</h1>\n  </body>\n</html>`;
            reply.transportLayer = {
              protocol: "TCP",
              srcPort: 80,
              dstPort: p.transportLayer.srcPort,
              seq: p.transportLayer.seq + 1,
              total: 1,
              checksum:
                "0x" +
                Math.floor(Math.random() * 65535)
                  .toString(16)
                  .toUpperCase(),
            };
          }

          return { action: "FORWARD", packet: reply };
        }
      }

            <line x1="18" y1="14" x2="14" y2="14"></line>
            <line x1="14" y1="14" x2="16" y2="12"></line>
            <line x1="14" y1="14" x2="16" y2="16"></line>
          </svg>
        ),
        Router: () => (
          <svg
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="1.5"
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="6" x2="12" y2="18"></line>
            <line x1="6" y1="12" x2="18" y2="12"></line>
            <polygon points="12 6 9 9 15 9" fill="currentColor"></polygon>
            <polygon points="12 18 9 15 15 15" fill="currentColor"></polygon>
            <polygon points="6 12 9 9 9 15" fill="currentColor"></polygon>
            <polygon points="18 12 15 9 15 15" fill="currentColor"></polygon>
          </svg>
        ),
        Packet: ({ color = "#f59e0b" }) => (
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill={color}
            stroke="#fff"
            strokeWidth="1"
            strokeLinecap="round"
            strokeLinejoin="round"
            className="packet-pulse"
          >
            <path d="M4 7.00005L10.2 11.65C11.2667 12.45 12.7333 12.45 13.8 11.65L20 7" />
            <rect x="3" y="5" width="18" height="14" rx="2" />
          </svg>
        ),
        Play: () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        ),
        Pause: () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        ),
        StepForward: () => (
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
          >
            <polygon points="5 4 15 12 5 20 5 4" fill="currentColor"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        ),
      };

      const ChangedValue = ({ value, className = "" }) => {
        const [flash, setFlash] = useState(false);
        const prev = useRef(value);
        useEffect(() => {
          if (prev.current !== value) {
            setFlash(true);
            const timer = setTimeout(() => setFlash(false), 800);
            prev.current = value;
            return () => clearTimeout(timer);
          }
        }, [value]);
        return (
          <span className={`${className} ${flash ? "flash-update" : ""}`}>
            {value}
          </span>
        );
      };

      const App = () => {
        const [nodes, setNodes] = useState(INITIAL_NODES);
        const [packets, setPackets] = useState([]);
        const [logs, setLogs] = useState([
          {
            id: "init",
            time: new Date().toLocaleTimeString(),
            msg: "Simulation initialized. Select a node to start.",
            type: "info",
          },
        ]);
        const [isPlaying, setIsPlaying] = useState(false);
        const [selectedEntity, setSelectedEntity] = useState(null); // { type: 'NODE'|'PACKET', id: string }
        const [speed, setSpeed] = useState(2); // Progress increment per frame

        const reqRef = useRef();

        // Refactored pure state processor to safely execute without side-effect collision during React renders
        const handleProcessStep = useCallback(
          (currentPackets) => {
            let nextPackets = [];
            let nodeUpdates = {};
            let logsToAdd = [];
            let clearSelected = false;

            const addLocalLog = (msg, type = "info") =>
              logsToAdd.push({ msg, type });

            currentPackets.forEach((p) => {
              if (p.state === "TRANSIT") {
                let np = {
                  ...p,
                  state: "ARRIVED",
                  progress: 100,
                  prevNode: p.currentNode,
                  currentNode: p.nextNode,
                };
                nextPackets.push(np);
                addLocalLog(
                  `Packet ${p.id.substring(0, 4)} arrived at ${nodes[p.nextNode].name}`,
                );
              } else if (p.state === "ARRIVED") {
                const node = nodes[p.currentNode];
                const activeNode = nodeUpdates[node.id] || node;
                let result;

                addLocalLog(`Processing packet at ${activeNode.name}...`);

                if (activeNode.type === "Switch")
                  result = NetworkEngine.processSwitch(p, activeNode);
                else if (activeNode.type === "Router")
                  result = NetworkEngine.processRouter(p, activeNode);
                else result = NetworkEngine.processPC(p, activeNode);

                if (result.extraLogs) {
                  result.extraLogs.forEach((msg) => addLocalLog(msg, "info"));
                }
                if (result.updatedNode) {
                  nodeUpdates[result.updatedNode.id] = result.updatedNode;
                }

                if (result.action === "FORWARD") {
                  nextPackets.push(result.packet);
                  addLocalLog(
                    `Packet routed from ${activeNode.name} towards ${nodes[result.packet.nextNode].name}`,
                    "success",
                  );
                } else if (result.action === "CONSUME") {
                  addLocalLog(result.message, "success");
                  if (
                    result.responseData &&
                    (activeNode.type === "PC" || activeNode.type === "Server")
                  ) {
                    nodeUpdates[activeNode.id] = {
                      ...activeNode,
                      browserOutput: result.responseData,
                    };
                  }
                  if (selectedEntity?.id === p.id) clearSelected = true;
                } else if (result.action === "DROP") {
                  addLocalLog(result.reason, "error");
                  nextPackets.push({
                    ...p,
                    state: "DROPPED",
                    dropTime: performance.now(),
                  });
                  if (selectedEntity?.id === p.id) clearSelected = true;
                }
              } else if (p.state === "DROPPED") {
                nextPackets.push(p);
              }
            });

            return { nextPackets, nodeUpdates, logsToAdd, clearSelected };
          },
          [nodes, selectedEntity],
        );

        // Safe async commit of aggregated side-effects calculated during processing
        const commitUpdates = useCallback((result) => {
          if (Object.keys(result.nodeUpdates).length > 0) {
            setTimeout(
              () => setNodes((n) => ({ ...n, ...result.nodeUpdates })),
              0,
            );
          }
          if (result.logsToAdd.length > 0) {
            setTimeout(() => {
              setLogs((l) => {
                const newLogs = result.logsToAdd.map((log) => ({
                  id: generateId(),
                  time: new Date().toLocaleTimeString(),
                  msg: log.msg,
                  type: log.type,
                }));
                return [...newLogs, ...l].slice(0, 50);
              });
            }, 0);
          }
          if (result.clearSelected) {
            setTimeout(() => setSelectedEntity(null), 0);
          }
        }, []);

        // Animation Loop
        useEffect(() => {
          if (!isPlaying) return;

          let lastTime = performance.now();
          const animate = (time) => {
            const deltaTime = time - lastTime;

            if (deltaTime > 20) {
              // Limit framerate logic
              setPackets((prev) => {
                // Filter out dropped packets older than 1.5 seconds
                let nextPackets = prev.filter(
                  (p) =>
                    !(
                      p.state === "DROPPED" &&
                      performance.now() - p.dropTime > 1500
                    ),
                );
                let needsProcessing = false;

                nextPackets = nextPackets.map((p) => {
                  if (p.state === "TRANSIT") {
                    const nextProgress = p.progress + speed;
                    if (nextProgress >= 100) {
                      needsProcessing = true;
                      return { ...p, progress: 100 };
                    }
                    return { ...p, progress: nextProgress };
                  } else if (p.state === "ARRIVED") {
                    needsProcessing = true;
                  }
                  return p;
                });

                if (needsProcessing) {
                  const result = handleProcessStep(nextPackets);
                  commitUpdates(result);
                  return result.nextPackets;
                }
                return nextPackets;
              });
              lastTime = time;
            }
            reqRef.current = requestAnimationFrame(animate);
          };
          reqRef.current = requestAnimationFrame(animate);
          return () => cancelAnimationFrame(reqRef.current);
        }, [isPlaying, speed, handleProcessStep, commitUpdates]);

        const handlePlayToggle = () => {
          const hasActivePackets = packets.some(
            (p) => p.state === "TRANSIT" || p.state === "ARRIVED",
          );
          if (!isPlaying && !hasActivePackets) {
            commitUpdates({
              logsToAdd: [
                {
                  msg: "No active packets. Click a node to send a ping or HTTP request first.",
                  type: "error",
                },
              ],
              nodeUpdates: {},
            });
            return;
          }
          setIsPlaying(!isPlaying);
        };

        const manualStep = () => {
          const hasActivePackets = packets.some(
            (p) => p.state === "TRANSIT" || p.state === "ARRIVED",
          );
          if (!hasActivePackets) {
            commitUpdates({
              logsToAdd: [
                {
                  msg: "No active packets. Click a node to send a ping or HTTP request first.",
                  type: "error",
                },
              ],
              nodeUpdates: {},
            });
            return;
          }

          setPackets((prev) => {
            let np = prev
              .filter((p) => p.state !== "DROPPED")
              .map((p) =>
                p.state === "TRANSIT" ? { ...p, progress: 100 } : p,
              );
            const result = handleProcessStep(np);
            commitUpdates(result);
            return result.nextPackets;
          });
        };

        const sendUserRequest = (nodeId, targetIp, type) => {
          const node = nodes[nodeId];
          if (!targetIp.match(/^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/)) {
            commitUpdates({
              logsToAdd: [{ msg: "Invalid IP address format.", type: "error" }],
              nodeUpdates: {},
            });
            return;
          }
          const res = NetworkEngine.createRequestPacket(node, targetIp, type);
          if (res.error) {
            commitUpdates({
              logsToAdd: [{ msg: res.error, type: "error" }],
              nodeUpdates: {},
            });
          } else {
            setPackets((prev) => [...prev, res.packet]);
            commitUpdates({
              logsToAdd: [
                {
                  msg: `Created ${type} request from ${node.name} to ${targetIp}`,
                  type: "success",
                },
              ],
              nodeUpdates: {},
            });
            setSelectedEntity({ type: "PACKET", id: res.packet.id });
          }
        };

        // Render Helpers
        const getEntityColor = (nodeId) => {
          if (nodeId.includes("A") || nodeId.includes("1")) return "#3b82f6"; // Blue for Subnet A
          if (
            nodeId.includes("B") ||
            nodeId.includes("2") ||
            nodeId.includes("3")
          )
            return "#10b981"; // Green for Subnet B
          if (nodeId.includes("EDGE") || nodeId.includes("INT"))
            return "#ef4444"; // Red for Edge/Internet
          return "#8b5cf6"; // Purple for Core
        };

        return (
          <div className="flex flex-col h-screen overflow-hidden">
            {/* Header */}
            <header className="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center shadow-md z-10">
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <Icons.Router /> LAN & WAN Simulator
                </h1>
                <p className="text-slate-400 text-sm mt-1">
                  AQA A Level Computer Science - Interactive Protocol Tracker
                </p>
              </div>
              <div className="flex gap-4 items-center bg-slate-900 p-2 rounded-lg border border-slate-700">
                <button
                  onClick={handlePlayToggle}
                  className={`flex items-center gap-1 px-4 py-2 rounded font-semibold transition ${isPlaying ? "bg-amber-500 hover:bg-amber-600 text-white" : "bg-green-600 hover:bg-green-500 text-white"}`}
                >
                  {isPlaying ? (
                    <>
                      <Icons.Pause /> Pause
                    </>
                  ) : (
                    <>
                      <Icons.Play /> Play
                    </>
                  )}
                </button>
                <button
                  onClick={manualStep}
                  disabled={isPlaying}
                  className="flex items-center gap-1 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded font-semibold disabled:opacity-50 transition"
                >
                  <Icons.StepForward /> Step Forward
                </button>
                <div className="flex items-center gap-2 text-sm text-slate-300 ml-4 border-l border-slate-700 pl-4">
                  <span>Speed:</span>
                  <input
                    type="range"
                    min="0.5"
                    max="5"
                    step="0.5"
                    value={speed}
                    onChange={(e) => setSpeed(parseFloat(e.target.value))}
                    className="w-24 accent-blue-500"
                  />
                </div>
              </div>
            </header>

            {/* Main Content */}
            <div className="flex flex-1 overflow-hidden">
              {/* LEFT: Canvas & Logs */}
              <div className="flex-1 flex flex-col relative bg-slate-900">
                {/* Canvas area */}
                <div
                  className="flex-1 relative overflow-hidden"
                  style={{
                    backgroundImage:
                      "radial-gradient(#334155 1px, transparent 1px)",
                    backgroundSize: "30px 30px",
                  }}
                >
                  <svg
                    className="w-full h-full absolute inset-0"
                    viewBox="0 0 1000 700"
                    preserveAspectRatio="xMidYMid meet"
                  >
                    {/* Links */}
                    {LINKS.map((link) => {
                      const n1 = nodes[link.source];
                      const n2 = nodes[link.target];
                      return (
                        <line
                          key={link.id}
                          x1={n1.x}
                          y1={n1.y}
                          x2={n2.x}
                          y2={n2.y}
                          stroke="#475569"
                          strokeWidth="4"
                          strokeDasharray="6,4"
                        />
                      );
                    })}

                    {/* Nodes */}
                    {Object.values(nodes).map((node) => {
                      const color = getEntityColor(node.id);
                      const isSelected = selectedEntity?.id === node.id;
                      return (
                        <g
                          key={node.id}
                          transform={`translate(${node.x}, ${node.y})`}
                          onClick={() =>
                            setSelectedEntity({ type: "NODE", id: node.id })
                          }
                          className="cursor-pointer"
                        >
                          <circle
                            cx="0"
                            cy="0"
                            r="30"
                            fill="#1e293b"
                            stroke={isSelected ? "#fff" : color}
                            strokeWidth={isSelected ? 4 : 2}
                          />
                          <g
                            transform="translate(-20, -20)"
                            fill={color}
                            className="text-white"
                          >
                            {node.type === "PC" && <Icons.PC />}
                            {node.type === "Server" && <Icons.Server />}
                            {node.type === "Switch" && <Icons.Switch />}
                            {node.type === "Router" && <Icons.Router />}
                          </g>
                          <text
                            x="0"
                            y="48"
                            textAnchor="middle"
                            fill="#cbd5e1"
                            fontSize="14"
                            fontWeight="bold"
                          >
                            {node.name}
                          </text>
                          {(node.type === "PC" || node.type === "Server") && (
                            <text
                              x="0"
                              y="66"
                              textAnchor="middle"
                              fill="#94a3b8"
                              fontSize="13"
                            >
                              {node.ip}
                            </text>
                          )}
                        </g>
                      );
                    })}

                    {/* Packets */}
                    {packets.map((p) => {
                      let px, py;
                      const curr = nodes[p.currentNode];

                      if (p.state === "TRANSIT") {
                        const next = nodes[p.nextNode];
                        px = curr.x + (next.x - curr.x) * (p.progress / 100);
                        py = curr.y + (next.y - curr.y) * (p.progress / 100);
                      } else if (p.state === "ARRIVED" && p.prevNode) {
                        const prev = nodes[p.prevNode];
                        const dx = curr.x - prev.x;
                        const dy = curr.y - prev.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const radius = 30; // Radius of the node circle
                        if (dist > 0) {
                          px = curr.x - (dx / dist) * radius;
                          py = curr.y - (dy / dist) * radius;
                        } else {
                          px = curr.x;
                          py = curr.y;
                        }
                      } else {
                        px = curr.x;
                        py = curr.y;
                      }

                      if (p.state === "DROPPED") {
                        return (
                          <g
                            key={p.id}
                            transform={`translate(${px}, ${py})`}
                            className="opacity-80"
                          >
                            <circle
                              cx="0"
                              cy="0"
                              r="14"
                              fill="#1e293b"
                              stroke="#ef4444"
                              strokeWidth="2"
                            />
                            <line
                              x1="-8"
                              y1="-8"
                              x2="8"
                              y2="8"
                              stroke="#ef4444"
                              strokeWidth="3"
                              strokeLinecap="round"
                            />
                            <line
                              x1="8"
                              y1="-8"
                              x2="-8"
                              y2="8"
                              stroke="#ef4444"
                              strokeWidth="3"
                              strokeLinecap="round"
                            />
                          </g>
                        );
                      }

                      const isSelected = selectedEntity?.id === p.id;
                      return (
                        <g
                          key={p.id}
                          transform={`translate(${px}, ${py})`}
                          onClick={() =>
                            setSelectedEntity({ type: "PACKET", id: p.id })
                          }
                          className="cursor-pointer"
                        >
                          <circle
                            cx="0"
                            cy="0"
                            r="14"
                            fill="#f59e0b"
                            stroke={isSelected ? "#fff" : "#b45309"}
                            strokeWidth={isSelected ? 3 : 1}
                          />
                          <g transform="translate(-12, -12)">
                            <Icons.Packet color="transparent" />
                          </g>
                        </g>
                      );
                    })}
                  </svg>

                  {/* Top-right Legend / Map info */}
                  <div className="absolute top-4 left-4 bg-slate-800/80 p-3 rounded border border-slate-700 pointer-events-none">
                    <h3 className="text-white font-bold mb-2">
                      Network Legend
                    </h3>
                    <div className="flex flex-col gap-1 text-sm">
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-blue-500"></div>{" "}
                        Subnet A (192.168.1.0/24)
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-green-500"></div>{" "}
                        Subnet B (192.168.2.0/24)
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-red-500"></div>{" "}
                        Internet/WAN
                      </div>
                    </div>
                  </div>
                </div>

                {/* Console Logs */}
                <div className="h-48 bg-black border-t border-slate-700 flex flex-col font-mono text-sm">
                  <div className="bg-slate-800 px-4 py-1 text-slate-300 font-semibold border-b border-slate-700">
                    Simulation Event Log
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-1">
                    {logs.map((log) => (
                      <div
                        key={log.id}
                        className={`flex gap-3 ${log.type === "error" ? "text-red-400" : log.type === "success" ? "text-green-400" : "text-slate-300"}`}
                      >
                        <span className="text-slate-500">[{log.time}]</span>
                        <span>{log.msg}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* RIGHT: Inspector Panel */}
              <div className="w-96 bg-slate-800 border-l border-slate-700 flex flex-col">
                {!selectedEntity ? (
                  <div className="flex-1 flex flex-col items-center justify-center text-slate-500 p-8 text-center">
                    <Icons.Router />
                    <h2 className="text-xl mt-4 font-bold text-slate-300">
                      Inspector
                    </h2>
                    <p className="mt-2 text-sm">
                      Click on any node or active packet in the network map to
                      view details and perform actions.
                    </p>
                  </div>
                ) : selectedEntity.type === "NODE" ? (
                  <NodeInspector
                    node={nodes[selectedEntity.id]}
                    onSendRequest={sendUserRequest}
                    color={getEntityColor(selectedEntity.id)}
                  />
                ) : (
                  <PacketInspector
                    packet={packets.find((p) => p.id === selectedEntity.id)}
                  />
                )}
              </div>
            </div>
          </div>
        );
      };

      // --- SUB-COMPONENTS ---

      const NodeInspector = ({ node, onSendRequest, color }) => {
        const [tab, setTab] = useState("INFO");
        const [pingTarget, setPingTarget] = useState("192.168.2.2");
        const [httpTarget, setHttpTarget] = useState("203.0.113.50");

        const hasBrowser = node.type === "PC" || node.type === "Server";

        return (
          <div className="flex flex-col h-full">
            <div
              className="p-4 border-b border-slate-700"
              style={{ borderTop: `4px solid ${color}` }}
            >
              <div className="flex items-center gap-3">
                <div style={{ color }}>
                  {node.type === "PC" && <Icons.PC />}
                  {node.type === "Server" && <Icons.Server />}
                  {node.type === "Switch" && <Icons.Switch />}
                  {node.type === "Router" && <Icons.Router />}
                </div>
                <div>
                  <h2 className="text-xl font-bold text-white">{node.name}</h2>
                  <p className="text-sm text-slate-400">{node.type}</p>
                </div>
              </div>
            </div>

            <div className="flex border-b border-slate-700 text-sm font-semibold">
              <button
                onClick={() => setTab("INFO")}
                className={`flex-1 py-2 ${tab === "INFO" ? "bg-slate-700 text-white" : "text-slate-400 hover:bg-slate-750"}`}
              >
                Info
              </button>
              {hasBrowser && (
                <button
                  onClick={() => setTab("PING")}
                  className={`flex-1 py-2 ${tab === "PING" ? "bg-slate-700 text-white" : "text-slate-400 hover:bg-slate-750"}`}
                >
                  Ping
                </button>
              )}
              {hasBrowser && (
                <button
                  onClick={() => setTab("HTTP")}
                  className={`flex-1 py-2 ${tab === "HTTP" ? "bg-slate-700 text-white" : "text-slate-400 hover:bg-slate-750"}`}
                >
                  HTTP
                </button>
              )}
              {hasBrowser && (
                <button
                  onClick={() => setTab("BROWSER")}
                  className={`flex-1 py-2 ${tab === "BROWSER" ? "bg-slate-700 text-white" : "text-slate-400 hover:bg-slate-750"}`}
                >
                  Browser
                </button>
              )}
            </div>

            <div className="flex-1 p-4 overflow-y-auto">
              {tab === "INFO" && (
                <div className="flex flex-col gap-4 text-sm">
                  {node.ip && (
                    <div className="bg-slate-900 p-3 rounded border border-slate-700">
                      <div className="text-slate-500 mb-1 font-semibold text-xs uppercase">
                        Network Configuration
                      </div>
                      <div className="grid grid-cols-[80px_1fr] gap-1">
                        <span className="text-slate-400">IP:</span>
                        <span className="font-mono text-blue-300">
                          {node.ip}
                        </span>
                        <span className="text-slate-400">Mask:</span>
                        <span className="font-mono text-slate-300">
                          {node.subnet}
                        </span>
                        <span className="text-slate-400">Gateway:</span>
                        <span className="font-mono text-slate-300">
                          {node.gw}
                        </span>
                        <span className="text-slate-400">MAC:</span>
                        <span className="font-mono text-slate-300">
                          {node.mac}
                        </span>
                      </div>
                    </div>
                  )}

                  {node.type === "Router" && (
                    <>
                      <div className="bg-slate-900 p-3 rounded border border-slate-700">
                        <div className="text-slate-500 mb-2 font-semibold text-xs uppercase">
                          Interfaces
                        </div>
                        {node.interfaces.map((iface, i) => (
                          <div
                            key={i}
                            className="mb-2 last:mb-0 border-b border-slate-800 pb-2 last:border-0 last:pb-0"
                          >
                            <div className="font-bold text-slate-300">
                              {iface.name}
                            </div>
                            <div className="grid grid-cols-[40px_1fr] gap-x-1 text-xs mt-1">
                              <span className="text-slate-500">IP:</span>
                              <span className="font-mono">{iface.ip}</span>
                              <span className="text-slate-500">MAC:</span>
                              <span className="font-mono">{iface.mac}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                      <div className="bg-slate-900 p-3 rounded border border-slate-700">
                        <div className="text-slate-500 mb-2 font-semibold text-xs uppercase">
                          Routing Table
                        </div>
                        <table className="w-full text-xs text-left border-collapse">
                          <thead>
                            <tr className="text-slate-400 border-b border-slate-700">
                              <th className="pb-1">Destination</th>
                              <th className="pb-1">Next Hop</th>
                            </tr>
                          </thead>
                          <tbody>
                            {node.routes.map((rt, i) => (
                              <tr
                                key={i}
                                className="border-b border-slate-800 last:border-0"
                              >
                                <td className="py-1 font-mono">
                                  {rt.dest}/
                                  {rt.mask
                                    .split(".")
                                    .reduce(
                                      (a, c) => a + (c === "255" ? 8 : 0),
                                      0,
                                    )}
                                </td>
                                <td className="py-1 font-mono">{rt.nextHop}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      {node.natTable !== undefined && (
                        <div className="bg-slate-900 p-3 rounded border border-slate-700 mt-4">
                          <div className="text-slate-500 mb-2 font-semibold text-xs uppercase">
                            NAT Translation Table
                          </div>
                          {node.natTable.length === 0 ? (
                            <div className="text-xs text-slate-500 italic">
                              Table is empty
                            </div>
                          ) : (
                            <table className="w-full text-[10px] text-left border-collapse">
                              <thead>
                                <tr className="text-slate-400 border-b border-slate-700">
                                  <th className="pb-1">Internal Map</th>
                                  <th className="pb-1">External Port</th>
                                  <th className="pb-1">Proto</th>
                                </tr>
                              </thead>
                              <tbody>
                                {node.natTable.map((nat, i) => (
                                  <tr
                                    key={i}
                                    className="border-b border-slate-800 last:border-0"
                                  >
                                    <td className="py-1 font-mono text-blue-300">
                                      {nat.internalIp}:{nat.internalPort}
                                    </td>
                                    <td className="py-1 font-mono text-emerald-300">
                                      {nat.externalPort}
                                    </td>
                                    <td className="py-1 font-mono text-slate-300">
                                      {nat.protocol}
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          )}
                        </div>
                      )}
                    </>
                  )}

                  {node.type === "Switch" && (
                    <div className="bg-slate-900 p-3 rounded border border-slate-700 text-slate-400 italic">
                      Layer 2 forwarding enabled.
                      <br />
                      MAC table populated automatically in this simulation.
                    </div>
                  )}
                </div>
              )}

              {tab === "PING" && (
                <div className="flex flex-col gap-4">
                  <p className="text-sm text-slate-300">
                    Send an ICMP Echo Request to test connectivity.
                  </p>
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">
                      Target IP Address
                    </label>
                    <input
                      type="text"
                      value={pingTarget}
                      onChange={(e) => setPingTarget(e.target.value)}
                      className="w-full bg-slate-900 border border-slate-700 text-white rounded p-2 font-mono"
                    />
                  </div>
                  <button
                    onClick={() => onSendRequest(node.id, pingTarget, "PING")}
                    className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition"
                  >
                    Send Ping Request
                  </button>
                </div>
              )}

              {tab === "HTTP" && (
                <div className="flex flex-col gap-4">
                  <p className="text-sm text-slate-300">
                    Simulate a web browser HTTP GET Request.
                  </p>
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">
                      Target IP Address
                    </label>
                    <input
                      type="text"
                      value={httpTarget}
                      onChange={(e) => setHttpTarget(e.target.value)}
                      className="w-full bg-slate-900 border border-slate-700 text-white rounded p-2 font-mono"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">
                      Destination Port
                    </label>
                    <input
                      type="text"
                      value="80 (HTTP)"
                      disabled
                      className="w-full bg-slate-800 border border-slate-700 text-slate-500 rounded p-2 font-mono cursor-not-allowed"
                    />
                  </div>
                  <button
                    onClick={() => onSendRequest(node.id, httpTarget, "HTTP")}
                    className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded transition"
                  >
                    Send HTTP Request
                  </button>
                </div>
              )}

              {tab === "BROWSER" && (
                <div className="bg-white text-black p-4 rounded h-64 border border-slate-400 overflow-auto font-sans shadow-inner">
                  {node.browserOutput ? (
                    <pre className="whitespace-pre-wrap font-sans">
                      {node.browserOutput.split("\n").map((line, i) => {
                        if (line.includes("HTTP 200"))
                          return (
                            <div
                              key={i}
                              className="text-green-700 font-mono text-xs mb-2 pb-2 border-b"
                            >
                              {line}
                            </div>
                          );
                        if (line.includes("<h1>"))
                          return (
                            <h1 key={i} className="text-2xl font-bold my-2">
                              {line.replace(/<\/?h1>/g, "")}
                            </h1>
                          );
                        return (
                          <span key={i}>
                            {line.replace(/<\/?(html|body)>/g, "")}
                          </span>
                        );
                      })}
                    </pre>
                  ) : (
                    <div className="flex items-center justify-center h-full text-slate-400 italic">
                      Browser Window Empty
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      };

      const PacketInspector = ({ packet }) => {
        if (!packet)
          return (
            <div className="p-8 text-center text-slate-500">
              Packet no longer exists.
            </div>
          );

        return (
          <div className="flex flex-col h-full bg-slate-800">
            <div className="p-4 border-b border-slate-700 border-t-4 border-t-amber-500 flex justify-between items-center bg-slate-850">
              <h2 className="text-xl font-bold text-white flex items-center gap-2">
                <Icons.Packet color="#f59e0b" /> Packet Inspector
              </h2>
            </div>

            <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
              <p className="text-sm text-slate-400 mb-2">
                AQA TCP/IP 4-Layer Model Breakdown:
              </p>

              {/* Application Layer */}
              <div className="border border-blue-800 bg-blue-900/20 rounded overflow-hidden">
                <div className="bg-blue-900/50 px-3 py-1 text-blue-300 font-bold text-xs uppercase border-b border-blue-800 flex justify-between">
                  <span>Layer 1: Application</span>
                  <ChangedValue value={packet.appLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 items-start">
                  {packet.appLayer.method && (
                    <>
                      <span className="text-slate-500">Method:</span>
                      <ChangedValue
                        className="font-mono text-slate-300 break-all"
                        value={packet.appLayer.method}
                      />
                    </>
                  )}
                  <span className="text-slate-500">Type:</span>
                  <ChangedValue
                    className="font-mono text-slate-300 break-words"
                    value={
                      packet.appLayer.protocol === "Ping"
                        ? "ICMP Message"
                        : "HTTP Traffic"
                    }
                  />
                </div>
              </div>

              {/* Transport Layer */}
              <div className="border border-purple-800 bg-purple-900/20 rounded overflow-hidden">
                <div className="bg-purple-900/50 px-3 py-1 text-purple-300 font-bold text-xs uppercase border-b border-purple-800 flex justify-between">
                  <span>Layer 2: Transport</span>
                  <ChangedValue value={packet.transportLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 items-start">
                  <span className="text-slate-500">Source Port:</span>
                  <ChangedValue
                    className="font-mono text-purple-200 break-all"
                    value={packet.transportLayer.srcPort}
                  />
                  <span className="text-slate-500">Dest Port:</span>
                  <ChangedValue
                    className="font-mono text-purple-200 break-all"
                    value={packet.transportLayer.dstPort}
                  />
                  <span className="text-slate-500">Sequence No:</span>
                  <ChangedValue
                    className="font-mono text-slate-300 break-all"
                    value={packet.transportLayer.seq}
                  />
                  <span className="text-slate-500">Total Pkts:</span>
                  <ChangedValue
                    className="font-mono text-slate-300 break-all"
                    value={packet.transportLayer.total}
                  />
                  <span className="text-slate-500">Checksum:</span>
                  <ChangedValue
                    className="font-mono text-slate-300 break-all"
                    value={packet.transportLayer.checksum}
                  />
                </div>
              </div>

              {/* Network / Internet Layer */}
              <div className="border border-emerald-800 bg-emerald-900/20 rounded overflow-hidden">
                <div className="bg-emerald-900/50 px-3 py-1 text-emerald-300 font-bold text-xs uppercase border-b border-emerald-800 flex justify-between">
                  <span>Layer 3: Network</span>
                  <ChangedValue value={packet.networkLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 items-start">
                  <span className="text-slate-500">Sender IP:</span>
                  <ChangedValue
                    className="font-mono text-emerald-200 break-all"
                    value={packet.networkLayer.srcIP}
                  />
                  <span className="text-slate-500">Dest IP:</span>
                  <ChangedValue
                    className="font-mono text-emerald-200 break-all"
                    value={packet.networkLayer.dstIP}
                  />
                  <span className="text-slate-500">TTL (Time To Live):</span>
                  <ChangedValue
                    className="font-mono text-slate-300 break-all"
                    value={packet.networkLayer.ttl}
                  />
                </div>
              </div>

              {/* Link / Network Access Layer */}
              <div className="border border-amber-800 bg-amber-900/20 rounded overflow-hidden">
                <div className="bg-amber-900/50 px-3 py-1 text-amber-300 font-bold text-xs uppercase border-b border-amber-800 flex justify-between">
                  <span>Layer 4: Link</span>
                  <ChangedValue value={packet.linkLayer.protocol} />
                </div>
                <div className="p-3 text-sm grid grid-cols-[110px_1fr] gap-y-1 text-xs items-start">
                  <span className="text-slate-500">Protocol:</span>
                  <ChangedValue
                    className="font-mono text-slate-300 break-all"
                    value={packet.linkLayer.protocol}
                  />
                  <span className="text-slate-500">Current Hop MAC:</span>
                  <ChangedValue
                    className="font-mono text-amber-200 break-all"
                    value={packet.linkLayer.srcMAC}
                  />
                  <span className="text-slate-500">Next Hop MAC:</span>
                  <ChangedValue
                    className="font-mono text-amber-200 break-all"
                    value={packet.linkLayer.dstMAC}
                  />
                </div>
              </div>

              {/* Payload */}
              <div className="border border-slate-600 bg-slate-900/50 rounded overflow-hidden mt-2">
                <div className="bg-slate-700/50 px-3 py-1 text-slate-300 font-bold text-xs uppercase border-b border-slate-600">
                  Packet Payload Data
                </div>
                <div className="p-3 text-sm font-mono text-slate-300 whitespace-pre-wrap payload-scroll">
                  <ChangedValue value={packet.payload} />
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
