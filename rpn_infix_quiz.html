<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPN ↔ Infix Quiz</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DYQESQXT38"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-DYQESQXT38");
  </script>
  <!-- Prevent FOUC: apply dark class before render -->
  <script>
    (function () {
      try {
        var mode = localStorage.getItem("uimode");
        if (mode === "dark" || (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --track-bg: #e2e8f0;
      --badge-bg: #dbeafe;
      --badge-text: #1d4ed8;
      --footer-bg: #f8fafc;
      --primary-btn: #1f2937;
      --primary-btn-hover: #000000;
      --input-bg: #ffffff;
      --input-color: #1e293b;
      --input-ok-bg: #f0fdf4;
      --input-bad-bg: #fef2f2;
      --input-bad-border: #fca5a5;
      --hint-bg: #fffbeb;
      --hint-border: #fde68a;
      --hint-text: #92400e;
      --hint-btn-bg: #ffffff;
      --hint-btn-active-bg: #fef3c7;
      --hint-btn-active-border: #fcd34d;
      --hint-btn-active-text: #92400e;
      --disabled-bg: #e2e8f0;
      --disabled-text: #94a3b8;
      --header-bg: #0f172a;
      --header-accent: #38bdf8;
    }
    html.dark {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --line: #334155;
      --blue: #38bdf8;
      --green: #4ade80;
      --red: #f87171;
      --track-bg: #334155;
      --badge-bg: #1e3a5f;
      --badge-text: #93c5fd;
      --footer-bg: #1e293b;
      --primary-btn: #334155;
      --primary-btn-hover: #475569;
      --input-bg: #0f172a;
      --input-color: #f1f5f9;
      --input-ok-bg: #052e16;
      --input-bad-bg: #1c0202;
      --input-bad-border: #ef4444;
      --hint-bg: #1c0a00;
      --hint-border: #92400e;
      --hint-text: #fde68a;
      --hint-btn-bg: #1e293b;
      --hint-btn-active-bg: #1c0a00;
      --hint-btn-active-border: #92400e;
      --hint-btn-active-text: #fde68a;
      --disabled-bg: #334155;
      --disabled-text: #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }
    /* CS Learning Header */
    .cs-header {
      width: 100%;
      background-color: var(--header-bg);
      padding: 0 1.5rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .cs-header-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--header-accent);
      text-decoration: none;
    }
    .cs-header-nav { display: flex; align-items: center; gap: 1.25rem; }
    .cs-header-nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    .cs-header-nav a:hover { color: #f1f5f9; }
    #theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    #theme-toggle:hover { color: #f1f5f9; }

    .wrap {
      min-height: calc(100vh - 58px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 820px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }
    .section { padding: 1.25rem 1.5rem; }
    .header { border-bottom: 1px solid var(--line); }
    .footer {
      border-top: 1px solid var(--line);
      background: var(--footer-bg);
      display: flex;
      justify-content: flex-end;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.3rem 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .type {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }
    .track {
      margin-top: 0.75rem;
      background: var(--track-bg);
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar {
      background: var(--blue);
      height: 100%;
      width: 0%;
      transition: width 0.2s ease;
    }
    .expr {
      background: #0f172a;
      border-radius: 12px;
      color: #fff;
      text-align: center;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .expr-label {
      color: #93c5fd;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .expr-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 1.6rem;
      margin-top: 0.3rem;
    }
    .question {
      font-size: 1.08rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
    }
    input {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: var(--input-bg);
      color: var(--input-color);
      transition: background 0.2s, border-color 0.2s;
    }
    input.ok {
      border-color: var(--green);
      background: var(--input-ok-bg);
    }
    input.bad {
      border-color: var(--input-bad-border);
      background: var(--input-bad-bg);
    }
    .controls {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.75rem;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: var(--primary-btn);
      color: #fff;
      flex: 1;
    }
    .primary:hover { background: var(--primary-btn-hover); }
    .primary[disabled] {
      background: var(--disabled-bg);
      color: var(--disabled-text);
      cursor: not-allowed;
    }
    .hint-btn {
      background: var(--hint-btn-bg);
      border: 2px solid var(--line);
      color: var(--muted);
    }
    .hint-btn.active {
      background: var(--hint-btn-active-bg);
      border-color: var(--hint-btn-active-border);
      color: var(--hint-btn-active-text);
    }
    .hint {
      margin-top: 0.85rem;
      background: var(--hint-bg);
      border: 1px solid var(--hint-border);
      border-radius: 10px;
      color: var(--hint-text);
      padding: 0.75rem;
      font-size: 0.92rem;
    }
    .error {
      margin-top: 0.7rem;
      color: var(--red);
      font-weight: 600;
    }
    .next {
      background: var(--blue);
      color: #fff;
    }
    .next[disabled] {
      background: var(--disabled-bg);
      color: var(--disabled-text);
      cursor: not-allowed;
    }
    .done { text-align: center; }
    .done h1 { margin: 0.4rem 0; }
    .restart {
      width: 100%;
      background: var(--blue);
      color: #fff;
    }
  </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        corePlugins: { preflight: false },
        theme: {
          extend: {
            colors: {
              headerBg: "#0f172a",
              headerAccent: "#38bdf8",
            },
          },
        },
      };
    </script>
</head>
<body>

<header class="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0 w-full">
  <a href="index.html" class="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline">
    <span class="text-slate-500">&lt;</span>CS<span class="text-slate-500">&gt;</span>&nbsp;Learning
  </a>
  <nav class="flex items-center gap-6">
    <a href="index.html" class="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors no-underline">Home</a>
    <button id="theme-toggle" aria-label="Toggle theme" class="text-slate-400 hover:text-headerAccent transition-colors p-1">
      <svg id="icon-sun" style="display:none" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
      </svg>
      <svg id="icon-moon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
      </svg>
    </button>
  </nav>
</header>

<div class="wrap">
  <main class="card" id="app"></main>
</div>

<script>
  const questions = [
    {
      id: 1, type: "Infix to RPN", expression: "a + b * c",
      question: "Convert the infix expression to Reverse Polish Notation (RPN).",
      correctAnswer: "a b c * +",
      hint: "Multiplication has higher precedence than addition, so it is evaluated first.",
    },
    {
      id: 2, type: "Infix to RPN", expression: "(a + b) * c",
      question: "Convert the infix expression to Reverse Polish Notation (RPN).",
      correctAnswer: "a b + c *",
      hint: "Brackets force addition first, then multiply by c.",
    },
    {
      id: 3, type: "Infix to RPN", expression: "x / (y + z)",
      question: "Convert the infix expression to Reverse Polish Notation (RPN).",
      correctAnswer: "x y z + /",
      hint: "Compute (y + z) first, then divide x by that result.",
    },
    {
      id: 4, type: "Infix to RPN", expression: "(x + y) / (s - (t + p * q))",
      question: "Convert this complex infix expression to RPN.",
      correctAnswer: "x y + s t p q * + - /",
      hint: "Work from inner brackets outward: p*q, then t+(...), then s-(...), then divide.",
    },
    {
      id: 5, type: "RPN to Infix", expression: "a b c + *",
      question: "Convert the RPN expression to infix notation using minimal brackets.",
      correctAnswer: "a * (b + c)",
      hint: "b and c combine first, then multiply by a.",
    },
    {
      id: 6, type: "RPN to Infix", expression: "x y + z /",
      question: "Convert the RPN expression to infix notation using minimal brackets.",
      correctAnswer: "(x + y) / z",
      hint: "x and y add first, then divide by z.",
    },
    {
      id: 7, type: "RPN to Infix", expression: "c a b - *",
      question: "Convert the RPN expression to infix notation using minimal brackets.",
      correctAnswer: "c * (a - b)",
      hint: "a-b is formed first, then multiplied by c.",
    },
    {
      id: 8, type: "RPN to Infix", expression: "p q * r s / +",
      question: "Convert the RPN expression to infix notation using minimal brackets.",
      correctAnswer: "p * q + r / s",
      hint: "Multiply p and q, divide r by s, then add the two results.",
    },
  ];

  const normalize = (text) => String(text || "").toLowerCase().replace(/\s+/g, "");

  const state = {
    currentIdx: 0,
    userInput: "",
    isCorrect: null,
    showHint: false,
    score: 0,
    showFinished: false,
    firstAttempt: true,
  };

  function setState(patch) {
    Object.assign(state, patch);
    render();
  }

  function handleSubmit(event) {
    event.preventDefault();
    if (state.isCorrect === true) return;
    const current = questions[state.currentIdx];
    if (normalize(state.userInput) === normalize(current.correctAnswer)) {
      setState({ isCorrect: true, score: state.score + (state.firstAttempt ? 1 : 0) });
    } else {
      setState({ isCorrect: false, firstAttempt: false });
    }
  }

  function nextQuestion() {
    if (state.currentIdx < questions.length - 1) {
      setState({ currentIdx: state.currentIdx + 1, userInput: "", isCorrect: null, showHint: false, firstAttempt: true });
    } else {
      setState({ showFinished: true });
    }
  }

  function restartQuiz() {
    setState({ currentIdx: 0, userInput: "", isCorrect: null, showHint: false, score: 0, showFinished: false, firstAttempt: true });
  }

  function render() {
    const app = document.getElementById("app");
    const previousInput = document.getElementById("answerInput");
    const shouldRestoreInputFocus = previousInput && document.activeElement === previousInput;
    const previousSelectionStart = shouldRestoreInputFocus ? previousInput.selectionStart : null;
    const previousSelectionEnd = shouldRestoreInputFocus ? previousInput.selectionEnd : null;

    if (state.showFinished) {
      app.innerHTML = `
        <section class="section done">
          <h1>Quiz Complete!</h1>
          <p>You scored <strong>${state.score}</strong> out of ${questions.length} on first attempts.</p>
          <button class="restart" id="restartQuiz">Restart Quiz</button>
        </section>
      `;
      document.getElementById("restartQuiz").addEventListener("click", restartQuiz);
      return;
    }

    const current = questions[state.currentIdx];
    const progress = ((state.currentIdx + (state.isCorrect === true ? 1 : 0)) / questions.length) * 100;
    const inputClass = state.isCorrect === true ? "ok" : state.isCorrect === false ? "bad" : "";
    const checkDisabled = state.isCorrect === true || !state.userInput.trim();
    const nextDisabled = state.isCorrect !== true;

    app.innerHTML = `
      <section class="section header">
        <div class="row">
          <div class="badge">Question ${state.currentIdx + 1} of ${questions.length}</div>
          <div class="type">${current.type}</div>
        </div>
        <div class="track"><div class="bar" style="width:${progress}%"></div></div>
      </section>

      <section class="section">
        <div class="expr">
          <div class="expr-label">Input Expression</div>
          <div class="expr-text">${current.expression}</div>
        </div>
        <div class="question">${current.question}</div>
        <form id="quizForm">
          <input id="answerInput" class="${inputClass}" type="text" value="${state.userInput.replace(/"/g, "&quot;")}" placeholder="Type your answer here..." ${state.isCorrect === true ? "disabled" : ""} />
          <div class="controls">
            <button class="primary" id="checkBtn" type="submit" ${checkDisabled ? "disabled" : ""}>Check Answer</button>
            <button class="hint-btn ${state.showHint ? "active" : ""}" id="hintBtn" type="button">Hint</button>
          </div>
        </form>
        ${state.showHint ? `<div class="hint">${current.hint}</div>` : ""}
        <div class="error" id="answerError" ${state.isCorrect === false ? "" : "hidden"}>Not quite. Check operator precedence and bracket placement.</div>
      </section>

      <section class="section footer">
        <button class="next" id="nextBtn" ${nextDisabled ? "disabled" : ""}>${state.currentIdx === questions.length - 1 ? "See Results" : "Next Question"}</button>
      </section>
    `;

    const input = document.getElementById("answerInput");
    const checkBtn = document.getElementById("checkBtn");
    const answerError = document.getElementById("answerError");
    document.getElementById("quizForm").addEventListener("submit", handleSubmit);
    input.addEventListener("input", (e) => {
      state.userInput = e.target.value;
      if (state.isCorrect === false) {
        state.isCorrect = null;
        input.classList.remove("bad");
        answerError.hidden = true;
      }
      checkBtn.disabled = !state.userInput.trim();
    });
    document.getElementById("hintBtn").addEventListener("click", () => setState({ showHint: !state.showHint }));
    document.getElementById("nextBtn").addEventListener("click", nextQuestion);

    if (shouldRestoreInputFocus && !input.disabled) {
      input.focus();
      if (previousSelectionStart !== null && previousSelectionEnd !== null) {
        const max = input.value.length;
        input.setSelectionRange(Math.min(previousSelectionStart, max), Math.min(previousSelectionEnd, max));
      }
    }
  }

  function applyTheme(mode) {
    if (mode === "dark") {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
    try { localStorage.setItem("uimode", mode); } catch(e) {}
    document.getElementById("icon-moon").style.display = mode === "dark" ? "none" : "";
    document.getElementById("icon-sun").style.display  = mode === "dark" ? "" : "none";
  }

  document.getElementById("theme-toggle").addEventListener("click", () => {
    const isDark = document.documentElement.classList.contains("dark");
    applyTheme(isDark ? "light" : "dark");
  });

  // Sync icons on load
  (function() {
    const isDark = document.documentElement.classList.contains("dark");
    document.getElementById("icon-moon").style.display = isDark ? "none" : "";
    document.getElementById("icon-sun").style.display  = isDark ? "" : "none";
  })();

  render();
</script>
</body>
</html>
