<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPN ↔ Infix Quiz</title>
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #1e293b;
        --muted: #64748b;
        --line: #e2e8f0;
        --blue: #2563eb;
        --green: #16a34a;
        --red: #dc2626;
        --amber-bg: #fffbeb;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .card {
        width: 100%;
        max-width: 820px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      .section {
        padding: 1.25rem 1.5rem;
      }
      .header {
        border-bottom: 1px solid var(--line);
      }
      .footer {
        border-top: 1px solid var(--line);
        background: #f8fafc;
        display: flex;
        justify-content: flex-end;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }
      .badge {
        background: #dbeafe;
        color: #1d4ed8;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.3rem 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .type {
        font-size: 0.9rem;
        color: var(--muted);
        font-weight: 600;
      }
      .track {
        margin-top: 0.75rem;
        background: #e2e8f0;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
      }
      .bar {
        background: var(--blue);
        height: 100%;
        width: 0%;
        transition: width 0.2s ease;
      }
      .expr {
        background: #0f172a;
        border-radius: 12px;
        color: #fff;
        text-align: center;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      .expr-label {
        color: #93c5fd;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .expr-text {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 1.6rem;
        margin-top: 0.3rem;
      }
      .question {
        font-size: 1.08rem;
        font-weight: 600;
        margin-bottom: 0.8rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 2px solid var(--line);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        font-size: 1rem;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      input.ok {
        border-color: var(--green);
        background: #f0fdf4;
      }
      input.bad {
        border-color: #fca5a5;
        background: #fef2f2;
      }
      .controls {
        display: flex;
        gap: 0.6rem;
        margin-top: 0.75rem;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 0.8rem 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: #1f2937;
        color: #fff;
        flex: 1;
      }
      .primary:hover {
        background: #000;
      }
      .primary[disabled] {
        background: #e2e8f0;
        color: #94a3b8;
        cursor: not-allowed;
      }
      .hint-btn {
        background: #fff;
        border: 2px solid var(--line);
        color: #475569;
      }
      .hint-btn.active {
        background: #fef3c7;
        border-color: #fcd34d;
        color: #92400e;
      }
      .hint {
        margin-top: 0.85rem;
        background: var(--amber-bg);
        border: 1px solid #fde68a;
        border-radius: 10px;
        color: #92400e;
        padding: 0.75rem;
        font-size: 0.92rem;
      }
      .error {
        margin-top: 0.7rem;
        color: var(--red);
        font-weight: 600;
      }
      .next {
        background: var(--blue);
        color: #fff;
      }
      .next[disabled] {
        background: #e2e8f0;
        color: #94a3b8;
        cursor: not-allowed;
      }
      .done {
        text-align: center;
      }
      .done h1 {
        margin: 0.4rem 0;
      }
      .restart {
        width: 100%;
        background: var(--blue);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card" id="app"></main>
    </div>

    <script>
      const questions = [
        {
          id: 1,
          type: "Infix to RPN",
          expression: "a + b * c",
          question:
            "Convert the infix expression to Reverse Polish Notation (RPN).",
          correctAnswer: "a b c * +",
          hint: "Multiplication has higher precedence than addition, so it is evaluated first.",
        },
        {
          id: 2,
          type: "Infix to RPN",
          expression: "(a + b) * c",
          question:
            "Convert the infix expression to Reverse Polish Notation (RPN).",
          correctAnswer: "a b + c *",
          hint: "Brackets force addition first, then multiply by c.",
        },
        {
          id: 3,
          type: "Infix to RPN",
          expression: "x / (y + z)",
          question:
            "Convert the infix expression to Reverse Polish Notation (RPN).",
          correctAnswer: "x y z + /",
          hint: "Compute (y + z) first, then divide x by that result.",
        },
        {
          id: 4,
          type: "Infix to RPN",
          expression: "(x + y) / (s - (t + p * q))",
          question: "Convert this complex infix expression to RPN.",
          correctAnswer: "x y + s t p q * + - /",
          hint: "Work from inner brackets outward: p*q, then t+(...), then s-(...), then divide.",
        },
        {
          id: 5,
          type: "RPN to Infix",
          expression: "a b c + *",
          question:
            "Convert the RPN expression to infix notation using minimal brackets.",
          correctAnswer: "a * (b + c)",
          hint: "b and c combine first, then multiply by a.",
        },
        {
          id: 6,
          type: "RPN to Infix",
          expression: "x y + z /",
          question:
            "Convert the RPN expression to infix notation using minimal brackets.",
          correctAnswer: "(x + y) / z",
          hint: "x and y add first, then divide by z.",
        },
        {
          id: 7,
          type: "RPN to Infix",
          expression: "c a b - *",
          question:
            "Convert the RPN expression to infix notation using minimal brackets.",
          correctAnswer: "c * (a - b)",
          hint: "a-b is formed first, then multiplied by c.",
        },
        {
          id: 8,
          type: "RPN to Infix",
          expression: "p q * r s / +",
          question:
            "Convert the RPN expression to infix notation using minimal brackets.",
          correctAnswer: "p * q + r / s",
          hint: "Multiply p and q, divide r by s, then add the two results.",
        },
      ];

      const normalize = (text) =>
        String(text || "")
          .toLowerCase()
          .replace(/\s+/g, "");

      const state = {
        currentIdx: 0,
        userInput: "",
        isCorrect: null,
        showHint: false,
        score: 0,
        showFinished: false,
        firstAttempt: true,
      };

      function setState(patch) {
        Object.assign(state, patch);
        render();
      }

      function handleSubmit(event) {
        event.preventDefault();
        if (state.isCorrect === true) return;

        const current = questions[state.currentIdx];
        if (normalize(state.userInput) === normalize(current.correctAnswer)) {
          setState({
            isCorrect: true,
            score: state.score + (state.firstAttempt ? 1 : 0),
          });
        } else {
          setState({ isCorrect: false, firstAttempt: false });
        }
      }

      function nextQuestion() {
        if (state.currentIdx < questions.length - 1) {
          setState({
            currentIdx: state.currentIdx + 1,
            userInput: "",
            isCorrect: null,
            showHint: false,
            firstAttempt: true,
          });
        } else {
          setState({ showFinished: true });
        }
      }

      function restartQuiz() {
        setState({
          currentIdx: 0,
          userInput: "",
          isCorrect: null,
          showHint: false,
          score: 0,
          showFinished: false,
          firstAttempt: true,
        });
      }

      function render() {
        const app = document.getElementById("app");
        const previousInput = document.getElementById("answerInput");
        const shouldRestoreInputFocus =
          previousInput && document.activeElement === previousInput;
        const previousSelectionStart = shouldRestoreInputFocus
          ? previousInput.selectionStart
          : null;
        const previousSelectionEnd = shouldRestoreInputFocus
          ? previousInput.selectionEnd
          : null;

        if (state.showFinished) {
          app.innerHTML = `
            <section class="section done">
              <h1>Quiz Complete!</h1>
              <p>You scored <strong>${state.score}</strong> out of ${questions.length} on first attempts.</p>
              <button class="restart" id="restartQuiz">Restart Quiz</button>
            </section>
          `;
          document
            .getElementById("restartQuiz")
            .addEventListener("click", restartQuiz);
          return;
        }

        const current = questions[state.currentIdx];
        const progress =
          ((state.currentIdx + (state.isCorrect === true ? 1 : 0)) /
            questions.length) *
          100;
        const inputClass =
          state.isCorrect === true
            ? "ok"
            : state.isCorrect === false
              ? "bad"
              : "";
        const checkDisabled =
          state.isCorrect === true || !state.userInput.trim();
        const nextDisabled = state.isCorrect !== true;

        app.innerHTML = `
          <section class="section header">
            <div class="row">
              <div class="badge">Question ${state.currentIdx + 1} of ${questions.length}</div>
              <div class="type">${current.type}</div>
            </div>
            <div class="track"><div class="bar" style="width:${progress}%"></div></div>
          </section>

          <section class="section">
            <div class="expr">
              <div class="expr-label">Input Expression</div>
              <div class="expr-text">${current.expression}</div>
            </div>
            <div class="question">${current.question}</div>
            <form id="quizForm">
              <input id="answerInput" class="${inputClass}" type="text" value="${state.userInput.replace(/"/g, "&quot;")}" placeholder="Type your answer here..." ${state.isCorrect === true ? "disabled" : ""} />
              <div class="controls">
                <button class="primary" id="checkBtn" type="submit" ${checkDisabled ? "disabled" : ""}>Check Answer</button>
                <button class="hint-btn ${state.showHint ? "active" : ""}" id="hintBtn" type="button">Hint</button>
              </div>
            </form>
            ${state.showHint ? `<div class="hint">${current.hint}</div>` : ""}
            <div class="error" id="answerError" ${state.isCorrect === false ? "" : "hidden"}>Not quite. Check operator precedence and bracket placement.</div>
          </section>

          <section class="section footer">
            <button class="next" id="nextBtn" ${nextDisabled ? "disabled" : ""}>${state.currentIdx === questions.length - 1 ? "See Results" : "Next Question"}</button>
          </section>
        `;

        const input = document.getElementById("answerInput");
        const checkBtn = document.getElementById("checkBtn");
        const answerError = document.getElementById("answerError");
        document
          .getElementById("quizForm")
          .addEventListener("submit", handleSubmit);
        input.addEventListener("input", (e) => {
          state.userInput = e.target.value;
          if (state.isCorrect === false) {
            state.isCorrect = null;
            input.classList.remove("bad");
            answerError.hidden = true;
          }
          checkBtn.disabled = !state.userInput.trim();
        });
        document
          .getElementById("hintBtn")
          .addEventListener("click", () =>
            setState({ showHint: !state.showHint }),
          );
        document
          .getElementById("nextBtn")
          .addEventListener("click", nextQuestion);

        if (shouldRestoreInputFocus && !input.disabled) {
          input.focus();
          if (
            previousSelectionStart !== null &&
            previousSelectionEnd !== null
          ) {
            const max = input.value.length;
            input.setSelectionRange(
              Math.min(previousSelectionStart, max),
              Math.min(previousSelectionEnd, max),
            );
          }
        }
      }

      render();
    </script>
  </body>
</html>
