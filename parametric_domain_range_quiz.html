<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parametric Domain &amp; Range Quiz</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DYQESQXT38"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-DYQESQXT38");
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { colors: { headerBg: "#0f172a", headerAccent: "#38bdf8" } } }
      };
    </script>
    <script>
      window.MathJax = {
        tex: { inlineMath: [["\\(","\\)"]], displayMath: [["\\[","\\]"]] },
        svg: { fontCache: "global" },
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Prevent FOUC -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("uimode");
          if (mode === "dark" || (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useState } = React;

      const rawQuestions = [
        { id:1, type:"Range", difficulty:"Linear", param:String.raw`x = 2t + 1, \quad y = 3t - 4`, domain_t:String.raw`0 \leq t \leq 5`, question:"What is the range of the function?", options:[{label:String.raw`1 \leq x \leq 11`,correct:false},{label:String.raw`-4 \leq y \leq 11`,correct:true},{label:String.raw`0 \leq y \leq 5`,correct:false},{label:String.raw`-4 \leq y \leq 15`,correct:false}], hint:"Range refers to the possible values of $y$. Substitute the boundaries of $t$ into the $y$ equation: $y(0) = 3(0)-4 = -4$ and $y(5) = 3(5)-4 = 11$." },
        { id:2, type:"Range", difficulty:"Linear / Negative Gradient", param:String.raw`x = t^2, \quad y = 10 - 2t`, domain_t:String.raw`1 \leq t \leq 4`, question:"What is the range of the function?", options:[{label:String.raw`2 \leq y \leq 8`,correct:true},{label:String.raw`1 \leq x \leq 16`,correct:false},{label:String.raw`1 \leq y \leq 4`,correct:false},{label:String.raw`8 \leq y \leq 2`,correct:false}], hint:"Calculate $y$ at the boundaries: $y(1) = 10 - 2(1) = 8$ and $y(4) = 10 - 2(4) = 2$. The range is the interval between the lowest and highest values: $[2, 8]$." },
        { id:3, type:"Domain", difficulty:"Trigonometric", param:String.raw`x = 3\sin(t), \quad y = 2\cos(2t)`, domain_t:String.raw`0 \leq t \leq 2\pi`, question:"What is the domain of the function?", options:[{label:String.raw`-2 \leq x \leq 2`,correct:false},{label:String.raw`0 \leq x \leq 3`,correct:false},{label:String.raw`-3 \leq x \leq 3`,correct:true},{label:String.raw`x \in \mathbb{R}`,correct:false}], hint:"Domain refers to the possible values of $x$. Since $\\sin(t)$ ranges from $-1$ to $1$, $3\\sin(t)$ must range from $-3$ to $3$." },
        { id:4, type:"Domain", difficulty:"Trigonometric (Restricted)", param:String.raw`x = \tan(t), \quad y = \sin(t)`, domain_t:String.raw`-\frac{\pi}{4} \leq t \leq \frac{\pi}{4}`, question:"What is the domain of the function?", options:[{label:String.raw`-1 \leq x \leq 1`,correct:true},{label:String.raw`-\frac{1}{\sqrt{2}} \leq x \leq \frac{1}{\sqrt{2}}`,correct:false},{label:String.raw`x \in \mathbb{R}`,correct:false},{label:String.raw`0 \leq x \leq 1`,correct:false}], hint:"Evaluate $x = \\tan(t)$ at the boundaries. $\\tan(-\\pi/4) = -1$ and $\\tan(\\pi/4) = 1$. Since $\\tan(t)$ is increasing on this interval, the domain is $[-1, 1]$." },
        { id:5, type:"Range", difficulty:"Quadratic", param:String.raw`x = t - 3, \quad y = t^2 - 4t + 5`, domain_t:String.raw`t \in \mathbb{R}`, question:"What is the range of the function?", options:[{label:String.raw`y \geq 0`,correct:false},{label:String.raw`y \geq 1`,correct:true},{label:String.raw`y \in \mathbb{R}`,correct:false},{label:String.raw`y \geq 5`,correct:false}], hint:"Complete the square for $y$: $y = (t-2)^2 + 1$. Since $(t-2)^2$ is always $\\geq 0$, the minimum value of $y$ is $1$." },
        { id:6, type:"Domain", difficulty:"Reciprocal", param:String.raw`x = \frac{1}{t+1}, \quad y = t^2`, domain_t:String.raw`t > 0`, question:"What is the domain of the function?", options:[{label:String.raw`x > 0`,correct:false},{label:String.raw`0 < x < 1`,correct:true},{label:String.raw`x < 1`,correct:false},{label:String.raw`x \in \mathbb{R}, x \neq -1`,correct:false}], hint:"As $t$ increases from $0$ to infinity, the denominator $(t+1)$ increases from $1$ to infinity. Therefore, $1/(t+1)$ decreases from $1$ towards $0$." },
        { id:7, type:"Range", difficulty:"Reciprocal Squared", param:String.raw`x = t^3, \quad y = \frac{4}{t^2 + 2}`, domain_t:String.raw`t \in \mathbb{R}`, question:"What is the range of the function?", options:[{label:String.raw`y > 0`,correct:false},{label:String.raw`0 < y \leq 2`,correct:true},{label:String.raw`y \geq 2`,correct:false},{label:String.raw`0 \leq y \leq 4`,correct:false}], hint:"The denominator $t^2 + 2$ has a minimum value of $2$ (when $t=0$). This gives $y$ a maximum value of $4/2 = 2$. As $t$ becomes very large, $y$ approaches $0$ but never reaches it." },
        { id:8, type:"Domain", difficulty:"Exponential", param:String.raw`x = e^{2t}, \quad y = e^t + 3`, domain_t:String.raw`t \in \mathbb{R}`, question:"What is the domain of the function?", options:[{label:String.raw`x \in \mathbb{R}`,correct:false},{label:String.raw`x \geq 0`,correct:false},{label:String.raw`x > 0`,correct:true},{label:String.raw`x > 1`,correct:false}], hint:"The function $x = e^{2t}$ is an exponential function. Exponential functions of the form $a^k$ are always strictly positive for all real exponents." },
        { id:9, type:"Range", difficulty:"Natural Logarithm", param:String.raw`x = \ln(t), \quad y = \frac{1}{t}`, domain_t:String.raw`t \geq 1`, question:"What is the range of the function?", options:[{label:String.raw`y > 0`,correct:false},{label:String.raw`0 < y \leq 1`,correct:true},{label:String.raw`y \geq 1`,correct:false},{label:String.raw`y \in \mathbb{R}`,correct:false}], hint:"If $t \\geq 1$, then the reciprocal $y = 1/t$ starts at $1/1 = 1$ and gets smaller as $t$ increases, approaching (but never hitting) $0$." },
        { id:10, type:"Domain", difficulty:"Logistic / Recip. Exp.", param:String.raw`x = \frac{10}{1 + e^{-t}}, \quad y = t^2`, domain_t:String.raw`t \in \mathbb{R}`, question:"What is the domain of the function?", options:[{label:String.raw`0 < x < 10`,correct:true},{label:String.raw`x > 0`,correct:false},{label:String.raw`x \in \mathbb{R}`,correct:false},{label:String.raw`1 < x < 10`,correct:false}], hint:"As $t \\to \\infty$, $e^{-t} \\to 0$, so $x \\to 10/1 = 10$. As $t \\to -\\infty$, $e^{-t} \\to \\infty$, so $x \\to 10/\\infty = 0$." },
      ];

      const shuffleArray = (arr) => {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      };

      const FormattedText = ({ text }) => {
        if (!text) return null;
        const parts = text.split(/(\$.*?\$)/g);
        return (
          <span>
            {parts.map((part, i) =>
              part.startsWith("$") && part.endsWith("$")
                ? <span key={i}>{`\\(${part.slice(1,-1)}\\)`}</span>
                : <span key={i}>{part}</span>
            )}
          </span>
        );
      };

      function App() {
        const [theme, setTheme] = useState(() => {
          const saved = localStorage.getItem("uimode");
          return saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        });
        useEffect(() => {
          if (theme === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
          localStorage.setItem("uimode", theme);
        }, [theme]);
        const toggleTheme = () => setTheme(p => p === "dark" ? "light" : "dark");

        const buildQuestions = () => rawQuestions.map(q => ({ ...q, options: shuffleArray(q.options) }));
        const [questions, setQuestions] = useState(buildQuestions);
        const [currentIdx, setCurrentIdx] = useState(0);
        const [selectedOption, setSelectedOption] = useState(null);
        const [wrongSelections, setWrongSelections] = useState([]);
        const [isCorrect, setIsCorrect] = useState(false);
        const [score, setScore] = useState(0);
        const [showFinished, setShowFinished] = useState(false);

        const currentQuestion = questions[currentIdx];

        useEffect(() => {
          if (window.MathJax?.typesetPromise) window.MathJax.typesetPromise();
        }, [currentIdx, selectedOption, wrongSelections, isCorrect, showFinished]);

        const handleOptionClick = (index) => {
          if (isCorrect) return;
          const option = currentQuestion.options[index];
          setSelectedOption(index);
          if (option.correct) {
            setIsCorrect(true);
            if (wrongSelections.length === 0) setScore(p => p + 1);
          } else if (!wrongSelections.includes(index)) {
            setWrongSelections(p => [...p, index]);
          }
        };

        const nextQuestion = () => {
          if (currentIdx < questions.length - 1) {
            setCurrentIdx(p => p + 1);
            setSelectedOption(null); setWrongSelections([]); setIsCorrect(false);
          } else { setShowFinished(true); }
        };

        const restartQuiz = () => {
          setQuestions(buildQuestions()); setCurrentIdx(0); setSelectedOption(null);
          setWrongSelections([]); setIsCorrect(false); setScore(0); setShowFinished(false);
        };

        const progress = ((currentIdx + (isCorrect ? 1 : 0)) / questions.length) * 100;

        const Header = () => (
          <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
            <a href="index.html" className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline">
              <span className="text-slate-500">&lt;</span>CS<span className="text-slate-500">&gt;</span>&nbsp;Learning
            </a>
            <nav className="flex items-center gap-6">
              <a href="index.html" className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors">Home</a>
              <button onClick={toggleTheme} className="text-slate-400 hover:text-headerAccent transition-colors p-1" aria-label="Toggle Dark Mode">
                {theme === "dark" ? (
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                  </svg>
                ) : (
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                  </svg>
                )}
              </button>
            </nav>
          </header>
        );

        if (showFinished) {
          return (
            <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex flex-col transition-colors">
              <Header />
              <div className="flex-1 flex items-center justify-center p-4">
                <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl max-w-lg w-full p-8 text-center border border-slate-100 dark:border-slate-700">
                  <div className="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">✓</div>
                  <h1 className="text-3xl font-bold text-slate-800 dark:text-slate-100 mb-2">Quiz Complete!</h1>
                  <p className="text-slate-600 dark:text-slate-300 mb-8">
                    You scored <span className="font-bold text-indigo-600 dark:text-indigo-400">{score} out of {questions.length}</span> on your first attempts.
                  </p>
                  <button onClick={restartQuiz} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl transition-all">
                    Restart &amp; Re-randomize
                  </button>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex flex-col transition-colors">
            <Header />
            <div className="flex-1 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl max-w-2xl w-full overflow-hidden flex flex-col border border-slate-100 dark:border-slate-700">
                {/* Progress header */}
                <div className="p-6 bg-white dark:bg-slate-800 border-b border-slate-100 dark:border-slate-700">
                  <div className="flex justify-between items-center mb-4">
                    <div className="px-3 py-1 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 rounded-full text-xs font-bold uppercase tracking-wider">
                      Question {currentIdx + 1} of {questions.length}
                    </div>
                    <div className="text-slate-500 dark:text-slate-400 text-sm font-medium">{currentQuestion.difficulty}</div>
                  </div>
                  <div className="w-full bg-slate-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                    <div className="bg-indigo-600 dark:bg-indigo-500 h-full transition-all duration-500 ease-out" style={{ width: `${progress}%` }}></div>
                  </div>
                </div>

                {/* Question body */}
                <div className="p-8 flex-grow">
                  <div className="mb-6 bg-slate-900 dark:bg-black/60 rounded-2xl p-6 text-center shadow-inner text-white">
                    <p className="text-indigo-400 font-mono text-sm mb-3">Parametric Equations:</p>
                    <div className="text-xl md:text-2xl mb-5">{`\\[${currentQuestion.param}\\]`}</div>
                    <p className="text-indigo-400 font-mono text-sm mb-3">Parameter Domain:</p>
                    <div className="text-lg">{`\\[${currentQuestion.domain_t}\\]`}</div>
                  </div>

                  <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 mb-6">{currentQuestion.question}</h2>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {currentQuestion.options.map((opt, idx) => {
                      const isWrong = wrongSelections.includes(idx);
                      const isSelectedCorrect = idx === selectedOption && isCorrect;
                      let btnCls = "border-2 border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 hover:border-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/20";
                      if (isWrong) btnCls = "border-red-200 dark:border-red-700 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300";
                      if (isSelectedCorrect) btnCls = "border-green-500 dark:border-green-500 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300";
                      return (
                        <button key={idx} onClick={() => handleOptionClick(idx)}
                          disabled={isCorrect && !isSelectedCorrect}
                          className={`p-4 rounded-2xl text-left transition-all relative flex items-center justify-between group ${btnCls} font-medium`}>
                          <span className="flex items-center gap-3">
                            <span className={`w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold transition-colors shrink-0 ${
                              isSelectedCorrect ? "bg-green-500 text-white"
                              : isWrong ? "bg-red-500 text-white"
                              : "bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 group-hover:bg-indigo-200 dark:group-hover:bg-indigo-800 group-hover:text-indigo-700 dark:group-hover:text-indigo-200"}`}>
                              {String.fromCharCode(65 + idx)}
                            </span>
                            <span>{`\\(${opt.label}\\)`}</span>
                          </span>
                          {isSelectedCorrect && <span className="text-green-500">✓</span>}
                          {isWrong && <span className="text-red-500">✗</span>}
                        </button>
                      );
                    })}
                  </div>

                  {wrongSelections.length > 0 && !isCorrect && (
                    <div className="mt-6 p-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-100 dark:border-amber-800 rounded-xl text-amber-800 dark:text-amber-200 text-sm leading-relaxed">
                      <span className="font-bold flex items-center gap-1 mb-1"><span className="text-lg">💡</span> Hint:</span>
                      <FormattedText text={currentQuestion.hint} />
                    </div>
                  )}
                </div>

                {/* Footer */}
                <div className="p-6 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-700 flex justify-end">
                  <button onClick={nextQuestion} disabled={!isCorrect}
                    className={`flex items-center gap-2 px-8 py-3 rounded-xl font-bold transition-all ${
                      isCorrect
                        ? "bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200 dark:shadow-indigo-900"
                        : "bg-slate-200 dark:bg-slate-700 text-slate-400 dark:text-slate-500 cursor-not-allowed opacity-50"}`}>
                    {currentIdx === questions.length - 1 ? "Finish Quiz" : "Next Question"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
