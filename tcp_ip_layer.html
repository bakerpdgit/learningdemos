<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      window.dataLayer = window.dataLayer || [];

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body { font-family: "Inter", sans-serif; }
      .layer-block {
        border: 2px solid;
        margin-bottom: 8px;
        transition: all 0.3s ease-in-out;
      }
      .packet-container { margin-bottom: 16px; }
      .payload-block {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed rgba(100, 100, 100, 0.3);
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
      ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }
      .control-button { min-width: 100px; }

        display: flex;
        flex-direction: column;
        gap: 1rem;
        overflow-y: auto;
        max-height: 500px;
      }
    </style>
    <!-- Prevent FOUC -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("uimode");
          if (mode === "dark" || (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-slate-100 min-h-screen flex flex-col">

    <header class="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0 w-full">
      <a href="index.html" class="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline">
        <span class="text-slate-500">&lt;</span>CS<span class="text-slate-500">&gt;</span>&nbsp;Learning
      </a>
      <nav class="flex items-center gap-6">
        <a href="index.html" class="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors no-underline">Home</a>
        <button id="theme-toggle" aria-label="Toggle theme" class="text-slate-400 hover:text-headerAccent transition-colors p-1">
          <svg id="icon-sun" class="hidden w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg id="icon-moon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
      </nav>
    </header>

    <div class="flex-1 flex flex-col items-center p-4 md:p-8">
      <div class="w-full max-w-5xl bg-white dark:bg-slate-800 shadow-2xl rounded-xl p-6 md:p-8">
        <header class="mb-6 text-center">
          <h1 class="text-3xl md:text-4xl font-bold text-indigo-600 dark:text-sky-400">
            TCP/IP Protocol Stack Journey
          </h1>
          <p class="text-gray-600 dark:text-slate-400 mt-1">
            Follow your data as it travels through the network layers!
          </p>
        </header>

        <section id="input-section" class="mb-6 p-6 bg-indigo-50 dark:bg-slate-700/50 rounded-lg shadow">
          <h2 class="text-xl font-semibold text-indigo-700 dark:text-sky-400 mb-3">
            Start Your Data's Journey
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="user-message" class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">Your Message:</label>
              <input type="text" id="user-message" value="GET www.perse.co.uk"
                class="w-full p-2 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" />
            </div>
            <div>
              <label for="app-protocol" class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">Application Protocol:</label>
              <select id="app-protocol"
                class="w-full p-2 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                <option value="HTTP">HTTP (Web)</option>
                <option value="HTTPS">HTTPS (Secure Web)</option>
                <option value="FTP">FTP (File Transfer)</option>
                <option value="SMTP">SMTP (Email)</option>
                <option value="DNS">DNS (Domain Name System)</option>
              </select>
            </div>
          </div>
          <button id="start-journey-btn"
            class="mt-4 w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-150 ease-in-out transform hover:scale-105 control-button">
            Start Journey
          </button>
        </section>

        <main id="demo-area" class="hidden">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-50 dark:bg-slate-700/50 p-4 rounded-lg shadow-inner">
              <h2 class="text-xl font-semibold text-indigo-700 dark:text-sky-400 mb-3">
                Data Packet View
              </h2>
              <div id="packet-visualisation" class="packet-visualisation-area text-sm"></div>
            </div>

            <div class="bg-gray-50 dark:bg-slate-700/50 p-4 rounded-lg shadow-inner flex flex-col">
              <div>
                <h2 id="layer-name" class="text-xl font-semibold text-indigo-700 dark:text-sky-400 mb-1">Layer Name</h2>
                <p id="layer-description" class="text-sm text-gray-600 dark:text-slate-300 mb-3 min-h-[100px] max-h-[200px] overflow-y-auto">
                  Description of the layer...
                </p>
              </div>
              <div class="mt-auto">
                <h3 class="text-md font-semibold text-indigo-600 dark:text-sky-400 mb-1">Processing at this layer:</h3>
                <p id="layer-processing"
                  class="text-sm text-gray-700 dark:text-slate-200 bg-indigo-50 dark:bg-slate-700 p-3 rounded-md border border-indigo-200 dark:border-slate-600 min-h-[100px] max-h-[250px] overflow-y-auto">
                  What happens to the data...
                </p>
              </div>
            </div>
          </div>

          <div class="mt-8 flex flex-col sm:flex-row justify-between items-center space-y-4 sm:space-y-0 sm:space-x-4">
            <button id="prev-step-btn"
              class="w-full sm:w-auto bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-150 ease-in-out control-button">
              &larr; Previous Step
            </button>
            <button id="reset-btn"
              class="w-full sm:w-auto bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-150 ease-in-out control-button">
              Reset Journey
            </button>
            <button id="next-step-btn"
              class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-150 ease-in-out control-button">
              Next Step &rarr;
            </button>
          </div>
        </main>

        <footer class="mt-8 text-center text-sm text-gray-500 dark:text-slate-400">
          <p>GCSE Computer Science TCP/IP Demo</p>
        </footer>
      </div>
    </div>

    <script>
      function applyTheme(mode) {
        if (mode === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('uimode', mode);
        document.getElementById('icon-sun').classList.toggle('hidden', mode !== 'dark');
        document.getElementById('icon-moon').classList.toggle('hidden', mode === 'dark');
      }

      document.getElementById('theme-toggle').addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark');
        applyTheme(isDark ? 'light' : 'dark');
      });

      (function () {
        const isDark = document.documentElement.classList.contains('dark');
        document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
        document.getElementById('icon-moon').classList.toggle('hidden', isDark);
      })();

      // DOM Elements
      const inputSection = document.getElementById("input-section");
      const demoArea = document.getElementById("demo-area");
      const userMessageInput = document.getElementById("user-message");
      const appProtocolSelect = document.getElementById("app-protocol");
      const startJourneyBtn = document.getElementById("start-journey-btn");

      const layerNameEl = document.getElementById("layer-name");
      const layerDescriptionEl = document.getElementById("layer-description");
      const layerProcessingEl = document.getElementById("layer-processing");
      const packetVisualisationEl = document.getElementById("packet-visualisation");

      const prevStepBtn = document.getElementById("prev-step-btn");
      const nextStepBtn = document.getElementById("next-step-btn");
      const resetBtn = document.getElementById("reset-btn");

      // State
      let currentStepIndex = -1;
      let originalMessage = "";
      let applicationProtocol = "";
      let packetSegments = [];

      function getDestPort(protocol) {
        switch (protocol) {
          case "HTTP": return 80;
          case "HTTPS": return 443;
          case "FTP": return 21;
          case "SMTP": return 25;
          case "DNS": return 53;
          default: return Math.floor(Math.random() * 1000) + 8000;
        }
      }

      function generateMockIP(type = "destination") {
        if (type === "source") {
          return `192.168.1.${Math.floor(Math.random() * 254) + 1}`;
        }
        const octet1 = [104, 172, 203, 198][Math.floor(Math.random() * 4)];
        return `${octet1}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 254) + 1}`;
      }

      function generateMAC() {
        return Array(6).fill(0).map(() =>
          Math.floor(Math.random() * 256).toString(16).padStart(2, "0")
        ).join(":").toUpperCase();
      }

      function generateChecksum() {
        return `0x${Math.floor(Math.random() * 0xffff).toString(16).toUpperCase().padStart(4, "0")}`;
      }

      const steps = [
        {
          id: "application",
          layerName: "1. Application Layer",
          description: "This layer interacts directly with software applications. It provides protocols that applications use to exchange data. Examples: HTTP for web, SMTP for email, FTP for file transfer.",
          addLayerDataToPacket: () => {
            packetSegments = [];
          },
          getProcessExplanation: () =>
            `Your message: "<strong>${originalMessage}</strong>"<br>Chosen protocol: <strong>${applicationProtocol}</strong><br>This is the raw data your application wants to send.`,
          renderVisual: (container) => {
            container.innerHTML = `
              <div class="layer-block border-blue-500 dark:border-blue-600 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 p-3 rounded-md shadow">
                <div class="font-bold text-lg">Application Layer (${applicationProtocol})</div>
                <div class="mt-1 p-2 bg-blue-50 dark:bg-blue-900/20 rounded break-all">Data: "${originalMessage}"</div>
              </div>`;
          },
        },
        {
          id: "transport",
          layerName: "2. Transport Layer",
          description: "Responsible for process-to-process delivery. It segments data from the application layer, adds port numbers, sequence numbers (for TCP), and a checksum. For this demo, we split the message into two packets.",
          addLayerDataToPacket: () => {
            if (packetSegments.length === 0 && originalMessage) {
              const transportProto =
                applicationProtocol === "HTTP" || applicationProtocol === "HTTPS" ||
                applicationProtocol === "FTP" || applicationProtocol === "SMTP"
                  ? "TCP" : "UDP";
              const commonSourcePort = Math.floor(Math.random() * (65535 - 1024)) + 1024;
              const commonDestPort = getDestPort(applicationProtocol);
              const midPoint = Math.ceil(originalMessage.length / 2);
              const data1 = originalMessage.substring(0, midPoint);
              const data2 = originalMessage.substring(midPoint);
              packetSegments = [
                {
                  appData: data1,
                  transportProtocol: transportProto,
                  sourcePort: commonSourcePort,
                  destPort: commonDestPort,
                  sequenceNumber: transportProto === "TCP" ? 1 : undefined,
                  checksumTransport: generateChecksum(),
                },
                {
                  appData: data2,
                  transportProtocol: transportProto,
                  sourcePort: commonSourcePort,
                  destPort: commonDestPort,
                  sequenceNumber: transportProto === "TCP" ? 2 : undefined,
                  checksumTransport: generateChecksum(),
                },
              ];
            }
          },
          getProcessExplanation: () => {
            if (!packetSegments || packetSegments.length === 0) return "No data to process.";
            let explanation = `The data is split and encapsulated into <strong>${packetSegments[0].transportProtocol}</strong> ${packetSegments[0].transportProtocol === "TCP" ? "Segments" : "Datagrams"}.<br><br>`;
            packetSegments.forEach((seg, index) => {
              explanation += `<strong>Packet ${index + 1}:</strong><br>
                Data: "<strong>${seg.appData}</strong>"<br>
                Source Port: <strong>${seg.sourcePort}</strong><br>
                Destination Port: <strong>${seg.destPort}</strong>`;
              if (seg.transportProtocol === "TCP") {
                explanation += `<br>Sequence Number: <strong>${seg.sequenceNumber}</strong>`;
              }
              explanation += `<br>Checksum: <strong>${seg.checksumTransport}</strong><br><br>`;
            });
            return explanation;
          },
          renderVisual: (container) => {
            container.innerHTML = "";
            if (!packetSegments || packetSegments.length === 0) return;
            packetSegments.forEach((seg, index) => {
              let headerInfo = `Src Port: ${seg.sourcePort}, Dst Port: ${seg.destPort}`;
              if (seg.transportProtocol === "TCP") headerInfo += `, Seq: ${seg.sequenceNumber}`;
              headerInfo += `, Checksum: ${seg.checksumTransport}`;
              container.innerHTML += `
                <div class="packet-container">
                  <div class="text-center font-semibold mb-1 text-indigo-600 dark:text-sky-400">Packet ${index + 1} of ${packetSegments.length}</div>
                  <div class="layer-block border-green-500 dark:border-green-600 bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 p-3 rounded-md shadow">
                    <div class="font-bold text-lg">Transport Layer (${seg.transportProtocol} Header)</div>
                    <div class="mt-1 p-2 bg-green-50 dark:bg-green-900/20 rounded break-all">${headerInfo}</div>
                    <div class="payload-block border-blue-500 dark:border-blue-600 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 p-3 rounded-md shadow mt-2">
                      <div class="font-bold text-lg">Application Layer (${applicationProtocol})</div>
                      <div class="mt-1 p-2 bg-blue-50 dark:bg-blue-900/20 rounded break-all">Data: "${seg.appData}"</div>
                    </div>
                  </div>
                </div>`;
            });
          },
        },
        {
          id: "internet",
          layerName: "3. Internet Layer (Also known as Network Layer)",
          description: "Responsible for logical addressing (IP addresses) and routing. Each Transport Layer segment gets an IP header, turning it into an IP Packet.",
          addLayerDataToPacket: () => {
            if (!packetSegments || packetSegments.length === 0) return;
            const commonSourceIP = packetSegments[0].sourceIP || generateMockIP("source");
            const commonDestIP = packetSegments[0].destIP || generateMockIP("destination");
            packetSegments.forEach((seg) => {
              seg.sourceIP = seg.sourceIP || commonSourceIP;
              seg.destIP = seg.destIP || commonDestIP;
            });
          },
          getProcessExplanation: () => {
            if (!packetSegments || packetSegments.length === 0) return "No data to process.";
            let explanation = `Each ${packetSegments[0].transportProtocol === "TCP" ? "Segment" : "Datagram"} is encapsulated in an <strong>IP Packet</strong>.<br><br>`;
            packetSegments.forEach((seg, index) => {
              explanation += `<strong>Packet ${index + 1}:</strong><br>
                Source IP Address: <strong>${seg.sourceIP}</strong><br>
                Destination IP Address: <strong>${seg.destIP}</strong><br><br>`;
            });
            return explanation;
          },
          renderVisual: (container) => {
            container.innerHTML = "";
            if (!packetSegments || packetSegments.length === 0) return;
            packetSegments.forEach((seg, index) => {
              let transportHeaderInfo = `Src Port: ${seg.sourcePort}, Dst Port: ${seg.destPort}`;
              if (seg.transportProtocol === "TCP") transportHeaderInfo += `, Seq: ${seg.sequenceNumber}`;
              transportHeaderInfo += `, Checksum: ${seg.checksumTransport}`;
              container.innerHTML += `
                <div class="packet-container">
                  <div class="text-center font-semibold mb-1 text-indigo-600 dark:text-sky-400">Packet ${index + 1} of ${packetSegments.length}</div>
                  <div class="layer-block border-yellow-500 dark:border-yellow-600 bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-300 p-3 rounded-md shadow">
                    <div class="font-bold text-lg">Internet Layer (IP Header)</div>
                    <div class="mt-1 p-2 bg-yellow-50 dark:bg-yellow-900/20 rounded break-all">Src IP: ${seg.sourceIP}, Dst IP: ${seg.destIP}</div>
                    <div class="payload-block border-green-500 dark:border-green-600 bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 p-3 rounded-md shadow mt-2">
                      <div class="font-bold text-lg">Transport Layer (${seg.transportProtocol} Header)</div>
                      <div class="mt-1 p-2 bg-green-50 dark:bg-green-900/20 rounded break-all">${transportHeaderInfo}</div>
                      <div class="payload-block border-blue-500 dark:border-blue-600 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 p-3 rounded-md shadow mt-2">
                        <div class="font-bold text-lg">Application Layer (${applicationProtocol})</div>
                        <div class="mt-1 p-2 bg-blue-50 dark:bg-blue-900/20 rounded break-all">Data: "${seg.appData}"</div>
                      </div>
                    </div>
                  </div>
                </div>`;
            });
          },
        },
        {
          id: "link",
          layerName: "4. Link Layer (Part I: phsyical addressing)",
          description: "Handles physical addressing (MAC addresses). Each IP packet is encapsulated in a \"frame\" (e.g., Ethernet frame) with source and destination MAC addresses for the current network segment.",
          addLayerDataToPacket: () => {
            if (!packetSegments || packetSegments.length === 0) return;
            const commonSourceMAC = packetSegments[0].sourceMAC || generateMAC();
            let commonDestMAC = packetSegments[0].destMAC || generateMAC();
            while (commonDestMAC === commonSourceMAC) commonDestMAC = generateMAC();
            packetSegments.forEach((seg) => {
              seg.sourceMAC = seg.sourceMAC || commonSourceMAC;
              seg.destMAC = seg.destMAC || commonDestMAC;
              seg.frameChecksum = seg.frameChecksum || generateChecksum();
            });
          },
          getProcessExplanation: () => {
            if (!packetSegments || packetSegments.length === 0) return "No data to process.";
            let explanation = `Each IP Packet is encapsulated in an <strong>Ethernet Frame</strong>.<br><br>`;
            packetSegments.forEach((seg, index) => {
              explanation += `<strong>Packet ${index + 1}:</strong><br>
                Source MAC Address: <strong>${seg.sourceMAC}</strong><br>
                Destination MAC Address: <strong>${seg.destMAC}</strong> (next hop)<br>
                Frame Check Sequence (FCS): <strong>${seg.frameChecksum}</strong><br><br>`;
            });
            return explanation;
          },
          renderVisual: (container) => {
            container.innerHTML = "";
            if (!packetSegments || packetSegments.length === 0) return;
            packetSegments.forEach((seg, index) => {
              let transportHeaderInfo = `Src Port: ${seg.sourcePort}, Dst Port: ${seg.destPort}`;
              if (seg.transportProtocol === "TCP") transportHeaderInfo += `, Seq: ${seg.sequenceNumber}`;
              transportHeaderInfo += `, Checksum: ${seg.checksumTransport}`;
              container.innerHTML += `
                <div class="packet-container">
                  <div class="text-center font-semibold mb-1 text-indigo-600 dark:text-sky-400">Packet ${index + 1} of ${packetSegments.length}</div>
                  <div class="layer-block border-red-500 dark:border-red-600 bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 p-3 rounded-md shadow">
                    <div class="font-bold text-lg">Link Layer (Ethernet Frame Header &amp; Trailer)</div>
                    <div class="mt-1 p-2 bg-red-50 dark:bg-red-900/20 rounded break-all">Src MAC: ${seg.sourceMAC}, Dst MAC: ${seg.destMAC}</div>
                    <div class="payload-block border-yellow-500 dark:border-yellow-600 bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-300 p-3 rounded-md shadow mt-2">
                      <div class="font-bold text-lg">Internet Layer (IP Header)</div>
                      <div class="mt-1 p-2 bg-yellow-50 dark:bg-yellow-900/20 rounded break-all">Src IP: ${seg.sourceIP}, Dst IP: ${seg.destIP}</div>
                      <div class="payload-block border-green-500 dark:border-green-600 bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 p-3 rounded-md shadow mt-2">
                        <div class="font-bold text-lg">Transport Layer (${seg.transportProtocol} Header)</div>
                        <div class="mt-1 p-2 bg-green-50 dark:bg-green-900/20 rounded break-all">${transportHeaderInfo}</div>
                        <div class="payload-block border-blue-500 dark:border-blue-600 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 p-3 rounded-md shadow mt-2">
                          <div class="font-bold text-lg">Application Layer (${applicationProtocol})</div>
                          <div class="mt-1 p-2 bg-blue-50 dark:bg-blue-900/20 rounded break-all">Data: "${seg.appData}"</div>
                        </div>
                      </div>
                    </div>
                    <div class="mt-1 p-2 bg-red-50 dark:bg-red-900/20 rounded font-semibold break-all">Frame Trailer (FCS: ${seg.frameChecksum})</div>
                  </div>
                </div>`;
            });
          },
        },
        {
          id: "physical",
          layerName: "5. Link Layer (Part II: sometimes called Physical)",
          description: "This layer finally transmits raw bits (0s and 1s) over a physical medium. Each frame is converted into signals.",
          addLayerDataToPacket: () => {
            if (!packetSegments || packetSegments.length === 0) return;
            packetSegments.forEach((seg) => {
              if (!seg.bitsRepresentation) {
                let dataToConvert = `${seg.sourceMAC}${seg.destMAC}${seg.sourceIP}${seg.destIP}${seg.sourcePort}${seg.destPort}${seg.appData}`;
                let bits = "";
                for (let i = 0; i < Math.min(dataToConvert.length, 10); i++) {
                  bits += dataToConvert.charCodeAt(i).toString(2).padStart(8, "0") + " ";
                }
                seg.bitsRepresentation = bits.trim() + "...";
              }
            });
          },
          getProcessExplanation: () => {
            if (!packetSegments || packetSegments.length === 0) return "No data to process.";
            let explanation = `Each Ethernet Frame is converted into a stream of signals (bits) for transmission.<br><br>`;
            packetSegments.forEach((seg, index) => {
              explanation += `<strong>Packet ${index + 1} Bits:</strong> <strong class="font-mono break-all">${seg.bitsRepresentation}</strong><br><br>`;
            });
            return explanation;
          },
          renderVisual: (container) => {
            container.innerHTML = "";
            if (!packetSegments || packetSegments.length === 0) return;
            packetSegments.forEach((seg, index) => {
              container.innerHTML += `
                <div class="packet-container">
                  <div class="text-center font-semibold mb-1 text-indigo-600 dark:text-sky-400">Packet ${index + 1} of ${packetSegments.length}</div>
                  <div class="layer-block border-purple-500 dark:border-purple-600 bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 p-3 rounded-md shadow">
                    <div class="font-bold text-lg">Link Layer (Bits on the Wire)</div>
                    <div class="mt-1 p-2 bg-purple-50 dark:bg-purple-900/20 rounded font-mono break-all text-xs">${seg.bitsRepresentation}</div>
                    <div class="text-center mt-3 text-sm italic">
                      (Represents Packet ${index + 1}'s frame encoded as signals)
                    </div>
                  </div>
                </div>`;
            });
          },
        },
      ];

      function renderStep() {
        if (currentStepIndex < 0 || currentStepIndex >= steps.length) return;
        const step = steps[currentStepIndex];
        step.addLayerDataToPacket();
        layerNameEl.textContent = step.layerName;
        layerDescriptionEl.innerHTML = step.description;
        layerProcessingEl.innerHTML = step.getProcessExplanation();
        step.renderVisual(packetVisualisationEl);

        prevStepBtn.disabled = currentStepIndex === 0;
        prevStepBtn.classList.toggle("opacity-50", prevStepBtn.disabled);
        prevStepBtn.classList.toggle("cursor-not-allowed", prevStepBtn.disabled);

        nextStepBtn.disabled = currentStepIndex === steps.length - 1;
        nextStepBtn.classList.toggle("opacity-50", nextStepBtn.disabled);
        nextStepBtn.classList.toggle("cursor-not-allowed", nextStepBtn.disabled);
      }

      startJourneyBtn.addEventListener("click", () => {
        const message = userMessageInput.value.trim();
        if (!message) {
          userMessageInput.focus();
          const tempMsgBox = document.createElement("div");
          tempMsgBox.textContent = "Please enter a message to send.";
          tempMsgBox.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-red-500 text-white p-3 rounded-md shadow-lg z-50";
          document.body.appendChild(tempMsgBox);
          setTimeout(() => tempMsgBox.remove(), 3000);
          return;
        }
        originalMessage = message;
        applicationProtocol = appProtocolSelect.value;
        packetSegments = [];
        currentStepIndex = 0;
        inputSection.classList.add("hidden");
        demoArea.classList.remove("hidden");
        renderStep();
      });

      nextStepBtn.addEventListener("click", () => {
        if (currentStepIndex < steps.length - 1) {
          currentStepIndex++;
          renderStep();
        }
      });

      prevStepBtn.addEventListener("click", () => {
        if (currentStepIndex > 0) {
          currentStepIndex--;
          if (currentStepIndex === 0) packetSegments = [];
          renderStep();
        }
      });

      resetBtn.addEventListener("click", () => {
        currentStepIndex = -1;
        originalMessage = "";
        applicationProtocol = "";
        packetSegments = [];
        userMessageInput.value = "GET www.perse.co.uk";
        appProtocolSelect.value = "HTTP";
        inputSection.classList.remove("hidden");
        demoArea.classList.add("hidden");
        layerNameEl.textContent = "Layer Name";
        layerDescriptionEl.textContent = "Description of the layer...";
        layerProcessingEl.textContent = "What happens to the data...";
        packetVisualisationEl.innerHTML = "";
      });

      inputSection.classList.remove("hidden");
      demoArea.classList.add("hidden");
    </script>
  </body>
</html>
