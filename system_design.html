      crossorigin

    ></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .fade-in {
        animation: fadeIn 0.3s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;

      }
      .slot-target {
        transition: all 0.2s;
      }
      .slot-target:hover,
      .slot-target.drag-over {
        background-color: #e2e8f0;

      html.dark .slot-target.drag-over {

        border: 2px solid #3b82f6;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
      }

      /* Custom range styling for perfect alignment */
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #2563eb;
        cursor: pointer;
        margin-top: -6px;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: #e5e7eb;
        border-radius: 2px;
      }
    </style>
      <!-- Prevent FOUC: apply dark class before render -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("uimode");
          if (
            mode === "dark" ||
            (!mode && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
</head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      // --- DATA: AQA Specification Questions ---
      const TOPICS = {
        COMPONENTS: "Components & Buses",
        IO: "I/O Controllers",
        ARCHITECTURE: "Architecture (Harvard/VN)",
        STORED_PROGRAM: "Stored Program Concept",
        PERFORMANCE: "Processor Performance",
      };

      const QUESTION_BANK = [
        // 1. COMPONENTS & BUSES
        {
          id: "c1",
          topic: TOPICS.COMPONENTS,
          type: "diagram-place",
          question:
            "Construct the System Bus structure. Drag and drop (or click to select and place) the correct labels into the empty drop zones. Hint: Note the arrow directions for data flow. (The Control Bus has already been placed for you).",
          items: ["Processor", "Main Memory", "Address Bus", "Data Bus"],
          correctMapping: {
            slot_cpu: "Processor",
            slot_mem: "Main Memory",
            slot_address: "Address Bus",
            slot_data: "Data Bus",
          },
          explanation:
            "The Processor sends addresses (unidirectional Address Bus). The Data Bus carries instructions/data both ways (bidirectional). The Control Bus carries control signals (e.g. read/write/clock) bidirectionally. All buses split to serve both Memory and I/O.",
        },
        {
          id: "c2",
          topic: TOPICS.COMPONENTS,
          type: "fill-blank",
          question:
            "The bus that carries the memory location of the next instruction to be fetched or the specific I/O device to be accessed is the [[BLANK]] bus.",
          hintLetter: "a",
          answer: "address",
          explanation:
            "The Address Bus is unidirectional and carries addresses from the processor to main memory or I/O controllers.",
        },
        {
          id: "c3",
          topic: TOPICS.COMPONENTS,
          type: "mcq",
          question: "Which bus is unidirectional?",
          options: ["Address Bus", "Data Bus", "Control Bus", "System Bus"],
          answer: "Address Bus",
          explanation:
            "The Address Bus is unidirectional because addresses are only ever generated by the processor and sent to memory or I/O controllers, never the other way.",
        },

        // 2. I/O CONTROLLERS
        {
          id: "io1",
          topic: TOPICS.IO,
          type: "visual-click",
          question:
            "Below is an I/O Controller setup. Click the component that would contain some memory to use as a buffer for temporarily storing data, helping align the fast speed of the processor with the slower speed of the peripheral device.",
          svgType: "io-controller",
          answer: "chip",
          explanation:
            "The Controller Chip contains the Buffer, which temporarily stores data. Because the CPU operates orders of magnitude faster than peripherals, the buffer prevents the CPU from having to pause/idle while the peripheral catches up.",
        },
        {
          id: "io2",
          topic: TOPICS.IO,
          type: "mcq",
          question:
            "Why does the processor not communicate directly with peripheral devices?",
          options: [
            "Peripherals operate at different speeds and use different protocols to the CPU.",
            "The processor does not have enough physical pins.",
            "Peripherals are only analog while the CPU is digital.",
            "The data bus cannot physically reach external devices.",
          ],
          answer:
            "Peripherals operate at different speeds and use different protocols to the CPU.",
          explanation:
            "I/O controllers act as an interface, translating the processor's signals into the specific formats/voltages/protocols required by the peripheral, and buffering data to handle speed mismatches.",
        },
        {
          id: "io3",
          topic: TOPICS.IO,
          type: "fill-blank",
          question:
            "An I/O controller consists of three main parts: an interface for connection to the system bus, a set of data buffers (in the chip), and an interface to the specific external [[BLANK]].",
          hintLetter: "d",
          answer: "device",
          explanation:
            "The Device Interface provides the physical and logical connection to the peripheral device.",
        },

        // 3. ARCHITECTURE (HARVARD / VN)
        {
          id: "a1",
          topic: TOPICS.ARCHITECTURE,
          type: "visual-select",
          question:
            "Select the diagram that correctly represents true Harvard Architecture.",
          options: [
            { id: "vn", label: "Architecture A" },
            { id: "harvard", label: "Architecture B" },
            { id: "fake", label: "Architecture C" },
          ],
          answer: "harvard",
          explanation:
            "Harvard architecture (B) physically separates data and instructions into different memory units with entirely different, dedicated buses. Architecture A is Von Neumann. Architecture C is a hybrid/flawed representation where buses are still shared.",
        },
        {
          id: "a2",
          topic: TOPICS.ARCHITECTURE,
          type: "fill-blank",
          question:
            "Harvard architecture is extensively used in embedded systems such as Digital [[BLANK]] Processing. (See the diagram below for a hint!)",
          hintLetter: "s",
          answer: "signal",
          diagram: "dsp",
          explanation:
            "Digital Signal Processing (DSP) systems use Harvard architecture because they require rapid, predictable streaming of data (like audio) where fetching an instruction and fetching the data simultaneously is a massive performance benefit.",
        },
        {
          id: "a3",
          topic: TOPICS.ARCHITECTURE,
          type: "mcq",
          question:
            "What is a primary advantage of Von Neumann architecture over Harvard architecture?",
          options: [
            "It optimizes memory space usage because free memory can hold either data or instructions.",
            "It allows instructions and data to be fetched at the exact same time.",
            "It is exclusively used for Digital Signal Processing.",
            "It eliminates the Von Neumann bottleneck completely.",
          ],
          answer:
            "It optimizes memory space usage because free memory can hold either data or instructions.",
          explanation:
            "In Von Neumann, memory is unified. If a program needs more space for data and less for instructions, the shared memory accommodates this dynamically. Harvard requires pre-partitioned separate memories.",
        },

        // 4. STORED PROGRAM CONCEPT
        {
          id: "sp1",
          topic: TOPICS.STORED_PROGRAM,
          type: "fill-blank",
          question:
            "The stored program concept states that machine code instructions are stored in main memory, fetched and executed [[BLANK]] by a processor.",
          hintLetter: "s",
          answer: "serially",
          explanation:
            "Serially means one after the other in sequence. They are fetched, decoded, and executed one by one.",
        },
        {
          id: "sp2",
          topic: TOPICS.STORED_PROGRAM,
          type: "mcq",
          question:
            "According to the stored program concept, what must happen before an application can be executed?",
          options: [
            "It must be loaded from secondary storage into main memory.",
            "It must be loaded directly into the processor's registers.",
            "It must be converted into a Harvard format.",
            "It must be executed directly from the hard drive.",
          ],
          answer: "It must be loaded from secondary storage into main memory.",
          explanation:
            "Processors only fetch instructions from Main Memory (RAM) or Cache, never directly from secondary storage (like an SSD or HDD).",
        },

        // 5. PROCESSOR PERFORMANCE
        {
          id: "pp1",
          topic: TOPICS.PERFORMANCE,
          type: "interactive-sim",
          question:
            "Use the simulation below to adjust the Address Bus Width. If the Address Bus width is 16 bits, what is the exact maximum number of addressable memory locations?",
          simType: "address-bus",
          answer: "65536",
          explanation:
            "The number of addressable locations is 2^n, where n is the width of the address bus. 2^16 = 65,536.",
        },
        {
          id: "pp2",
          topic: TOPICS.PERFORMANCE,
          type: "mcq",
          question:
            "How does increasing the word length affect processor performance?",
          options: [
            "The processor can process more bits of data in a single clock cycle.",
            "The clock speed of the processor naturally increases.",
            "It physically increases the amount of Cache memory.",
            "It changes the architecture from Von Neumann to Harvard.",
          ],
          answer:
            "The processor can process more bits of data in a single clock cycle.",
          explanation:
            "Word length is the number of bits processed by the CPU's ALU in one go. A 64-bit processor can process twice as much data per instruction as a 32-bit processor.",
        },
        {
          id: "pp3",
          topic: TOPICS.PERFORMANCE,
          type: "fill-blank",
          question:
            "Having multiple [[BLANK]] can improve performance, but only if the software is designed to run concurrently.",
          hintLetter: "c",
          answer: "cores",
          explanation:
            "Multiple cores allow independent processing units to execute separate instructions simultaneously, known as parallel processing.",
        },
        {
          id: "pp4",
          topic: TOPICS.PERFORMANCE,
          type: "fill-blank",
          question:
            "Increasing the size of [[BLANK]] memory improves performance because it can store more frequently used instructions and data closer to the CPU than main memory.",
          hintLetter: "c",
          answer: "cache",
          explanation:
            "Cache memory is much faster to access than standard RAM. Having more cache means a higher cache hit rate, reducing the time the CPU spends waiting for instructions or data to be fetched from slower main memory.",
        },
        {
          id: "pp5",
          topic: TOPICS.PERFORMANCE,
          type: "fill-blank",
          question:
            "Increasing the processor's clock speed improves performance because it increases the number of fetch-decode-execute [[BLANK]] that can run per second.",
          hintLetter: "c",
          answer: "cycles",
          explanation:
            "The clock speed dictates the fundamental pace of the CPU (measured in GHz). More cycles per second means more instructions can be processed in the same amount of time.",
        },
      ];

      // --- UTILITY: Shuffle Array ---
      const shuffleArray = (array) => {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      };

      // --- COMPONENTS ---

      const SunIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      );
      const MoonIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      );

      const FilterDropdown = ({
        topics,
        selectedTopics,
        onToggle,
        onApply,
      }) => {
        const [isOpen, setIsOpen] = useState(false);

        return (
          <div className="absolute top-4 right-4 z-50">
            <button
              onClick={() => setIsOpen(!isOpen)}
              className="bg-white dark:bg-slate-700 dark:border-slate-500 dark:text-slate-200 border border-gray-300 shadow-sm rounded-md px-4 py-2 flex items-center gap-2 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none"
            >
              <svg
                className="w-5 h-5 text-gray-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  strokeWidth="2"
                  d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
                ></path>
              </svg>
              Filter Subtopics
            </button>
            {isOpen && (
              <div className="mt-2 w-64 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 shadow-lg rounded-md p-4 flex flex-col gap-2 fade-in">
                {Object.values(topics).map((topic) => (
                  <label
                    key={topic}
                    className="flex items-center gap-2 text-sm cursor-pointer dark:text-slate-200"
                  >
                    <input
                      type="checkbox"
                      className="rounded text-blue-600 focus:ring-blue-500"
                      checked={selectedTopics.includes(topic)}
                      onChange={() => onToggle(topic)}
                    />
                    {topic}
                  </label>
                ))}
                <button
                  onClick={() => {
                    setIsOpen(false);
                    onApply();
                  }}
                  className="mt-3 bg-blue-600 hover:bg-blue-700 text-white rounded py-1 px-4 w-full transition-colors text-sm font-semibold"
                >
                  Apply & New Question
                </button>
              </div>
            )}
          </div>
        );
      };

      // --- App Main Component ---
      const App = () => {
        const [isDark, setIsDark] = useState(() => {
          try { return localStorage.getItem("uimode") === "dark" || (!localStorage.getItem("uimode") && window.matchMedia("(prefers-color-scheme: dark)").matches); } catch(e) { return false; }
        });
        useEffect(() => {
          document.documentElement.classList.toggle("dark", isDark);
          try { localStorage.setItem("uimode", isDark ? "dark" : "light"); } catch(e) {}
        }, [isDark]);

        const [selectedTopics, setSelectedTopics] = useState(
          Object.values(TOPICS),
        );
        const [tempSelectedTopics, setTempSelectedTopics] = useState(
          Object.values(TOPICS),
        );
        const [unasked, setUnasked] = useState([]);
        const [currentQ, setCurrentQ] = useState(null);

        // Interaction States
        const [userAnswer, setUserAnswer] = useState("");
        const [feedback, setFeedback] = useState(null);
        const [showSolution, setShowSolution] = useState(false);

        // Specific states for complex interactions
        const [mcqOptions, setMcqOptions] = useState([]);
        const [placedItems, setPlacedItems] = useState({});
        const [selectedItemToPlace, setSelectedItemToPlace] = useState(null);
        const [simBusWidth, setSimBusWidth] = useState(8);

        // Initialize or reset questions based on topics
        const initializeQuestions = (topicsToUse) => {
          const filtered = QUESTION_BANK.filter((q) =>
            topicsToUse.includes(q.topic),
          );
          if (filtered.length === 0) {
            alert("Please select at least one subtopic!");
            return false;
          }
          const shuffled = shuffleArray(filtered);
          setUnasked(shuffled.slice(1));
          loadQuestion(shuffled[0]);
          return true;
        };

        useEffect(() => {
          initializeQuestions(selectedTopics);
        }, []);

        const loadQuestion = (q) => {
          setCurrentQ(q);
          setFeedback(null);
          setShowSolution(false);
          setUserAnswer("");

          if (q.type === "mcq") {
            setMcqOptions(shuffleArray(q.options));
          } else if (q.type === "diagram-place") {
            setPlacedItems({});
            setSelectedItemToPlace(null);
            setUserAnswer({});
          } else if (q.type === "interactive-sim") {
            setSimBusWidth(8);
          }
        };

        const handleNext = () => {
          if (unasked.length === 0) {
            initializeQuestions(selectedTopics);
          } else {
            const nextQ = unasked[0];
            setUnasked(unasked.slice(1));
            loadQuestion(nextQ);
          }
        };

        const handleApplyFilter = () => {
          if (tempSelectedTopics.length === 0) {
            alert("You must select at least one topic.");
            setTempSelectedTopics(selectedTopics);
            return;
          }
          setSelectedTopics(tempSelectedTopics);
          initializeQuestions(tempSelectedTopics);
        };

        const toggleTopic = (topic) => {
          if (tempSelectedTopics.includes(topic)) {
            setTempSelectedTopics(
              tempSelectedTopics.filter((t) => t !== topic),
            );
          } else {
            setTempSelectedTopics([...tempSelectedTopics, topic]);
          }
        };

        const checkAnswer = () => {
          let isCorrect = false;

          if (
            currentQ.type === "mcq" ||
            currentQ.type === "visual-click" ||
            currentQ.type === "visual-select"
          ) {
            isCorrect = userAnswer === currentQ.answer;
          } else if (currentQ.type === "fill-blank") {
            const cleanAns =
              typeof userAnswer === "string"
                ? userAnswer.trim().toLowerCase()
                : "";
            const targetAns = currentQ.answer.toLowerCase();
            const hint = currentQ.hintLetter.toLowerCase();

            if (
              cleanAns === targetAns ||
              hint + cleanAns === targetAns ||
              cleanAns === hint + targetAns.substring(1)
            ) {
              isCorrect = true;
            }
          } else if (currentQ.type === "diagram-place") {
            const required = Object.keys(currentQ.correctMapping).length;
            const placedCount = Object.keys(placedItems).length;
            if (placedCount < required) {
              alert("Please place all labels before submitting.");
              return;
            }
            isCorrect = true;
            for (const [slot, item] of Object.entries(
              currentQ.correctMapping,
            )) {
              if (placedItems[slot] !== item) {
                isCorrect = false;
                break;
              }
            }
          } else if (currentQ.type === "interactive-sim") {
            const cleanAns =
              typeof userAnswer === "string" ? userAnswer.trim() : "";
            isCorrect = cleanAns === currentQ.answer;
          }

          if (isCorrect) {
            setFeedback("correct");
            setShowSolution(true);
          } else {
            setFeedback("wrong");
          }
        };

        const revealSolution = () => {
          setShowSolution(true);
          if (
            currentQ.type === "fill-blank" ||
            currentQ.type === "interactive-sim"
          ) {
            setUserAnswer(currentQ.answer);
          } else if (
            currentQ.type === "mcq" ||
            currentQ.type === "visual-select" ||
            currentQ.type === "visual-click"
          ) {
            setUserAnswer(currentQ.answer);
          } else if (currentQ.type === "diagram-place") {
            setPlacedItems(currentQ.correctMapping);
          }
        };

        // Calculate if the Check Answer button should be disabled
        const isSubmitDisabled = () => {
          if (currentQ.type === "diagram-place") {
            return (
              Object.keys(placedItems).length !==
              Object.keys(currentQ.correctMapping).length
            );
          }
          if (!userAnswer) return true;
          if (
            typeof userAnswer === "object" &&
            Object.keys(userAnswer).length === 0
          )
            return true;
          return false;
        };

        // Drag and Drop Handlers
        const handleDragStart = (e, item) => {
          e.dataTransfer.setData("text/plain", item);
        };
        const handleDrop = (e, slotId) => {
          e.preventDefault();
          e.currentTarget.classList.remove("drag-over");
          const item = e.dataTransfer.getData("text/plain");
          if (currentQ.items.includes(item)) {
            setPlacedItems((prev) => ({ ...prev, [slotId]: item }));
          }
        };
        const handleDragOver = (e) => {
          e.preventDefault();
          e.currentTarget.classList.add("drag-over");
        };
        const handleDragLeave = (e) => {
          e.currentTarget.classList.remove("drag-over");
        };

        // Dynamic render for Fill-in-the-blank text
        const renderQuestionText = () => {
          if (currentQ.type === "fill-blank") {
            const parts = currentQ.question.split("[[BLANK]]");
            return (
              <div className="text-lg text-gray-800 dark:text-slate-100 mb-8 font-medium leading-relaxed">
                {parts[0]}
                <span className="inline-flex items-center mx-1 relative top-1">
                  <span className="text-xl font-bold text-gray-700 dark:text-slate-300 mr-1">
                    {currentQ.hintLetter}
                  </span>
                  <input
                    type="text"
                    value={typeof userAnswer === "string" ? userAnswer : ""}
                    onChange={(e) => setUserAnswer(e.target.value)}
                    className="border-b-2 border-gray-400 dark:border-slate-500 w-32 px-1 focus:outline-none focus:border-blue-600 bg-transparent text-lg font-bold text-blue-700 dark:text-blue-400 placeholder-gray-300"
                    onKeyDown={(e) => e.key === "Enter" && checkAnswer()}
                    autoFocus
                  />
                </span>
                {parts[1]}
              </div>
            );
          }
          return (
            <div className="text-lg text-gray-800 dark:text-slate-100 mb-8 font-medium">
              {currentQ.question}
            </div>
          );
        };

        if (!currentQ)
          return <div className="p-10 text-center">Loading Interactive...</div>;

        // Conditional for showing the grey interactive area container.
        // Only render the wrapper if there is actually content to go inside it.
        const hasInteractiveContent =
          currentQ.type !== "fill-blank" || currentQ.diagram;

        return (
          <div className="min-h-screen flex flex-col bg-gray-100 dark:bg-slate-900">
            {/* CS Learning Header */}
            <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
              <a
                href="index.html"
                className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline"
              >
                <span className="text-slate-500">&lt;</span>CS
                <span className="text-slate-500">&gt;</span>&nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a
                  href="index.html"
                  className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                >
                  Home
                </a>
                <button
                  onClick={() => setIsDark(d => !d)}
                  className="text-slate-400 hover:text-headerAccent transition-colors p-1"
                  aria-label="Toggle Dark Mode"
                >
                  {isDark ? (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                  ) : (

                            </text>

                            <rect
                              x="210"
                              y="20"
                              width="80"
                              height="60"
                              fill="#fee2e2"
                              stroke="#f87171"
                              strokeWidth="2"
                            />
                            <text
                              x="250"
                              y="55"
                              textAnchor="middle"
                              fontWeight="bold"
                              fontSize="12"
                            >
                              Instr. Mem
                            </text>

                            <rect
                              x="210"
                              y="120"
                              width="80"
                              height="60"
                              fill="#dcfce7"
                              stroke="#4ade80"
                              strokeWidth="2"
                            />
                            <text
                              x="250"
                              y="155"
                              textAnchor="middle"
                              fontWeight="bold"
                              fontSize="12"
                            >
                              Data Mem
                            </text>

                            <line
                              x1="80"
                              y1="35"
                              x2="200"
                              y2="35"
                              stroke="#f87171"
                              strokeWidth="3"
                              markerEnd="url(#arrowRed)"
                            />
                            <text
                              x="145"
                              y="25"
                              textAnchor="middle"
                              fontSize="10"
                              fill="#b91c1c"
                              fontWeight="bold"
                            >
                              Instr Addr Bus
                            </text>

                            <line
                              x1="80"
                              y1="65"
                              x2="210"
                              y2="65"
                              stroke="#f87171"
                              strokeWidth="3"
                            />
                            <text
                              x="145"
                              y="80"
                              textAnchor="middle"
                              fontSize="10"
                              fill="#b91c1c"
                              fontWeight="bold"
                            >
                              Instr Data Bus
                            </text>

                            <line
                              x1="80"
                              y1="135"
                              x2="200"
                              y2="135"
                              stroke="#4ade80"
                              strokeWidth="3"
                              markerEnd="url(#arrowGreen)"
                            />
                            <text
                              x="145"
                              y="125"
                              textAnchor="middle"
                              fontSize="10"
                              fill="#15803d"
                              fontWeight="bold"
                            >
                              Data Addr Bus
                            </text>

                            <line
                              x1="80"
                              y1="165"
                              x2="210"
                              y2="165"
                              stroke="#4ade80"
                              strokeWidth="3"
                            />
                            <text
                              x="145"
                              y="180"
                              textAnchor="middle"
                              fontSize="10"
                              fill="#15803d"
                              fontWeight="bold"
                            >
                              Data Bus
                            </text>
                          </svg>
                        </div>

                        {/* Arch C: Fake/Hybrid */}
                        <div
                          onClick={() => setUserAnswer("fake")}
                          className={`p-3 border-4 rounded-xl cursor-pointer transition-all bg-white dark:bg-slate-700 relative
                                                ${userAnswer === "fake" ? "border-blue-500 shadow-lg" : "border-gray-200 dark:border-slate-500 hover:border-blue-300"}`}
                        >
                          <h3 className="text-center font-bold mb-2 text-gray-700 dark:text-slate-200 text-sm">
                            Architecture C
                          </h3>
                          <svg viewBox="0 0 300 200" className="w-full h-auto">
                            <rect
                              x="10"
                              y="60"
                              width="70"
                              height="80"
                              fill="#e5e7eb"
                              stroke="#9ca3af"
                              strokeWidth="2"
                            />
                            <text
                              x="45"
                              y="105"
                              textAnchor="middle"
                              fontWeight="bold"
                              fontSize="14"
                            >
                              CPU
                            </text>

                            <rect
                              x="210"
                              y="20"
                              width="80"
                              height="60"
                              fill="#fee2e2"
                              stroke="#f87171"
                              strokeWidth="2"
                            />
                            <text
                              x="250"
                              y="55"
                              textAnchor="middle"
                              fontWeight="bold"
                              fontSize="12"
                            >
                              Instr. Mem
                            </text>

                            <rect
                              x="210"
                              y="120"
                              width="80"
                              height="60"
                              fill="#dcfce7"
                              stroke="#4ade80"
                              strokeWidth="2"
                            />
                            <text
                              x="250"
                              y="155"
                              textAnchor="middle"
                              fontWeight="bold"
                              fontSize="12"
                            >
                              Data Mem
                            </text>

                            {/* Shared lines splitting */}
                            <path
                              d="M 80 80 L 160 80 L 160 40 L 200 40 M 160 80 L 160 140 L 200 140"
                              fill="none"
                              stroke="#f59e0b"
                              strokeWidth="3"
                              markerEnd="url(#arrowBlue)"
                            />
                            <text
                              x="120"
                              y="70"
                              textAnchor="middle"
                              fontSize="10"
                              fontWeight="bold"
                            >
                              Single Address Bus
                            </text>

                            <path
                              d="M 80 120 L 140 120 L 140 60 L 210 60 M 140 120 L 140 160 L 210 160"
                              fill="none"
                              stroke="#f59e0b"
                              strokeWidth="3"
                            />
                            <text
                              x="110"
                              y="140"
                              textAnchor="middle"
                              fontSize="10"
                              fontWeight="bold"
                            >
                              Single Data Bus
                            </text>
                          </svg>
                        </div>
                      </div>
                    )}

                    {/* Interactive Simulation (Sliders) */}
                    {currentQ.type === "interactive-sim" &&
                      currentQ.simType === "address-bus" && (
                        <div className="p-6 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded shadow-sm">
                          <div className="flex flex-col md:flex-row gap-8 items-center">
                            <div className="w-full md:w-1/2">
                              <div className="flex justify-between items-end mb-4">
                                <label className="text-sm font-bold text-gray-700 dark:text-slate-200">
                                  Adjust Address Bus Width:
                                </label>
                                <span className="text-blue-600 font-bold">
                                  {simBusWidth} bits
                                </span>
                              </div>

                              <div className="relative w-full px-[6px]">
                                <input
                                  type="range"
                                  min="4"
                                  max="32"
                                  step="4"
                                  value={simBusWidth}
                                  onChange={(e) =>
                                    setSimBusWidth(parseInt(e.target.value))
                                  }
                                  className="w-full"
                                />
                              </div>
                              <div className="flex justify-between text-xs text-gray-500 dark:text-slate-400 font-bold px-[2px] mt-1">
                                {[4, 8, 12, 16, 20, 24, 28, 32].map((val) => (
                                  <span
                                    key={val}
                                    className={`w-4 text-center cursor-pointer transition-all ${simBusWidth === val ? "text-blue-700 scale-125" : "hover:text-blue-400"}`}
                                    onClick={() => setSimBusWidth(val)}
                                  >
                                    {val}
                                  </span>
                                ))}
                              </div>

                              {/* Visual representation of lines. Dynamic rendering container prevents looking like a blank box */}
                              <div className="mt-8 border-y border-gray-200 dark:border-slate-500 py-4 min-h-[60px] flex flex-col justify-center items-center gap-[2px]">
                                {Array.from({ length: simBusWidth }).map(
                                  (_, i) => (
                                    <div
                                      key={i}
                                      className="w-full max-w-[280px] h-[2px] bg-blue-400 opacity-70"
                                    ></div>
                                  ),
                                )}
                              </div>
                              <p className="text-center text-xs text-gray-400 dark:text-slate-500 mt-2 italic">
                                Visual representation of parallel physical lines
                              </p>
                            </div>

                            <div className="w-full md:w-1/2 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded p-6 text-center shadow-inner">
                              <h4 className="text-sm text-blue-800 dark:text-blue-300 font-bold mb-3">
                                Max Addressable Locations (2^{simBusWidth}):
                              </h4>
                              <p className="text-4xl font-mono text-blue-600 font-bold">
                                {Math.pow(2, simBusWidth) > 1000000
                                  ? `~${(Math.pow(2, simBusWidth) / 1048576).toFixed(0)} Million`
                                  : Math.pow(2, simBusWidth).toLocaleString()}
                              </p>
                            </div>
                          </div>
                          <div className="mt-8 pt-6 border-t border-gray-200 dark:border-slate-600">
                            <label className="block font-bold mb-2 text-gray-700 dark:text-slate-200">
                              Answer (exact number for 16 bits):
                            </label>
                            <input
                              type="number"
                              value={userAnswer}
                              onChange={(e) => setUserAnswer(e.target.value)}
                              placeholder="Enter exact number"
                              className="border-2 border-gray-300 dark:border-slate-500 dark:bg-slate-600 dark:text-slate-100 rounded p-3 w-48 focus:border-blue-500 focus:outline-none font-mono text-lg shadow-sm"
                              onKeyDown={(e) =>
                                e.key === "Enter" && checkAnswer()
                              }
                            />
                          </div>
                        </div>
                      )}
                  </div>
                )}
              </div>

              {/* Controls & Feedback */}
              <div className="flex flex-col md:flex-row items-center justify-between border-t border-gray-200 dark:border-slate-600 pt-6 gap-4 mt-auto">
                <div className="flex-1">
                  {feedback === "wrong" && !showSolution && (
                    <div className="flex items-center gap-2 text-red-600 dark:text-red-400 fade-in bg-red-50 dark:bg-red-900/20 p-2 rounded border border-red-200 dark:border-red-800">
                      <svg
                        className="w-6 h-6 shrink-0"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          strokeLinecap="round"
                          strokeLinejoin="round"
                          strokeWidth="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                        ></path>
                      </svg>
                      <span className="font-semibold text-sm">
                        Incorrect, please try again or view solution.
                      </span>
                    </div>
                  )}
                  {feedback === "correct" && (
                    <div className="flex items-center gap-2 text-green-700 dark:text-green-400 fade-in bg-green-50 dark:bg-green-900/20 p-2 rounded border border-green-200 dark:border-green-800">
                      <svg
                        className="w-6 h-6 shrink-0"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          strokeLinecap="round"
                          strokeLinejoin="round"
                          strokeWidth="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                        ></path>
                      </svg>
                      <span className="font-bold">Correct! Excellent job.</span>
                    </div>
                  )}
                </div>

                <div className="flex gap-3 shrink-0">
                  {(!feedback || feedback === "wrong") && !showSolution && (
                    <>
                      <button
                        onClick={revealSolution}
                        className="px-6 py-2.5 rounded-lg font-semibold text-gray-600 dark:text-slate-300 border border-gray-300 dark:border-slate-500 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
                      >
                        Show Solution
                      </button>
                      <button
                        onClick={checkAnswer}
                        disabled={isSubmitDisabled()}
                        className="px-6 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                      >
                        Check Answer
                      </button>
                    </>
                  )}
                  {showSolution && (
                    <button
                      onClick={handleNext}
                      className="px-8 py-2.5 rounded-lg font-bold text-white bg-green-600 hover:bg-green-700 transition-colors shadow-lg animate-pulse focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2"
                    >
                      Next Question ➔
                    </button>
                  )}
                </div>
              </div>

              {/* Explanation Panel */}
              {showSolution && (
                <div className="mt-6 p-5 bg-yellow-50 dark:bg-yellow-900/20 border-l-4 border-yellow-400 rounded-r-md shadow-sm fade-in">
                  <h4 className="font-bold text-yellow-800 dark:text-yellow-300 mb-2 flex items-center gap-2">
                    <svg
                      className="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        strokeWidth="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                      ></path>
                    </svg>
                    Explanation & Context:
                  </h4>
                  <p className="text-gray-800 dark:text-slate-200 leading-relaxed text-sm md:text-base">
                    {currentQ.explanation}
                  </p>
                </div>
              )}
            </div>
          </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
