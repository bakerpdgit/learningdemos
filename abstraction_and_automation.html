      const QUESTIONS = [
        // 3.4.1.3 Abstraction

        // 3.4.1.5 Procedural Abstraction
        {

          category: "implementing",

        {

          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"

      const Header = ({ selectedCats, setSelectedCats, applyFilters }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [tempCats, setTempCats] = useState(selectedCats);

        const handleToggle = (id) => {
          if (tempCats.includes(id)) {
            setTempCats(tempCats.filter((c) => c !== id));
          } else {
            setTempCats([...tempCats, id]);
          }
        };

        const handleApply = () => {
          applyFilters(tempCats);
          setIsOpen(false);
        };

        return (
          <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
            <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center relative">
              <div>
                <h1 className="text-xl md:text-2xl font-bold text-slate-800">
                  AQA A-Level CS
                </h1>
                <p className="text-sm text-slate-500">
                  Abstraction & Automation Interactive
                </p>
              </div>

              <div>
                <button
                  onClick={() => setIsOpen(!isOpen)}
                  className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition-colors"
                >
                  <FilterIcon />
                  <span className="hidden md:inline">
                    Topics ({tempCats.length})
                  </span>
                  <ChevronDown />
                </button>

                {isOpen && (
                  <div className="absolute right-4 mt-2 w-72 bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden z-50">
                    <div className="p-3 bg-slate-50 border-b border-gray-200 text-sm font-semibold text-slate-700">
                      Select Subtopics
                    </div>
                    <div className="max-h-60 overflow-y-auto p-2">
                      {CATEGORIES.map((cat) => (
                        <label
                          key={cat.id}
                          className="flex items-start gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer"
                        >
                          <input
                            type="checkbox"
                            className="mt-1 w-4 h-4 text-aqa rounded focus:ring-aqa"
                            checked={tempCats.includes(cat.id)}
                            onChange={() => handleToggle(cat.id)}
                          />
                          <span className="text-sm text-slate-700">
                            {cat.label}
                          </span>
                        </label>
                      ))}
                    </div>
                    <div className="p-3 border-t border-gray-200 bg-slate-50 flex justify-between items-center">
                      <button
                        onClick={() => setTempCats(CATEGORIES.map((c) => c.id))}
                        className="text-xs text-aqa-dark hover:underline font-medium"
                      >
                        Select All
                      </button>
                      <button
                        onClick={handleApply}
                        disabled={tempCats.length === 0}
                        className="bg-aqa hover:bg-aqa-dark text-white px-4 py-1.5 rounded-lg text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        Apply Filter

                  </div>
                )}
              </div>
            </div>
          </header>

      };

      const FillInQuestion = ({ question, onAnswer, disabled }) => {
        const [val, setVal] = useState("");

        // Parse text to find {{letter}}
        const parts = question.text.split(/\{\{([a-zA-Z0-9])\}\}/);

        const handleSubmit = () => {
          const normalizedUser = val.trim().toLowerCase();
          const normalizedTarget = question.answer.toLowerCase();
          const targetFirstLetter = question.firstLetter.toLowerCase();

          // Allow exact match or match ignoring the provided first letter if user typed it anyway
          const isCorrect =
            normalizedUser === normalizedTarget ||
            targetFirstLetter + normalizedUser === normalizedTarget ||
            normalizedUser === normalizedTarget.substring(1);

          onAnswer(isCorrect);
        };

        return (
          <div className="text-lg text-slate-700 leading-relaxed mb-6">
            {parts.map((part, i) => {
              if (i % 2 === 1) {
                return (
                  <span key={i} className="inline-flex items-center mx-1">
                    <span className="bg-slate-200 text-slate-700 font-bold px-2 py-1 rounded-l-md border border-slate-300 border-r-0">
                      {part}
                    </span>
                    <input
                      type="text"
                      value={val}
                      onChange={(e) => setVal(e.target.value)}
                      disabled={disabled}
                      className="border border-slate-300 rounded-r-md px-2 py-1 w-32 focus:outline-none focus:ring-2 focus:ring-aqa disabled:bg-slate-50 disabled:text-slate-500"
                      onKeyDown={(e) =>
                        e.key === "Enter" && !disabled && handleSubmit()
                      }
                      autoFocus
                    />
                  </span>
                );
              }
              return <span key={i}>{part}</span>;
            })}
            <div className="mt-6">
              <button
                onClick={handleSubmit}
                disabled={disabled || val.trim() === ""}
                className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50"
              >
                Check Answer
              </button>
            </div>
          </div>
        );
      };

      const MCQQuestion = ({ question, onAnswer, disabled }) => {
        const [selected, setSelected] = useState(null);

        // Shuffle options once per question
        const shuffledOptions = useMemo(() => {
          const optionsWithIndex = question.options.map((opt, index) => ({
            text: opt,
            originalIndex: index,
          }));
          // Fisher-Yates shuffle
          for (let i = optionsWithIndex.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithIndex[i], optionsWithIndex[j]] = [
              optionsWithIndex[j],
              optionsWithIndex[i],
            ];
          }
          return optionsWithIndex;
        }, [question.id]);

        const handleSubmit = () => {
          onAnswer(selected === question.answer);
        };

        return (
          <div>
            <p className="text-lg text-slate-800 font-medium mb-4">
              {question.text}
            </p>
            <div className="flex flex-col gap-3 mb-6">
              {shuffledOptions.map((opt, i) => (
                <label
                  key={i}
                  className={`flex items-center p-4 border rounded-xl cursor-pointer transition-colors
                                    ${disabled ? "opacity-75 cursor-not-allowed" : "hover:bg-slate-50"}
                                    ${selected === opt.originalIndex ? "border-aqa bg-aqa-light/30 ring-1 ring-aqa" : "border-gray-200 bg-white"}`}
                >
                  <input
                    type="radio"
                    name={`mcq-${question.id}`}
                    className="w-4 h-4 text-aqa focus:ring-aqa border-gray-300"
                    checked={selected === opt.originalIndex}
                    onChange={() => !disabled && setSelected(opt.originalIndex)}
                    disabled={disabled}
                  />
                  <span className="ml-3 text-slate-700">{opt.text}</span>
                </label>
              ))}
            </div>
            <button
              onClick={handleSubmit}
              disabled={disabled || selected === null}
              className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50"
            >
              Check Answer
            </button>
          </div>
        );
      };

      // --- INTERACTIVE DIAGRAM COMPONENTS ---

                <div className="w-full h-40 bg-slate-50 rounded-lg mb-3 relative overflow-hidden flex items-center justify-center">

                  >

                    />
                    <path
                      d="M 20,20 Q 50,80 100,40 T 180,30"

                      strokeWidth="4"
                    />
                    <circle cx="10" cy="60" r="4" fill="#000" />
                    <circle cx="70" cy="70" r="4" fill="#000" />
                    <circle cx="130" cy="50" r="4" fill="#000" />
                    <circle cx="190" cy="80" r="4" fill="#000" />
                  </svg>
                  <div className="absolute bottom-2 right-2 bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">
                    Geographic Layout
                  </div>
                </div>
                <span className="font-medium text-slate-700">Map A</span>
              </div>

              {/* Abstract Map */}
              <div
                onClick={() => !disabled && setSelected("abstract")}
                className={`interactive-element cursor-pointer p-4 border-2 rounded-xl bg-white flex flex-col items-center
                                ${selected === "abstract" ? "border-aqa ring-2 ring-aqa ring-offset-2" : "border-gray-200"}
                                ${disabled ? "opacity-80" : ""}`}
              >
                <div className="w-full h-40 bg-slate-50 rounded-lg mb-3 relative overflow-hidden flex items-center justify-center">
                  {/* Straight lines representing abstract topology */}
                  <svg
                    width="200"
                    height="120"
                    viewBox="0 0 200 120"
                    className="opacity-70"
                  >
                    <path
                      d="M 20,60 L 180,60"

                      strokeWidth="6"
                    />
                    <path
                      d="M 60,20 L 60,100"

                      strokeWidth="6"
                    />
                    <circle
                      cx="20"
                      cy="60"
                      r="5"
                      fill="#fff"
                      stroke="#000"
                      strokeWidth="2"
                    />
                    <circle
                      cx="60"
                      cy="60"
                      r="6"
                      fill="#fff"
                      stroke="#000"
                      strokeWidth="2"
                    />
                    <circle
                      cx="100"
                      cy="60"
                      r="5"
                      fill="#fff"
                      stroke="#000"
                      strokeWidth="2"
                    />
                    <circle
                      cx="140"
                      cy="60"
                      r="5"
                      fill="#fff"
                      stroke="#000"
                      strokeWidth="2"
                    />
                    <circle
                      cx="180"
                      cy="60"
                      r="5"
                      fill="#fff"

                      strokeWidth="2"
                    />
                    <circle

                      cy="20"

                      fill="#fff"
                      stroke="#000"
                      strokeWidth="2"
                    />
                    <circle

                      stroke="#000"
                      strokeWidth="2"

                  </svg>

            <button

              disabled={disabled || !selected}
              className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50"
            >
              Check Answer
            </button>
          </div>
        );
      };

      const InteractiveCar = ({ question, onAnswer, disabled }) => {
        // true = visible to driver, false = hidden
        const [visibility, setVisibility] = useState({
          steering: true,
          spark: true,
          brakes: true,
          fuel: true,
        });

        const toggle = (key) => {
          if (disabled) return;
          setVisibility((prev) => ({ ...prev, [key]: !prev[key] }));
        };

        const handleSubmit = () => {
          // Correct answer: Steering/Brakes visible. Spark/Fuel hidden.
          const isCorrect =
            visibility.steering === true &&
            visibility.brakes === true &&
            visibility.spark === false &&
            visibility.fuel === false;
          onAnswer(isCorrect);
        };

        const PartCard = ({ id, label, iconClass }) => (
          <div
            onClick={() => toggle(id)}
            className={`interactive-element cursor-pointer flex flex-col items-center justify-center p-4 border-2 rounded-xl transition-all
                        ${!visibility[id] ? "bg-slate-800 border-slate-800 text-white" : "bg-white border-gray-200 text-slate-700 hover:border-slate-300"}`}
          >
            <div className="mb-2 text-2xl">{iconClass}</div>
            <span className="font-medium text-sm text-center">{label}</span>
            <span
              className={`text-xs mt-2 px-2 py-0.5 rounded-full ${!visibility[id] ? "bg-slate-600 text-white" : "bg-green-100 text-green-800"}`}
            >
              {visibility[id] ? "Visible to Driver" : "Hidden (Abstracted)"}
            </span>
          </div>
        );

        return (
          <div>
            <p className="text-lg text-slate-800 mb-4">{question.text}</p>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              <PartCard id="steering" label="Steering Wheel" iconClass="🛞" />
              <PartCard id="spark" label="Spark Plugs" iconClass="⚡" />
              <PartCard id="brakes" label="Brake Pedal" iconClass="🛑" />
              <PartCard id="fuel" label="Fuel Injection Unit" iconClass="⛽" />
            </div>
            <button
              onClick={handleSubmit}
              disabled={disabled}
              className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50"
            >
              Check Answer
            </button>
          </div>
        );
      };

      const InteractiveDecompose = ({ question, onAnswer, disabled }) => {
        // Tree state: simple string array of currently expanded node IDs
        const [expanded, setExpanded] = useState([]);

        const tree = {
          root: {
            id: "root",
            label: "Manage School System",
            children: ["student", "attendance"],
          },
          student: {
            id: "student",
            label: "Manage Student",
            children: ["add_student", "edit_student"],
          },
          attendance: {
            id: "attendance",
            label: "Record Attendance",
            children: ["select_class", "mark_register"],
          },
        };

        const toggleExpand = (id) => {
          if (disabled || !tree[id]) return; // disable if not parent or completely disabled
          if (!expanded.includes(id)) {
            setExpanded([...expanded, id]);
          }
        };

        const handleSubmit = () => {
          // Correct if all 3 parent nodes are expanded (meaning all 4 leaves are visible)
          const isCorrect =
            expanded.includes("root") &&
            expanded.includes("student") &&
            expanded.includes("attendance");
          onAnswer(isCorrect);
        };

        const renderNode = (nodeId) => {
          const node = tree[nodeId] || {
            id: nodeId,
            label: nodeId.replace("_", " "),
            children: [],
          };
          const isExpanded = expanded.includes(nodeId);
          const isLeaf = !tree[nodeId];

          if (isExpanded && !isLeaf) {
            return (
              <div key={nodeId} className="flex flex-col items-center">
                <div className="bg-slate-100 text-slate-500 text-sm px-4 py-2 rounded border border-slate-200 mb-4 opacity-60">
                  {node.label} (Decomposed)
                </div>
                <div className="flex gap-4 md:gap-8 relative">
                  {/* Visual lines */}
                  <div className="absolute top-[-16px] left-1/4 right-1/4 h-px bg-slate-300"></div>
                  <div className="absolute top-[-16px] left-1/4 w-px h-4 bg-slate-300"></div>
                  <div className="absolute top-[-16px] right-1/4 w-px h-4 bg-slate-300"></div>

                  {node.children.map((childId) => renderNode(childId))}
                </div>
              </div>
            );
          }

          return (
            <div key={nodeId} className="flex flex-col items-center">
              <button
                onClick={() => toggleExpand(nodeId)}
                disabled={disabled || isLeaf}
                className={`interactive-element px-4 py-3 rounded-xl border-2 font-medium shadow-sm transition-all text-center min-w-[120px] max-w-[160px] text-sm
                                ${isLeaf ? "bg-emerald-50 border-emerald-400 text-emerald-800 cursor-default" : "bg-white border-aqa text-slate-700 hover:bg-aqa-light cursor-pointer"}`}
              >
                {isLeaf ? node.label : `Click to decompose:\n${node.label}`}
              </button>
            </div>
          );
        };

        return (
          <div className="overflow-x-auto pb-4">
            <p className="text-lg text-slate-800 mb-6">{question.text}</p>
            <div className="flex flex-col items-center bg-slate-50 p-6 rounded-xl border border-gray-200 mb-6 min-w-max">
              {renderNode("root")}
            </div>
            <button
              onClick={handleSubmit}
              disabled={disabled}
              className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50"
            >
              Check Answer
            </button>
          </div>
        );
      };

      const InteractiveAutomation = ({ question, onAnswer, disabled }) => {
        const [selected, setSelected] = useState([]);

        const options = [
          { id: "algo", text: "Creating algorithms" },
          { id: "hardware", text: "Building physical prototype hardware" },
          { id: "code", text: "Implementing algorithms in program code" },
          { id: "data", text: "Implementing models in data structures" },
          { id: "exec", text: "Executing the code" },
          { id: "manual", text: "Writing manual testing reports" },
        ];

        const toggle = (id) => {
          if (disabled) return;
          if (selected.includes(id)) {
            setSelected(selected.filter((item) => item !== id));
          } else {
            setSelected([...selected, id]);
          }
        };

        const handleSubmit = () => {
          const correctIds = ["algo", "code", "data", "exec"];
          const isCorrect =
            selected.length === 4 &&
            correctIds.every((id) => selected.includes(id));
          onAnswer(isCorrect);
        };

        return (
          <div>
            <p className="text-lg text-slate-800 mb-4">{question.text}</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
              {options.map((opt) => (
                <div
                  key={opt.id}
                  onClick={() => toggle(opt.id)}
                  className={`cursor-pointer p-4 rounded-xl border-2 transition-all flex items-center
                                    ${selected.includes(opt.id) ? "bg-aqa-light/30 border-aqa ring-1 ring-aqa" : "bg-white border-gray-200 hover:border-gray-300"}
                                    ${disabled && !selected.includes(opt.id) ? "opacity-50" : ""}`}
                >
                  <div
                    className={`w-5 h-5 rounded flex items-center justify-center mr-3 border
                                    ${selected.includes(opt.id) ? "bg-aqa border-aqa text-white" : "border-gray-300"}`}
                  >
                    {selected.includes(opt.id) && (
                      <svg
                        className="w-3.5 h-3.5"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          strokeLinecap="round"
                          strokeLinejoin="round"
                          strokeWidth="3"
                          d="M5 13l4 4L19 7"
                        ></path>
                      </svg>
                    )}
                  </div>
                  <span className="font-medium text-slate-700">{opt.text}</span>
                </div>
              ))}
            </div>
            <button
              onClick={handleSubmit}
              disabled={disabled}
              className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50"
            >
              Check Answer
            </button>
          </div>
        );
      };

      // Main App Component
      const App = () => {
        const [selectedCats, setSelectedCats] = useState(
          CATEGORIES.map((c) => c.id),
        );
        const [askedQuestions, setAskedQuestions] = useState([]);
        const [currentQ, setCurrentQ] = useState(null);

        // Question state
        const [qStatus, setQStatus] = useState("idle"); // idle | correct | incorrect
        const [showSolution, setShowSolution] = useState(false);

        // Pool generator
        const getNextQuestion = useCallback((catsToUse, askedToUse) => {
          let pool = QUESTIONS.filter((q) => catsToUse.includes(q.category));
          if (pool.length === 0) return null;

          let unasked = pool.filter((q) => !askedToUse.includes(q.id));

          // If all asked in this pool, reset the asked list for this pool only
          if (unasked.length === 0) {
            const poolIds = pool.map((p) => p.id);
            const newAsked = askedToUse.filter((id) => !poolIds.includes(id));
            setAskedQuestions(newAsked);
            unasked = pool;
          }

          const next = unasked[Math.floor(Math.random() * unasked.length)];
          return next;
        }, []);

        // Initial load
        useEffect(() => {
          if (!currentQ) {
            const next = getNextQuestion(selectedCats, askedQuestions);
            setCurrentQ(next);
          }
        }, [currentQ, selectedCats, askedQuestions, getNextQuestion]);

        const handleApplyFilters = (newCats) => {
          setSelectedCats(newCats);
          // Reset current question flow
          setQStatus("idle");
          setShowSolution(false);
          setCurrentQ(getNextQuestion(newCats, askedQuestions));
        };

        const handleAnswer = (isCorrect) => {
          setQStatus(isCorrect ? "correct" : "incorrect");
          if (isCorrect) {
            // Mark as asked if correct
            if (currentQ && !askedQuestions.includes(currentQ.id)) {
              setAskedQuestions([...askedQuestions, currentQ.id]);
            }
          }
        };

        const handleNext = () => {
          setQStatus("idle");
          setShowSolution(false);
          setCurrentQ(getNextQuestion(selectedCats, askedQuestions));
        };

        // Render active question component
        const renderQuestion = () => {
          if (!currentQ)
            return (
              <div className="p-8 text-center text-slate-500">
                No questions available for selected filters.
              </div>
            );

          const disabled = qStatus === "correct" || showSolution;
          const props = {
            key: currentQ.id,
            question: currentQ,
            onAnswer: handleAnswer,
            disabled,
          };

          switch (currentQ.type) {
            case "fill":
              return <FillInQuestion {...props} />;
            case "mcq":
              return <MCQQuestion {...props} />;
            case "interactive_tube":
              return <InteractiveTube {...props} />;
            case "interactive_car":
              return <InteractiveCar {...props} />;
            case "interactive_decompose":
              return <InteractiveDecompose {...props} />;
            case "interactive_automation":
              return <InteractiveAutomation {...props} />;
            default:
              return <div>Unknown question type</div>;
          }
        };

        const getSolutionText = () => {
          if (!currentQ) return "";
          if (currentQ.type === "fill")
            return `Correct answer: ${currentQ.firstLetter}${currentQ.answer.substring(1)}`;
          if (currentQ.type === "mcq")
            return `Correct answer: ${currentQ.options[currentQ.answer]}`;
          if (currentQ.type === "interactive_tube")
            return "Correct answer: Map B (The topological map with straight lines). Representational abstraction removes unnecessary geographical details.";
          if (currentQ.type === "interactive_car")
            return "Correct answer: Hide the Spark Plugs and Fuel Injection Unit. A driver only needs essential interface elements like the Steering Wheel and Brake Pedal.";
          if (currentQ.type === "interactive_decompose")
            return "Correct answer: Decompose all nodes until you reach 'Add Student', 'Edit Student', 'Select Class', and 'Mark Register'. Decomposition repeatedly breaks problems down until reaching single identifiable tasks.";
          if (currentQ.type === "interactive_automation")
            return "Correct answers: Creating algorithms, Implementing algorithms in program code, Implementing models in data structures, Executing the code.";
          return "";
        };

        return (
          <div className="min-h-screen flex flex-col">
            <Header
              selectedCats={selectedCats}
              applyFilters={handleApplyFilters}
            />

            <main className="flex-grow flex items-start justify-center p-4 md:p-8">
              <div className="w-full max-w-3xl bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                {/* Progress / Category Tag */}
                {currentQ && (
                  <div className="bg-slate-50 px-6 py-3 border-b border-gray-200 flex justify-between items-center">
                    <span className="text-xs font-bold text-aqa uppercase tracking-wider bg-aqa-light px-2 py-1 rounded">
                      {
                        CATEGORIES.find((c) => c.id === currentQ.category)
                          ?.label
                      }
                    </span>
                    <span className="text-xs text-slate-400">
                      ID: {currentQ.id}
                    </span>
                  </div>
                )}

                {/* Question Body */}
                <div className="p-6 md:p-8">{renderQuestion()}</div>

                {/* Feedback Panel */}
                {(qStatus !== "idle" || showSolution) && (
                  <div
                    className={`p-6 border-t ${qStatus === "correct" ? "bg-emerald-50 border-emerald-100" : "bg-slate-50 border-gray-200"}`}
                  >
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                      <div className="flex items-center gap-3">
                        {qStatus === "correct" && (
                          <>
                            <div className="bg-emerald-100 p-1.5 rounded-full">
                              <CheckIcon />
                            </div>
                            <div>
                              <span className="font-bold text-emerald-800 block text-lg">
                                Correct!
                              </span>
                              <span className="text-emerald-600 text-sm">
                                {getSolutionText()}
                              </span>
                            </div>
                          </>
                        )}
                        {qStatus === "incorrect" && !showSolution && (
                          <>
                            <div className="bg-rose-100 p-1.5 rounded-full">
                              <XIcon />
                            </div>
                            <span className="font-bold text-rose-700 text-lg">
                              Not quite right. Try again!
                            </span>
                          </>
                        )}
                        {showSolution && qStatus !== "correct" && (
                          <div className="text-slate-700">
                            <span className="font-bold block mb-1">
                              Solution:
                            </span>
                            <span className="text-sm bg-white border border-gray-200 px-3 py-2 rounded inline-block">
                              {getSolutionText()}
                            </span>
                          </div>
                        )}
                      </div>

                      <div className="flex gap-3 w-full md:w-auto">
                        {qStatus === "incorrect" && !showSolution && (
                          <button
                            onClick={() => setShowSolution(true)}
                            className="flex-1 md:flex-none bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg font-medium transition-colors text-sm"
                          >
                            Show Solution
                          </button>
                        )}
                        {(qStatus === "correct" || showSolution) && (
                          <button
                            onClick={handleNext}
                            className="flex-1 md:flex-none bg-aqa hover:bg-aqa-dark text-white px-6 py-2 rounded-lg font-bold transition-colors shadow-sm"
                          >
                            Next Question &rarr;
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </main>

            <footer className="text-center py-6 text-slate-500 text-sm">
              Interactive created for AQA A-Level Computer Science (Section
              3.4.1)
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
