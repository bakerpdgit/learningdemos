          nodes: ["A", "B", "C", "D", "E", "F", "G", "H"],
          start: "A",
          target: "H",
          edges: [
            { u: "A", v: "B", w: 4 },

            { u: "A", v: "D", w: 7 },
            { u: "B", v: "E", w: 2 },

            { u: "C", v: "F", w: 5 },
            { u: "D", v: "F", w: 1 },
            { u: "E", v: "G", w: 4 },

            { u: "G", v: "H", w: 2 },
          ],
          layout: {
            A: { x: 40, y: 150 },
            B: { x: 120, y: 40 },
            C: { x: 120, y: 150 },
            D: { x: 120, y: 260 },
            E: { x: 220, y: 80 },
            F: { x: 220, y: 220 },
            G: { x: 320, y: 150 },
            H: { x: 390, y: 150 },
          },
        },
      ];

      // --- ORACLE FUNCTION ---
      function generateOracle(graph) {
        let rows = [];
        let dist = {};
        let prev = {};
        graph.nodes.forEach((n) => {
          dist[n] = Infinity;
          prev[n] = null;
        });
        dist[graph.start] = 0;

        const getSortedQueue = (qArray, distObj) => {
          return [...qArray].sort((a, b) => {
            if (distObj[a] < distObj[b]) return -1;
            if (distObj[a] > distObj[b]) return 1;
            return a.localeCompare(b);
          });
        };

        let q = [...graph.nodes];
        q = getSortedQueue(q, dist);

        rows.push({
          visited: "-",
          q_pre: [...q],
          q: [...q],
          dist: { ...dist },
          prev: { ...prev },
          isTarget: false,
        });

        while (q.length > 0) {
          let u = q[0];
          if (dist[u] === Infinity) break;

          let newQ_pre = q.filter((n) => n !== u);

          if (u === graph.target) {
            rows.push({
              visited: u,
              q_pre: [...newQ_pre],
              q: [...newQ_pre],
              dist: { ...dist },
              prev: { ...prev },
              isTarget: true,
            });
            break;
          }

          let stepDist = { ...dist };
          let stepPrev = { ...prev };
          let neighbors = graph.edges.filter((e) => e.u === u || e.v === u);

          neighbors.forEach((edge) => {
            let v = edge.u === u ? edge.v : edge.u;
            if (newQ_pre.includes(v)) {
              let alt = dist[u] + edge.w;
              if (alt < stepDist[v]) {
                stepDist[v] = alt;
                stepPrev[v] = u;
                dist[v] = alt;
                prev[v] = u;
              }
            }
          });

          let newQ_post = getSortedQueue(newQ_pre, stepDist);

          rows.push({
            visited: u,
            q_pre: [...newQ_pre],
            q: [...newQ_post],
            dist: { ...stepDist },
            prev: { ...stepPrev },
            isTarget: false,
          });
          q = newQ_post;
        }
        return rows;
      }

      // --- HELPER FUNCTIONS ---
      const parseDist = (val) => {
        if (val === undefined || val === null || val === "") return Infinity;
        const s = String(val).trim().toLowerCase();
        if (s === "inf" || s === "infinity" || s === "∞" || s === "-")
          return Infinity;
        const parsed = parseInt(s, 10);
        return isNaN(parsed) ? Infinity : parsed;
      };
      const parsePrev = (val) => {
        if (val === undefined || val === null) return null;
        const s = String(val).trim().toUpperCase();
        if (s === "" || s === "-" || s === "NULL" || s === "NONE") return null;
        return s;
      };
      const parseQueue = (val) =>
        String(val)
          .toUpperCase()
          .replace(/[^A-Z]/g, "");
      const formatDist = (val) => (val === Infinity ? "∞" : val);
      const formatPrev = (val) => (val === null ? "-" : val);

      // --- MAIN APP COMPONENT ---
      function App() {
        // Theme State Setup
        const [theme, setTheme] = useState(() => {
          const saved = localStorage.getItem("uimode");
          if (saved) return saved;
          return window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        });

        useEffect(() => {
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
          localStorage.setItem("uimode", theme);
        }, [theme]);

        const toggleTheme = () =>
          setTheme((prev) => (prev === "dark" ? "light" : "dark"));

        // Configuration State
        const [selectedDifficulties, setSelectedDifficulties] = useState([
          "Easy",
          "Medium",
          "Hard",
        ]);
        const [activeGraph, setActiveGraph] = useState(ALL_GRAPHS[0]);

        // Simulation State
        const [oracle, setOracle] = useState([]);
        const [userTable, setUserTable] = useState([]);
        const [currentRowIdx, setCurrentRowIdx] = useState(0);
        const [phase, setPhase] = useState("INIT");
        const [feedback, setFeedback] = useState({
          type: "info",
          msg: "Welcome. Follow the pseudocode to begin.",
        });
        const [minDistAnswer, setMinDistAnswer] = useState("");
        const [backtrackPath, setBacktrackPath] = useState("");
        const [forwardPathAnswer, setForwardPathAnswer] = useState("");

        // --- Panel Resizing State ---
        const [leftWidth, setLeftWidth] = useState(33.33);
        const [topHeight, setTopHeight] = useState(50);

        const startHorizDrag = (e) => {
          e.preventDefault();
          document.body.classList.add("dragging-h");
          const onMouseMove = (moveEvent) => {
            const newWidthPct = (moveEvent.clientX / window.innerWidth) * 100;
            setLeftWidth(Math.max(20, Math.min(newWidthPct, 80)));
          };
          const onMouseUp = () => {
            document.body.classList.remove("dragging-h");
            document.removeEventListener("mousemove", onMouseMove);
            document.removeEventListener("mouseup", onMouseUp);
          };
          document.addEventListener("mousemove", onMouseMove);
          document.addEventListener("mouseup", onMouseUp);
        };

        const startVertDrag = (e) => {
          e.preventDefault();
          document.body.classList.add("dragging-v");
          const leftPane = document.getElementById("left-pane-container");
          if (!leftPane) return;
          const rect = leftPane.getBoundingClientRect();
          const onMouseMove = (moveEvent) => {
            const y = moveEvent.clientY - rect.top;
            const newHeightPct = (y / rect.height) * 100;
            setTopHeight(Math.max(20, Math.min(newHeightPct, 80)));
          };
          const onMouseUp = () => {
            document.body.classList.remove("dragging-v");
            document.removeEventListener("mousemove", onMouseMove);
            document.removeEventListener("mouseup", onMouseUp);
          };
          document.addEventListener("mousemove", onMouseMove);
          document.addEventListener("mouseup", onMouseUp);
        };

        useEffect(() => {
          const correctOracle = generateOracle(activeGraph);
          setOracle(correctOracle);

          let initDist = {};
          let initPrev = {};
          activeGraph.nodes.forEach((n) => {
            initDist[n] = "";
            initPrev[n] = "";
          });

          setUserTable([
            { visited: "-", q: "", dist: initDist, prev: initPrev },
          ]);
          setCurrentRowIdx(0);
          setPhase("INIT");
          setMinDistAnswer("");
          setBacktrackPath("");
          setForwardPathAnswer("");
          setFeedback({
            type: "info",
            msg: "Step 1: Initialize the table. Set Start node distance to 0, others to Infinity (∞). Set Prev to hyphen (-). Add all nodes to Priority Queue.",
          });
        }, [activeGraph]);

        const handleCellChange = (node, field, value) => {
          let newTable = [...userTable];
          newTable[currentRowIdx][field][node] = value;
          setUserTable(newTable);
        };
        const handleRowChange = (field, value) => {
          let newTable = [...userTable];
          newTable[currentRowIdx][field] = value;
          setUserTable(newTable);
        };

        const checkStep = () => {
          const uRow = userTable[currentRowIdx];
          const oRow = oracle[currentRowIdx];
          let errors = [];

          if (phase === "DEQUEUE") {
            if (uRow.visited.toUpperCase().trim() !== oRow.visited) {
              errors.push(
                `Incorrect node dequeued. You must remove the unvisited node with the lowest distance (Priority Dequeue).`,
              );
            }
            if (parseQueue(uRow.q) !== parseQueue(oRow.q_pre.join(""))) {
              errors.push(
                `Priority Queue is incorrect. You must remove the dequeued node from the queue (keeping the remaining nodes in their current order for now).`,
              );
            }

            if (errors.length === 0) {
              handleRowChange("visited", oRow.visited);
              handleRowChange("q", oRow.q_pre.join(", "));

              if (oRow.isTarget) {
                let cleanRow = {
                  ...uRow,
                  visited: oRow.visited,
                  q: oRow.q_pre.join(", "),
                };
                activeGraph.nodes.forEach((n) => {
                  cleanRow.dist[n] = formatDist(oRow.dist[n]);
                  cleanRow.prev[n] = formatPrev(oRow.prev[n]);
                });
                let newTable = [...userTable];
                newTable[currentRowIdx] = cleanRow;
                setUserTable(newTable);
                setPhase("MIN_DIST");
                setFeedback({
                  type: "success",
                  msg: `Target ${activeGraph.target} dequeued! Algorithm terminates. First, identify the minimum distance to the target.`,
                });
              } else {
                setPhase("EVAL");
                setFeedback({
                  type: "success",
                  msg: `Correct! Node ${oRow.visited} dequeued and removed from Priority Queue. Now calculate paths to its unvisited neighbors and update Distances and Previous columns.`,
                });
              }
              return;
            }
          } else if (phase === "EVAL") {
            activeGraph.nodes.forEach((n) => {
              if (parsePrev(uRow.prev[n]) !== oRow.prev[n])
                errors.push(`Previous node for Node ${n} is incorrect.`);
              if (parseDist(uRow.dist[n]) !== oRow.dist[n])
                errors.push(`Distance for Node ${n} is incorrect.`);
            });
            if (errors.length === 0) {
              setPhase("UPDATE_PQ");
              setFeedback({
                type: "success",
                msg: `Correct! Now process the UPDATE command. Review the Priority Queue string to reflect any new priorities based on updated distances (lowest distance first, alphabetical tie-break). Make changes if needed and submit.`,
              });
              return;
            }
          } else if (phase === "INIT" || phase === "UPDATE_PQ") {
            if (parseQueue(uRow.q) !== parseQueue(oRow.q.join(""))) {
              if (phase === "INIT") {
                errors.push(
                  "Priority Queue is incorrect. Ensure you list all nodes, ordered by distance (Start node first) then alphabetically.",
                );
              } else {
                errors.push(
                  "Priority Queue is incorrect. It must be ordered strictly by the newly updated distances (lowest distance first). Use alphabetical order for ties.",
                );
              }
            }
            if (phase === "INIT") {
              activeGraph.nodes.forEach((n) => {
                if (parsePrev(uRow.prev[n]) !== oRow.prev[n])
                  errors.push(`Previous node for Node ${n} is incorrect.`);
                if (parseDist(uRow.dist[n]) !== oRow.dist[n])
                  errors.push(`Distance for Node ${n} is incorrect.`);
              });
            }

            if (errors.length === 0) {
              let cleanRow = { ...uRow, q: oRow.q.join(", ") };
              activeGraph.nodes.forEach((n) => {
                cleanRow.dist[n] = formatDist(oRow.dist[n]);
                cleanRow.prev[n] = formatPrev(oRow.prev[n]);
              });
              let newTable = [...userTable];
              newTable[currentRowIdx] = cleanRow;

              let nextDist = {};
              let nextPrev = {};
              activeGraph.nodes.forEach((n) => {
                nextDist[n] = cleanRow.dist[n];
                nextPrev[n] = cleanRow.prev[n];
              });
              newTable.push({
                visited: "",
                q: "",
                dist: nextDist,
                prev: nextPrev,
              });
              setUserTable(newTable);
              setCurrentRowIdx(currentRowIdx + 1);
              setPhase("DEQUEUE");
              setFeedback({
                type: "success",
                msg:
                  phase === "INIT"
                    ? `Initialization complete. Now, perform a Priority Dequeue.`
                    : `Priority Queue updated! Row ${currentRowIdx + 1} complete. Now perform the next Priority Dequeue.`,
              });
              return;
            }
          }
          if (errors.length > 0)
            setFeedback({
              type: "error",
              msg: errors[0] + (errors.length > 1 ? " (And other errors)" : ""),
            });
        };

        const checkMinDist = () => {
          const correctDist =
            oracle[oracle.length - 1].dist[activeGraph.target];
          const userDist = parseInt(minDistAnswer.trim(), 10);
          if (userDist === correctDist) {
            setPhase("BACKTRACK");
            setFeedback({
              type: "success",
              msg: `Correct! The minimum distance is ${correctDist}. Now perform the backtracking trace.`,
            });
          } else {
            setFeedback({
              type: "error",
              msg: `Incorrect. Look at the final distance calculated for the target node (${activeGraph.target}) in the trace table.`,
            });
          }
        };

        const checkBacktrack = () => {
          let path = [];
          let curr = activeGraph.target;
          while (curr !== null) {
            path.push(curr);
            curr = oracle[oracle.length - 1].prev[curr];
          }
          const backwardStr = path.join("");
          const userPathStr = backtrackPath
            .toUpperCase()
            .replace(/[^A-Z]/g, "");

          if (userPathStr === backwardStr) {
            setPhase("FINAL_PATH");
            setBacktrackPath(path.join(" ← "));
            setFeedback({
              type: "success",
              msg: `Correct! You have backtracked successfully. Now state the final path from Start to Target.`,
            });
          } else {
            setFeedback({
              type: "error",
              msg: `Incorrect. You must start at the Target (${activeGraph.target}) and list the nodes in reverse order as you read the 'Prev' column back to Start (${activeGraph.start}).`,
            });
          }
        };

        const checkForwardPath = () => {
          let path = [];
          let curr = activeGraph.target;
          while (curr !== null) {
            path.unshift(curr);
            curr = oracle[oracle.length - 1].prev[curr];
          }
          const forwardStr = path.join("");
          const userPathStr = forwardPathAnswer
            .toUpperCase()
            .replace(/[^A-Z]/g, "");

          if (userPathStr === forwardStr) {
            setPhase("DONE");
            setForwardPathAnswer(path.join(" → "));
            setFeedback({
              type: "success",
              msg: `Perfect! You found the shortest path: ${path.join(" → ")} with total weight ${oracle[oracle.length - 1].dist[activeGraph.target]}.`,
            });
          } else {
            setFeedback({
              type: "error",
              msg: `Incorrect. The final path should be your backtracked sequence reversed, starting at ${activeGraph.start} and ending at ${activeGraph.target}.`,
            });
          }
        };

        const showHint = () => {
          let oRow = oracle[currentRowIdx];
          if (phase === "DEQUEUE") {
            handleRowChange("visited", oRow.visited);
            handleRowChange("q", oRow.q_pre.join(", "));
            setFeedback({
              type: "info",
              msg: `Hint applied: Priority Dequeue selects node ${oRow.visited} and removes it from the queue.`,
            });
          } else if (phase === "EVAL") {
            let newTable = [...userTable];
            activeGraph.nodes.forEach((n) => {
              newTable[currentRowIdx].dist[n] = formatDist(oRow.dist[n]);
              newTable[currentRowIdx].prev[n] = formatPrev(oRow.prev[n]);
            });
            setUserTable(newTable);
            setFeedback({
              type: "info",
              msg: `Hint applied: Distances and Previous columns updated.`,
            });
          } else if (phase === "UPDATE_PQ") {
            handleRowChange("q", oRow.q.join(", "));
            setFeedback({
              type: "info",
              msg: `Hint applied: Priority Queue updated with remaining unvisited nodes.`,
            });
          } else if (phase === "INIT") {
            let newTable = [...userTable];
            newTable[currentRowIdx].q = oRow.q.join(", ");
            activeGraph.nodes.forEach((n) => {
              newTable[currentRowIdx].dist[n] = formatDist(oRow.dist[n]);
              newTable[currentRowIdx].prev[n] = formatPrev(oRow.prev[n]);
            });
            setUserTable(newTable);
            setFeedback({
              type: "info",
              msg: `Hint applied: Initialization row completed.`,
            });
          }
        };

        let activeLine = 0;
        if (phase === "INIT") activeLine = 2;
        else if (phase === "DEQUEUE") activeLine = 9;
        else if (phase === "EVAL") activeLine = 11;
        else if (phase === "UPDATE_PQ") activeLine = 20;
        else if (
          phase === "MIN_DIST" ||
          phase === "BACKTRACK" ||
          phase === "FINAL_PATH" ||
          phase === "DONE"
        )
          activeLine = 10;

        const toggleDifficulty = (diff) => {
          if (selectedDifficulties.includes(diff)) {
            if (selectedDifficulties.length > 1)
              setSelectedDifficulties(
                selectedDifficulties.filter((d) => d !== diff),
              );
          } else {
            setSelectedDifficulties([...selectedDifficulties, diff]);
          }
        };
        const filteredGraphs = ALL_GRAPHS.filter((g) =>
          selectedDifficulties.includes(g.difficulty),
        );

        const PseudocodeLine = ({ num, text, lineId }) => (
          <div
            className={`px-2 py-0.5 font-mono text-[0.85rem] border-l-4 transition-colors ${activeLine === lineId ? "bg-sky-100 dark:bg-sky-900/40 border-sky-600 dark:border-sky-400 font-bold text-sky-800 dark:text-sky-300" : "border-transparent text-slate-800 dark:text-slate-300"}`}
          >
            {num}: &nbsp;{text}
          </div>
        );

        return (
          <div className="flex flex-col h-screen overflow-hidden">
            {/* Global CS Learning Header */}
            <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
              <a
                href="index.html"
                className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline"
              >
                <span className="text-slate-500">&lt;</span>CS
                <span className="text-slate-500">&gt;</span>&nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a
                  href="index.html"
                  className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                >
                  Home
                </a>
                <button
                  onClick={toggleTheme}
                  className="text-slate-400 hover:text-headerAccent transition-colors p-1"
                  aria-label="Toggle Dark Mode"
                >
                  {theme === "dark" ? (
                    <svg
                      className="w-5 h-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        strokeWidth={2}
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                      />
                    </svg>
                  ) : (
                    <svg
                      className="w-5 h-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        strokeWidth={2}
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
                      />
                    </svg>
                  )}
                </button>
              </nav>
            </header>

            {/* App Toolbar */}
            <div className="bg-white dark:bg-slate-800 shadow-sm px-6 py-3 flex justify-between items-center z-20 shrink-0 border-b border-gray-200 dark:border-slate-700">
              <div>
                <h1 className="text-xl font-bold text-gray-800 dark:text-slate-100">
                  Dijkstra's Algorithm Tracer
                </h1>
                <p className="text-sm text-gray-500 dark:text-slate-400">
                  AQA A-Level Computer Science
                </p>
              </div>
              <div className="flex items-center space-x-4">
                <div className="relative group">
                  <button className="bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-200 px-4 py-2 rounded shadow text-sm font-semibold inline-flex items-center border border-gray-200 dark:border-slate-600 hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors">
                    Filter Topics (Difficulty) <span className="ml-2">▼</span>
                  </button>
                  <div className="absolute right-0 mt-1 bg-white dark:bg-slate-800 min-w-[160px] shadow-lg rounded border border-gray-200 dark:border-slate-700 z-10 hidden group-hover:block overflow-hidden">
                    {["Easy", "Medium", "Hard"].map((diff) => (
                      <label
                        key={diff}
                        className="flex items-center p-3 cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-700 text-gray-700 dark:text-slate-200"
                      >
                        <input
                          type="checkbox"
                          className="mr-3"
                          checked={selectedDifficulties.includes(diff)}
                          onChange={() => toggleDifficulty(diff)}
                        />
                        {diff}
                      </label>
                    ))}
                  </div>
                </div>
                <select
                  className="bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-slate-200 py-2 px-4 rounded shadow font-semibold focus:outline-none focus:ring-2 focus:ring-sky-500"
                  value={activeGraph.id}
                  onChange={(e) =>
                    setActiveGraph(
                      ALL_GRAPHS.find((g) => g.id === parseInt(e.target.value)),
                    )
                  }
                >
                  {filteredGraphs.map((g) => (
                    <option key={g.id} value={g.id}>
                      {g.name} [{g.difficulty}]
                    </option>
                  ))}
                </select>
              </div>
            </div>

            {/* MAIN CONTENT */}
            <div className="flex flex-1 overflow-hidden">
              {/* LEFT PANE */}
              <div
                id="left-pane-container"
                style={{ width: `${leftWidth}%`, minWidth: "20%" }}
                className="flex flex-col relative z-10 shrink-0 border-r border-gray-200 dark:border-slate-700"
              >
                {/* SVG Graph Visualizer */}
                <div
                  style={{ height: `${topHeight}%`, minHeight: "20%" }}
                  className="bg-gray-50 dark:bg-slate-800/50 flex items-center justify-center p-4 relative overflow-hidden shrink-0"
                >
                  <svg
                    width="100%"
                    height="100%"
                    viewBox="0 0 450 300"
                    preserveAspectRatio="xMidYMid meet"
                  >
                    {activeGraph.edges.map((edge, i) => {
                      const posU = activeGraph.layout[edge.u];
                      const posV = activeGraph.layout[edge.v];
                      const midX = (posU.x + posV.x) / 2;
                      const midY = (posU.y + posV.y) / 2;
                      const isEval =
                        phase === "EVAL" &&
                        userTable[currentRowIdx] &&
                        (userTable[currentRowIdx].visited === edge.u ||
                          userTable[currentRowIdx].visited === edge.v);

                      return (
                        <g key={`edge-${i}`}>
                          <line
                            x1={posU.x}
                            y1={posU.y}
                            x2={posV.x}
                            y2={posV.y}
                            className={`edge-line ${isEval ? "edge-evaluating" : ""}`}
                          />
                          <rect
                            x={midX - 10}
                            y={midY - 10}
                            width="20"
                            height="20"
                            rx="10"
                            className="edge-weight-bg"
                          />
                          <text x={midX} y={midY} className="edge-weight">
                            {edge.w}
                          </text>
                        </g>
                      );
                    })}

                    {activeGraph.nodes.map((n) => {
                      const pos = activeGraph.layout[n];
                      let nodeClass = "node-circle";
                      if (n === activeGraph.start) nodeClass += " node-start";
                      if (n === activeGraph.target) nodeClass += " node-target";
                      if (
                        userTable[currentRowIdx] &&
                        userTable[currentRowIdx].visited === n
                      )
                        nodeClass += " node-current";

                      return (
                        <g key={`node-${n}`}>
                          <circle
                            cx={pos.x}
                            cy={pos.y}
                            r="18"
                            className={nodeClass}
                          />
                          <text x={pos.x} y={pos.y} className="node-text">
                            {n}
                          </text>
                        </g>
                      );
                    })}

                    {/* Legend */}
                    <g transform="translate(10, 10)">
                      <rect
                        width="130"
                        height="65"
                        rx="4"
                        className="fill-white/80 dark:fill-slate-800/80"
                      />
                      <circle
                        cx="20"
                        cy="20"
                        r="6"
                        className="node-start dark:fill-slate-900"
                        fill="white"
                      />
                      <text
                        x="35"
                        y="24"
                        fontSize="10"
                        className="fill-gray-700 dark:fill-slate-300 font-sans font-medium"
                      >
                        Start Node
                      </text>
                      <circle
                        cx="20"
                        cy="35"
                        r="6"
                        className="node-target dark:fill-slate-900"
                        fill="white"
                      />
                      <text
                        x="35"
                        y="39"
                        fontSize="10"
                        className="fill-gray-700 dark:fill-slate-300 font-sans font-medium"
                      >
                        Target Node
                      </text>
                      <circle
                        cx="20"
                        cy="50"
                        r="6"
                        className="node-current dark:fill-slate-900"
                        fill="white"
                      />
                      <text
                        x="35"
                        y="54"
                        fontSize="10"
                        className="fill-gray-700 dark:fill-slate-300 font-sans font-medium"
                      >
                        Current Node
                      </text>
                    </g>
                  </svg>
                </div>

                {/* Vertical Resizer */}
                <div
                  className="h-2 cursor-row-resize bg-gray-100 dark:bg-slate-800 border-y border-gray-200 dark:border-slate-700 flex items-center justify-center flex-shrink-0 z-30 transition-colors hover:bg-gray-200 dark:hover:bg-slate-700"
                  onMouseDown={startVertDrag}
                >
                  <div className="w-8 h-0.5 bg-gray-400 dark:bg-slate-500 rounded"></div>
                </div>

                {/* Pseudocode Panel */}
                <div className="flex-1 overflow-y-auto bg-white dark:bg-slate-900 p-4">
                  <h3 className="font-bold text-gray-700 dark:text-slate-400 mb-3 uppercase text-xs tracking-wider">
                    AQA Pseudocode Trace
                  </h3>
                  <PseudocodeLine
                    num="01"
                    lineId={1}
                    text="SUBROUTINE Dijkstra(Graph, Start, Target)"
                  />
                  <PseudocodeLine
                    num="02"
                    lineId={2}
                    text={<>&nbsp;&nbsp;FOR each Node in Graph</>}
                  />
                  <PseudocodeLine
                    num="03"
                    lineId={2}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;Distance[Node] &larr; INFINITY
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="04"
                    lineId={2}
                    text={
                      <>&nbsp;&nbsp;&nbsp;&nbsp;Previous[Node] &larr; NULL</>
                    }
                  />
                  <PseudocodeLine
                    num="05"
                    lineId={2}
                    text={
                      <>&nbsp;&nbsp;&nbsp;&nbsp;ENQUEUE Node in PriorityQueue</>
                    }
                  />
                  <PseudocodeLine
                    num="06"
                    lineId={2}
                    text={<>&nbsp;&nbsp;ENDFOR</>}
                  />
                  <PseudocodeLine
                    num="07"
                    lineId={2}
                    text={<>&nbsp;&nbsp;Distance[Start] &larr; 0</>}
                  />
                  <PseudocodeLine
                    num="08"
                    lineId={8}
                    text={<>&nbsp;&nbsp;WHILE PriorityQueue is not empty</>}
                  />
                  <PseudocodeLine
                    num="09"
                    lineId={9}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;CurrentNode &larr; DEQUEUE
                        PriorityQueue
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="10"
                    lineId={10}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;IF CurrentNode == Target THEN
                        RETURN
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="11"
                    lineId={11}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;FOR each Neighbor of CurrentNode
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="12"
                    lineId={11}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;IF Neighbor in
                        PriorityQueue THEN
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="13"
                    lineId={11}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;NewDist
                        &larr; Dist[Current] + Weight
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="14"
                    lineId={11}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;IF
                        NewDist &lt; Dist[Neighbor] THEN
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="15"
                    lineId={11}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Dist[Neighbor]
                        &larr; NewDist
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="16"
                    lineId={11}
                    text={
                      <>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Prev[Neighbor]
                        &larr; CurrentNode
                      </>
                    }
                  />
                  <PseudocodeLine
                    num="17"
                    lineId={11}
                    text={
                      <>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ENDIF</>
                    }
                  />
                  <PseudocodeLine
                    num="18"
                    lineId={11}
                    text={<>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ENDIF</>}
                  />
                  <PseudocodeLine
                    num="19"
                    lineId={11}
                    text={<>&nbsp;&nbsp;&nbsp;&nbsp;ENDFOR</>}
                  />
                  <PseudocodeLine
                    num="20"
                    lineId={20}
                    text={<>&nbsp;&nbsp;&nbsp;&nbsp;UPDATE PriorityQueue</>}
                  />
                  <PseudocodeLine
                    num="21"
                    lineId={8}
                    text={<>&nbsp;&nbsp;ENDWHILE</>}
                  />
                  <PseudocodeLine num="22" lineId={1} text="ENDSUBROUTINE" />
                </div>
              </div>

              {/* Horizontal Resizer */}
              <div
                className="w-2 cursor-col-resize bg-gray-100 dark:bg-slate-800 border-x border-gray-200 dark:border-slate-700 flex flex-col items-center justify-center flex-shrink-0 z-30 transition-colors hover:bg-gray-200 dark:hover:bg-slate-700"
                onMouseDown={startHorizDrag}
              >
                <div className="w-0.5 h-8 bg-gray-400 dark:bg-slate-500 rounded"></div>
              </div>

              {/* RIGHT PANE */}
              <div className="flex-1 flex flex-col bg-white dark:bg-[#1e293b] overflow-hidden">
                {/* Feedback Banner */}
                <div
                  className={`p-4 border-b font-semibold flex items-center shadow-sm z-10 shrink-0 ${
                    feedback.type === "error"
                      ? "bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300 border-red-200 dark:border-red-800"
                      : feedback.type === "success"
                        ? "bg-green-50 dark:bg-emerald-900/30 text-green-700 dark:text-emerald-300 border-green-200 dark:border-emerald-800"
                        : "bg-blue-50 dark:bg-sky-900/30 text-blue-700 dark:text-sky-300 border-blue-200 dark:border-sky-800"
                  }`}
                >
                  <span className="mr-3 text-xl">
                    {feedback.type === "error"
                      ? "❌"
                      : feedback.type === "success"
                        ? "✅"
                        : "ℹ️"}
                  </span>
                  <span>{feedback.msg}</span>
                </div>

                {/* Table Area */}
                <div className="flex-1 overflow-auto p-4 bg-gray-50 dark:bg-[#0f172a]">
                  <table className="w-full border-collapse bg-white dark:bg-slate-800 shadow-sm rounded-lg overflow-hidden text-sm border-hidden">
                    <thead className="bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-slate-200 border-b border-gray-300 dark:border-slate-600">
                      <tr>
                        <th
                          className="border border-gray-300 dark:border-slate-600 p-2 min-w-[80px]"
                          rowSpan="2"
                        >
                          Node Visited
                          <br />
                          <span className="font-normal text-xs text-gray-500 dark:text-slate-400">
                            (Dequeued)
                          </span>
                        </th>
                        <th
                          className="border border-gray-300 dark:border-slate-600 p-2 min-w-[120px]"
                          rowSpan="2"
                        >
                          Priority Queue
                          <br />
                          <span className="font-normal text-xs text-gray-500 dark:text-slate-400">
                            (Unvisited)
                          </span>
                        </th>
                        <th
                          className="border border-gray-300 dark:border-slate-600 p-2 text-center"
                          colSpan={activeGraph.nodes.length}
                        >
                          Distance
                        </th>
                        <th
                          className="border border-gray-300 dark:border-slate-600 p-2 text-center"
                          colSpan={activeGraph.nodes.length}
                        >
                          Previous
                        </th>
                      </tr>
                      <tr>
                        {activeGraph.nodes.map((n) => (
                          <th
                            key={`th-dist-${n}`}
                            className="border border-gray-300 dark:border-slate-600 p-1 bg-gray-100 dark:bg-slate-700/80 font-medium"
                          >
                            Node {n}
                          </th>
                        ))}
                        {activeGraph.nodes.map((n) => (
                          <th
                            key={`th-prev-${n}`}
                            className="border border-gray-300 dark:border-slate-600 p-1 bg-gray-100 dark:bg-slate-700/80 font-medium"
                          >
                            Node {n}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody className="text-gray-800 dark:text-slate-300">
                      {userTable.map((row, rIdx) => {
                        const isActiveRow = rIdx === currentRowIdx;
                        const canEditVisited =
                          isActiveRow && phase === "DEQUEUE";
                        const canEditQ =
                          isActiveRow &&
                          (phase === "DEQUEUE" ||
                            phase === "UPDATE_PQ" ||
                            phase === "INIT");
                        const canEditDist =
                          isActiveRow && (phase === "EVAL" || phase === "INIT");
                        const canEditPrev =
                          isActiveRow && (phase === "EVAL" || phase === "INIT");

                        const inputClass =
                          "w-full h-full min-w-[40px] text-center border border-gray-300 dark:border-slate-600 rounded py-1 px-1 outline-none bg-transparent focus:bg-blue-50 dark:focus:bg-slate-700 focus:border-blue-500 dark:focus:border-sky-400 focus:ring-2 focus:ring-blue-500/30 transition-all font-medium text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-slate-500";
                        const lockedClass =
                          "border border-gray-300 dark:border-slate-600 p-2 bg-gray-50 dark:bg-slate-800/80 text-center";

                        return (
                          <tr
                            key={`row-${rIdx}`}
                            className={
                              isActiveRow
                                ? "bg-blue-50/50 dark:bg-sky-900/20"
                                : "hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors"
                            }
                          >
                            <td
                              className={
                                canEditVisited
                                  ? "border border-gray-300 dark:border-slate-600 p-1"
                                  : `${lockedClass} font-bold text-gray-900 dark:text-white`
                              }
                            >
                              {canEditVisited ? (
                                <input
                                  type="text"
                                  className={`${inputClass} font-bold`}
                                  maxLength="1"
                                  value={row.visited}
                                  onChange={(e) =>
                                    handleRowChange(
                                      "visited",
                                      e.target.value.toUpperCase(),
                                    )
                                  }
                                  placeholder="?"
                                  autoFocus
                                />
                              ) : (
                                row.visited
                              )}
                            </td>
                            <td
                              className={
                                canEditQ
                                  ? "border border-gray-300 dark:border-slate-600 p-1"
                                  : `${lockedClass} text-xs tracking-wider`
                              }
                            >
                              {canEditQ ? (
                                <input
                                  type="text"
                                  className={`${inputClass} text-xs`}
                                  value={row.q}
                                  onChange={(e) =>
                                    handleRowChange("q", e.target.value)
                                  }
                                  placeholder="e.g. A, B, C"
                                />
                              ) : (
                                row.q
                              )}
                            </td>

                            {activeGraph.nodes.map((n) => (
                              <td
                                key={`td-dist-${rIdx}-${n}`}
                                className={
                                  canEditDist
                                    ? "border border-gray-300 dark:border-slate-600 p-1"
                                    : lockedClass
                                }
                              >
                                {canEditDist ? (
                                  <input
                                    type="text"
                                    className={inputClass}
                                    value={row.dist[n]}
                                    onChange={(e) =>
                                      handleCellChange(
                                        n,
                                        "dist",
                                        e.target.value,
                                      )
                                    }
                                    placeholder="∞"
                                  />
                                ) : (
                                  <span
                                    className={
                                      row.dist[n] === "∞"
                                        ? "text-gray-400 dark:text-slate-500 font-serif text-lg leading-none"
                                        : ""
                                    }
                                  >
                                    {row.dist[n]}
                                  </span>
                                )}
                              </td>
                            ))}

                            {activeGraph.nodes.map((n) => (
                              <td
                                key={`td-prev-${rIdx}-${n}`}
                                className={
                                  canEditPrev
                                    ? "border border-gray-300 dark:border-slate-600 p-1"
                                    : `${lockedClass} text-gray-500 dark:text-slate-400`
                                }
                              >
                                {canEditPrev ? (
                                  <input
                                    type="text"
                                    className={inputClass}
                                    maxLength="1"
                                    value={row.prev[n]}
                                    onChange={(e) =>
                                      handleCellChange(
                                        n,
                                        "prev",
                                        e.target.value.toUpperCase(),
                                      )
                                    }
                                    placeholder="-"
                                  />
                                ) : (
                                  row.prev[n]
                                )}
                              </td>
                            ))}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>

                  {/* Action Controls */}
                  {phase !== "MIN_DIST" &&
                    phase !== "BACKTRACK" &&
                    phase !== "DONE" && (
                      <div className="mt-6 flex gap-4 justify-end">
                        <button
                          onClick={showHint}
                          className="px-4 py-2 border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-slate-300 rounded hover:bg-gray-100 dark:hover:bg-slate-700 font-medium transition-colors"
                        >
                          Reveal Step Answer
                        </button>
                        <button
                          onClick={checkStep}
                          className="px-6 py-2 bg-blue-600 dark:bg-sky-600 text-white rounded hover:bg-blue-700 dark:hover:bg-sky-500 font-bold shadow-md transition-colors"
                        >
                          {phase === "DEQUEUE"
                            ? "Verify Priority Dequeue"
                            : phase === "EVAL"
                              ? "Verify Distances & Prevs"
                              : phase === "UPDATE_PQ"
                                ? "Verify Priority Queue"
                                : "Submit Step"}
                        </button>
                      </div>
                    )}

                  {/* Final Output UI */}
                  {(phase === "MIN_DIST" ||
                    phase === "BACKTRACK" ||
                    phase === "FINAL_PATH" ||
                    phase === "DONE") && (
                    <div className="mt-8 bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-800 rounded-lg p-6 shadow-sm">
                      <h3 className="text-lg font-bold text-purple-800 dark:text-purple-300 mb-4">
                        Final Algorithm Outputs
                      </h3>

                      {/* Min Distance Question */}
                      <div className="mb-6">
                        <p className="text-purple-700 dark:text-purple-400 mb-2 font-semibold">
                          1. What is the minimum distance from Start (
                          {activeGraph.start}) to Target ({activeGraph.target})?
                        </p>
                        <div className="flex items-center gap-4">
                          <input
                            type="number"
                            className="w-32 p-2 border border-purple-300 dark:border-purple-700 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 text-lg text-center bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                            value={minDistAnswer}
                            onChange={(e) => setMinDistAnswer(e.target.value)}
                            disabled={phase !== "MIN_DIST"}
                          />
                          {phase === "MIN_DIST" && (
                            <>
                              <button
                                onClick={checkMinDist}
                                className="px-4 py-2 bg-purple-600 dark:bg-purple-500 text-white rounded font-bold hover:bg-purple-700 dark:hover:bg-purple-600 transition-colors shadow"
                              >
                                Check Distance
                              </button>
                              <button
                                onClick={() =>
                                  setMinDistAnswer(
                                    oracle[oracle.length - 1].dist[
                                      activeGraph.target
                                    ].toString(),
                                  )
                                }
                                className="px-4 py-2 border border-purple-300 dark:border-purple-700 text-purple-700 dark:text-purple-400 rounded hover:bg-purple-100 dark:hover:bg-purple-900/50 font-medium transition-colors bg-white dark:bg-slate-800"
                              >
                                Reveal
                              </button>
                            </>
                          )}
                        </div>
                      </div>

                      {/* Backtrack Path Question */}
                      {(phase === "BACKTRACK" ||
                        phase === "FINAL_PATH" ||
                        phase === "DONE") && (
                        <div className="mb-6">
                          <p className="text-purple-700 dark:text-purple-400 mb-2 font-semibold">
                            2. Backtrack to find the route. Read backwards using
                            the 'Prev' column from Target ({activeGraph.target})
                            to Start ({activeGraph.start}).
                          </p>
                          <div className="flex items-center gap-4">
                            <input
                              type="text"
                              className="flex-1 p-3 border border-purple-300 dark:border-purple-700 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 text-lg uppercase tracking-widest bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-purple-300 dark:placeholder-purple-800"
                              placeholder={`e.g. ${activeGraph.target}-...-${activeGraph.start}`}
                              value={backtrackPath}
                              onChange={(e) => setBacktrackPath(e.target.value)}
                              disabled={phase !== "BACKTRACK"}
                            />
                            {phase === "BACKTRACK" && (
                              <>
                                <button
                                  onClick={checkBacktrack}
                                  className="px-6 py-3 bg-purple-600 dark:bg-purple-500 text-white rounded font-bold hover:bg-purple-700 dark:hover:bg-purple-600 transition-colors shadow"
                                >
                                  Check Backtrack
                                </button>
                                <button
                                  onClick={() => {
                                    let path = [];
                                    let curr = activeGraph.target;
                                    while (curr !== null) {
                                      path.push(curr);
                                      curr =
                                        oracle[oracle.length - 1].prev[curr];
                                    }
                                    setBacktrackPath(path.join("-"));
                                  }}
                                  className="px-4 py-3 border border-purple-300 dark:border-purple-700 text-purple-700 dark:text-purple-400 rounded hover:bg-purple-100 dark:hover:bg-purple-900/50 font-medium transition-colors bg-white dark:bg-slate-800"
                                >
                                  Reveal Solution
                                </button>
                              </>
                            )}
                          </div>
                        </div>
                      )}

                      {/* Forward Path Question */}
                      {(phase === "FINAL_PATH" || phase === "DONE") && (
                        <div>
                          <p className="text-purple-700 dark:text-purple-400 mb-2 font-semibold">
                            3. State the shortest path from Start (
                            {activeGraph.start}) to Target ({activeGraph.target}
                            ).
                          </p>
                          <div className="flex items-center gap-4">
                            <input
                              type="text"
                              className="flex-1 p-3 border border-purple-300 dark:border-purple-700 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 text-lg uppercase tracking-widest bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-purple-300 dark:placeholder-purple-800"
                              placeholder={`e.g. ${activeGraph.start}-...-${activeGraph.target}`}
                              value={forwardPathAnswer}
                              onChange={(e) =>
                                setForwardPathAnswer(e.target.value)
                              }
                              disabled={phase === "DONE"}
                            />
                            {phase === "FINAL_PATH" && (
                              <>
                                <button
                                  onClick={checkForwardPath}
                                  className="px-6 py-3 bg-purple-600 dark:bg-purple-500 text-white rounded font-bold hover:bg-purple-700 dark:hover:bg-purple-600 transition-colors shadow"
                                >
                                  Check Path
                                </button>
                                <button
                                  onClick={() => {
                                    let path = [];
                                    let curr = activeGraph.target;
                                    while (curr !== null) {
                                      path.unshift(curr);
                                      curr =
                                        oracle[oracle.length - 1].prev[curr];
                                    }
                                    setForwardPathAnswer(path.join("-"));
                                  }}
                                  className="px-4 py-3 border border-purple-300 dark:border-purple-700 text-purple-700 dark:text-purple-400 rounded hover:bg-purple-100 dark:hover:bg-purple-900/50 font-medium transition-colors bg-white dark:bg-slate-800"
                                >
                                  Reveal Solution
                                </button>
                              </>
                            )}
                            {phase === "DONE" && (
                              <button
                                onClick={() => {
                                  const currentIdx = ALL_GRAPHS.findIndex(
                                    (g) => g.id === activeGraph.id,
                                  );
                                  const nextGraph =
                                    ALL_GRAPHS[
                                      (currentIdx + 1) % ALL_GRAPHS.length
                                    ];
                                  setActiveGraph(nextGraph);
                                  if (
                                    !selectedDifficulties.includes(
                                      nextGraph.difficulty,
                                    )
                                  ) {
                                    setSelectedDifficulties([
                                      ...selectedDifficulties,
                                      nextGraph.difficulty,
                                    ]);
                                  }
                                }}
                                className="px-6 py-3 bg-emerald-600 dark:bg-emerald-500 text-white rounded font-bold hover:bg-emerald-700 dark:hover:bg-emerald-600 transition-colors shadow"
                              >
                                Try Next Graph
                              </button>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
