        {

            { id: "p1", prefix: "Societal debate over mass surveillance versus public ", missingWords: ["safety"], firstLetter: "s", suffix: ".", category: "Ethical", isFollowUp: false },

        {

            { id: "s6", prefix: "Parents choosing at what age to let their child create an ", missingWords: ["account", "accounts"], firstLetter: "a", suffix: ".", category: "Moral", isFollowUp: true },
            { id: "s7", prefix: "Difficulty enforcing local laws when the company is based in a different ", missingWords: ["jurisdiction", "jurisdictions"], firstLetter: "j", suffix: ".", category: "Legal", isFollowUp: false },
            { id: "s8", prefix: "Obtaining genuinely informed ", missingWords: ["consent"], firstLetter: "c", suffix: " from users hidden in complex Terms of Service.", category: "Legal", isFollowUp: true },
            { id: "s9", prefix: "Ensuring compliance with the General Data Protection ", missingWords: ["regulation"], firstLetter: "r", suffix: " (GDPR).", category: "Legal", isFollowUp: true },
            { id: "s10", prefix: "The alteration of traditional human communication and ", missingWords: ["attention"], firstLetter: "a", suffix: " spans.", category: "Cultural", isFollowUp: false },
            { id: "s11", prefix: "Imposing Western tech values on different global ", missingWords: ["cultures", "culture"], firstLetter: "c", suffix: ".", category: "Cultural", isFollowUp: true },
            { id: "s12", prefix: "The digital divide where those without access miss out on modern cultural ", missingWords: ["participation"], firstLetter: "p", suffix: ".", category: "Cultural", isFollowUp: true },
          ],
          explanation: "A holistic analysis of a global platform must consider the massive scale of algorithms. Cultural changes (attention/communication), Legal challenges (global vs local laws), Ethical impacts (democracy/society), and Moral choices (user/employee decisions).",
        },
      ];

      const shuffleArray = (arr) => {
        const newArr = [...arr];
        for (let i = newArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
      };

      const checkKeyword = (inputStr, correctList, firstLetter) => {
        if (!inputStr) return false;
        let cleanUser = inputStr.toLowerCase().trim().replace(/[^a-z0-9]/g, "");
        let cleanFirst = firstLetter.toLowerCase();
        for (let ans of correctList) {
          let cleanAns = ans.toLowerCase().trim().replace(/[^a-z0-9]/g, "");
          if (cleanUser === cleanAns || cleanFirst + cleanUser === cleanAns) return true;
        }
        return false;
      };

      // --- Theme Icons ---
      const SunIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      );
      const MoonIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      );

      // --- MAIN APP COMPONENT ---
      const App = () => {
        const allTopics = ["Moral", "Ethical", "Cultural", "Legal", "Spec Concepts"];

        const [theme, setTheme] = React.useState(() => {
          try {
            return localStorage.getItem("uimode") ||
              (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          } catch { return "light"; }
        });

        React.useEffect(() => {
          document.documentElement.classList.toggle("dark", theme === "dark");
          try { localStorage.setItem("uimode", theme); } catch {}
        }, [theme]);

        const toggleTheme = () => setTheme((t) => (t === "dark" ? "light" : "dark"));

        const [selectedTopics, setSelectedTopics] = React.useState(allTopics);
        const [pool, setPool] = React.useState([]);
        const [totalInLoop, setTotalInLoop] = React.useState(0);
        const [currentQuestion, setCurrentQuestion] = React.useState(null);
        const [currentOptions, setCurrentOptions] = React.useState([]);
        const [userAnswer, setUserAnswer] = React.useState("");
        const [scenarioAnswer, setScenarioAnswer] = React.useState({});
        const [contextualAnswer, setContextualAnswer] = React.useState({});
        const [isCorrect, setIsCorrect] = React.useState(null);
        const [showSolution, setShowSolution] = React.useState(false);
        const [isMenuOpen, setIsMenuOpen] = React.useState(false);
        const inputRef = React.useRef(null);

        React.useEffect(() => { initLoop(allTopics); }, []);

        React.useEffect(() => {
          if (currentQuestion?.type === "keyword" && inputRef.current && !showSolution && isCorrect === null) {
            inputRef.current.focus();
          }
        }, [currentQuestion, showSolution, isCorrect]);

        const initLoop = (topicsToUse) => {
          let filtered = questionsDB.filter((q) => topicsToUse.includes(q.topic));
          if (filtered.length === 0) { alert("Please select at least one sub-topic to continue."); return; }
          let shuffled = shuffleArray(filtered);
          setTotalInLoop(shuffled.length);
          loadNextQuestion(shuffled);
          setIsMenuOpen(false);
        };

        const loadNextQuestion = (forcedPool = null) => {
          let activePool = forcedPool || pool;
          if (activePool.length === 0) {
            let filtered = questionsDB.filter((q) => selectedTopics.includes(q.topic));
            if (filtered.length === 0) { alert("No questions found for the selected topics."); return; }
            activePool = shuffleArray(filtered);
            setTotalInLoop(activePool.length);
          }

          const nextQ = activePool[0];
          const newPool = activePool.slice(1);
          setPool(newPool);
          setCurrentQuestion(nextQ);
          setUserAnswer("");
          setScenarioAnswer({});
          setContextualAnswer({});
          setIsCorrect(null);
          setShowSolution(false);

          if (nextQ.type === "mcq") {
            setCurrentOptions(shuffleArray(nextQ.options));
          } else if (nextQ.type === "scenario") {
            let initScen = {};
            nextQ.items.forEach((item) => { initScen[item.id] = ""; });
            setScenarioAnswer(initScen);
          } else if (nextQ.type === "contextual_scenario") {
            let initAns = {};
            nextQ.items.forEach((item) => {
              initAns[item.id] = { wordInput: "", revealedCount: item.firstLetter.length, wordSolved: false, solvedWord: "", category: "", rowStatus: "pending" };
            });
            setContextualAnswer(initAns);
          }
        };

        const handleTopicToggle = (topic) => {
          setSelectedTopics((prev) => prev.includes(topic) ? prev.filter((t) => t !== topic) : [...prev, topic]);
        };

        const handleAnswerChange = (val) => {
          setUserAnswer(val);
          if (isCorrect === false) setIsCorrect(null);
        };

        const handleScenarioChange = (id, cat) => {
          setScenarioAnswer({ ...scenarioAnswer, [id]: cat });
          if (isCorrect === false) setIsCorrect(null);
        };

        const handleContextualWordChange = (id, val, item) => {
          let currentState = contextualAnswer[id];
          let primaryWord = item.missingWords[0];
          let prefix = primaryWord.substring(0, currentState.revealedCount);
          let cleanUser = val.toLowerCase().trim().replace(/[^a-z0-9]/g, "");
          let cleanPrefix = prefix.toLowerCase().replace(/[^a-z0-9]/g, "");
          let isMatch = false;
          let matchedWord = primaryWord;

          for (let ans of item.missingWords) {
            let cleanAns = ans.toLowerCase().trim().replace(/[^a-z0-9]/g, "");
            if (cleanUser === cleanAns || cleanPrefix + cleanUser === cleanAns) { isMatch = true; matchedWord = ans; break; }
          }

          if (isMatch) {
            setContextualAnswer((prev) => ({ ...prev, [id]: { ...prev[id], wordInput: "", wordSolved: true, solvedWord: matchedWord, rowStatus: "categorizing" } }));
          } else {
            setContextualAnswer((prev) => ({ ...prev, [id]: { ...prev[id], wordInput: val } }));
          }
        };

        const revealNextLetter = (id, item) => {
          setContextualAnswer((prev) => {
            let current = prev[id];
            let primaryWord = item.missingWords[0];
            let nextCount = current.revealedCount + 1;
            if (nextCount >= primaryWord.length) {
              return { ...prev, [id]: { ...current, revealedCount: primaryWord.length, wordSolved: true, solvedWord: primaryWord, rowStatus: "categorizing", wordInput: "" } };
            } else {
              return { ...prev, [id]: { ...current, revealedCount: nextCount } };
            }
          });
        };

        const handleContextualCategoryChange = (id, cat, item) => {
          let isCorrectCat = cat === item.category;
          setContextualAnswer((prev) => ({ ...prev, [id]: { ...prev[id], category: cat, rowStatus: isCorrectCat ? "correct" : "incorrect" } }));
        };

        const submitAnswer = () => {
          if (currentQuestion.type === "mcq" || currentQuestion.type === "categorisation") {
            if (!userAnswer) return;
            setIsCorrect(userAnswer === currentQuestion.correctAnswer);
          } else if (currentQuestion.type === "keyword") {
            if (!userAnswer) return;
            setIsCorrect(checkKeyword(userAnswer, currentQuestion.correctAnswers, currentQuestion.firstLetter));
          } else if (currentQuestion.type === "scenario") {
            let allAnswered = currentQuestion.items.every((i) => scenarioAnswer[i.id] !== "");
            if (!allAnswered) { alert("Please classify all items before checking your answer."); return; }
            setIsCorrect(currentQuestion.items.every((i) => scenarioAnswer[i.id] === currentQuestion.correctAnswers[i.id]));
          }
        };

        React.useEffect(() => {
          if (currentQuestion && currentQuestion.type === "contextual_scenario") {
            let keys = Object.keys(contextualAnswer);
            if (keys.length > 0 && keys.length === currentQuestion.items.length) {
              let allDone = currentQuestion.items.every((i) =>
                contextualAnswer[i.id]?.rowStatus === "correct" || contextualAnswer[i.id]?.rowStatus === "incorrect"
              );
              if (allDone && isCorrect !== "completed_contextual") setIsCorrect("completed_contextual");
            }
          }
        }, [contextualAnswer, currentQuestion, isCorrect]);

        // --- RENDERERS ---

        const renderMCQ = () => (
          <div className="space-y-3 mt-6 fade-in">
            {currentOptions.map((opt) => {
              let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 shadow-sm ";
              if (showSolution) {
                if (opt === currentQuestion.correctAnswer) btnClass += "bg-green-50 dark:bg-green-900/20 border-green-500 text-green-900 dark:text-green-300";
                else if (opt === userAnswer) btnClass += "bg-red-50 dark:bg-red-900/20 border-red-400 text-red-800 dark:text-red-300 opacity-60";
                else btnClass += "bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 opacity-50 text-slate-600 dark:text-slate-400";
              } else if (isCorrect) {
                if (opt === currentQuestion.correctAnswer) btnClass += "bg-green-50 dark:bg-green-900/20 border-green-500 text-green-900 dark:text-green-300";
                else btnClass += "bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 opacity-50 text-slate-600 dark:text-slate-400";
              } else {
                if (opt === userAnswer) btnClass += "bg-indigo-50 dark:bg-indigo-900/30 border-indigo-500 text-indigo-900 dark:text-indigo-200 ring-1 ring-indigo-500";
                else btnClass += "bg-white dark:bg-slate-700 border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 hover:border-indigo-300 text-slate-700 dark:text-slate-200";
              }
              return (
                <button key={opt} onClick={() => handleAnswerChange(opt)} disabled={showSolution || isCorrect} className={btnClass}>
                  {opt}
                </button>
              );
            })}
          </div>
        );

        const renderCategorisation = () => (
          <div className="grid grid-cols-2 gap-4 mt-8 fade-in">
            {currentQuestion.categories.map((cat) => {
              let btnClass = "p-5 text-center rounded-xl font-bold text-lg border-2 transition-all shadow-sm ";
              if (showSolution) {
                if (cat === currentQuestion.correctAnswer) btnClass += "bg-green-50 dark:bg-green-900/20 border-green-500 text-green-800 dark:text-green-300";
                else if (cat === userAnswer) btnClass += "bg-red-50 dark:bg-red-900/20 border-red-400 text-red-800 dark:text-red-300 opacity-60";
                else btnClass += "bg-slate-50 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-400 dark:text-slate-500";
              } else if (isCorrect) {
                if (cat === currentQuestion.correctAnswer) btnClass += "bg-green-50 dark:bg-green-900/20 border-green-500 text-green-800 dark:text-green-300";
                else btnClass += "bg-slate-50 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-400 dark:text-slate-500 opacity-50";
              } else {
                if (cat === userAnswer) btnClass += "bg-indigo-600 border-indigo-700 text-white shadow-md transform scale-[1.02]";
                else btnClass += "bg-white dark:bg-slate-700 border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 hover:border-indigo-400";
              }
              return (
                <button key={cat} onClick={() => handleAnswerChange(cat)} disabled={showSolution || isCorrect} className={btnClass}>
                  {cat}
                </button>
              );
            })}
          </div>
        );

        const renderKeyword = () => (
          <div className="mt-8 flex flex-col items-center justify-center fade-in">
            <div className="relative flex items-center w-full max-w-md shadow-sm">
              <span className="absolute left-4 font-bold text-2xl text-indigo-700 dark:text-indigo-400 select-none">
                {currentQuestion.firstLetter}
              </span>
              <input
                ref={inputRef}
                type="text"
                value={userAnswer}
                onChange={(e) => handleAnswerChange(e.target.value)}
                disabled={showSolution || isCorrect}
                placeholder="... type the missing keyword or acronym"
                className="w-full pl-12 pr-4 py-4 text-xl border-2 border-slate-300 dark:border-slate-600 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors text-slate-800 dark:text-slate-100 font-semibold bg-white dark:bg-slate-700"
                onKeyDown={(e) => { if (e.key === "Enter") submitAnswer(); }}
              />
            </div>
          </div>
        );

        const renderScenario = () => (
          <div className="space-y-5 mt-6 fade-in">
            {currentQuestion.items.map((item) => (
              <div key={item.id} className="p-4 md:p-5 border-2 border-slate-200 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-700 shadow-sm flex flex-col lg:flex-row lg:items-center justify-between gap-4 transition-colors hover:border-indigo-200 dark:hover:border-indigo-700">
                <div className="text-base font-medium text-slate-700 dark:text-slate-200 lg:w-3/5 leading-relaxed">
                  <i className="fas fa-caret-right text-indigo-400 mr-2"></i> {item.text}
                </div>
                <div className="lg:w-2/5 flex flex-wrap gap-2 justify-start lg:justify-end">
                  {currentQuestion.categories.map((cat) => {
                    let isSelected = scenarioAnswer[item.id] === cat;
                    let isCorrectAns = currentQuestion.correctAnswers[item.id] === cat;
                    let btnClass = "px-3 py-1.5 text-sm font-bold rounded-lg transition-all border shadow-sm ";
                    if (showSolution) {
                      if (isCorrectAns) btnClass += "bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 border-green-500 ring-2 ring-green-500 ring-offset-1";
                      else if (isSelected) btnClass += "bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border-red-300 dark:border-red-700 opacity-60";
                      else btnClass += "bg-white dark:bg-slate-600 text-slate-400 dark:text-slate-500 border-slate-200 dark:border-slate-600";
                    } else if (isCorrect) {
                      if (isCorrectAns) btnClass += "bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 border-green-500";
                      else btnClass += "bg-white dark:bg-slate-600 text-slate-300 dark:text-slate-500 border-slate-200 dark:border-slate-600 opacity-50";
                    } else {
                      if (isSelected) btnClass += "bg-indigo-600 text-white border-indigo-700 shadow-md";
                      else btnClass += "bg-white dark:bg-slate-600 text-slate-600 dark:text-slate-200 border-slate-300 dark:border-slate-500 hover:bg-slate-50 dark:hover:bg-slate-500 hover:border-indigo-300";
                    }
                    return (
                      <button key={cat} onClick={() => handleScenarioChange(item.id, cat)} className={btnClass} disabled={showSolution || isCorrect}>
                        {cat}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        );

        const renderContextualScenario = () => (
          <div className="space-y-4 mt-6 fade-in">
            <p className="text-sm font-medium text-slate-600 dark:text-slate-300 mb-4 bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-lg border border-indigo-100 dark:border-indigo-800 flex items-center gap-2">
              <i className="fas fa-info-circle text-indigo-500 dark:text-indigo-400"></i>
              Complete the missing word (use [+] for hints) to reveal the categories, then select the correct category.
            </p>
            {currentQuestion.items.map((item) => {
              let ans = contextualAnswer[item.id] || { wordInput: "", revealedCount: 1, wordSolved: false, rowStatus: "pending" };
              let primaryWord = item.missingWords[0];
              let prefix = primaryWord.substring(0, ans.revealedCount);

              let rowClass = "p-4 md:p-5 border-2 rounded-xl flex flex-col xl:flex-row gap-4 xl:items-center justify-between transition-colors shadow-sm ";
              if (item.isFollowUp) rowClass += " ml-4 md:ml-12 border-l-4 border-l-indigo-300 dark:border-l-indigo-700 ";

              if (ans.rowStatus === "correct") rowClass += "bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800";
              else if (ans.rowStatus === "incorrect") rowClass += "bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800";
              else if (ans.rowStatus === "categorizing") rowClass += "bg-indigo-50 dark:bg-indigo-900/20 border-indigo-200 dark:border-indigo-700 shadow-md";
              else rowClass += "bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 hover:border-indigo-200 dark:hover:border-indigo-700";

              return (
                <div key={item.id} className={rowClass}>
                  <div className="text-base text-slate-700 dark:text-slate-200 leading-relaxed xl:w-3/5 flex flex-wrap items-center gap-1.5">
                    {item.isFollowUp && <span className="text-indigo-400 mr-1 opacity-70 font-bold">...</span>}
                    {!item.isFollowUp && <i className="fas fa-caret-right text-indigo-400 mr-1"></i>}
                    <span>{item.prefix}</span>

                    <div className={`inline-flex border-2 rounded-md px-2 py-1 items-center transition-colors ${
                      ans.rowStatus === "correct"
                        ? "bg-green-100 dark:bg-green-900/30 border-green-500 text-green-900 dark:text-green-300 font-bold"
                        : ans.rowStatus === "incorrect"
                          ? "bg-red-100 dark:bg-red-900/30 border-red-400 text-red-900 dark:text-red-300 font-bold"
                          : ans.wordSolved
                            ? "bg-indigo-100 dark:bg-indigo-900/30 border-indigo-500 text-indigo-900 dark:text-indigo-200 font-bold"
                            : "bg-slate-50 dark:bg-slate-600 border-slate-300 dark:border-slate-500 shadow-inner focus-within:border-indigo-500"
                    }`}>
                      <span className={`font-bold mr-0.5 ${ans.wordSolved ? "" : "text-indigo-700 dark:text-indigo-400"}`}>{prefix}</span>
                      {ans.wordSolved ? (
                        <span className="min-w-[4rem] px-1">{ans.solvedWord.substring(ans.revealedCount)}</span>
                      ) : (
                        <>
                          <input
                            type="text"
                            value={ans.wordInput}
                            onChange={(e) => handleContextualWordChange(item.id, e.target.value, item)}
                            className="outline-none bg-transparent min-w-[5rem] max-w-[8rem] text-slate-800 dark:text-slate-100 font-semibold"
                          />
                          <button
                            onClick={() => revealNextLetter(item.id, item)}
                            className="ml-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 focus:outline-none transition-colors px-1"
                            title="Reveal next letter"
                          >
                            <i className="fas fa-plus-square text-lg"></i>
                          </button>
                        </>
                      )}
                    </div>
                    <span>{item.suffix}</span>
                  </div>

                  <div className="xl:w-2/5 flex flex-wrap gap-2 justify-start xl:justify-end min-h-[2.5rem]">
                    {ans.wordSolved && ["Moral", "Ethical", "Cultural", "Legal"].map((cat) => {
                      let isSelected = ans.category === cat;
                      let isCorrectCat = item.category === cat;
                      let btnClass = "px-3 py-1.5 text-xs md:text-sm font-bold rounded-lg transition-all border shadow-sm ";

                      if (ans.rowStatus === "correct") {
                        if (isCorrectCat) btnClass += "bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 border-green-500 ring-2 ring-green-500 ring-offset-1";
                        else btnClass += "bg-white dark:bg-slate-600 text-slate-300 dark:text-slate-500 border-slate-100 dark:border-slate-600 opacity-40";
                      } else if (ans.rowStatus === "incorrect") {
                        if (isCorrectCat) btnClass += "bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 border-green-500 ring-2 ring-green-500 ring-offset-1";
                        else if (isSelected) btnClass += "bg-red-100 dark:bg-red-900/20 text-red-700 dark:text-red-400 border-red-500 opacity-80 line-through";
                        else btnClass += "bg-white dark:bg-slate-600 text-slate-300 dark:text-slate-500 border-slate-100 dark:border-slate-600 opacity-40";
                      } else {
                        btnClass += "bg-white dark:bg-slate-600 text-slate-600 dark:text-slate-200 border-slate-300 dark:border-slate-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 hover:border-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 hover:shadow-md";
                      }

                      return (
                        <button
                          key={cat}
                          onClick={() => handleContextualCategoryChange(item.id, cat, item)}
                          className={btnClass}
                          disabled={ans.rowStatus === "correct" || ans.rowStatus === "incorrect"}
                        >
                          {cat}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );

        const renderFeedback = () => {
          if (isCorrect === "completed_contextual") {
            let correctCount = currentQuestion.items.filter((i) => contextualAnswer[i.id]?.rowStatus === "correct").length;
            let totalCount = currentQuestion.items.length;
            let message = correctCount === totalCount ? "Perfect Score!" : "Scenario Completed";
            let icon = correctCount === totalCount ? "fa-star text-yellow-500" : "fa-flag-checkered text-blue-500";
            let bgClass = correctCount === totalCount
              ? "bg-yellow-50 dark:bg-yellow-900/20 border-yellow-200 dark:border-yellow-800 text-yellow-900 dark:text-yellow-200"
              : "bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 text-blue-900 dark:text-blue-200";

            return (
              <div className={`mt-8 p-6 border rounded-xl flex flex-col items-center fade-in ${bgClass}`}>
                <div className="flex items-center gap-2 font-bold text-xl mb-2">
                  <i className={`fas ${icon} text-2xl`}></i> {message} ({correctCount}/{totalCount})
                </div>
                <p className="text-center font-medium mb-6 opacity-90">{currentQuestion.explanation}</p>
                <button onClick={() => loadNextQuestion()} className="px-8 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold shadow-md transition-transform transform hover:-translate-y-0.5">
                  Next Question <i className="fas fa-arrow-right ml-2"></i>
                </button>
              </div>
            );
          }

          if (isCorrect === null && !showSolution) {
            if (currentQuestion.type === "contextual_scenario") return null;
            return (
              <div className="mt-8 flex justify-end border-t border-slate-200 dark:border-slate-700 pt-6">
                <button
                  onClick={submitAnswer}
                  className="px-8 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold shadow-md transition-transform transform hover:-translate-y-0.5 flex items-center gap-2"
                >
                  <i className="fas fa-check"></i> Check Answer
                </button>
              </div>
            );
          }

          if (isCorrect === true) {
            return (
              <div className="mt-8 p-6 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl text-green-900 dark:text-green-200 flex flex-col items-center fade-in">
                <div className="flex items-center gap-2 font-bold text-xl mb-3 text-green-700 dark:text-green-400">
                  <i className="fas fa-check-circle text-2xl"></i> Correct!
                </div>
                <p className="text-center text-green-800 dark:text-green-300 font-medium mb-6">{currentQuestion.explanation}</p>
                <button onClick={() => loadNextQuestion()} className="px-8 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 font-bold shadow-md transition-transform transform hover:-translate-y-0.5">
                  Next Question <i className="fas fa-arrow-right ml-2"></i>
                </button>
              </div>
            );
          }

          if (isCorrect === false && !showSolution) {
            return (
              <div className="mt-8 p-6 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-red-900 dark:text-red-200 flex flex-col items-center fade-in">
                <div className="flex items-center gap-2 font-bold text-xl mb-2 text-red-700 dark:text-red-400">
                  <i className="fas fa-times-circle text-2xl"></i> Not Quite Right
                </div>
                <p className="text-center mb-6 font-medium text-red-800 dark:text-red-300">
                  You can adjust your answer and try again, or view the solution.
                </p>
                <div className="flex gap-4">
                  <button
                    onClick={() => setShowSolution(true)}
                    className="px-6 py-3 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-600 font-bold transition-colors shadow-sm"
                  >
                    Show Solution <i className="fas fa-eye ml-2"></i>
                  </button>
                </div>
              </div>
            );
          }

          if (showSolution) {
            return (
              <div className="mt-8 p-6 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl text-blue-900 dark:text-blue-200 flex flex-col items-center fade-in">
                <div className="flex items-center gap-2 font-bold text-xl mb-3 text-blue-700 dark:text-blue-400">
                  <i className="fas fa-info-circle text-2xl"></i> Solution
                </div>
                <p className="text-center font-medium mb-6">{currentQuestion.explanation}</p>
                <button onClick={() => loadNextQuestion()} className="px-8 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold shadow-md transition-transform transform hover:-translate-y-0.5">
                  Next Question <i className="fas fa-arrow-right ml-2"></i>
                </button>
              </div>
            );
          }
        };

        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 relative pb-12">
            {/* CS Learning Header */}
            <header className="bg-headerBg h-[58px] flex items-center justify-between px-8 shadow-lg z-50 shrink-0">
              <a
                href="index.html"
                className="font-mono text-[1.2rem] font-bold text-headerAccent tracking-widest no-underline"
              >
                <span className="text-slate-500">&lt;</span>CS
                <span className="text-slate-500">&gt;</span>&nbsp;Learning
              </a>
              <nav className="flex items-center gap-6">
                <a
                  href="index.html"
                  className="text-slate-400 hover:text-headerAccent text-[0.875rem] font-medium tracking-wide transition-colors"
                >
                  Home
                </a>
                <button
                  onClick={toggleTheme}
                  className="text-slate-400 hover:text-headerAccent transition-colors p-1"
                  aria-label="Toggle Dark Mode"
                >
                  {theme === "dark" ? (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  )}
                </button>
              </nav>
            </header>

            {/* Page Sub-Header */}
            <div className="bg-indigo-800 dark:bg-slate-800 text-white p-4 shadow-md sticky top-[58px] z-40">
              <div className="max-w-4xl mx-auto flex justify-between items-center">
                <div>
                  <h1 className="text-xl md:text-2xl font-bold tracking-tight">AQA A-Level CS</h1>
                  <p className="text-indigo-200 dark:text-slate-400 text-xs md:text-sm font-medium tracking-wide uppercase mt-0.5">
                    4.8 Consequences of Computing
                  </p>
                </div>

                <div className="relative">
                  <button
                    onClick={() => setIsMenuOpen(!isMenuOpen)}
                    className="flex items-center gap-2 bg-indigo-700 dark:bg-slate-700 hover:bg-indigo-600 dark:hover:bg-slate-600 px-4 py-2.5 rounded-lg transition-colors shadow-sm font-semibold text-sm"
                  >
                    <i className="fas fa-filter"></i>
                    <span className="hidden md:inline">Topics Filter</span>
                    <i className={`fas fa-chevron-${isMenuOpen ? "up" : "down"} text-xs ml-1`}></i>
                  </button>

                  {isMenuOpen && (
                    <>
                      <div className="fixed inset-0 z-40" onClick={() => setIsMenuOpen(false)}></div>
                      <div className="absolute right-0 mt-3 w-72 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 p-5 text-slate-800 dark:text-slate-100 z-50 fade-in">
                        <h3 className="font-bold text-xs text-slate-500 dark:text-slate-400 mb-4 uppercase tracking-widest border-b dark:border-slate-700 pb-2">
                          Filter Sub-topics
                        </h3>
                        <div className="space-y-3 mb-5">
                          {allTopics.map((topic) => (
                            <label key={topic} className="flex items-center gap-3 cursor-pointer p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-md group">
                              <input
                                type="checkbox"
                                checked={selectedTopics.includes(topic)}
                                onChange={() => handleTopicToggle(topic)}
                                className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500 border-slate-300"
                              />
                              <span className="font-semibold text-slate-700 dark:text-slate-200 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
                                {topic}
                              </span>
                            </label>
                          ))}
                        </div>
                        <button
                          onClick={() => initLoop(selectedTopics)}
                          className="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition-colors shadow-md"
                        >
                          Apply & Restart
                        </button>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* Main Content */}
            <main className="max-w-4xl mx-auto p-4 md:p-6 mt-4">
              {currentQuestion ? (
                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 md:p-8 fade-in">
                  <div className="flex flex-wrap justify-between items-center mb-6 border-b border-slate-100 dark:border-slate-700 pb-4 gap-4">
                    <span className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-sm font-bold px-4 py-1.5 rounded-md uppercase tracking-wide flex items-center gap-2">
                      <i className="fas fa-tag"></i> {currentQuestion.topic}
                    </span>
                    <span className="text-sm font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 px-4 py-1.5 rounded-md flex items-center gap-2">
                      <i className="fas fa-layer-group text-slate-400 dark:text-slate-500"></i> Q {totalInLoop - pool.length} of {totalInLoop}
                    </span>
                  </div>

                  <h2 className="text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 leading-snug mb-2">
                    {currentQuestion.question}
                  </h2>

                  {currentQuestion.type === "scenario" && (
                    <p className="text-slate-500 dark:text-slate-400 mb-6 font-medium text-sm border-l-4 border-indigo-300 dark:border-indigo-700 pl-3">
                      Select the most appropriate category for each project consideration to build the case study argument.
                    </p>
                  )}

                  {currentQuestion.type === "mcq" && renderMCQ()}
                  {currentQuestion.type === "categorisation" && renderCategorisation()}
                  {currentQuestion.type === "keyword" && renderKeyword()}
                  {currentQuestion.type === "scenario" && renderScenario()}
                  {currentQuestion.type === "contextual_scenario" && renderContextualScenario()}

                  {renderFeedback()}
                </div>
              ) : (
                <div className="text-center p-16">
                  <i className="fas fa-spinner fa-spin text-5xl text-indigo-500 mb-6"></i>
                  <p className="text-slate-600 dark:text-slate-400 font-bold text-lg">Loading interactive content...</p>
                </div>
              )}
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
